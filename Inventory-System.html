<style>
body{font-family:Arial;background:#f5f5f5;margin:0;padding:20px}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
input,select{padding:8px;width:100%}
button{padding:10px;background:#222;color:#fff;border:none;border-radius:6px;cursor:pointer}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #ddd;text-align:left}
.red{color:red;font-weight:bold}
.green{color:green;font-weight:bold}
</style>
</head>
<body>

<h1>📦 INVENTORY SYSTEM</h1>

<div class="card">
  <div class="grid">
    <input id="procode" placeholder="ProCode" />

    <select id="type">
      <option value="import">Nhập kho</option>
      <option value="export">Xuất kho</option>
      <option value="return">Trả hàng</option>
      <option value="cancel">Hủy hàng</option>
    </select>

    <input id="qty" type="number" placeholder="Số lượng" />
    <input id="price" type="number" placeholder="Giá" />

    <button onclick="addLog()">Lưu</button>
  </div>
</div>

<div class="card">
  <h3>📊 Inventory</h3>
  <table>
    <thead>
      <tr>
        <th>ProCode</th>
        <th>Tồn</th>
        <th>Minus</th>
        <th>Giá nhập</th>
        <th>Giá bán</th>
        <th>Profit</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>
