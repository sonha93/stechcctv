<!-- ===========================
     ACTIVITY SHEET
=========================== -->

<div id="activitySheet">

    <div class="activity-container">

        <div class="sheet-top"></div>

        <div class="activity-header">

            <div class="activity-title">
                Hoạt động
            </div>

            <button
                class="close-activity"
                onclick="closeActivity()">
                ✕
            </button>

        </div>

        <div class="activity-tabs">

            <button
                class="activity-tab active"
                data-type="all">
                Tất cả
            </button>

            <button
                class="activity-tab"
                data-type="follow">
                Follow
            </button>

            <button
                class="activity-tab"
                data-type="like">
                Thích
            </button>

            <button
                class="activity-tab"
                data-type="comment">
                Bình luận
            </button>

            <button
                class="activity-tab"
                data-type="story">
                Story
            </button>

            <button
                class="activity-tab"
                data-type="message">
                Tin nhắn
            </button>

        </div>

        <div id="activityList">

            <div class="activity-loading">

                Đang tải...

            </div>

        </div>

    </div>

</div>
