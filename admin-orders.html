<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quản lý đơn hàng Stech</title>
<style>
/* =========================
   RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    padding:16px;
}

/* =========================
   TITLE
========================= */

h1{
    margin-bottom:16px;
    font-size:20px;
    color:#222;
}

/* =========================
   STATS
========================= */

.stats-wrap{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    margin-bottom:16px;
}

.stat-box{
    background:#fff;
    padding:14px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.06);
}

.stat-box h3{
    font-size:13px;
    color:#777;
    margin-bottom:6px;
}

.stat-box span{
    font-size:20px;
    font-weight:700;
    color:#111;
}

/* =========================
   TABLE (DESKTOP)
========================= */

.table-wrap{
    background:#fff;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    overflow:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:900px;
}

th,td{
    padding:12px;
    border-bottom:1px solid #eee;
    text-align:left;
    font-size:13px;
    white-space:nowrap;
}

th{
    background:#111;
    color:#fff;
}

tr:hover{
    background:#fafafa;
}

/* =========================
   STATUS
========================= */

.status{
    padding:4px 10px;
    border-radius:20px;
    font-size:11px;
    font-weight:700;
    display:inline-block;
}

.pending{
    background:#fff3cd;
    color:#856404;
}

.confirmed{
    background:#d4edda;
    color:#155724;
}

.cancelled{
    background:#f8d7da;
    color:#721c24;
}

/* =========================
   BUTTONS
========================= */

.actions{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
}

button{
    border:none;
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
    font-size:12px;
    transition:.2s;
}

.confirm-btn{
    background:#28a745;
    color:#fff;
}

.confirm-btn:hover{
    background:#218838;
}

.cancel-btn{
    background:#dc3545;
    color:#fff;
}

.cancel-btn:hover{
    background:#c82333;
}

/* =========================
   EMPTY
========================= */

.empty{
    padding:30px;
    text-align:center;
    color:#777;
}

/* =========================
   MOBILE OPTIMIZATION
========================= */

@media (max-width:768px){

    body{
        padding:12px;
    }

    h1{
        font-size:18px;
    }

    .stats-wrap{
        grid-template-columns:1fr 1fr;
        gap:10px;
    }

    .table-wrap{
        border-radius:10px;
    }

    table{
        min-width:700px;
    }

    th,td{
        padding:10px;
        font-size:12px;
    }

    button{
        padding:6px 8px;
        font-size:11px;
    }

    .status{
        font-size:10px;
        padding:3px 8px;
    }
}
   </style>
</head>

<body>

<h1>Quản lý đơn hàng Stech</h1>
   <!-- SEARCH -->
<div style="margin-bottom:16px;">
    <input
        type="text"
        id="searchOrder"
        placeholder="Tìm mã đơn hàng..."
        style="
            width:100%;
            padding:12px;
            border:1px solid #ddd;
            border-radius:10px;
            font-size:14px;
        "
    >
</div>
   <!-- FILTER DATE -->
<div
    style="
        display:flex;
        gap:10px;
        margin-bottom:16px;
        flex-wrap:wrap;
    "
>

    <input
        type="date"
        id="filterDate"
        style="
            padding:12px;
            border:1px solid #ddd;
            border-radius:10px;
        "
    >

    <button
        id="clearDate"
        style="
            padding:12px 16px;
            border:none;
            border-radius:10px;
            background:#111;
            color:#fff;
            cursor:pointer;
        "
    >
        Xóa lọc
    </button>

</div>
<div class="stats-wrap">

    <div class="stat-box">
        <h3>Tổng đơn</h3>
        <span id="totalOrders">0</span>
    </div>

    <div class="stat-box">
        <h3>Doanh thu</h3>
        <span id="totalRevenue">0đ</span>
    </div>

</div>

<div class="stats-wrap" style="margin-bottom:16px;">

    <div class="stat-box">
        <h3>Đơn chờ xử lý</h3>
        <span id="pendingCount">0</span>
    </div>

    <div class="stat-box">
        <h3>Đơn đang giao</h3>
        <span id="shippingCount">0</span>
    </div>

    <div class="stat-box">
        <h3>Đơn giao thành công</h3>
        <span id="completedCount">0</span>
    </div>

    <div class="stat-box">
        <h3>Đơn giao thất bại</h3>
        <span id="cancelledCount">0</span>
    </div>

</div>

<!-- REVENUE BY DATE -->
<div class="stat-box" style="margin-bottom:16px;">
    
    <h3>Doanh thu theo ngày</h3>

    <div id="revenueByDate">
        Đang tải...
    </div>

</div>
<div class="table-wrap">

<table>

<thead>
   <tr>
  <th>Mã đơn</th>
  <th>Khách hàng</th>
  <th>Địa chỉ</th>
  <th>Sản phẩm</th>
  <th>Tổng tiền</th>
  <th>Trạng thái</th>
  <th>Ngày tạo</th>
  <th>Hành động</th>
</tr>
</thead>

<tbody id="ordersTable">

<tr>
<td colspan="8" class="empty">
Đang tải đơn hàng...
</td>
</tr>

</tbody>

</table>
   </div>

<!-- PAGINATION -->
<div
    id="pagination"
    style="
        margin-top:16px;
        display:flex;
        flex-wrap:wrap;
        gap:6px;
        justify-content:center;
    "
></div>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script type="module" src="admin-orders.js"></script>
</body>
</html>
