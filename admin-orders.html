<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quản lý đơn hàng</title>

<style>

/* =========================
   RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    padding:20px;
}

/* =========================
   TITLE
========================= */

h1{
    margin-bottom:20px;
    color:#222;
}

/* =========================
   TABLE
========================= */

.table-wrap{
    overflow-x:auto;
    background:#fff;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:900px;
}

th,td{
    padding:14px;
    border-bottom:1px solid #eee;
    text-align:left;
    font-size:14px;
}

th{
    background:#111;
    color:#fff;
}

tr:hover{
    background:#fafafa;
}

/* =========================
   STATUS
========================= */

.status{
    padding:6px 12px;
    border-radius:20px;
    font-size:12px;
    font-weight:bold;
    display:inline-block;
}

.pending{
    background:#fff3cd;
    color:#856404;
}

.confirmed{
    background:#d4edda;
    color:#155724;
}

.cancelled{
    background:#f8d7da;
    color:#721c24;
}

/* =========================
   BUTTONS
========================= */

.actions{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

button{
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
    transition:.2s;
}

.confirm-btn{
    background:#28a745;
    color:#fff;
}

.confirm-btn:hover{
    background:#218838;
}

.cancel-btn{
    background:#dc3545;
    color:#fff;
}

.cancel-btn:hover{
    background:#c82333;
}

/* =========================
   EMPTY
========================= */

.empty{
    padding:40px;
    text-align:center;
    color:#777;
}

</style>
</head>

<body>

<h1>Quản lý đơn hàng</h1>

<div class="table-wrap">

<table>

<thead>
<tr>
    <th>Mã đơn</th>
    <th>Khách hàng</th>
    <th>Sản phẩm</th>
    <th>Tổng tiền</th>
    <th>Trạng thái</th>
    <th>Ngày tạo</th>
    <th>Hành động</th>
</tr>
</thead>

<tbody id="ordersTable">

<tr>
<td colspan="7" class="empty">
Đang tải đơn hàng...
</td>
</tr>

</tbody>

</table>

</div>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script type="module" src="admin-orders.js"></script>
</body>
</html>
