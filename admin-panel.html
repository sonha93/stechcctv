<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Shop Camera Pro</title>
<style>
body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
.container { max-width: 600px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; }
table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
th { background: #eee; }
button { padding: 6px 12px; background: #00acc1; color: #fff; border: none; cursor: pointer; border-radius: 4px; }
#preview { max-width: 100%; margin-top: 10px; }
</style>

<!-- Firebase App (cdn) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

</head>
<body>
<div class="container">
<h2>Admin Panel - Shop Camera Pro</h2>
<table>
<tr>
<th>Tên sản phẩm</th>
<th>Giá</th>
<th>Ảnh</th>
</tr>
<tr>
<td>Ví dụ Camera 1</td>
<td>500.000</td>
<td><img id="current-img" src="" alt="" width="100"></td>
</tr>
</table>

<input type="file" id="file-input">
<button id="upload-btn">Upload lên Firebase</button>
<p id="progress">Upload 0%</p>
<img id="preview" src="" alt="Preview">

</div>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBgiXCyXP7Ion3dgL-QOckfhGKbZZxkxN0",
  authDomain: "stech-storage.firebaseapp.com",
  projectId: "stech-storage",
  storageBucket: "stech-storage.appspot.com",
  messagingSenderId: "426074076904",
  appId: "1:426074076904:web:50e3475feb2a2fbbeb3b5d"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const storage = firebase.storage();

const fileInput = document.getElementById('file-input');
const uploadBtn = document.getElementById('upload-btn');
const progressText = document.getElementById('progress');
const preview = document.getElementById('preview');
const currentImg = document.getElementById('current-img');

let selectedFile = null;

fileInput.addEventListener('change', e => {
    selectedFile = e.target.files[0];
    if(selectedFile) {
        const reader = new FileReader();
        reader.onload = function(evt) {
            preview.src = evt.target.result;
        }
        reader.readAsDataURL(selectedFile);
    }
});

uploadBtn.addEventListener('click', () => {
    if(!selectedFile) return alert('Chọn file trước!');
    const storageRef = storage.ref('uploads/' + selectedFile.name);
    const uploadTask = storageRef.put(selectedFile);

    uploadTask.on('state_changed', snapshot => {
        const percent = Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100);
        progressText.innerText = 'Upload ' + percent + '%';
    }, error => {
        console.error('Upload lỗi:', error);
        alert('Upload thất bại!');
    }, () => {
        uploadTask.snapshot.ref.getDownloadURL().then(url => {
            currentImg.src = url; // hiện ảnh sau upload
            preview.src = '';
            progressText.innerText = 'Upload hoàn tất!';
        });
    });
});
</script>

</body>
</html>
