<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin sản phẩm</title>

<style>
:root{
  --main-color:#00acc1;
}

body{
  font-family:Arial;
  padding:20px;
  background:#f5f5f5;
}

h2{
  margin-bottom:15px;
}

input,
button,
select,
textarea{
  display:block;
  margin:8px 0;
  padding:10px;
  width:320px;
  border:1px solid #ddd;
  border-radius:6px;
  font-family:Arial;
}

textarea{
  min-height:80px;
  resize:vertical;
}

button{
  cursor:pointer;
  background:var(--main-color);
  color:#fff;
  border:none;
}

.item{
  background:#fff;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.item img{
  width:80px;
  border-radius:6px;
  display:block;
  margin-bottom:6px;
}

.home-btn{
  display:inline-block;
  margin-bottom:10px;
  background:#00acc1;
  color:#fff;
  padding:8px 12px;
  border-radius:20px;
  text-decoration:none;
  font-size:13px;
}

.home-btn:hover{
  opacity:0.85;
}

#showCat{
  margin:6px 0;
  color:#00acc1;
  font-weight:bold;
}

.spec-title{
  font-weight:bold;
  margin-top:10px;
  color:#00acc1;
}

.cat-box-container {
  background: #fff;
  padding: 12px;
  border-radius: 6px;
  border: 1px solid #ddd;
  margin: 8px 0;
}

.cat-box-container label {
  display: block;
  margin: 6px 0;
  cursor: pointer;
}

.cat-box-container input {
  display: inline-block;
  width: auto;
  margin-right: 8px;
}

@media (max-width:768px){

  body{
    padding:10px;
  }

  input,
  select,
  button,
  textarea{
    width:100%;
    box-sizing:border-box;
  }

  .form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:2px;
  }

  .full{
    grid-column:1 / -1;
  }

  .item{
    display:grid;
    grid-template-columns:80px 1fr;
    gap:10px;
    align-items:center;
  }

  .item img{
    width:100%;
    height:auto;
  }

}

</style>
</head>

<body>

<h2>📦 Admin sản phẩm</h2>

<a href="index.html" class="home-btn">
← Trang chủ
</a>

<div class="form-grid">

  <input id="name" placeholder="Tên sản phẩm" class="full">

  <input id="price" placeholder="Giá">

  <input id="oldPrice" placeholder="Giá cũ">

  <textarea id="desc" placeholder="Mô tả" class="full"></textarea>

  <input id="imgUrl" placeholder="Link ảnh Cloudinary" class="full">

  <!-- ĐÃ THAY THẾ SELECT THÀNH CHECKBOX ĐỂ CHỌN NHIỀU NHÁNH CÙNG LÚC -->
  <div class="full cat-box-container">
    <p style="font-weight: bold; margin: 0 0 8px 0; color: #333;">📁 Chọn nhánh hiển thị (Tích chọn nhiều):</p>
    <label><input type="checkbox" class="cat-checkbox" value="home"> 🏠 Trang chủ</label>
    <label><input type="checkbox" class="cat-checkbox" value="sd"> 💾 Thẻ nhớ</label>
    <label><input type="checkbox" class="cat-checkbox" value="cam-in"> 🏠 Camera trong nhà</label>
    <label><input type="checkbox" class="cat-checkbox" value="cam-ngoai"> 🌳 Camera ngoài trời</label>
    <label><input type="checkbox" class="cat-checkbox" value="combo"> 📦 Combo</label>
  </div>

  <div id="showCat" class="full"></div>

  <div id="specBox" class="full"></div>

  <input type="file" id="fileImg" class="full">

  <label class="full">
    <input type="checkbox" id="featured" style="display:inline-block; width:auto; margin-right:5px;">
    ⭐ Featured
  </label>

  <button id="btnAdd" class="full">
    ➕ Thêm sản phẩm
  </button>

</div>

<hr>

<div id="list"></div>

<script type="module">

import { initializeApp } from "gstatic.com";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc } from "gstatic.com";

/* =========================
   FIREBASE
========================= */

const firebaseConfig = {
  apiKey: "AIzaSyDYVcBEYJN1HUCta3XdJAUBe4TGLnmy7y4",
  authDomain: "firebaseapp.com",
  projectId: "stech-73b89",
  storageBucket: "stech-73b89.firebasestorage.app",
  messagingSenderId: "873739162979",
  appId: "1:873739162979:web:978f1a4043f025b1cdaf56"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =========================
   START
========================= */

window.addEventListener("load", function(){

let products = [];

const nameMap = {
  sd:"Thẻ nhớ",
  "cam-in":"Camera trong nhà",
  "cam-ngoai":"Camera ngoài trời",
  combo:"Combo",
  home:"Trang chủ"
};

function getVal(id){
  const el=document.getElementById(id);
  return el ? el.value.trim() : "";
}

const btnAdd = document.getElementById("btnAdd");
const list = document.getElementById("list");

/* =========================
   XỬ LÝ CHỌN DANH MỤC & HIỂN THỊ CẤU HÌNH
========================= */
document.querySelectorAll(".cat-checkbox").forEach(checkbox => {
  checkbox.addEventListener("change", function() {
    const checkedBoxes = Array.from(document.querySelectorAll(".cat-checkbox:checked"));
    const checkedValues = checkedBoxes.map(el => el.value);
    
    // Hiển thị text các mục đã chọn
    const names = checkedValues.map(val => nameMap[val]);
    document.getElementById("showCat").innerText = names.length > 0 ? "📁 Đã chọn: " + names.join(", ") : "";

    const box = document.getElementById("specBox");
    
    // Tự động mở form điền thông số dựa trên các ô được tích
    if (checkedValues.includes("cam-in") || checkedValues.includes("cam-ngoai") || checkedValues.includes("combo")) {
      box.innerHTML = `<div class="spec-title">⚙️ Thông số camera</div>
        <input id="model" placeholder="Model">
        <input id="xuatXu" placeholder="Xuất xứ">
        <input id="baoHanh" placeholder="Bảo hành">
        <input id="doPhanGiai" placeholder="Độ phân giải">
        <input id="gocNhin" placeholder="Góc nhìn">
        <input id="ketNoi" placeholder="Kết nối">
        <input id="thietKe" placeholder="Thiết kế">
        <input id="chatLieu" placeholder="Chất liệu">
        <input id="congSuat" placeholder="Công suất">`;
    } 
    else if (checkedValues.includes("sd")) {
      box.innerHTML = `<div class="spec-title">💾 Thông số thẻ nhớ</div>
        <input id="model" placeholder="Model">
        <input id="xuatXu" placeholder="Xuất xứ">
        <input id="baoHanh" placeholder="Bảo hành">
        <input id="dungLuong" placeholder="Dung lượng">
        <input id="tocDo" placeholder="Tốc độ">
        <input id="loai" placeholder="Loại">
        <input id="chatLieu" placeholder="Chất liệu">`;
    } 
    else {
      box.innerHTML = "";
    }
  });
});

/* =========================
   LOAD FIRESTORE
========================= */
async function loadProducts(){
  products = [];
  try {
    const querySnapshot = await getDocs(collection(db,"products"));
    querySnapshot.forEach(doc => {
      products.push({
        docId:doc.id,
        ...doc.data()
      });
    });
    render();
  } catch(e) {
    console.error("Lỗi tải sản phẩm:", e);
  }
}

/* =========================
   RENDER DANH SÁCH (Hàm hiển thị danh sách admin bổ sung)
========================= */
function render(){
  list.innerHTML = "";
  products.forEach(p => {
    const div = document.createElement("div");
    div.className = "item";
    
    // Xử lý hiển thị danh mục dạng mảng hoặc chuỗi cũ
    let catDisplay = "";
    if(Array.isArray(p.category)) {
      catDisplay = p.category.map(c => nameMap[c] || c).join(", ");
    } else {
      catDisplay = nameMap[p.category] || p.category;
    }

    div.innerHTML = `
      <img src="${p.img || ''}" alt="">
      <div>
        <strong>${p.name}</strong><br>
        <span>Giá: ${p.price.toLocaleString('vi-VN')}đ</span> | <span>Nh nhánh: ${catDisplay}</span>
      </div>
    `;
    list.appendChild(div);
  });
}

// Chạy tải dữ liệu lần đầu
loadProducts();

/* =========================
   ADD PRODUCT
========================= */
btnAdd.addEventListener("click", async function(){
  const name=getVal("name");
  const price=Number(getVal("price").replace(/\D/g,""));
  const oldPrice=Number(getVal("oldPrice").replace(/\D/g,"") || 0);
  const desc=getVal("desc");
  
  // Lấy mảng các danh mục được tích chọn
  const selectedCategories = Array.from(document.querySelectorAll(".cat-checkbox:checked")).map(el => el.value);

  const file = document.getElementById("fileImg").files[0];
  const imgUrl = getVal("imgUrl");

  if(!name){
    return alert("Thiếu tên sản phẩm");
  }
  if(!price){
    return alert("Giá không hợp lệ");
  }
  if(selectedCategories.length === 0){
    return alert("Vui lòng chọn ít nhất 1 nhánh hiển thị!");
  }
  if(!file && !imgUrl){
    return alert("Chưa có ảnh");
  }

  async function addProduct(img){
    const productData = {
      id:Date.now(),
      name,
      price,
      oldPrice,
      desc,
      category: selectedCategories, // Lưu dạng MẢNG để hiển thị đa nhánh
      categoryName: selectedCategories.map(cat => nameMap[cat]).join(", "),
      img,
      featured: document.getElementById("featured").checked,
      model:getVal("model"),
      xuatXu:getVal("xuatXu"),
      baoHanh:getVal("baoHanh"),
      doPhanGiai:getVal("doPhanGiai"),
      gocNhin:getVal("gocNhin"),
      ketNoi:getVal("ketNoi"),
      thietKe:getVal("thietKe"),
      chatLieu:getVal("chatLieu"),
      congSuat:getVal("congSuat"),
      dungLuong:getVal("dungLuong"),
      tocDo:getVal("tocDo"),
      loai:getVal("loai")
    };

    try {
      await addDoc(collection(db,"products"), productData);
      alert("✔ Thêm sản phẩm thành công");
      
      // Reset form sau khi thêm thành công
      document.getElementById("name").value = "";
      document.getElementById("price").value = "";
      document.getElementById("oldPrice").value = "";
      document.getElementById("desc").value = "";
      document.getElementById("imgUrl").value = "";
      document.getElementById("fileImg").value = "";
      document.querySelectorAll(".cat-checkbox").forEach(el => el.checked = false);
      document.getElementById("specBox").innerHTML = "";
      document.getElementById("showCat").innerText = "";
      
      loadProducts();
    } catch(e) {
      alert("Lỗi lưu dữ liệu vào Firebase");
      console.error(e);
    }
  }

  /* =========================
     LINK CLOUDINARY
  ========================= */
  if(imgUrl){
    await addProduct(imgUrl);
    return;
  }

  /* =========================
     UPLOAD CLOUDINARY
  ========================= */
  if(file){
    try{
      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", "qzcttlvsh");

      const res = await fetch(
        "cloudinary.com",
        { method:"POST", body:formData }
      );

      const data = await res.json();
      if(!data.secure_url){
        return alert("Upload Cloudinary thất bại");
      }
      await addProduct(data.secure_url);
    }
    catch(err){
      console.log(err);
      alert("Lỗi upload ảnh");
    }
  }
});

});
</script>
</body>
</html>
