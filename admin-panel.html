<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin sản phẩm</title>

<style>
:root{ --main-color:#00acc1; }
body{ font-family:Arial; padding:20px; background:#f5f5f5; }
h2{ margin-bottom:15px; }

input, button, select{
  display:block;
  margin:8px 0;
  padding:10px;
  width:320px;
  border:1px solid #ddd;
  border-radius:6px;
}

button{
  cursor:pointer;
  background:var(--main-color);
  color:#fff;
  border:none;
}

.item{
  background:#fff;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.item img{
  width:80px;
  border-radius:6px;
  display:block;
  margin-bottom:6px;
}

.home-btn{
  display:inline-block;
  margin-bottom:10px;
  background:#00acc1;
  color:#fff;
  padding:8px 12px;
  border-radius:20px;
  text-decoration:none;
  font-size:13px;
}
.home-btn:hover{ opacity:0.85; }

#showCat{
  margin:6px 0;
  color:#00acc1;
  font-weight:bold;
}

/* 📱 MOBILE */
@media (max-width: 768px){

  body{ padding:10px; }

  input, select, button{
    width:100%;
    box-sizing:border-box;
  }

  .form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
  }

  .full{
    grid-column:1 / -1;
  }

  .item{
    display:grid;
    grid-template-columns:80px 1fr;
    gap:10px;
    align-items:center;
  }

  .item img{
    width:100%;
  }

  .item button{
    grid-column:1 / -1;
  }
}
  /* 🔥 PAGINATION STYLE */
#pagination{
  text-align:center;
  margin-top:10px;
}

#pagination button{
  margin:4px;
  padding:6px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#ddd;
}

#pagination button.active{
  background:#e53935;
  color:#fff;
}
</style>
</head>

<body>

<h2>📦 Admin sản phẩm</h2>
<a href="index.html" class="home-btn">← Trang chủ</a>

<div class="form-grid">

  <input id="name" placeholder="Tên sản phẩm" class="full">

  <input id="price" placeholder="Giá">
  <input id="oldPrice" placeholder="Giá cũ">

  <input id="desc" placeholder="Mô tả" class="full">

  <input id="imgUrl" placeholder="Link ảnh" class="full">

  <select id="category" class="full">
    <option value="sd">Thẻ nhớ</option>
    <option value="cam-in">Camera trong nhà</option>
    <option value="cam-ngoai">Camera ngoài trời</option>
    <option value="combo">Combo</option>
    <option value="home">Trang chủ</option>
  </select>

  <div id="showCat" class="full"></div>
  <div id="specBox" class="full"></div>

  <input type="file" id="fileImg" class="full">

  <label class="full">
    <input type="checkbox" id="featured"> ⭐ Featured
  </label>

  <button id="btnAdd" class="full">➕ Thêm sản phẩm</button>

</div>

<hr>

<div id="list"></div>

<!-- PAGINATION -->
<div id="pagination" style="text-align:center;margin-top:10px;"></div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];

let currentPage = 1;
const perPage = 6;

function save(){
  localStorage.setItem("products", JSON.stringify(products));
}

const nameMap = {
  sd: "Thẻ nhớ",
  "cam-in": "Camera trong nhà",
  "cam-ngoai": "Camera ngoài trời",
  combo: "Combo",
  home: "Trang chủ"
};

document.getElementById("category").addEventListener("change", function(){

  const type = this.value;

  document.getElementById("showCat").innerText =
    "📁 Thư mục: " + nameMap[type];

  const box = document.getElementById("specBox");

  if(type === "cam-in" || type === "cam-ngoai" || type === "home"){
    box.innerHTML = `
      <input id="doPhanGiai" placeholder="Độ phân giải">
      <input id="gocNhin" placeholder="Góc nhìn">
      <input id="ketNoi" placeholder="Kết nối">
      <input id="baoHanh" placeholder="Bảo hành">
    `;
  }
  else if(type === "sd"){
    box.innerHTML = `
      <input id="dungLuong" placeholder="Dung lượng">
      <input id="tocDo" placeholder="Tốc độ">
      <input id="loai" placeholder="Loại">
      <input id="baoHanh" placeholder="Bảo hành">
    `;
  }
  else if(type === "combo"){
    box.innerHTML = `
      <input id="moTaCombo" placeholder="Mô tả combo">
    `;
  }
  else{
    box.innerHTML = "";
  }
});

function getVal(id){
  const el = document.getElementById(id);
  return el ? el.value : "";
}

document.getElementById("btnAdd").addEventListener("click", function () {

  const name = document.getElementById("name").value.trim();
  const price = Number(document.getElementById("price").value.replace(/\D/g,""));
  const oldPrice = Number(document.getElementById("oldPrice").value.replace(/\D/g,"") || 0);
  const desc = document.getElementById("desc").value || "";
  const category = document.getElementById("category").value;

  const file = document.getElementById("fileImg").files[0];
  const imgUrl = document.getElementById("imgUrl").value.trim();

  if (!name) return alert("Thiếu tên");
  if (!price) return alert("Giá không hợp lệ");
  if (!file && !imgUrl) return alert("Chưa có ảnh");

  function addProduct(img){

    let spec = {};

    if(category === "cam-in" || category === "cam-ngoai" || category === "home"){
      spec = {
        doPhanGiai: getVal("doPhanGiai"),
        gocNhin: getVal("gocNhin"),
        ketNoi: getVal("ketNoi"),
        baoHanh: getVal("baoHanh"),
      };
    } else if(category === "sd"){
      spec = {
        dungLuong: getVal("dungLuong"),
        tocDo: getVal("tocDo"),
        loai: getVal("loai"),
        baoHanh: getVal("baoHanh")
      };
    } else {
      spec = {
        moTaCombo: getVal("moTaCombo")
      };
    }

    products.push({
      id: Date.now(),
      name,
      price,
      oldPrice,
      desc,
      category,
      categoryName: nameMap[category],
      img,
      featured: document.getElementById("featured").checked,
      spec
    });

    save();
    currentPage = 1; // 🔥 reset về trang 1
    render();

    alert("✔ Thêm thành công");
  }

  if (imgUrl) return addProduct(imgUrl);

  const reader = new FileReader();
  reader.onload = e => addProduct(e.target.result);
  reader.readAsDataURL(file);
});

function del(id){
  products = products.filter(p => p.id !== id);
  save();
  render();
}

function updateProduct(id){
  const newPrice = document.getElementById(`price-${id}`).value;
  const newOldPrice = document.getElementById(`oldPrice-${id}`).value;

  products = products.map(p =>
    p.id === id
      ? {...p, price:Number(newPrice), oldPrice:Number(newOldPrice)}
      : p
  );

  save();
  render();
}

function render(){

  const box = document.getElementById("list");

  if(products.length === 0){
    box.innerHTML = "<p>Chưa có sản phẩm</p>";
    document.getElementById("pagination").innerHTML = "";
    return;
  }

  const start = (currentPage - 1) * perPage;
  const pageProducts = products.slice(start, start + perPage);

  box.innerHTML = pageProducts.map(p => `
    <div class="item">
      <img src="${p.img}">
      <div>
        <b>${p.name}</b><br>
        📁 ${p.categoryName}<br>
        Giá: ${p.price.toLocaleString()}đ<br>
        ${p.oldPrice ? `<del>${p.oldPrice.toLocaleString()}đ</del><br>` : ""}
        <input id="price-${p.id}" value="${p.price}">
        <input id="oldPrice-${p.id}" value="${p.oldPrice || ''}">
        <button onclick="updateProduct(${p.id})">Cập nhật</button>
      </div>
      <button onclick="del(${p.id})" style="background:red">Xoá</button>
    </div>
  `).join("");

  renderPagination();
}

function renderPagination(){
  const totalPage = Math.ceil(products.length / perPage);
  const pagi = document.getElementById("pagination");

  pagi.innerHTML = "";

  for(let i = 1; i <= totalPage; i++){
    pagi.innerHTML += `
      <button onclick="goPage(${i})"
        style="
          margin:3px;
          padding:6px 10px;
          border:none;
          border-radius:6px;
          background:${i === currentPage ? '#e53935' : '#ddd'};
          color:${i === currentPage ? '#fff' : '#000'};
        ">
        ${i}
      </button>
    `;
  }
}

function goPage(page){
  currentPage = page;
  render();
}

render();
</script>

</body>
</html>
