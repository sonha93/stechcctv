<script>

document.addEventListener("DOMContentLoaded", function(){

let products = JSON.parse(localStorage.getItem("products")) || [];

function save(){
  localStorage.setItem("products", JSON.stringify(products));
}

const nameMap = {
  sd:"Thẻ nhớ",
  "cam-in":"Camera trong nhà",
  "cam-ngoai":"Camera ngoài trời",
  combo:"Combo",
  home:"Trang chủ"
};

function getVal(id){
  const el=document.getElementById(id);
  return el ? el.value.trim() : "";
}

document.getElementById("category").addEventListener("change", function(){

  const type=this.value;

  document.getElementById("showCat").innerText =
    "📁 Thư mục: " + nameMap[type];

  const box=document.getElementById("specBox");

  if(type==="cam-in" || type==="cam-ngoai" || type==="home"){

    box.innerHTML=`
      <div class="spec-title">⚙️ Thông số camera</div>

      <input id="model" placeholder="Model">
      <input id="xuatXu" placeholder="Xuất xứ">
      <input id="baoHanh" placeholder="Bảo hành">
      <input id="doPhanGiai" placeholder="Độ phân giải">
      <input id="gocNhin" placeholder="Góc nhìn">
      <input id="ketNoi" placeholder="Kết nối">
      <input id="thietKe" placeholder="Thiết kế">
      <input id="chatLieu" placeholder="Chất liệu">
      <input id="congSuat" placeholder="Công suất">
    `;

  }else if(type==="sd"){

    box.innerHTML=`
      <div class="spec-title">💾 Thông số thẻ nhớ</div>

      <input id="model" placeholder="Model">
      <input id="xuatXu" placeholder="Xuất xứ">
      <input id="baoHanh" placeholder="Bảo hành">
      <input id="dungLuong" placeholder="Dung lượng">
      <input id="tocDo" placeholder="Tốc độ">
      <input id="loai" placeholder="Loại">
      <input id="chatLieu" placeholder="Chất liệu">
    `;

  }else if(type==="combo"){

    box.innerHTML=`
      <div class="spec-title">🎁 Thông tin combo</div>

      <textarea id="moTaCombo" placeholder="Mô tả combo"></textarea>
      <input id="baoHanh" placeholder="Bảo hành">
    `;

  }else{
    box.innerHTML="";
  }

});

document.getElementById("btnAdd").addEventListener("click", async function(){

  const name=getVal("name");

  const price=Number(
    getVal("price").replace(/\D/g,"")
  );

  const oldPrice=Number(
    getVal("oldPrice").replace(/\D/g,"") || 0
  );

  const desc=getVal("desc");

  const category=document.getElementById("category").value;

  const file=document.getElementById("fileImg").files[0];

  const imgUrl=getVal("imgUrl");

  if(!name){
    return alert("Thiếu tên sản phẩm");
  }

  if(!price){
    return alert("Giá không hợp lệ");
  }

  if(!file && !imgUrl){
    return alert("Chưa có ảnh");
  }

  function addProduct(img){

    products.push({

      id: Date.now(),

      name,
      price,
      oldPrice,
      desc,

      category,
      categoryName:nameMap[category],

      img,

      featured:document.getElementById("featured").checked,

      model:getVal("model"),
      xuatXu:getVal("xuatXu"),
      baoHanh:getVal("baoHanh"),

      doPhanGiai:getVal("doPhanGiai"),
      gocNhin:getVal("gocNhin"),
      ketNoi:getVal("ketNoi"),

      thietKe:getVal("thietKe"),
      chatLieu:getVal("chatLieu"),
      congSuat:getVal("congSuat"),

      dungLuong:getVal("dungLuong"),
      tocDo:getVal("tocDo"),
      loai:getVal("loai"),

      moTaCombo:getVal("moTaCombo")

    });

    save();

    render();

    alert("✔ Thêm sản phẩm thành công");

    document.getElementById("name").value="";
    document.getElementById("price").value="";
    document.getElementById("oldPrice").value="";
    document.getElementById("desc").value="";
    document.getElementById("imgUrl").value="";
    document.getElementById("fileImg").value="";
    document.getElementById("featured").checked=false;
  }

  // nếu có link ảnh thì dùng luôn
  if(imgUrl){

    addProduct(imgUrl);

    return;
  }

  // upload cloudinary
  if(file){

    try{

      const formData = new FormData();

      formData.append("file", file);

      // tên upload preset cloudinary
      formData.append("upload_preset", "stech_upload");

      const res = await fetch(
        "https://api.cloudinary.com/v1_1/dmz9gpp1b/image/upload",
        {
          method:"POST",
          body:formData
        }
      );

      const data = await res.json();

      console.log(data);

      if(!data.secure_url){

        return alert("Upload Cloudinary thất bại");

      }

      const cloudImg = data.secure_url;

      addProduct(cloudImg);

    }catch(err){

      console.log(err);

      alert("Lỗi upload ảnh");

    }

  }

});

function del(id){

  products = products.filter(p=>p.id!==id);

  save();

  render();
}

function updateProduct(id){

  const newPrice = Number(
    getVal(`price-${id}`)
  );

  const newOldPrice = Number(
    getVal(`oldPrice-${id}`) || 0
  );

  products = products.map(p=>

    p.id===id

    ? {
        ...p,
        price:newPrice,
        oldPrice:newOldPrice
      }

    : p

  );

  save();

  render();
}

function render(){

  const box=document.getElementById("list");

  if(products.length===0){

    box.innerHTML="<p>Chưa có sản phẩm</p>";

    return;
  }

  box.innerHTML = products.map(p=>`

    <div class="item">

      <img src="${p.img || ''}">

      <div>

        <b>${p.name}</b><br>

        <span style="color:#00acc1;font-size:12px;">
          📁 ${p.categoryName || p.category}
        </span><br>

        Giá: ${Number(p.price).toLocaleString()}đ<br>

        ${
          p.oldPrice
          ? `<del>${Number(p.oldPrice).toLocaleString()}đ</del><br>`
          : ""
        }

        <input
          id="price-${p.id}"
          value="${p.price}"
          placeholder="Giá bán"
        >

        <input
          id="oldPrice-${p.id}"
          value="${p.oldPrice || ''}"
          placeholder="Giá gốc"
        >

        <button onclick="updateProduct(${p.id})">
          Cập nhật
        </button>

      </div>

      <button
        onclick="del(${p.id})"
        style="background:red"
      >
        Xoá
      </button>

    </div>

  `).join("");

}

render();

document.getElementById("category")
.dispatchEvent(new Event("change"));

});

</script>
