<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin sản phẩm</title>

<style>

:root{
  --main-color:#00acc1;
}

body{
  font-family:Arial;
  padding:20px;
  background:#f5f5f5;
}

h2{
  margin-bottom:15px;
}

input,
button,
select,
textarea{
  display:block;
  margin:8px 0;
  padding:10px;
  width:320px;
  border:1px solid #ddd;
  border-radius:6px;
  font-family:Arial;
}

textarea{
  min-height:80px;
  resize:vertical;
}

button{
  cursor:pointer;
  background:var(--main-color);
  color:#fff;
  border:none;
}

.item{
  background:#fff;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.item img{
  width:80px;
  border-radius:6px;
  display:block;
  margin-bottom:6px;
}

.home-btn{
  display:inline-block;
  margin-bottom:10px;
  background:#00acc1;
  color:#fff;
  padding:8px 12px;
  border-radius:20px;
  text-decoration:none;
  font-size:13px;
}

.home-btn:hover{
  opacity:0.85;
}

#showCat{
  margin:6px 0;
  color:#00acc1;
  font-weight:bold;
}

.spec-title{
  font-weight:bold;
  margin-top:10px;
  color:#00acc1;
}

@media (max-width:768px){

  body{
    padding:10px;
  }

  input,
  select,
  button,
  textarea{
    width:100%;
    box-sizing:border-box;
  }

  .form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
  }

  .full{
    grid-column:1 / -1;
  }

  .item{
    display:grid;
    grid-template-columns:80px 1fr;
    gap:10px;
    align-items:center;
  }

  .item img{
    width:100%;
    height:auto;
  }

}

</style>
</head>

<body>

<h2>📦 Admin sản phẩm</h2>

<a href="index.html" class="home-btn">
← Trang chủ
</a>

<div class="form-grid">

  <input id="name" placeholder="Tên sản phẩm" class="full">

  <input id="price" placeholder="Giá">

  <input id="oldPrice" placeholder="Giá cũ">

  <textarea id="desc" placeholder="Mô tả" class="full"></textarea>

  <input id="imgUrl" placeholder="Link ảnh Cloudinary" class="full">

  <select id="category" class="full">

    <option value="sd">Thẻ nhớ</option>

    <option value="cam-in">
      Camera trong nhà
    </option>

    <option value="cam-ngoai">
      Camera ngoài trời
    </option>

    <option value="combo">
      Combo
    </option>

    <option value="home">
      Trang chủ
    </option>

  </select>

  <div id="showCat" class="full"></div>

  <div id="specBox" class="full"></div>

  <input type="file" id="fileImg" class="full">

  <label class="full">
    <input type="checkbox" id="featured">
    ⭐ Featured
  </label>

  <button id="btnAdd" class="full">
    ➕ Thêm sản phẩm
  </button>

</div>

<hr>

<div id="list"></div>

<script>

window.addEventListener("load", function(){

let products =
JSON.parse(localStorage.getItem("products")) || [];

function save(){

  localStorage.setItem(
    "products",
    JSON.stringify(products)
  );

}

const nameMap = {

  sd:"Thẻ nhớ",

  "cam-in":"Camera trong nhà",

  "cam-ngoai":"Camera ngoài trời",

  combo:"Combo",

  home:"Trang chủ"

};

function getVal(id){

  const el=document.getElementById(id);

  return el ? el.value.trim() : "";

}

const categoryEl =
document.getElementById("category");

const btnAdd =
document.getElementById("btnAdd");

const list =
document.getElementById("list");

categoryEl.addEventListener("change", function(){

  const type=this.value;

  document.getElementById("showCat").innerText =
  "📁 Thư mục: " + nameMap[type];

  const box=document.getElementById("specBox");

  if(
    type==="cam-in" ||
    type==="cam-ngoai" ||
    type==="home"
  ){

    box.innerHTML=`

      <div class="spec-title">
        ⚙️ Thông số camera
      </div>

      <input id="model" placeholder="Model">

      <input id="xuatXu" placeholder="Xuất xứ">

      <input id="baoHanh" placeholder="Bảo hành">

      <input id="doPhanGiai" placeholder="Độ phân giải">

      <input id="gocNhin" placeholder="Góc nhìn">

      <input id="ketNoi" placeholder="Kết nối">

      <input id="thietKe" placeholder="Thiết kế">

      <input id="chatLieu" placeholder="Chất liệu">

      <input id="congSuat" placeholder="Công suất">

    `;

  }

  else if(type==="sd"){

    box.innerHTML=`

      <div class="spec-title">
        💾 Thông số thẻ nhớ
      </div>

      <input id="model" placeholder="Model">

      <input id="xuatXu" placeholder="Xuất xứ">

      <input id="baoHanh" placeholder="Bảo hành">

      <input id="dungLuong" placeholder="Dung lượng">

      <input id="tocDo" placeholder="Tốc độ">

      <input id="loai" placeholder="Loại">

      <input id="chatLieu" placeholder="Chất liệu">

    `;

  }

  else{

    box.innerHTML="";

  }

});

btnAdd.addEventListener("click", async function(){

  const name=getVal("name");

  const price=Number(
    getVal("price").replace(/\D/g,"")
  );

  const oldPrice=Number(
    getVal("oldPrice").replace(/\D/g,"") || 0
  );

  const desc=getVal("desc");

  const category=categoryEl.value;

  const file=
  document.getElementById("fileImg").files[0];

  const imgUrl=getVal("imgUrl");

  if(!name){

    return alert("Thiếu tên sản phẩm");

  }

  if(!price){

    return alert("Giá không hợp lệ");

  }

  if(!file && !imgUrl){

    return alert("Chưa có ảnh");

  }

  function addProduct(img){

    products.push({

      id:Date.now(),

      name,
      price,
      oldPrice,
      desc,

      category,

      categoryName:nameMap[category],

      img,

      featured:
      document.getElementById("featured").checked

    });

    save();

    render();

    alert("✔ Thêm sản phẩm thành công");

  }

  // dùng link cloudinary
  if(imgUrl){

    addProduct(imgUrl);

    return;

  }

  // upload cloudinary
  if(file){

    try{

      const formData = new FormData();

      formData.append("file", file);

      // upload preset
      formData.append(
        "upload_preset",
        "stech_upload"
      );

      const res = await fetch(

        "https://api.cloudinary.com/v1_1/dmz9gpp1b/image/upload",

        {
          method:"POST",
          body:formData
        }

      );

      const data = await res.json();

      console.log(data);

      if(!data.secure_url){

        return alert(
          "Upload Cloudinary thất bại"
        );

      }

      addProduct(data.secure_url);

    }

    catch(err){

      console.log(err);

      alert("Lỗi upload ảnh");

    }

  }

});

function render(){

  if(products.length===0){

    list.innerHTML =
    "<p>Chưa có sản phẩm</p>";

    return;

  }

  list.innerHTML = products.map(p=>`

    <div class="item">

      <img src="${p.img || ''}">

      <div>

        <b>${p.name}</b><br>

        <span style="color:#00acc1;font-size:12px;">

          📁 ${p.categoryName || p.category}

        </span><br>

        Giá:
        ${Number(p.price).toLocaleString()}đ

      </div>

    </div>

  `).join("");

}

render();

categoryEl.dispatchEvent(
  new Event("change")
);

});

</script>

</body>
</html>
