<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Sản Phẩm</title>

<link rel="icon" type="image/png" href="favicon-96x96.png?v=20260523" sizes="96x96" /> 
<link rel="icon" type="image/svg+xml" href="favicon.svg?v=20260523" /> 
<link rel="shortcut icon" href="favicon.ico?v=20260523" /> 
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=20260523" /> 
<meta name="apple-mobile-web-app-title" content="Stech" />
<link rel="manifest" href="site.webmanifest?v=20260523" />

<style>
:root{
  --main-color:#00acc1;
}

body{
  font-family:Arial;
  padding:20px;
  background:#f5f5f5;
}

h2{
  margin-bottom:15px;
}

input,
button,
select,
textarea{
  display:block;
  margin:8px 0;
  padding:10px;
  width:320px;
  border:1px solid #ddd;
  border-radius:6px;
  font-family:Arial;
}

textarea{
  min-height:80px;
  resize:vertical;
}

button{
  cursor:pointer;
  background:var(--main-color);
  color:#fff;
  border:none;
}

.item{
  background:#fff;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.item img{
  width:80px;
  border-radius:6px;
  display:block;
  margin-bottom:6px;
}

.home-btn{
  display:inline-block;
  margin-bottom:10px;
  background:#00acc1;
  color:#fff;
  padding:8px 12px;
  border-radius:20px;
  text-decoration:none;
  font-size:13px;
}

.home-btn:hover{
  opacity:0.85;
}

#showCat{
  margin:6px 0;
  color:#00acc1;
  font-weight:bold;
}

.spec-title{
  font-weight:bold;
  margin-top:10px;
  color:#00acc1;
}

@media (max-width:768px){

  body{
    padding:10px;
  }

  input,
  select,
  button,
  textarea{
    width:100%;
    box-sizing:border-box;
  }

  .form-grid{
    display:block !important;
}

  .full{
    grid-column:1 / -1;
  }

  .item{
    display:grid;
    grid-template-columns:80px 1fr;
    gap:10px;
    align-items:center;
  }

  .item img{
    width:100%;
    height:auto;
}
  }

</style>
</head>

<body>

<h2>📦 Admin sản phẩm</h2>

<a href="index.html" class="home-btn">
← Trang chủ
</a>

<div class="form-grid">

  <input id="name" placeholder="Tên sản phẩm" class="full">

 <input id="price" placeholder="Giá bán" class="full">

 <input id="oldPrice" placeholder="Giá gốc" class="full">
<input id="importPrice" placeholder="Giá nhập" class="full">
  <textarea id="desc" placeholder="Mô tả" class="full"></textarea>

  <input id="imgUrl" placeholder="Link ảnh Cloudinary" class="full">

  <select id="category" class="full">

    <option value="sd">Thẻ nhớ</option>

    <option value="cam-in">
      Camera trong nhà
    </option>

    <option value="cam-ngoai">
      Camera ngoài trời
    </option>

    <option value="combo">
      Combo
    </option>

    <option value="home">
      Trang chủ
    </option>

  </select>

  <div id="showCat" class="full"></div>

  <div id="specBox" class="full"></div>

  <input type="file" id="fileImg" class="full">

  <label class="full">
    <input type="checkbox" id="featured">
    ⭐ Featured
  </label>

  <button id="btnAdd" class="full">
➕ Thêm sản phẩm
</button>

<button
id="btnCancelEdit"
class="full"
style="display:none;background:#888;"
>
❌ Hủy chỉnh sửa
</button>
<div style="margin-top:10px;">
<input
    type="text"
    id="searchProduct"
    placeholder="Tìm sản phẩm theo tên..."
    style="
        width:320px;
        padding:12px;
        border:1px solid #ddd;
        border-radius:8px;
        font-size:14px;
    "
>
</div>

<hr>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc,getDoc, updateDoc, deleteDoc, setDoc,serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* =========================
   FIREBASE
========================= */

const firebaseConfig = {

  apiKey: "AIzaSyDYVcBEYJN1HUCta3XdJAUBe4TGLnmy7y4",

  authDomain: "stech-73b89.firebaseapp.com",

  projectId: "stech-73b89",

  storageBucket: "stech-73b89.firebasestorage.app",

  messagingSenderId: "873739162979",

  appId: "1:873739162979:web:978f1a4043f025b1cdaf56"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* =========================
   START
========================= */

window.addEventListener("load", function(){

let products = [];
let filteredProducts = [];
let editingId = null;
const nameMap = {

  sd:"Thẻ nhớ",

  "cam-in":"Camera trong nhà",

  "cam-ngoai":"Camera ngoài trời",

  combo:"Combo",

  home:"Trang chủ"

};

function getVal(id){

  const el=document.getElementById(id);

  return el ? el.value.trim() : "";

}

const categoryEl =
document.getElementById("category");

const btnAdd =
document.getElementById("btnAdd");

const list =
document.getElementById("list");

/* =========================
   CATEGORY
========================= */

categoryEl.addEventListener("change", function(){

  const type=this.value;

  document.getElementById("showCat").innerText =
  "📁 Thư mục: " + nameMap[type];

  const box=document.getElementById("specBox");

  if(
    type==="cam-in" ||
    type==="cam-ngoai" ||
    type==="home"
  ){

    box.innerHTML=`<div class="spec-title">⚙️ Thông số camera</div>
      <input id="model" placeholder="Model">
      <input id="xuatXu" placeholder="Xuất xứ">
       <input id="Namsx" placeholder="Thời điểm ra mắt">
      <input id="Hdsd" placeholder="Hướng dẫn sử dụng">
        <input id="mauSac" placeholder="Màu sắc">
      <input id="baoHanh" placeholder="Bảo hành">
      <input id="Kichthuoc" placeholder="Kích Thước">
      <input id="trongLuongsp" placeholder="Trọng lượng sản phẩm">
      <input id="chatLieu" placeholder="Chất liệu">
      <input id="loaiCamera" placeholder="Loại camera">
      <input id="doPhanGiai" placeholder="Độ phân giải">
      <input id="dienAp" placeholder="Điện áp">
      <input id="gocOngKinh" placeholder="Góc ống kính">
     <input id="hongNgoai" placeholder="Tầm nhìn xa hồng ngoại">
      <input id="kieuKetNoi" placeholder="Kiểu kết nối">
       <input id="sDtoiDa" placeholder="Hỗ trợ thẻ nhớ tối đa">
        <input id="sDNgoai" placeholder="Thẻ nhớ ngoài">
      <input id="ungDungKetNoi" placeholder="Ứng dụng kết nối">`;
    
  }

  else if(type==="sd"){

    box.innerHTML=`<div class="spec-title">💾 Thông số thẻ nhớ</div>
      <input id="model" placeholder="Model">
      <input id="xuatXu" placeholder="Xuất xứ">
      <input id="baoHanh" placeholder="Bảo hành">
       <input id="hdbq" placeholder="Hướng dẫn bảo quản">
         <input id="hdsudung" placeholder="Hướng dẫn sử dụng">
      <input id="dungLuong" placeholder="Dung lượng bộ nhớ">
      <input id="tocDo" placeholder="Tốc độ ghi">
      <input id="kichthuoc" placeholder="Kích thước">
      <input id="Tlsp" placeholder="Trọng lượng sản phẩm">`;

  }

  else{

    box.innerHTML="";

  }

});

/* =========================
   LOAD FIRESTORE
========================= */

async function loadProducts(){

  products = [];

  const querySnapshot =
  await getDocs(collection(db,"products"));

  querySnapshot.forEach(doc => {

    products.push({

      docId:doc.id,

      ...doc.data()

    });

  });
  filteredProducts = [...products];
  render();

}

/* =========================
   ADD PRODUCT
========================= */

btnAdd.addEventListener("click", async function(){

  const name=getVal("name");

  const price=Number(
    getVal("price").replace(/\D/g,"")
  );

  const oldPrice=Number(
    getVal("oldPrice").replace(/\D/g,"") || 0
  );
  const importPrice = Number(
  getVal("importPrice").replace(/\D/g,"") || 0
);

  const desc=getVal("desc");

  const category=categoryEl.value;

  const file=
  document.getElementById("fileImg").files[0];

  const imgUrl=getVal("imgUrl");

  if(!name){

    return showToast("Thiếu tên sản phẩm");

  }

  if(!price){

    return showToast("Giá không hợp lệ");

  }

  if(!file && !imgUrl){

    return showToast("Chưa có ảnh");

  }

const slug =
  name
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/đ/g,"d")
    .replace(/\s+/g,"-")
    .replace(/[^a-z0-9-]/g,"")
  + "-" + Date.now();
  async function addProduct(img){

    const productData = {
importPrice,
      id:Date.now(),

      name,
      price,
      oldPrice,
   
      desc,

      category,

      categoryName:nameMap[category],

      img,

      featured:
      document.getElementById("featured").checked,

      model:getVal("model"),
      xuatXu:getVal("xuatXu"),
      Namsx:getVal("Namsx"),
      baoHanh:getVal("baoHanh"),
      Hdsd:getVal("Hdsd"),
      mauSac:getVal("mauSac"),
     Kichthuoc:getVal("Kichthuoc"),
      trongLuongsp:getVal("trongLuongsp"),
     chatLieu:getVal("chatLieu"),
     loaiCamera:getVal("loaiCamera"),
     doPhanGiai:getVal("doPhanGiai"),
      dienAp:getVal("dienAp"),
      gocOngKinh:getVal("gocOngKinh"),
      hongNgoai:getVal("hongNgoai"),
      kieuKetNoi:getVal("kieuKetNoi"),
      sDtoiDa:getVal("sDtoiDa"),
       sDNgoai:getVal("sDNgoai"),
      ungDungKetNoi:getVal("ungDungKetNoi"),
      // THẺ NHỚ
      hdbq:getVal("hdbq"),
      hdsudung:getVal("hdsudung"),
      dungLuong:getVal("dungLuong"),
      tocDo:getVal("tocDo"),
      kichthuoc:getVal("kichthuoc"),
      Tlsp:getVal("Tlsp")
    };
  if(editingId){

await updateDoc(
doc(db,"products",editingId),
{
...productData,
img
}
);

showToast("Đã cập nhật sản phẩm");

editingId=null;

btnAdd.innerHTML="➕ Thêm sản phẩm";

document.getElementById("btnCancelEdit").style.display="none";

await loadProducts();

return;

}

await setDoc(
doc(db,"products",slug),
{
...productData,
img
}
);

showToast("✔ Thêm sản phẩm thành công");

await loadProducts();
}
  
  /* =========================
     LINK CLOUDINARY
  ========================= */

  if(imgUrl){

    await addProduct(imgUrl);

    return;

  }

  /* =========================
     UPLOAD CLOUDINARY
  ========================= */

  if(file){

    try{

      const formData = new FormData();

      formData.append("file", file);

      formData.append(
        "upload_preset",
        "qzcttlvsh"
      );

      const res = await fetch(

        "https://api.cloudinary.com/v1_1/dmz9gpp1b/image/upload",

        {
          method:"POST",
          body:formData
        }

      );

      const data = await res.json();

      console.log(data);

      if(!data.secure_url){

        return showToast(
          "Upload Cloudinary thất bại"
        );

      }

      await addProduct(data.secure_url);

    }

     catch(err){

      console.log(err);

      showToast("Lỗi upload ảnh");

    }

  }

});
/* =========================
   RENDER PRODUCTS MỚI
========================= */

/* =========================
   RENDER PRODUCTS 2 DÒNG GIÁ
========================= */
/* =========================
   PAGINATION
========================= */

let currentPage = 1;
const itemsPerPage = 10;

/* =========================
   RENDER PRODUCTS
========================= */

function render() {

  if(filteredProducts.length === 0){
    list.innerHTML = "<p>Chưa có sản phẩm</p>";
    return;
  }

  // tổng số trang
 const totalPages =
Math.ceil(filteredProducts.length / itemsPerPage);

  // vị trí cắt mảng
  const start = (currentPage - 1) * itemsPerPage;
  const end = start + itemsPerPage;

  // dữ liệu trang hiện tại
  const currentProducts =
filteredProducts.slice(start, end);

  // render sản phẩm
  list.innerHTML = currentProducts.map(p => `
    <div class="item" data-id="${p.docId}">
      <img src="${p.img || ''}">

      <div>
        <b>${p.name}</b><br>

        <span style="color:#00acc1;font-size:12px;">
          📁 ${p.categoryName || p.category}
        </span><br>
        <div style="margin-top:4px;font-weight:bold;color:green;">
   📦 Kho hiện tại: ${p.stock ?? 0}

<input
  type="text"
  class="stockInput"
  value=""
  placeholder="Nhập thêm số lượng"
  style="width:150px;margin-top:2px;"
>
    </div>
        <div style="color:red;font-weight:bold;margin-top:4px;">
          Giá hiện tại:
          ${Number(p.price).toLocaleString()}đ
        </div>

        <div style="margin-top:2px;">
          Giá gốc:
          ${p.oldPrice
            ? Number(p.oldPrice).toLocaleString() + 'đ'
            : 'Đơn hàng 0đ'}
        </div>
        <div style="margin-top:2px;color:#2563eb;font-weight:bold;">
  Giá nhập:
  ${Number(p.importPrice || 0).toLocaleString()}đ
</div>
        <input
          type="text"
          class="priceInput"
          value="${p.price}"
          placeholder="Giá mới"
          style="width:150px;margin-top:4px;"
        >

        <input
          type="text"
          class="oldPriceInput"
          value="${p.oldPrice || ''}"
          placeholder="Giá cũ"
          style="width:150px;margin-top:2px;"
        >
        <input
  type="text"
  class="importPriceInput"
  value="${p.importPrice || ''}"
  placeholder="Giá nhập"
  style="width:150px;margin-top:2px;"
>
        <button class="updateBtn">
Cập nhật
</button>

<button
class="editBtn"
style="
background:#f59e0b;
margin-top:6px;
">
✏️ Sửa thông tin
</button>

<button
class="deleteBtn"
style="
background:red;
margin-top:6px;
">
Xóa
</button>

      </div>
    </div>
  `).join("");

  /* =========================
     PAGINATION BUTTONS
  ========================= */

  let pageHTML = `
    <div style="
      margin-top:20px;
      display:flex;
      gap:6px;
      flex-wrap:wrap;
    ">
  `;

  for(let i = 1; i <= totalPages; i++){

    pageHTML += `
      <button
        class="pageBtn"
        data-page="${i}"
        style="
          width:40px;
          padding:8px;
          background:${i === currentPage ? '#007c91' : '#00acc1'};
        "
      >
        ${i}
      </button>
    `;
  }

  pageHTML += `</div>`;

  list.innerHTML += pageHTML;

  /* =========================
     CLICK PAGE
  ========================= */

  document.querySelectorAll(".pageBtn").forEach(btn => {

    btn.addEventListener("click", () => {

      currentPage = Number(btn.dataset.page);

      render();

      window.scrollTo({
        top:0,
        behavior:"smooth"
      });

    });

  });

  /* =========================
     UPDATE
  ========================= */

  document.querySelectorAll('.updateBtn').forEach(btn => {

    btn.addEventListener('click', async e => {

      const item = e.target.closest('.item');
      const id = item.dataset.id;

      const newPrice = Number(
        item.querySelector('.priceInput')
        .value.replace(/\D/g,'')
      );

      const oldPrice = Number(
        item.querySelector('.oldPriceInput')
        .value.replace(/\D/g,'') || 0
      );
    const importPrice = Number(
  item.querySelector('.importPriceInput')
  .value.replace(/\D/g,'') || 0
);
      if(!newPrice){
        return showToast("Giá không hợp lệ");
      }

 const stockInput =
  item.querySelector('.stockInput');

const addQty = Number(
  stockInput.value.replace(/\D/g,'')
) || 0;

const productRef = doc(db,"products",id);

const latestSnap = await getDoc(productRef);

const latestData = latestSnap.data();

const currentStock = Number(
  latestData?.stock || 0
);

const stockValue = currentStock + addQty;
if(
  Number(latestData?.price || 0) !== newPrice ||
  Number(latestData?.oldPrice || 0) !== oldPrice
){

  await addDoc(
    collection(db,"product_sale_price_history"),
    {
      productId:id,
      productName:latestData?.name || "",

      oldSalePrice:Number(latestData?.price || 0),
      newSalePrice:newPrice,

      oldComparePrice:Number(latestData?.oldPrice || 0),
      newComparePrice:oldPrice,

      changedAt:serverTimestamp()
    }
  );

}

 await addDoc(
  collection(db,"product_change_logs"),
  {

    productId:id,
    productName:latestData?.name || "",

    changedBy:"admin",
    changeType:"PRICE_UPDATE",

    before:{
      importPrice:Number(latestData?.importPrice || 0),
      price:Number(latestData?.price || 0),
      oldPrice:Number(latestData?.oldPrice || 0)
    },

   after:{
  importPrice:Number(latestData?.importPrice || 0),
  price:newPrice,
  oldPrice:oldPrice
},
profitBefore:
  Number(latestData?.price || 0)
  - Number(latestData?.importPrice || 0),
profitAfter:
  newPrice - Number(latestData?.importPrice || 0),
    priceChangePercent:
      Number(latestData?.price || 0) > 0
      ? (
          (
            newPrice -
            Number(latestData?.price || 0)
          ) /
          Number(latestData?.price || 0) *
          100
        ).toFixed(2)
      : 0,

    importChangePercent:0,

    createdAt:serverTimestamp()

  }
);     
await updateDoc(
  productRef,
  {
    price:newPrice,
    oldPrice:oldPrice,
    importPrice:importPrice,
    stock:stockValue
  }
);
if(addQty > 0){

  await addDoc(
    collection(db,"stock_movements"),
    {
      productId:id,
      qty:addQty,
      type:"IMPORT",
      createdAt:serverTimestamp()
    }
  );

}

showToast("Cập nhật thành công");

loadProducts();
  });
     });
  /* =========================
   EDIT
========================= */

document.querySelectorAll(".editBtn").forEach(btn=>{

btn.addEventListener("click", async e=>{

const item=e.target.closest(".item");

const id=item.dataset.id;

const snap=await getDoc(doc(db,"products",id));

const p=snap.data();

editingId=id;

// load dữ liệu cơ bản
document.getElementById("name").value=p.name||"";
document.getElementById("price").value=p.price||"";
document.getElementById("oldPrice").value=p.oldPrice||"";
document.getElementById("importPrice").value=p.importPrice||"";
document.getElementById("desc").value=p.desc||"";
document.getElementById("imgUrl").value=p.img||"";

document.getElementById("featured").checked=
p.featured||false;

categoryEl.value=p.category;

// tạo lại form thông số
categoryEl.dispatchEvent(new Event("change"));

setTimeout(()=>{

[
"model",
"xuatXu",
"Namsx",
"Hdsd",
"mauSac",
"baoHanh",
"Kichthuoc",
"trongLuongsp",
"chatLieu",
"loaiCamera",
"doPhanGiai",
"dienAp",
"gocOngKinh",
"hongNgoai",
"kieuKetNoi",
"sDtoiDa",
"sDNgoai",
"ungDungKetNoi",

"hdbq",
"hdsudung",
"dungLuong",
"tocDo",
"kichthuoc",
"Tlsp"

].forEach(key=>{

const el=document.getElementById(key);

if(el){

el.value=p[key]||"";

}

});

},50);

btnAdd.innerHTML="💾 Lưu thay đổi";

document.getElementById("btnCancelEdit").style.display="block";

window.scrollTo({
top:0,
behavior:"smooth"
});

});

});
  /* =========================
     DELETE
  ========================= */

  document.querySelectorAll('.deleteBtn').forEach(btn => {

    btn.addEventListener('click', async e => {

      const item = e.target.closest('.item');
      const id = item.dataset.id;

      if(confirm("Xóa sản phẩm này?")){

        await deleteDoc(doc(db,"products",id));

        loadProducts();

      }

    });

  });

}
/* =========================
   INIT
========================= */

loadProducts();
document
.getElementById("btnCancelEdit")
.addEventListener("click",()=>{

editingId=null;

btnAdd.innerHTML="➕ Thêm sản phẩm";

document.getElementById("btnCancelEdit").style.display="none";

document.getElementById("name").value="";
document.getElementById("price").value="";
document.getElementById("oldPrice").value="";
document.getElementById("importPrice").value="";
document.getElementById("desc").value="";
document.getElementById("imgUrl").value="";
document.getElementById("fileImg").value="";

document.getElementById("featured").checked=false;

categoryEl.value="sd";

categoryEl.dispatchEvent(new Event("change"));

});
const searchProduct =
document.getElementById("searchProduct");

if(searchProduct){

  searchProduct.addEventListener("input", () => {

    const keyword =
      searchProduct.value
      .trim()
      .toLowerCase();

    filteredProducts =
      products.filter(p => {

        return (
          p.name || ""
        )
        .toLowerCase()
        .includes(keyword);

      });

    currentPage = 1;

    render();

  });

}

categoryEl.dispatchEvent(
  new Event("change")
);

}); // đóng window load

/* FORMAT MONEY INPUT */
function formatMoneyInput(input){

  if(!input) return;

  input.addEventListener("input", () => {

    let value = input.value.replace(/\D/g,"");

    if(!value){
      input.value = "";
      return;
    }

    input.value =
      Number(value).toLocaleString("vi-VN");

  });

}

formatMoneyInput(document.getElementById("price"));
formatMoneyInput(document.getElementById("oldPrice"));
formatMoneyInput(document.getElementById("importPrice"));
window.alert = function(message){
showToast(message);
};

function showToast(message){

const toast = document.createElement("div");

toast.innerText = message;

toast.style.cssText = `
position:fixed;
left:50%;
bottom:30px;
transform:translateX(-50%);
background:#222;
color:#fff;
padding:12px 20px;
