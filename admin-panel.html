<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Admin sản phẩm</title>
<link rel="stylesheet" href="style-admin.css">

<style>
:root{ --main-color:#00acc1; }
body{ font-family:Arial; padding:20px; background:#f5f5f5; }
h2{ margin-bottom:15px; }

input, button, select{
  display:block;
  margin:8px 0;
  padding:10px;
  width:320px;
  border:1px solid #ddd;
  border-radius:6px;
}

button{
  cursor:pointer;
  background:var(--main-color);
  color:#fff;
  border:none;
}

.item{
  background:#fff;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.item img{
  width:80px;
  border-radius:6px;
  display:block;
  margin-bottom:6px;
}

.home-btn{
  display:inline-block;
  margin-bottom:10px;
  background:#00acc1;
  color:#fff;
  padding:8px 12px;
  border-radius:20px;
  text-decoration:none;
  font-size:13px;
}
.home-btn:hover{ opacity:0.85; }

#showCat{
  margin:6px 0;
  color:#00acc1;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>📦 Admin sản phẩm</h2>

<a href="index.html" class="home-btn">← Trang chủ</a>

<input id="name" placeholder="Tên sản phẩm">
<input id="price" placeholder="Giá">
<input id="oldPrice" placeholder="Giá cũ">
<input id="desc" placeholder="Mô tả">

<input id="imgUrl" placeholder="Link ảnh (URL) - không bắt buộc">

<!-- ✅ KHUNG KHUYẾN MÃI THÊM MỚI -->
<input type="datetime-local" id="saleStart" placeholder="Bắt đầu khuyến mãi">
<input type="datetime-local" id="saleEnd" placeholder="Kết thúc khuyến mãi">
<input id="salePrice" placeholder="Giá khuyến mãi">

<select id="category">
  <option value="sd">Thẻ nhớ</option>
  <option value="cam-in">Camera trong nhà</option>
  <option value="cam-ngoai">Camera ngoài trời</option>
  <option value="combo">Combo</option>
  <option value="home">Trang chủ</option>
</select>

<div id="showCat"></div>

<div id="specBox"></div>

<input type="file" id="fileImg" accept="image/*">

<label>
  <input type="checkbox" id="featured">
  ⭐ Featured
</label>

<button id="btnAdd">➕ Thêm sản phẩm</button>

<hr>

<div id="list"></div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

function save(){
  localStorage.setItem("products", JSON.stringify(products));
}

/* ========================= MAP CATEGORY ========================= */
const nameMap = {
  sd: "Thẻ nhớ",
  "cam-in": "Camera trong nhà",
  "cam-ngoai": "Camera ngoài trời",
  combo: "Combo",
  home: "Trang chủ"
};

/* ========================= SHOW CATEGORY ========================= */
document.getElementById("category").addEventListener("change", function(){

  const type = this.value;

  document.getElementById("showCat").innerText =
    "📁 Thư mục: " + nameMap[type];

  const box = document.getElementById("specBox");

  if(type === "cam-in" || type === "cam-ngoai" || type === "home"){
    box.innerHTML = `
      <input id="doPhanGiai" placeholder="Độ phân giải">
      <input id="gocNhin" placeholder="Góc nhìn">
      <input id="ketNoi" placeholder="Kết nối">
      <input id="baoHanh" placeholder="Bảo hành">
    `;
  }
  else if(type === "sd"){
    box.innerHTML = `
      <input id="dungLuong" placeholder="Dung lượng">
      <input id="tocDo" placeholder="Tốc độ">
      <input id="loai" placeholder="Loại">
      <input id="baoHanh" placeholder="Bảo hành">
    `;
  }
  else if(type === "combo"){
    box.innerHTML = `
      <input id="moTaCombo" placeholder="Mô tả combo">
    `;
  }
  else{
    box.innerHTML = "";
  }
});

/* ========================= SAFE GET ========================= */
function getVal(id){
  const el = document.getElementById(id);
  return el ? el.value : "";
}

/* ========================= GIÁ KHUYẾN MÃI ========================= */
function getFinalPrice(p){
  const now = Date.now();

  const start = p.saleStart ? new Date(p.saleStart).getTime() : 0;
  const end = p.saleEnd ? new Date(p.saleEnd).getTime() : 0;

  if (start && end && now >= start && now <= end && p.salePrice){
    return p.salePrice;
  }

  return p.price;
}

/* ========================= ADD PRODUCT ========================= */
document.getElementById("btnAdd").addEventListener("click", function () {

  const name = document.getElementById("name").value.trim();
  const price = Number(document.getElementById("price").value.replace(/\D/g,""));
  const oldPrice = Number(document.getElementById("oldPrice").value.replace(/\D/g,"") || 0);
  const desc = document.getElementById("desc").value || "";
  const category = document.getElementById("category").value;

  const file = document.getElementById("fileImg").files[0];
  const imgUrl = document.getElementById("imgUrl").value.trim();

  if (!name) return alert("Thiếu tên");
  if (!price) return alert("Giá không hợp lệ");
  if (!file && !imgUrl) return alert("Chưa chọn ảnh hoặc link ảnh");

  function addProduct(img){

    let spec = {};

    if(category === "cam-in" || category === "cam-ngoai" || category === "home"){
      spec = {
        doPhanGiai: getVal("doPhanGiai"),
        gocNhin: getVal("gocNhin"),
        ketNoi: getVal("ketNoi"),
        baoHanh: getVal("baoHanh"),
      };
    }
    else if(category === "sd"){
      spec = {
        dungLuong: getVal("dungLuong"),
        tocDo: getVal("tocDo"),
        loai: getVal("loai"),
        baoHanh: getVal("baoHanh")
      };
    }
    else{
      spec = {
        moTaCombo: getVal("moTaCombo")
      };
    }

    products.push({
      id: Date.now(),
      name,
      price,
      oldPrice,
      desc,
      category,
      categoryName: nameMap[category],
      img,
      featured: document.getElementById("featured").checked,

      /* ✅ KHÔNG XOÁ - THÊM KM */
      saleStart: document.getElementById("saleStart").value || "",
      saleEnd: document.getElementById("saleEnd").value || "",
      salePrice: Number(document.getElementById("salePrice").value.replace(/\D/g,"") || 0),

      spec
    });

    save();
    render();

    alert("✔ Thêm sản phẩm thành công");

    document.getElementById("name").value = "";
    document.getElementById("price").value = "";
    document.getElementById("oldPrice").value = "";
    document.getElementById("desc").value = "";
    document.getElementById("fileImg").value = "";
    document.getElementById("imgUrl").value = "";
    document.getElementById("featured").checked = false;
  }

  if (imgUrl) return addProduct(imgUrl);

  const reader = new FileReader();

  reader.onload = function (e) {
    const img = new Image();
    img.src = e.target.result;

    img.onload = function(){

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      const MAX_WIDTH = 500;
      const scale = MAX_WIDTH / img.width;

      canvas.width = MAX_WIDTH;
      canvas.height = img.height * scale;

      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      addProduct(canvas.toDataURL("image/jpeg", 0.7));
    };
  };

  reader.readAsDataURL(file);
});

/* ========================= DELETE ========================= */
function del(id){
  products = products.filter(p => p.id !== id);
  save();
  render();
}

/* ========================= UPDATE ========================= */
function updateProduct(id){
  const newPrice = document.getElementById(`price-${id}`).value;
  const newOldPrice = document.getElementById(`oldPrice-${id}`).value;

  products = products.map(p => {
    if(p.id === id){
      return {...p, price: Number(newPrice), oldPrice: Number(newOldPrice)};
    }
    return p;
  });

  save();
  render();
}

/* ========================= RENDER ========================= */
function render(){

  const box = document.getElementById("list");

  if(products.length === 0){
    box.innerHTML = "<p>Chưa có sản phẩm</p>";
    return;
  }

  box.innerHTML = products.map(p => `
    <div class="item">
      <img src="${p.img || ''}">
      <div>

        <b>${p.name}</b><br>

        <span style="color:#00acc1;font-size:12px">
          📁 ${p.categoryName || p.category}
        </span><br>

        Giá: ${Number(getFinalPrice(p)).toLocaleString()}đ<br>

        ${p.oldPrice ? `<del>${Number(p.oldPrice).toLocaleString()}đ</del><br>` : ""}

        <input id="price-${p.id}" value="${p.price}" placeholder="Giá bán">
        <input id="oldPrice-${p.id}" value="${p.oldPrice || ''}" placeholder="Giá gốc">

        <button onclick="updateProduct(${p.id})">Cập nhật</button>

      </div>

      <button onclick="del(${p.id})" style="background:red">
        Xoá
      </button>

    </div>
  `).join("");
}

render();

</script>

</body>
</html>
