	
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Admin sản phẩm</title>

<style>
:root{
  --main-color:#00acc1;
}

body{
  font-family:Arial;
  padding:20px;
  background:#f5f5f5;
}

h2{
  margin-bottom:15px;
}

input, button, select{
  display:block;
  margin:8px 0;
  padding:10px;
  width:320px;
  border:1px solid #ddd;
  border-radius:6px;
}

button{
  cursor:pointer;
  background:var(--main-color);
  color:#fff;
  border:none;
}

.item{
  background:#fff;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.item img{
  width:80px;
  border-radius:6px;
  display:block;
  margin-bottom:6px;
}

.toast{
  position:fixed;
  top:20px;
  right:20px;
  background:#4caf50;
  color:#fff;
  padding:10px 15px;
  border-radius:6px;
  z-index:9999;
}
</style>
</head>

<body>

<h2>📦 Admin sản phẩm</h2>

<input id="name" placeholder="Tên sản phẩm">
<input id="price" placeholder="Giá">
<input id="oldPrice" placeholder="Giá cũ">
<input id="desc" placeholder="Mô tả">

<select id="category">
  <option value="sd">Thẻ nhớ</option>
  <option value="cam-in">Camera trong nhà</option>
  <option value="cam-ngoai">Camera ngoài trời</option>
  <option value="combo">Combo</option>
  <option value="home">Trang chủ</option>
</select>

<div id="specBox"></div>

<input type="file" id="fileImg" accept="image/*">

<label>
  <input type="checkbox" id="featured">
  ⭐ Featured
</label>

<button id="btnAdd">➕ Thêm sản phẩm</button>

<hr>

<div id="list"></div>

<script>

/* =========================
   DATA
========================= */
let products = JSON.parse(localStorage.getItem("products")) || [];

function save(){
  localStorage.setItem("products", JSON.stringify(products));
}

/* =========================
   SPEC UI
========================= */
document.getElementById("category").addEventListener("change", function(){

  const type = this.value;
  const box = document.getElementById("specBox");

  if(type === "cam-in" || type === "cam-ngoai" || type === "home"){
    box.innerHTML = `
      <input id="doPhanGiai" placeholder="Độ phân giải">
      <input id="gocNhin" placeholder="Góc nhìn">
      <input id="ketNoi" placeholder="Kết nối">
    `;
  }

  else if(type === "sd"){
    box.innerHTML = `
      <input id="dungLuong" placeholder="Dung lượng">
      <input id="tocDo" placeholder="Tốc độ">
      <input id="loai" placeholder="Loại">
      <input id="baoHanh" placeholder="Bảo hành">
    `;
  }

  else if(type === "combo"){
    box.innerHTML = `
      <input id="moTaCombo" placeholder="Mô tả combo">
    `;
  }

  else{
    box.innerHTML = "";
  }
});

/* =========================
   TOAST
========================= */
function toast(msg){
  const t = document.createElement("div");
  t.className = "toast";
  t.innerText = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2000);
}

/* =========================
   SAFE GET
========================= */
function getVal(id){
  const el = document.getElementById(id);
  return el ? el.value : "";
}

/* =========================
   ADD PRODUCT (FIX TRIỆT ĐỂ)
========================= */
document.getElementById("btnAdd").addEventListener("click", function () {

  try {

    const name = document.getElementById("name").value.trim();
    const price = Number(document.getElementById("price").value.replace(/\D/g,""));
    const oldPrice = Number(document.getElementById("oldPrice").value.replace(/\D/g,"") || 0);
    const desc = document.getElementById("desc").value || "";
    const category = document.getElementById("category").value;
    const file = document.getElementById("fileImg").files[0];

    if (!name) return alert("Thiếu tên");
    if (!price) return alert("Giá không hợp lệ");
    if (!file) return alert("Chưa chọn ảnh");

    const reader = new FileReader();

    reader.onload = function (e) {

      let spec = {};

      if(category === "cam-in" || category === "cam-ngoai" || category === "home"){
        spec = {
          doPhanGiai: getVal("doPhanGiai"),
          gocNhin: getVal("gocNhin"),
          ketNoi: getVal("ketNoi")
        };
      }

      else if(category === "sd"){
        spec = {
          dungLuong: getVal("dungLuong"),
          tocDo: getVal("tocDo"),
          loai: getVal("loai"),
          baoHanh: getVal("baoHanh")
        };
      }

      else{
        spec = {
          moTaCombo: getVal("moTaCombo")
        };
      }

      products.push({
        id: Date.now(),
        name,
        price,
        oldPrice,
        desc,
        category,
        img: e.target.result,
        featured: document.getElementById("featured").checked,
        spec
      });

      save();
      render();

      document.getElementById("name").value = "";
      document.getElementById("price").value = "";
      document.getElementById("oldPrice").value = "";
      document.getElementById("desc").value = "";
      document.getElementById("fileImg").value = "";
      document.getElementById("featured").checked = false;

      toast("✔ Upload thành công");

    };

    reader.onerror = function () {
      alert("Lỗi đọc ảnh");
    };

    reader.readAsDataURL(file);

  } catch (err) {
    alert("Lỗi JS: " + err.message);
  }

});

/* =========================
   DELETE
========================= */
function del(id){
  products = products.filter(p => p.id !== id);
  save();
  render();
}

/* =========================
   RENDER
========================= */
function render(){

  const box = document.getElementById("list");

  if(products.length === 0){
    box.innerHTML = "<p>Chưa có sản phẩm</p>";
    return;
  }

  box.innerHTML = products.map(p => `
    <div class="item">
      <img src="${p.img}">
      <b>${p.name}</b><br>
      💰 ${p.price.toLocaleString()}đ<br>
      ⭐ ${p.featured ? "Có" : "Không"}<br>
      <button onclick="del(${p.id})">Xoá</button>
    </div>
  `).join("");
}

render();

</script>

</body>
</html>
