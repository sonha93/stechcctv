<script type="module">
document.addEventListener("DOMContentLoaded", () => {

  // Firebase config
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
  import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBgiXCyXP7Ion3dgL-QOckfhGKbZZxkxN0",
    authDomain: "stech-storage.firebaseapp.com",
    projectId: "stech-storage",
    storageBucket: "stech-storage.appspot.com",
    messagingSenderId: "426074076904",
    appId: "1:426074076904:web:50e3475feb2a2fbbeb3b5d",
    measurementId: "G-MX7LET5ZS8"
  };

  const app = initializeApp(firebaseConfig);
  const storage = getStorage(app);

  /* =========================
     GET DATA
  ======================== */

  let products = JSON.parse(localStorage.getItem("products")) || [];

  function save(){
    localStorage.setItem("products", JSON.stringify(products));
  }

  const nameMap = {
    sd:"Thẻ nhớ",
    "cam-in":"Camera trong nhà",
    "cam-ngoai":"Camera ngoài trời",
    combo:"Combo",
    home:"Trang chủ"
  };

  function getVal(id){
    const el = document.getElementById(id);
    return el ? el.value.trim() : "";
  }

  /* =========================
     UPLOAD IMAGE
  ======================== */
  function uploadImage(file, category){
    return new Promise((resolve, reject)=>{
      const fileName = Date.now() + "_" + file.name;
      const path = `images/${category}/${fileName}`;
      const storageRef = ref(storage, path);
      const uploadTask = uploadBytesResumable(storageRef, file);

      uploadTask.on('state_changed',
        snapshot => {},
        error => reject(error),
        () => {
          getDownloadURL(uploadTask.snapshot.ref).then(url => resolve(url));
        }
      );
    });
  }

  /* =========================
     ADD PRODUCT
  ======================== */
  const btnAdd = document.getElementById("btnAdd");
  btnAdd.addEventListener("click", async function(){
    const name = getVal("name");
    const price = Number(getVal("price").replace(/\D/g,""));
    const oldPrice = Number(getVal("oldPrice").replace(/\D/g,"") || 0);
    const desc = getVal("desc");
    const category = getVal("category");
    const file = document.getElementById("fileImg").files[0];
    const imgUrl = getVal("imgUrl");

    if(!name) return alert("Thiếu tên");
    if(!price) return alert("Giá không hợp lệ");
    if(!file && !imgUrl) return alert("Chưa có ảnh");

    async function addProduct(img){
      products.push({
        id:Date.now(),
        name, price, oldPrice, desc,
        category, categoryName:nameMap[category],
        img,
        featured:document.getElementById("featured").checked,
        model:getVal("model"),
        xuatXu:getVal("xuatXu"),
        baoHanh:getVal("baoHanh"),
        doPhanGiai:getVal("doPhanGiai"),
        gocNhin:getVal("gocNhin"),
        ketNoi:getVal("ketNoi"),
        thietKe:getVal("thietKe"),
        chatLieu:getVal("chatLieu"),
        congSuat:getVal("congSuat"),
        dungLuong:getVal("dungLuong"),
        tocDo:getVal("tocDo"),
        loai:getVal("loai"),
        moTaCombo:getVal("moTaCombo")
      });

      save();
      render();
      alert("✔ Thêm sản phẩm thành công");

      // reset form
      ["name","price","oldPrice","desc","imgUrl","fileImg"].forEach(id=>document.getElementById(id).value="");
      document.getElementById("featured").checked=false;
    }

    if(imgUrl){
      return addProduct(imgUrl);
    }

    if(file){
      try{
        const uploadedUrl = await uploadImage(file, category);
        addProduct(uploadedUrl);
      } catch(e){
        console.error(e);
        alert("Upload ảnh thất bại!");
      }
    }
  });

  /* =========================
     DELETE PRODUCT
  ======================== */
  window.del = function(id){
    products = products.filter(p=>p.id!==id);
    save();
    render();
  }

  /* =========================
     UPDATE PRICE
  ======================== */
  window.updateProduct = function(id){
    const newPrice = Number(getVal(`price-${id}`));
    const newOldPrice = Number(getVal(`oldPrice-${id}`) || 0);
    products = products.map(p=>{
      if(p.id===id) return {...p, price:newPrice, oldPrice:newOldPrice};
      return p;
    });
    save();
    render();
  }

  /* =========================
     RENDER
  ======================== */
  function render(){
    const box = document.getElementById("list");
    if(products.length===0){ box.innerHTML="<p>Chưa có sản phẩm</p>"; return;}
    box.innerHTML = products.map(p=>`
      <div class="item">
        <img src="${p.img || ''}">
        <div>
          <b>${p.name}</b><br>
          <span style="color:#00acc1;font-size:12px;">📁 ${p.categoryName || p.category}</span><br>
          Giá: ${Number(p.price).toLocaleString()}đ<br>
          ${p.oldPrice ? `<del>${Number(p.oldPrice).toLocaleString()}đ</del><br>` : ""}
          <input id="price-${p.id}" value="${p.price}" placeholder="Giá bán">
          <input id="oldPrice-${p.id}" value="${p.oldPrice||''}" placeholder="Giá gốc">
          <button onclick="updateProduct(${p.id})">Cập nhật</button>
        </div>
        <button onclick="del(${p.id})" style="background:red">Xoá</button>
      </div>
    `).join("");
  }

  /* =========================
     INIT
  ======================== */
  render();
  document.getElementById("category").dispatchEvent(new Event("change"));

});
</script>
