<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Shop Camera Pro</title>
<style>
/* ===== RESET ===== */
* { margin:0; padding:0; box-sizing:border-box; font-family:sans-serif; }
body { background:#f5f5f5; padding:20px; }
.container { max-width:1200px; margin:0 auto; background:#fff; padding:20px; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
/* Header */
h1 { margin-bottom:20px; color:#00acc1; }
/* Layout bảng */
table { width:100%; border-collapse:collapse; margin-bottom:20px; }
table, th, td { border:1px solid #ccc; }
th, td { padding:10px; text-align:left; }
th { background:#eee; }
/* Form upload */
.upload-section { margin-bottom:20px; }
input[type=file] { padding:5px; }
button { padding:8px 12px; background:#00acc1; color:#fff; border:none; border-radius:4px; cursor:pointer; }
button:hover { background:#007c91; }
img.preview { max-width:200px; display:block; margin-top:10px; border:1px solid #ccc; border-radius:4px; }
</style>
</head>
<body>

<div class="container">
  <h1>Admin Panel - Shop Camera Pro</h1>

  <!-- BẢNG CÁC SẢN PHẨM -->
  <table id="products-table">
    <thead>
      <tr>
        <th>Tên sản phẩm</th>
        <th>Giá</th>
        <th>Ảnh</th>
      </tr>
    </thead>
    <tbody>
      <!-- Sản phẩm sẽ được load từ JS -->
    </tbody>
  </table>

  <!-- PHẦN UPLOAD ẢNH MỚI -->
  <div class="upload-section">
    <label>Chọn ảnh để upload:</label>
    <input type="file" id="fileInput" accept="image/*">
    <button id="uploadBtn">Upload lên Firebase</button>
    <img id="preview" class="preview" src="">
    <p id="uploadStatus"></p>
  </div>

</div>

<!-- ===== FIREBASE CDN ===== -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics-compat.js"></script>

<script>
// ===== CẤU HÌNH FIREBASE =====
const firebaseConfig = {
  apiKey: "AIzaSyBgiXCyXP7Ion3dgL-QOckfhGKbZZxkxN0",
  authDomain: "stech-storage.firebaseapp.com",
  projectId: "stech-storage",
  storageBucket: "stech-storage.appspot.com",
  messagingSenderId: "426074076904",
  appId: "1:426074076904:web:50e3475feb2a2fbbeb3b5d",
  measurementId: "G-MX7LET5ZS8"
};

// Khởi tạo Firebase
firebase.initializeApp(firebaseConfig);
firebase.analytics();
const storage = firebase.storage();

// ===== UPLOAD ẢNH =====
const fileInput = document.getElementById('fileInput');
const uploadBtn = document.getElementById('uploadBtn');
const preview = document.getElementById('preview');
const uploadStatus = document.getElementById('uploadStatus');

fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  if(file) {
    preview.src = URL.createObjectURL(file);
  }
});

uploadBtn.addEventListener('click', () => {
  const file = fileInput.files[0];
  if(!file) { alert('Chọn ảnh trước khi upload'); return; }

  const storageRef = storage.ref('uploads/' + file.name);
  const uploadTask = storageRef.put(file);

  uploadStatus.textContent = 'Đang upload...';

  uploadTask.on('state_changed', 
    snapshot => {
      const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
      uploadStatus.textContent = `Upload ${progress.toFixed(0)}%`;
    }, 
    error => { uploadStatus.textContent = 'Lỗi upload: ' + error; }, 
    () => {
      uploadTask.snapshot.ref.getDownloadURL().then(downloadURL => {
        uploadStatus.textContent = 'Upload xong! URL: ' + downloadURL;
        console.log('File available at', downloadURL);
      });
    }
  );
});
</script>

</body>
</html>
