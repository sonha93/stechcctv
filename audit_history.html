<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Adit History</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f6f9;
    padding:25px;
    color:#111827;
}

h2{
    font-size:28px;
    margin-bottom:25px;
}

.audit-filter{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:25px;
}
.audit-info{
    min-height:95px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}
.audit-filter input{
    padding:14px;
    border:1px solid #ddd;
    border-radius:12px;
    background:#fff;
}

.audit-filter button{
    background:#111;
    color:#fff;
    border:none;
    border-radius:12px;
    padding:14px 22px;
    cursor:pointer;
    font-weight:600;
}

#auditStatus{
    font-size:20px;
    font-weight:bold;
    margin:20px 0;
}

#auditSelect{
    width:350px;
    padding:12px;
    border-radius:10px;
    border:1px solid #ddd;
}

.audit-row{
    background:#fff;
    border-radius:24px;
    padding:28px;
    margin-bottom:25px;
    box-shadow:0 4px 20px rgba(0,0,0,.06);
}

.audit-row h3{
    background:#111;
    color:white;
    padding:18px 25px;
    border-radius:16px;
    font-size:22px;
    margin-bottom:20px;
}

.audit-grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(260px,1fr));
    gap:15px;
    margin-top:20px;
}

.audit-card{
    background:#f8fafc;
    border:1px solid #edf2f7;
    border-radius:16px;
    padding:18px;
}

.audit-card span{
    display:block;
    color:#6b7280;
    font-size:14px;
    margin-bottom:8px;
}

.audit-card b{
    font-size:18px;
}

.good{
    color:#16a34a;
    font-weight:bold;
}

.loss{
    color:#dc2626;
    font-weight:bold;
}

.more{
    color:#f59e0b;
    font-weight:bold;
}

.summary-loss{
    color:#dc2626;
    font-weight:bold;
}

.summary-more{
    color:#16a34a;
    font-weight:bold;
}

.summary-total{
    margin-top:25px;
    background:#111;
    color:white;
    border-radius:18px;
    padding:20px;
    font-size:28px;
    font-weight:bold;
    text-align:center;
}

@media(max-width:768px){

    body{
        padding:12px;
    }

    .audit-row{
        padding:18px;
    }

    .audit-row h3{
        font-size:18px;
    }

    .summary-total{
        font-size:22px;
    }
body{
    background:#f6f7fb;
    font-family:Inter,Arial,sans-serif;
}

.audit-row{
    background:#fff;
    border-radius:20px;
    padding:25px;
    box-shadow:0 5px 25px rgba(0,0,0,.06);
}

.audit-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:15px;
}

.audit-card{
    background:#fafafa;
    border:1px solid #eee;
    border-radius:16px;
    padding:18px;
}

.audit-card span{
    color:#666;
    font-size:13px;
}

.audit-card b{
    font-size:26px;
    font-weight:700;
}

.summary-total{
    background:#fff;
    border:1px solid #eee;
    color:#111;
    border-radius:16px;
}

.good{
    color:#16a34a;
}

.loss{
    color:#dc2626;
}

.more{
    color:#f59e0b;
}
    .audit-product-title{
    font-size:34px;
    font-weight:700;
    margin-bottom:25px;
    color:#111827;
}

.audit-row{
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 4px 20px rgba(0,0,0,.08);
    margin-bottom:25px;
}

.audit-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:16px;
}

.audit-card{
    background:#f8fafc;
    border-radius:16px;
    padding:18px;
}

.audit-card span{
    display:block;
    color:#6b7280;
    font-size:14px;
    margin-bottom:8px;
}

.audit-card b{
    font-size:20px;
    font-weight:700;
    color:#111827;
}

.summary-total{
    margin-top:20px;
    background:#111827;
    color:white;
    padding:18px;
    border-radius:16px;
    font-size:28px;
    font-weight:700;
    
}
}
</style>
</head>
<body>

<h2>📋 ADIT HISTORY</h2>
<div class="audit-filter">

    <input type="date" id="auditDateFilter">

    <button id="searchAudit">
        Search Audit
    </button>

    <button id="latestAudit">
      Latest Audit
    </button>

    <button id="openAudit">
       Open Audit
    </button>
<button id="closeAudit">
        Close Audit
    </button>
</div>

<div id="auditStatus">
    🔴 CLOSING AUDIT
</div>
<select id="auditSelect">
</select>
<br><br>

<div id="auditList"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script type="module" src="audit_history.js"></script>

</body>
</html>
