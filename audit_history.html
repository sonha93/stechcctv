<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Lịch sử kiểm kê kho</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    padding:20px;
}

h2{
    margin-bottom:20px;
}

.audit-row{
    background:#fff;
    margin-bottom:1px;
    padding:15px;
    border-bottom:1px solid #eee;
}

.audit-row h3{
    margin-bottom:15px;
}

.audit-grid{
    display:grid;
    grid-template-columns:
    repeat(6,minmax(140px,1fr));
    gap:10px;
    margin-top:10px;
}

.audit-card{
    background:#fafafa;
    padding:10px;
    border-radius:6px;
    border:1px solid #eee;
}
#auditList{
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}
    .audit-filter button:hover{
    opacity:.9;
}

#openAudit{
    background:#16a34a;
}

#closeAudit{
    background:#dc2626;
}
    #auditStatus{
    padding:15px;
    background:#fff;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}
    #auditSelect{
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
    min-width:320px;
    margin-bottom:20px;
}
.audit-card span{
    display:block;
    color:#666;
    font-size:13px;
    margin-bottom:5px;
}

.audit-card b{
    font-size:16px;
}

.summary-loss{
    color:red;
    font-weight:bold;
}

.summary-more{
    color:green;
    font-weight:bold;
}

.summary-total{
    background:#111;
    color:white;
    padding:12px;
    border-radius:8px;
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
}

.good{
    color:green;
    font-weight:bold;
}

.loss{
    color:red;
    font-weight:bold;
}

.more{
    color:orange;
    font-weight:bold;
}
.audit-filter{
    display:flex;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.audit-filter input{
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
}

.audit-filter button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#111;
    color:white;
}
    #auditStatus{
    margin:15px 0;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>
<body>

<h2>📋 Lịch sử kiểm kê kho</h2>
<div class="audit-filter">

    <input type="date" id="auditDateFilter">

    <button id="searchAudit">
        Tìm kiểm kê
    </button>

    <button id="latestAudit">
        Kỳ mới nhất
    </button>

    <button id="openAudit">
        Mở kiểm kê
    </button>
<button id="closeAudit">
        Đóng kiểm kê
    </button>
</div>

<div id="auditStatus">
    🔴 ĐANG ĐÓNG KIỂM KÊ
</div>
<select id="auditSelect">
</select>
<br><br>

<div id="auditList"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script type="module" src="audit_history.js"></script>

</body>
</html>
