<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Cuộc gọi</title>

<link rel="stylesheet" href="call.css">

</head>

<body>

<div class="call-page">

    <!-- NỀN -->
    <div class="call-bg"></div>

    <!-- THÔNG TIN -->

    <div class="call-top">

        <img
        id="callAvatar"
        class="call-avatar"
        src="default-avatar.png">

        <div
        id="callName"
        class="call-name">

            Người dùng

        </div>

        <div
        id="callStatus"
        class="call-status">

            Đang kết nối...

        </div>

        <div
        id="callTimer"
        class="call-timer">

        </div>

    </div>

    <!-- AUDIO -->

    <audio
    id="remoteAudio"
    autoplay>

    </audio>

    <audio
    id="ringtone"
    loop>

        <source
        src="assets/sounds/ring.mp3"
        type="audio/mpeg">

    </audio>

    <!-- NÚT -->

    <div class="call-actions">

        <!-- MIC -->

        <button
        id="muteBtn"
        class="call-btn">

            <svg
            viewBox="0 0 24 24"
            fill="currentColor">

                <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/>

                <path d="M17 11a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21H8v2h8v-2h-3v-3.08A7 7 0 0 0 19 11h-2z"/>

            </svg>

        </button>

        <!-- LOA -->

        <button
        id="speakerBtn"
        class="call-btn">

            <svg
            viewBox="0 0 24 24"
            fill="currentColor">

                <path d="M3 10v4h4l5 5V5L7 10H3z"/>

                <path d="M16.5 12a4.5 4.5 0 0 0-2.5-4.03v8.06A4.5 4.5 0 0 0 16.5 12z"/>

                <path d="M14 3.23v2.06a7 7 0 0 1 0 13.42v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>

            </svg>

        </button>

        <!-- TỪ CHỐI -->

        <button
        id="rejectBtn"
        class="call-btn reject">

            <svg
            viewBox="0 -960 960 960"
            fill="currentColor">

                <path d="M200-520q58-46 127.5-73T480-620q83 0 152.5 27T760-520l-56 58q-46-35-102.5-56.5T480-540q-65 0-121.5 21.5T256-462l-56-58Z"/>

            </svg>

        </button>

        <!-- NHẬN -->

        <button
        id="acceptBtn"
        class="call-btn accept">

            <svg
            viewBox="0 -960 960 960"
            fill="currentColor">

                <path d="M798-120q-119 0-247.5-60.5T318-352Q207-463 146.5-591.5T86-839q0-24 16.5-40.5T143-896h154q20 0 35 13t20 33l25 113q4 18-1 34t-18 28l-74 74q29 52 69.5 99.5T443-413q48 48 95.5 88.5T638-255l74-74q12-12 28-17t34-1l113 25q20 5 33 20t13 35v154q0 24-16.5 40.5T798-120Z"/>

            </svg>

        </button>

        <!-- KẾT THÚC -->

        <button
        id="endBtn"
        class="call-btn end">

            <svg
            viewBox="0 -960 960 960"
            fill="currentColor">

                <path d="M200-520q58-46 127.5-73T480-620q83 0 152.5 27T760-520l-56 58q-46-35-102.5-56.5T480-540q-65 0-121.5 21.5T256-462l-56-58Z"/>

            </svg>

        </button>

    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script type="module" src="firebase-init.js"></script>

<script type="module" src="call.js"></script>

</body>
</html>
