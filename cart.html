<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giỏ hàng</title>
<link rel="stylesheet" href="stylecart.css">
<style>
/* =========================
   RESET
========================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#f5f5f5;
}

/* =========================
   OVERLAY + SIDEBAR
========================= */
#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  opacity:0;
  visibility:hidden;
  transition:.2s;
  z-index:9998;
}
#overlay.active{
  opacity:1;
  visibility:visible;
}

.sidebar{
  position:fixed;
  top:0;
  left:-280px;
  width:260px;
  height:100vh;
  background:#fff;
  padding:20px;
  z-index:99999;
  transition:.25s;
}
.sidebar.active{
  left:0;
}
.sidebar a{
  display:block;
  padding:14px;
  margin-bottom:10px;
  border-radius:12px;
  background:#f5f5f5;
  text-decoration:none;
  color:#111;
  font-weight:bold;
}

/* =========================
   HEADER
========================= */
.top-header{
  position:sticky;
  top:0;
  z-index:9999;
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px;
  background:#33A0AB;
  flex-wrap:nowrap;
  overflow:visible !important;
}

/* MENU + ICON */
.menu-btn,
.icon-btn{
  width:54px;
  height:54px;
  min-width:54px;
  border-radius:18px;
  background:#1fb4c7;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  cursor:pointer;
  flex-shrink:0;
  border:none;
}

/* LOGO */
.logo{
  width:58px;
  height:58px;
  min-width:58px;
  border-radius:18px;
  overflow:hidden;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}
.logo img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
  padding:2px;
}

/* SEARCH */
.search-box{
  position:relative;
  flex:1;
  max-width:450px;
}
.search-box input{
  width:100%;
  height:48px;
  border:none;
  outline:none;
  border-radius:18px;
  padding:0 18px;
  background:#f1f1f1;
  font-weight:bold;
}

/* SEARCH RESULTS */
.search-results{
  position:absolute;
  top:100%;
  left:0;
  right:0;
  background:#fff;
  border:1px solid #ddd;
  max-height:350px;
  overflow-y:auto;
  z-index:9999;
}
.search-item{
  display:flex;
  gap:10px;
  padding:10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
.search-item img{
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:6px;
}
.search-name{font-weight:bold;}
.search-price{color:red;font-weight:bold;}
.search-oldprice{
  font-size:12px;
  color:#888;
  text-decoration:line-through;
}

/* RIGHT ICONS */
.header-icons{
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
}

/* CART BADGE */
.cart-badge{
  position:absolute;
  top:2px;
  right:2px;
  min-width:20px;
  height:20px;
  border-radius:50%;
  background:red;
  color:#fff;
  font-size:11px;
  font-weight:bold;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* =========================
   CART UI
========================= */
.container{
  max-width:900px;
  margin:auto;
  padding:15px;
}
.item{
  display:flex;
  gap:10px;
  background:#fff;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  position:relative;
}
.item img{
  width:80px;
  height:80px;
  border-radius:10px;
}
.check-item{
  position:absolute;
  top:5px;
  left:5px;
  width:20px;
  height:20px;
}
.info{
  flex:1;
  display:flex;
  flex-direction:column;
}
.price-row{
  display:flex;
  justify-content:space-between;
  gap:5px;
}
.price-new{color:red;font-weight:bold;}
.price-old{
  text-decoration:line-through;
  color:#888;
  font-size:13px;
}
.qty{
  display:flex;
  align-items:center;
  border:1px solid #ccc;
  border-radius:8px;
  overflow:hidden;
  margin-top:5px;
}
.qty button{
  border:none;
  background:#eee;
  width:28px;
  height:28px;
  cursor:pointer;
}
.qty span{
  width:28px;
  text-align:center;
}
.remove{
  position:absolute;
  top:5px;
  right:5px;
  background:none;
  border:none;
  font-size:18px;
  cursor:pointer;
}

.total{
  text-align:right;
  font-size:20px;
  font-weight:bold;
  color:red;
  margin-top:10px;
}
.checkout{
  width:100%;
  margin-top:10px;
  padding:12px;
  background:linear-gradient(90deg,#1e88e5,#00acc1,#43a047);
  color:#fff;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
.empty{
  text-align:center;
  margin-top:40px;
}

/* =========================
   MOBILE
========================= */
@media(max-width:768px){
  .top-header{
    gap:6px;
    padding:6px;
  }

  .menu-btn,
  .icon-btn,
  .logo{
    width:44px;
    height:44px;
    min-width:44px;
    border-radius:14px;
  }

  .search-box input{
    height:44px;
    border-radius:14px;
  }

  .cart-badge{
    width:18px;
    height:18px;
    font-size:10px;
  }
   .header-icons{
  display:flex;
  align-items:center;
  gap:10px;
}

/* KHUNG ICON */
.icon-btn{
  width:44px;
  height:44px;
  border-radius:14px;

  display:flex;
  align-items:center;
  justify-content:center;

  position:relative;

  text-decoration:none;

  background:#1fb4c7;
  color:#fff;

  font-size:20px;

  line-height:1;
}

/* ICON 🛒 chỉnh giữa chuẩn */
.cart-icon{
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1;
  transform:translateY(0px);
}

/* BADGE số */
.cart-badge{
  position:absolute;
  top:-4px;
  right:-4px;

  width:18px;
  height:18px;

  border-radius:50%;
  background:red;
  color:#fff;

  font-size:10px;
  font-weight:bold;

  display:flex;
  align-items:center;
  justify-content:center;
}
   .icon-btn:hover{
  transform:scale(1.05);
  transition:0.2s;
  background:#159aaa;
}
}
</style>
</head>
<body>

<div id="overlay" onclick="toggleMenu()"></div>
<!-- MENU / SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Danh mục</h3>
  <a href="index.html">Trang chủ</a>
   <a href="cart.html">Giỏ hàng</a>
  <a href="camera-trong-nha.html">Camera trong nhà</a>
  <a href="camera-ngoai-troi.html">Camera ngoài trời</a>
  <a href="the-nho.html">Thẻ nhớ</a>
  <a href="combo-khuyenmai.html">Combo khuyến mãi</a>
</div>

<div class="top-header">

  <div class="menu-btn" onclick="toggleMenu()">☰</div>

  <div class="logo">
    <img src="https://i.ibb.co/Z1kv9nJj/logo.png" alt="Stech">
  </div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Tìm sản phẩm...">
    <div id="searchResults" class="search-results"></div>
       </div>

      <div class="header-icons">

    <a href="admin.html" class="icon-btn admin-btn">🔐</a>

    <a href="cart.html" class="icon-btn">
      <span class="cart-icon">🛒</span>
      <span class="cart-badge">0</span>
    </a>
  </div>

</div> <!-- ❗ PHẢI ĐÓNG HEADER Ở ĐÂY -->

<!-- GIỎ HÀNG PHẢI RA NGOÀI -->
<div class="container">
  <h2>🛒 Giỏ hàng</h2>
  <div id="cartList"></div>
  <div class="total" id="total"></div>
  <div id="cartAction"></div>
</div>
    <script type="module" src="./cart.js"></script>
<script>
function toggleMenu() {
  document.getElementById("sidebar")
    .classList.toggle("active");

  document.getElementById("overlay")
    .classList.toggle("active");
}
</script>



</body>
</html>
