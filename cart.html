<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giỏ hàng</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
  body{background:#f4f7fb;color: #333;}
  #overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;z-index:998;}
  #overlay.active{display:block;}
  .sidebar{position:fixed;left:-260px;top:0;width:260px;height:100%;background:#fff;padding:20px;transition:0.3s;z-index:999;}
  .sidebar.active{left:0;}
  .sidebar h3{margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px;}
  .sidebar a{display:block;padding:12px 10px;border-radius:8px;text-decoration:none;color:#333;margin-bottom:5px;transition:0.2s;}
  .sidebar a:hover{background:#f0f0f0;color:#1e88e5;}
  header{display:flex;align-items:center;gap:10px;padding:10px;background:linear-gradient(90deg,#1e88e5,#00acc1,#43a047);position:sticky;top:0;z-index:1000;}
  .menu-btn{width:40px;height:40px;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;user-select:none;}
  .logo img{width:40px;height:40px;border-radius:50%;object-fit:cover;}
  header input{flex:1;padding:10px 15px;border:none;border-radius:20px;background:#fff;outline:none;}
  .container{max-width:900px;margin:auto;padding:15px;}
  .container h2{margin-bottom: 15px; font-size: 22px;}
  .item{display:flex;gap:15px;background:#fff;padding:15px;margin-bottom:12px;border-radius:12px;align-items:center;position:relative;box-shadow: 0 2px 5px rgba(0,0,0,0.05);}
  .item img{width:80px;height:80px;border-radius:10px;object-fit:cover;border: 1px solid #eee;}
  .check-item{width:20px;height:20px;cursor:pointer;accent-color: #43a047;}
  .info{flex:1;display:flex;flex-direction:column;gap:5px;min-width:150px;}
  .info b{font-size: 16px;}
  .price-row{display:flex;gap:10px;align-items:center;flex-wrap: wrap;}
  .price-new{color:red;font-weight:bold;white-space:nowrap;font-size:16px;}
  .price-old{text-decoration:line-through;color:#888;font-size:13px;white-space:nowrap;}
  .qty{display:flex;align-items:center;border:1px solid #ddd;border-radius:8px;overflow:hidden;width:fit-content;margin-top:5px;background:#fff;}
  .qty button{border:none;background:#f5f5f5;width:32px;height:28px;font-size:16px;cursor:pointer;transition:0.2s;}
  .qty button:hover{background:#e0e0e0;}
  .qty span{display:inline-block;width:35px;text-align:center;font-weight:bold;}
  .remove{position:absolute;top:15px;right:15px;background:#ffebee;border:none;font-size:18px;cursor:pointer;color:#e53935;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:0.2s;}
  .remove:hover{background:#ffcdd2;}
  .total{text-align:right;font-size:22px;font-weight:bold;color:red;margin:20px 0;}
  .checkout{width:100%;padding:14px;background:linear-gradient(90deg,#1e88e5,#00acc1,#43a047);color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:16px;font-weight:bold;transition:0.2s;}
  .checkout:hover{opacity:0.9;}
  .empty{text-align:center;margin-top:60px;font-size:16px;color:#666;}
</style>
</head>
<body>

<div id="overlay"></div>

<div class="sidebar" id="sidebar">
  <h3>Danh mục</h3>
  <a href="index.html">Trang chủ</a>
  <a href="cart.html">Giỏ hàng</a>
  <a href="camera-trong-nha.html">Camera trong nhà</a>
  <a href="camera-ngoai-troi.html">Camera ngoài trời</a>
  <a href="the-nho.html">Thẻ nhớ</a>
  <a href="combo-khuyenmai.html">Combo khuyến mãi</a>
  <a href="admin.html" style="border-top:1px solid #eee; margin-top:15px;">Admin</a>
</div>

<header>
  <div class="menu-btn" id="menuBtn">☰</div>
  <div class="logo"><img src="https://ibb.co" onerror="this.src='https://placeholder.com'"></div>
  <input id="searchInput" placeholder="Tìm kiếm sản phẩm trong giỏ...">
</header>

<div class="container">
  <h2>🛒 Giỏ hàng</h2>
  <div id="cartList"></div>
  <div class="total" id="total"></div>
  <div id="cartAction"></div>
</div>

<!-- ĐÃ KHÔI PHỤC ĐẦY ĐỦ LINK TẢI MODULE HỢP LỆ -->
<script type="module">
  import { initializeApp } from "https://gstatic.com";
  import { getAuth, onAuthStateChanged } from "https://gstatic.com";
  import { getFirestore, doc, getDoc, setDoc } from "https://gstatic.com";

  // ĐÃ SỬA CẤU HÌNH GỐC ĐẦY ĐỦ CỦA BẠN
  const firebaseConfig = {
    apiKey: "AIzaSyDYVcBEYJN1HUCta3XdJAUBe4TGLnmy7y4",
    authDomain: "stech-73b89.firebaseapp.com",
    projectId: "stech-73b89",
    storageBucket: "stech-73b89.appspot.com",
    messagingSenderId: "873739162979",
    appId: "1:873739162979:web:978f1a4043f025b1cdaf56"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let cart = [];

  // ĐIỀU HƯỚNG SIDEBAR MENU BẰNG EVENT LISTENER
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");
  const menuBtn = document.getElementById("menuBtn");

  function toggleMenu(){
    if(sidebar && overlay) {
      sidebar.classList.toggle("active");
      overlay.classList.toggle("active");
    }
  }
  if(menuBtn) menuBtn.addEventListener("click", toggleMenu);
  if(overlay) overlay.addEventListener("click", toggleMenu);

  // THEO DÕI TRẠNG THÁI ĐĂNG NHẬP & TẢI GIỎ HÀNG TỪ FIRESTORE
  onAuthStateChanged(auth, async (user) => {
    if(user){
      currentUser = user;
      try {
        const cartRef = doc(db, "carts", currentUser.uid);
        const cartSnap = await getDoc(cartRef);
        
        if (cartSnap.exists()) {
          cart = cartSnap.data().items || [];
        } else {
          cart = [];
        }
      } catch (error) {
        console.error("Lỗi khi lấy giỏ hàng từ Firestore:", error);
        cart = [];
      }
    } else {
      currentUser = null;
      cart = JSON.parse(localStorage.getItem("cart_guest")) || [];
    }
    renderCart();
  });

  // HIỂN THỊ DANH SÁCH GIỎ HÀNG TRÊN GIAO DIỆN
  function renderCart(list = null){
    let arr = list || cart;
    const box = document.getElementById("cartList");
    const totalBox = document.getElementById("total");
    const actionBox = document.getElementById("cartAction");

    if(!box) return;

    if(arr.length === 0){
      box.innerHTML = "<p class='empty'>Giỏ hàng của bạn đang trống.</p>";
      if(totalBox) totalBox.innerHTML = "";
      if(actionBox) actionBox.innerHTML = "";
      return;
    }

    let total = 0;
    box.innerHTML = arr.map((item, i) => {
      if(item.checked === undefined) item.checked = true;
      if(item.checked) {
        total += (Number(item.price) || 0) * (Number(item.qty) || 1);
      }
      
      let imageSrc = item.img || 'https://via.placeholder.com/80';

      return `
      <div class="item">
        <input type="checkbox" class="check-item btn-check" data-index="${i}" ${item.checked ? "checked" : ""}>
        <img src="${imageSrc}" onerror="this.src='https://via.placeholder.com/80'">
        <div class="info">
          <b>${item.name || 'Sản phẩm không tên'}</b>
          <div class="price-row">
            <span class="price-new">${(Number(item.price) || 0).toLocaleString()}đ</span>
            ${item.oldPrice ? `<span class="price-old">${(Number(item.oldPrice) || 0).toLocaleString()}đ</span>` : ""}
          </div>
          <div class="qty">
            <button class="btn-minus" data-index="${i}">-</button>
            <span>${item.qty || 1}</span>
            <button class="btn-plus" data-index="${i}">+</button>
          </div>
        </div>
        <button class="remove btn-remove" data-index="${i}">🗑</button>
      </div>`;
    }).join("");

    if(totalBox) totalBox.innerHTML = "Tổng: " + total.toLocaleString() + "đ";
    if(actionBox) actionBox.innerHTML = `<button class="checkout" id="checkoutBtn">Đặt hàng</button>`;

    addCartEvents();
  }

  // GẮN SỰ KIỆN CHO CÁC NÚT BẤM TRONG GIỎ HÀNG (SỬA LỖI SỰ KIỆN TRONG MODULE)
  function addCartEvents() {
    document.querySelectorAll(".btn-check").forEach(btn => {
      btn.addEventListener("change", (e) => {
        const index = e.target.dataset.index;
        cart[index].checked = e.target.checked;
        saveCart();
        renderCart();
      });
    });

    document.querySelectorAll(".btn-minus").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const index = e.target.dataset.index;
        cart[index].qty = (Number(cart[index].qty) || 1) - 1;
        if(cart[index].qty < 1) cart[index].qty = 1;
        saveCart();
        renderCart();
      });
    });

    document.querySelectorAll(".btn-plus").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const index = e.target.dataset.index;
        cart[index].qty = (Number(cart[index].qty) || 1) + 1;
        saveCart();
        renderCart();
      });
    });

    document.querySelectorAll(".btn-remove").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const button = e.target.closest(".btn-remove");
        const index = button.dataset.index;
        if(confirm("Bạn muốn xóa sản phẩm này khỏi giỏ hàng?")){
          cart.splice(index, 1);
          saveCart();
          renderCart();
        }
      });
    });

    const checkoutBtn = document.getElementById("checkoutBtn");
    if(checkoutBtn) {
      checkoutBtn.addEventListener("click", () => {
        let checkedItems = cart.filter(i => i.checked !== false);
        if(checkedItems.length === 0){ 
          alert("Vui lòng tích chọn ít nhất 1 sản phẩm để đặt hàng!"); 
          return; 
        }
        window.location.href = "checkout.html";
      });
    }
  }

  // ĐỒNG BỘ GIỎ HÀNG LÊN FIRESTORE HOẶC LOCALSTORAGE NẾU LÀ GUEST
  async function saveCart(){ 
    if(currentUser) {
      try {
        await setDoc(doc(db, "carts", currentUser.uid), {
          items: cart,
          lastUpdated: new Date()
        });
      } catch (error) {
        console.error("Lỗi khi đồng bộ giỏ hàng lên Firestore:", error);
      }
    } else {
      localStorage.setItem("cart_guest", JSON.stringify(cart));
    }
  }

  // TÌM KIẾM SẢN PHẨM TRONG GIỎ
  const searchInput = document.getElementById("searchInput");
  if(searchInput) {
    searchInput.addEventListener("input", function(){
      const key = this.value.toLowerCase().trim();
      const filtered = cart.filter(i => (i.name || '').toLowerCase().includes(key));
      renderCart(filtered);
    });
  }
</script>

</body>
</html>
