<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Giỏ hàng</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="stylecart.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#f4f7fb;}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;z-index:998;}
#overlay.active{display:block;}
.sidebar{position:fixed;left:-260px;top:0;width:260px;height:100%;background:#fff;padding:20px;transition:0.3s;z-index:999;}
.sidebar.active{left:0;}
.sidebar a{display:block;padding:10px;border-radius:8px;text-decoration:none;color:#333;}
header{display:flex;align-items:center;gap:10px;padding:10px;background:linear-gradient(90deg,#1e88e5,#00acc1,#43a047);position:sticky;top:0;z-index:1000;}
.menu-btn{width:40px;height:40px;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;}
.logo img{width:40px;height:40px;border-radius:50%;}
header input{flex:1;padding:10px;border:none;border-radius:20px;background:#e0e0e0;}
.container{max-width:900px;margin:auto;padding:15px;}
.item{display:flex;gap:10px;background:#fff;padding:12px;margin-bottom:10px;border-radius:12px;align-items:center;position:relative;}
.item img{width:80px;height:80px;border-radius:10px;}
.check-item{position:absolute;top:5px;left:5px;width:20px;height:20px;cursor:pointer;}
.info{flex:1;display:flex;flex-direction:column;justify-content:center;min-width:180px;}
.price-row{display:flex;justify-content:space-between;flex-wrap:nowrap;gap:5px;align-items:center;}
.price-new{color:red;font-weight:bold;white-space:nowrap;}
.price-old{text-decoration:line-through;color:#888;font-size:13px;white-space:nowrap;}
.qty{display:flex;align-items:center;border:1px solid #ccc;border-radius:8px;overflow:hidden;gap:4px;margin-top:5px;}
.qty button{border:none;background:#eee;width:28px;height:28px;border-radius:6px;cursor:pointer;}
.qty span{display:inline-block;width:28px;text-align:center;}
.remove{position:absolute;top:5px;right:5px;background:none;border:none;font-size:18px;cursor:pointer;}
.total{text-align:right;font-size:20px;font-weight:bold;color:red;margin-top:10px;}
.checkout{width:100%;margin-top:10px;padding:12px;background:linear-gradient(90deg,#1e88e5,#00acc1,#43a047);color:#fff;border:none;border-radius:10px;cursor:pointer;}
.empty{text-align:center;margin-top:40px;}
.btn{width:100%;padding:12px;background:linear-gradient(90deg,#1e88e5,#00acc1,#43a047);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:16px;}
.back-btn{display:inline-block;margin-bottom:15px;background:#fff;color:#00acc1;padding:8px 12px;border-radius:10px;text-decoration:none;font-size:13px;}
</style>
</head>
<body>

<div id="overlay" onclick="toggleMenu()"></div>
<div class="sidebar" id="sidebar">
<h3>Danh mục</h3>
<a href="admin.html">Admin</a>
<a href="cart.html">Giỏ hàng</a>
<a href="index.html">Trang chủ</a>
<a href="camera-trong-nha.html">Camera trong nhà</a>
<a href="camera-ngoai-troi.html">Camera ngoài trời</a>
<a href="the-nho.html">Thẻ nhớ</a>
<a href="combo-khuyenmai.html">Combo khuyến mãi</a>
</div>

<header>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
<div class="logo"><img src="https://i.ibb.co/Z1kv9nJj/logo.png"></div>
<input id="searchInput" placeholder="Tìm kiếm">
</header>

<div class="container">
<a href="index.html" class="back-btn">← Quay lại</a>
<div class="title-box">💳 Thanh toán đơn hàng</div>
<div class="box" id="cartBox"></div>

<div class="box">
<h3>📦 Thông tin giao hàng</h3>
<input id="name" placeholder="Họ tên">
<input id="phone" placeholder="Số điện thoại" maxlength="10">
<textarea id="address" placeholder="Địa chỉ"></textarea>
</div>

<div class="box">
<h3>💰 Thanh toán</h3>
<select id="payment">
<option value="cod">COD</option>
<option value="bank">Chuyển khoản</option>
</select>
<div id="bankInfo" style="display:none;margin-top:10px;padding:10px;border:1px dashed #ccc;border-radius:8px;">
<h3>🏦 Vietinbank</h3>
<p>HOANG ANH SON</p>
<p>101005245058</p>
<img id="qr" style="width:100%;max-width:250px;">
</div>
</div>

<button class="btn" onclick="placeOrder()">🛒 Đặt hàng</button>

<div id="loading" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;flex-direction:column;z-index:9999;color:#fff;">
<div class="spinner" style="width:40px;height:40px;border:4px solid #fff;border-top:4px solid transparent;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:10px;"></div>
<p>Đang xử lý đơn hàng...</p>
</div>
<div class="container">
<h2>🛒 Giỏ hàng</h2>
<div id="cartList"></div>
<div class="total" id="total"></div>
<div id="cartAction"></div>
</div>

<script>
// ======= MENU =======
function toggleMenu(){document.getElementById("sidebar").classList.toggle("active");document.getElementById("overlay").classList.toggle("active");}

// ======= CART =======
let cart = JSON.parse(localStorage.getItem("cart"))||[];

function renderCart(list=null){
let arr = list||cart;
const box = document.getElementById("cartList");
const totalBox = document.getElementById("total");
const actionBox = document.getElementById("cartAction");
if(arr.length===0){box.innerHTML="<p class='empty'>Giỏ trống</p>";totalBox.innerHTML="";actionBox.innerHTML="";return;}
let total=0;
box.innerHTML = arr.map((item,i)=>{
if(item.checked===undefined)item.checked=true;
if(item.checked) total+=item.price*(item.qty||1);
return `<div class="item">
<input type="checkbox" class="check-item" ${item.checked?"checked":""} onclick="toggleCheck(${i})">
<img src="${item.img}">
<div class="info">
<b>${item.name}</b>
<div class="price-row">
<span class="price-new">${item.price.toLocaleString()}đ</span>
${item.oldPrice?`<span class="price-old">${item.oldPrice.toLocaleString()}đ</span>`:""}
<span>${item.qty||1} × ${item.price.toLocaleString()}đ</span>
</div>
<div class="qty">
<button onclick="changeQty(${i},-1)">-</button>
<span>${item.qty||1}</span>
<button onclick="changeQty(${i},1)">+</button>
</div>
</div>
<button class="remove" onclick="removeItem(${i})">🗑</button>
</div>`;
}).join("");
totalBox.innerHTML="Tổng: "+total.toLocaleString()+"đ";
actionBox.innerHTML=`<button class="checkout" onclick="checkout()">Đặt hàng</button>`;
}

function toggleCheck(i){cart[i].checked=!cart[i].checked;localStorage.setItem("cart",JSON.stringify(cart));renderCart();}
function changeQty(i,delta){cart[i].qty=(cart[i].qty||1)+delta;if(cart[i].qty<1)cart[i].qty=1;localStorage.setItem("cart",JSON.stringify(cart));renderCart();}
function removeItem(i){cart.splice(i,1);localStorage.setItem("cart",JSON.stringify(cart));renderCart();}
document.getElementById("searchInput").addEventListener("input",function(){const key=this.value.toLowerCase();renderCart(cart.filter(i=>i.name.toLowerCase().includes(key)));});

function checkout(){let checkedItems=cart.filter(i=>i.checked!==false);if(checkedItems.length===0){alert("Chọn ít nhất 1 sản phẩm!");return;}window.location.href="checkout.html";}

renderCart();

// ======= BANK =======
document.getElementById("payment").addEventListener("change",function(){
let payment=document.getElementById("payment").value;
let bank=document.getElementById("bankInfo");
let total=cart.reduce((sum,p)=>sum+(Number(p.price)||0)*(Number(p.qty)||1),0);
if(payment==="bank"){
bank.style.display="block";
document.getElementById("qr").src="https://img.vietqr.io/image/ICB-101005245058-compact2.png?amount="+total+"&addInfo=Thanh%20toan";
}else{bank.style.display="none";}
});

// ======= PLACE ORDER =======
function placeOrder(){
if(cart.length===0){alert("🛒 Giỏ hàng trống!");return;}
let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
let address=document.getElementById("address").value.trim();
if(!name||!phone||!address){alert("⚠️ Nhập đầy đủ thông tin!");return;}
const phoneRegex=/^(03|05|07|08|09)\d{8}$/;
if(!phoneRegex.test(phone)){alert("⚠️ SĐT không hợp lệ!");return;}
const orderId=Date.now();
const total=cart.reduce((sum,p)=>sum+(Number(p.price)||0)*(Number(p.qty)||1),0);
document.getElementById("loading").style.display="flex";
let order={id:orderId,name,phone,address,total,cart:[...cart],time:new Date().toLocaleString()};
let orders=JSON.parse(localStorage.getItem("orders"))||[];
orders.push(order);
localStorage.setItem("orders",JSON.stringify(orders));
localStorage.removeItem("cart");
setTimeout(()=>{window.location.href="success.html";},1200);
}
</script>
</body>
</html>
