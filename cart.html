<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giỏ hàng</title>
<link rel="stylesheet" href="stylecart.css">
<style>
/* ... (giữ nguyên style như trước) ... */
</style>
</head>
<body>

<div id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
  <h3>Danh mục</h3>
  <a href="admin.html">Admin</a>
  <a href="cart.html">Giỏ hàng</a>
  <a href="index.html">Trang chủ</a>
  <!-- ... các link khác ... -->
</div>

<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="logo"><img src="https://i.ibb.co/Z1kv9nJj/logo.png"></div>
  <input id="searchInput" placeholder="Tìm kiếm">
</header>

<div class="container">
  <h2>🛒 Giỏ hàng</h2>
  <div id="cartList"></div>
  <div class="total" id="total"></div>
  <div id="cartAction"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "...",
  authDomain: "stech-73b89.firebaseapp.com",
  projectId: "stech-73b89",
  storageBucket: "stech-73b89.appspot.com",
  messagingSenderId: "...",
  appId: "..."
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let cartData = [];

// MENU
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

// =========================
// LOAD USER + CART
// =========================
auth.onAuthStateChanged(user=>{
  if(!user){
    window.location.href="index.html";
    return;
  }
  currentUser = user;
  loadCart();
});

function loadCart(){
  if(!currentUser) return;
  const cartRef = db.collection("carts").doc(currentUser.uid);
  cartRef.get().then(doc=>{
    cartData = doc.exists ? doc.data().items : [];
    renderCart();
  });
}

// =========================
// RENDER CART
// =========================
function renderCart(){
  const box = document.getElementById("cartList");
  const totalBox = document.getElementById("total");
  const actionBox = document.getElementById("cartAction");
  if(cartData.length===0){
    box.innerHTML="<p class='empty'>Giỏ hàng trống</p>";
    totalBox.innerHTML=""; actionBox.innerHTML=""; return;
  }
  let total=0;
  box.innerHTML = cartData.map((item,i)=>{
    const qty = item.qty||1;
    total += (item.price||0)*qty;
    return `
      <div class="item">
        <img src="${item.img}">
        <div class="info">
          <b>${item.name}</b>
          <div class="price-row">
            <span class="price-new">${item.price.toLocaleString()}đ</span>
            ${item.oldPrice?`<span class="price-old">${item.oldPrice.toLocaleString()}đ</span>`:""}
            <span>${qty} × ${item.price.toLocaleString()}đ</span>
          </div>
          <div class="qty">
            <button onclick="changeQty(${i},-1)">-</button>
            <span>${qty}</span>
            <button onclick="changeQty(${i},1)">+</button>
          </div>
        </div>
        <button class="remove" onclick="removeItem(${i})">🗑</button>
      </div>`;
  }).join("");
  totalBox.innerHTML = "Tổng: "+total.toLocaleString()+"đ";
  actionBox.innerHTML = `<button class="checkout" onclick="checkout()">Đặt hàng</button>`;
}

// =========================
// CHANGE QTY / REMOVE
// =========================
function saveCart(){
  if(!currentUser) return;
  db.collection("carts").doc(currentUser.uid).set({items:cartData});
  renderCart();
}
function changeQty(i,delta){cartData[i].qty=(cartData[i].qty||1)+delta; if(cartData[i].qty<1) cartData[i].qty=1; saveCart();}
function removeItem(i){cartData.splice(i,1); saveCart();}

// =========================
// CHECKOUT
// =========================
function checkout(){
  if(cartData.length===0){alert("Giỏ hàng trống!"); return;}
  db.collection("carts").doc(currentUser.uid).set({items:cartData});
  window.location.href="checkout.html";
}

// =========================
// SEARCH
// =========================
document.getElementById("searchInput").addEventListener("input",function(){
  const key=this.value.toLowerCase();
  renderCart(cartData.filter(i=>i.name.toLowerCase().includes(key)));
});
</script>

</body>
</html>
