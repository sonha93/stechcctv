<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giỏ hàng</title>
<link rel="stylesheet" href="stylecart.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#f4f7fb;}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;z-index:998;}
#overlay.active{display:block;}
.sidebar{position:fixed;left:-260px;top:0;width:260px;height:100%;background:#fff;padding:20px;transition:0.3s;z-index:999;}
.sidebar.active{left:0;}
.sidebar a{display:block;padding:10px;border-radius:8px;text-decoration:none;color:#333;}
header{display:flex;align-items:center;gap:10px;padding:10px;background:linear-gradient(90deg,#1e88e5,#00acc1,#43a047);position:sticky;top:0;z-index:1000;}
.menu-btn{width:40px;height:40px;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;}
.logo img{width:40px;height:40px;border-radius:50%;}
header input{flex:1;padding:10px;border:none;border-radius:20px;background:#e0e0e0;}
.container{max-width:900px;margin:auto;padding:15px;}
.item{display:flex;gap:10px;background:#fff;padding:12px;margin-bottom:10px;border-radius:12px;align-items:center;position:relative;}
.item img{width:80px;height:80px;border-radius:10px;}
.check-item{position:absolute;top:5px;left:5px;width:20px;height:20px;cursor:pointer;}
.info{flex:1;display:flex;flex-direction:column;justify-content:center;min-width:180px;}
.price-row{display:flex;justify-content:space-between;flex-wrap:nowrap;gap:5px;align-items:center;}
.price-new{color:red;font-weight:bold;white-space:nowrap;}
.price-old{text-decoration:line-through;color:#888;font-size:13px;white-space:nowrap;}
.qty{display:flex;align-items:center;border:1px solid #ccc;border-radius:8px;overflow:hidden;gap:4px;margin-top:5px;}
.qty button{border:none;background:#eee;width:28px;height:28px;border-radius:6px;cursor:pointer;}
.qty span{display:inline-block;width:28px;text-align:center;}
.remove{position:absolute;top:5px;right:5px;background:none;border:none;font-size:18px;cursor:pointer;}
.total{text-align:right;font-size:20px;font-weight:bold;color:red;margin-top:10px;}
.checkout{width:100%;margin-top:10px;padding:12px;background:linear-gradient(90deg,#1e88e5,#00acc1,#43a047);color:#fff;border:none;border-radius:10px;cursor:pointer;}
.empty{text-align:center;margin-top:40px;}
</style>
</head>
<body>

<div id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
  <h3>Danh mục</h3>
  <a href="admin.html">Admin</a>
  <a href="cart.html">Giỏ hàng</a>
  <a href="index.html">Trang chủ</a>
  <a href="camera-trong-nha.html">Camera trong nhà</a>
  <a href="camera-ngoai-troi.html">Camera ngoài trời</a>
  <a href="the-nho.html">Thẻ nhớ</a>
  <a href="combo-khuyenmai.html">Combo khuyến mãi</a>
</div>

<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="logo"><img src="https://i.ibb.co/Z1kv9nJj/logo.png"></div>
  <input id="searchInput" placeholder="Tìm kiếm">
</header>

<div class="container">
  <h2>🛒 Giỏ hàng</h2>
  <div id="cartList"></div>
  <div class="total" id="total"></div>
  <div id="cartAction"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDYVcBEYJN1HUCta3XdJAUBe4TGLnmy7y4",
  authDomain: "stech-73b89.firebaseapp.com",
  projectId: "stech-73b89",
  storageBucket: "stech-73b89.firebasestorage.app",
  messagingSenderId: "873739162979",
  appId: "1:873739162979:web:978f1a4043f025b1cdaf56",
  databaseURL: "https://stech-73b89-default-rtdb.asia-southeast1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
let currentUser = null;
let currentCart = [];
let localCart = JSON.parse(localStorage.getItem("cart") || "[]"); // FIX: parse chắc chắn array
// MENU
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

// SAVE CART
async function saveCart(){
  if(currentUser){
    await db.ref("carts/"+currentUser.uid).set(currentCart);
  } else {
    localStorage.setItem("cart", JSON.stringify(currentCart));
  }
}

// RENDER CART
function renderCart(filteredCart = null){
  const cartData = filteredCart || currentCart;
  const box = document.getElementById("cartList");
  const totalBox = document.getElementById("total");
  const actionBox = document.getElementById("cartAction");

  if(!cartData || cartData.length===0){
    box.innerHTML="<p class='empty'>Giỏ trống</p>";
    totalBox.innerHTML="";
    actionBox.innerHTML="";
    return;
  }

  let total = 0;
  box.innerHTML = cartData.map(item=>{
    if(item.checked) total += (Number(item.price)||0)*(Number(item.qty)||1);
   const idx = currentCart.findIndex(i => i.id === item.id); // FIX: tìm index theo id
    return `
      <div class="item">
        <input type="checkbox" class="check-item" ${item.checked?"checked":""} onclick="toggleCheck(${idx})">
        <img src="${item.img}">
        <div class="info">
          <b>${item.name}</b>
          <div class="price-row">
            <span class="price-new">${(Number(item.price)||0).toLocaleString()}đ</span>
            ${item.oldPrice?`<span class="price-old">${(Number(item.oldPrice)||0).toLocaleString()}đ</span>`:""}
            <span>${item.qty||1} × ${(Number(item.price)||0).toLocaleString()}đ</span>
          </div>
          <div class="qty">
            <button onclick="changeQty(${idx},-1)">-</button>
            <span>${item.qty||1}</span>
            <button onclick="changeQty(${idx},1)">+</button>
          </div>
        </div>
        <button class="remove" onclick="removeItem(${idx})">🗑</button>
      </div>
    `;
  }).join("");

  totalBox.innerHTML="Tổng: "+total.toLocaleString()+"đ";
  actionBox.innerHTML=`<button class="checkout" onclick="checkout()">Đặt hàng</button>`;
}

// CHECKBOX TOGGLE
async function toggleCheck(i){
  currentCart[i].checked = !currentCart[i].checked;
  await saveCart();
  renderCart();
}

// CHANGE QTY
async function changeQty(i, delta){
  currentCart[i].qty = (currentCart[i].qty||1) + delta;
  if(currentCart[i].qty<1) currentCart[i].qty=1;
  await saveCart();
  renderCart();
}

// REMOVE ITEM
async function removeItem(i){
  currentCart.splice(i,1);
  await saveCart();
  renderCart();
}

// CHECKOUT
async function checkout(){
  if(currentCart.length===0){ alert("Giỏ hàng trống!"); return; }
  // Chỉ xóa các sản phẩm được chọn để mua
  currentCart = currentCart.filter(item => !item.checked);
  await saveCart();
  renderCart();
  window.location.href="checkout.html";
}

// SEARCH
document.getElementById("searchInput").addEventListener("input", function(){
  const key = this.value.toLowerCase();
  renderCart(currentCart.filter(i=>i.name.toLowerCase().includes(key)));
});

// AUTH STATE + LOAD CART
auth.onAuthStateChanged(async user=>{
  currentUser = user;
  if(user){
    const snapshot = await db.ref("carts/"+user.uid).once("value");
let firebaseCart = snapshot.val() ? Object.values(snapshot.val()) : []; // FIX: chuyển object thành array
    // gộp localCart vào firebaseCart
    firebaseCart.forEach(fItem=>{
     localCart.forEach(lItem=>{
  if(!lItem.id) lItem.id = Date.now() + Math.random(); // tạo id nếu chưa có
  if(!firebaseCart.some(f=>f.id===lItem.id)) {
    firebaseCart.push({...lItem, checked: true});
  }
});

    localCart.forEach(lItem=>{
      if(!firebaseCart.some(f=>f.id===lItem.id)) {
        firebaseCart.push({...lItem, checked: true});
      }
    });

    currentCart = firebaseCart;
    await saveCart();
    localCart = [];
    localStorage.removeItem("cart");
  } else {
    // Nếu chưa đăng nhập, lấy dữ liệu từ localStorage và gán mặc định checked = true
    currentCart = localCart.map(item => ({
      ...item,
      checked: item.checked !== undefined ? item.checked : true
    }));
  }
  // Kích hoạt render sau khi dữ liệu giỏ hàng được đồng bộ xong
  renderCart();
});
</script>
</body>
</html>
