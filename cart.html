<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giỏ hàng</title>
<link rel="stylesheet" href="stylecart.css">
<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#f4f7fb;
}

/* ===== MENU ===== */
#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:998;
}
#overlay.active{ display:block; }

.sidebar{
  position:fixed;
  left:-260px;
  top:0;
  width:260px;
  height:100%;
  background:#fff;
  padding:20px;
  transition:0.3s;
  z-index:999;
}
.sidebar.active{ left:0; }

.sidebar a{
  display:block;
  padding:10px;
  border-radius:8px;
  text-decoration:none;
  color:#333;
}

/* ===== HEADER ===== */
header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  background:linear-gradient(90deg,#1e88e5,#00acc1,#43a047);
  position:sticky;
  top:0;
  z-index:1000;
}

.menu-btn{
  width:40px;
  height:40px;
  background:#fff;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  cursor:pointer;
}

.logo img{
  width:40px;
  height:40px;
  border-radius:50%;
}

header input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
  background:#e0e0e0;
}

/* ===== CART ===== */
.container{
  max-width:900px;
  margin:auto;
  padding:15px;
}

.item{
  display:flex;
  gap:10px;
  background:#fff;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  align-items:center;
}

.item img{
  width:80px;
  height:80px;
  border-radius:10px;
}

.check{
  width:20px;
  height:20px;
}

.info{ flex:1; }

.price-new{
  color:red;
  font-weight:bold;
}

.price-old{
  text-decoration:line-through;
  color:#888;
  font-size:13px;
}

.qty{
  display:flex;
  align-items:center;
  border:1px solid #ccc;
  border-radius:8px;
  overflow:hidden;
}

.qty button{
  border:none;
  background:#eee;
  width:30px;
  height:30px;
  cursor:pointer;
}

.qty span{
  padding:0 10px;
}

.remove{
  background:none;
  border:none;
  font-size:18px;
  cursor:pointer;
}

.total{
  text-align:right;
  font-size:20px;
  font-weight:bold;
  color:red;
  margin-top:10px;
}

.checkout{
  width:100%;
  margin-top:10px;
  padding:12px;
  background:linear-gradient(90deg,#1e88e5,#00acc1,#43a047);
  color:#fff;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.empty{
  text-align:center;
  margin-top:40px;
}

</style>
</head>

<body>

<div id="overlay" onclick="toggleMenu()"></div>

<!-- MENU -->
<div class="sidebar" id="sidebar">
  <h3>Danh mục</h3>

  <a href="admin.html">Admin</a>
  <a href="cart.html">Giỏ hàng</a>
  <a href="index.html">Trang chủ</a>
  <a href="camera-trong-nha.html">Camera trong nhà</a>
  <a href="camera-ngoai-troi.html">Camera ngoài trời</a>
  <a href="the-nho.html">Thẻ nhớ</a>
  <a href="combo-khuyenmai.html">Combo khuyến mãi</a>
</div>
<link rel="stylesheet" href="stylecart.css">
<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="logo">
    <img src="https://i.ibb.co/Z1kv9nJj/logo.png">
  </div>
  <input id="searchInput" placeholder="Tìm kiếm">
</header>

<div class="container">
  <h2>🛒 Giỏ hàng</h2>
  <div id="cartList"></div>
  <div class="total" id="total"></div>
  <div id="cartAction"></div>
</div>

<script>

/* MENU FIX */
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

/* ===== RENDER ===== */
function renderCart(list = null){

  let cart = list || JSON.parse(localStorage.getItem("cart")) || [];

  const box = document.getElementById("cartList");
  const totalBox = document.getElementById("total");
  const actionBox = document.getElementById("cartAction");

  if(cart.length === 0){
    box.innerHTML = "<p class='empty'>Giỏ trống</p>";
    totalBox.innerHTML = "";
    actionBox.innerHTML = "";
    return;
  }

  let total = 0;

  box.innerHTML = cart.map((item,i)=>{

    let qty = item.qty || 1;
    let checked = item.checked !== false;

    if(checked){
      total += item.price * qty;
    }

    return `
    <div class="item">
      <input type="checkbox" class="check" 
        ${checked ? "checked":""}
        onchange="toggleCheck(${i})">

      <img src="${item.img}">

      <div class="info">
        <b>${item.name}</b><br>

        <div class="price-new">
          ${item.price.toLocaleString()}đ
        </div>

        ${item.oldPrice ? `
          <div class="price-old">
            ${item.oldPrice.toLocaleString()}đ
          </div>
        ` : ""}

        <div class="qty">
          <button onclick="changeQty(${i},-1)">-</button>
          <span>${qty}</span>
          <button onclick="changeQty(${i},1)">+</button>
        </div>
      </div>

      <button class="remove" onclick="removeItem(${item.id})">🗑</button>
    </div>
    `;
  }).join("");

  totalBox.innerHTML = "Tổng: " + total.toLocaleString()+"đ";

  actionBox.innerHTML = `
    <button class="checkout" onclick="checkout()">Đặt hàng</button>
  `;
}

/* ===== SEARCH FIX ===== */
document.getElementById("searchInput").addEventListener("input", function(){

  const keyword = this.value.toLowerCase();
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  const filtered = cart.filter(item =>
    item.name.toLowerCase().includes(keyword)
  );

  renderCart(filtered);
});

/* ===== CHECK ===== */
function toggleCheck(i){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart[i].checked = !cart[i].checked;
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

/* ===== QTY ===== */
function changeQty(i,delta){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart[i].qty = (cart[i].qty || 1) + delta;

  if(cart[i].qty < 1) cart[i].qty = 1;

  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

/* ===== XOÁ ===== */
function removeItem(id){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart = cart.filter(item => item.id !== id);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

/* ===== CHECKOUT ===== */
function checkout(){
  window.location.href = "checkout.html";
}

/* LOAD */
renderCart();

</script>

</body>
</html>
