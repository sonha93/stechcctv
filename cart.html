<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giỏ hàng</title>
<link rel="stylesheet" href="stylecart.css">
<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#f4f7fb;
}

/* ===== MENU ===== */
#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:998;
}
#overlay.active{ display:block; }

.sidebar{
  position:fixed;
  left:-260px;
  top:0;
  width:260px;
  height:100%;
  background:#fff;
  padding:20px;
  transition:0.3s;
  z-index:999;
}
.sidebar.active{ left:0; }

.sidebar a{
  display:block;
  padding:10px;
  border-radius:8px;
  text-decoration:none;
  color:#333;
}

/* ===== HEADER ===== */
header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  background:linear-gradient(90deg,#1e88e5,#00acc1,#43a047);
  position:sticky;
  top:0;
  z-index:1000;
}

.menu-btn{
  width:40px;
  height:40px;
  background:#fff;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  cursor:pointer;
}

.logo img{
  width:40px;
  height:40px;
  border-radius:50%;
}

header input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
  background:#e0e0e0;
}

/* ===== CART ===== */
.container{
  max-width:900px;
  margin:auto;
  padding:15px;
}

.item{
  display:flex;
  gap:10px;
  background:#fff;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  align-items:center;
}

.item img{
  width:80px;
  height:80px;
  border-radius:10px;
}

.check{
  width:20px;
  height:20px;
}

.info{ flex:1; }

.price-new{
  color:red;
  font-weight:bold;
}

.price-old{
  text-decoration:line-through;
  color:#888;
  font-size:13px;
}

.qty{
  display:flex;
  align-items:center;
  border:1px solid #ccc;
  border-radius:8px;
  overflow:hidden;
}

.qty button{
  border:none;
  background:#eee;
  width:30px;
  height:30px;
  cursor:pointer;
}

.qty span{
  padding:0 10px;
}

.remove{
  background:none;
  border:none;
  font-size:18px;
  cursor:pointer;
}

.total{
  text-align:right;
  font-size:20px;
  font-weight:bold;
  color:red;
  margin-top:10px;
}

.checkout{
  width:100%;
  margin-top:10px;
  padding:12px;
  background:linear-gradient(90deg,#1e88e5,#00acc1,#43a047);
  color:#fff;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.empty{
  text-align:center;
  margin-top:40px;
}

</style>
</head>

<body>

<div id="overlay" onclick="toggleMenu()"></div>

<!-- MENU -->
<div class="sidebar" id="sidebar">
  <h3>Danh mục</h3>

  <a href="admin.html">Admin</a>
  <a href="cart.html">Giỏ hàng</a>
  <a href="index.html">Trang chủ</a>
  <a href="camera-trong-nha.html">Camera trong nhà</a>
  <a href="camera-ngoai-troi.html">Camera ngoài trời</a>
  <a href="the-nho.html">Thẻ nhớ</a>
  <a href="combo-khuyenmai.html">Combo khuyến mãi</a>
</div>

<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="logo">
    <img src="https://i.ibb.co/Z1kv9nJj/logo.png">
  </div>
  <input id="searchInput" placeholder="Tìm kiếm">
</header>

<div class="container">
  <h2>🛒 Giỏ hàng</h2>
  <div id="cartList"></div>
  <div class="total" id="total"></div>
  <div id="cartAction"></div>
</div>

<script>

/* MENU FIX */
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

/* =========================
   INIT CART
========================= */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function getProducts(){
  return JSON.parse(localStorage.getItem("products")) || [];
}

/* =========================
   RENDER CART
========================= */
function renderCart(){
  const box = document.getElementById("cartList");
  const totalBox = document.getElementById("total");
  const actionBox = document.getElementById("cartAction");
  const products = getProducts();

  if(cart.length === 0){
    box.innerHTML = "<p class='empty'>Giỏ trống</p>";
    totalBox.innerHTML = "";
    actionBox.innerHTML = "";
    return;
  }

  let total = 0;
  box.innerHTML = cart.map((item,index)=>{
    const p = products.find(x => String(x.id) === String(item.id)) || item;
    const qty = item.quantity || 1;
    const checked = item.checked !== false;

    if(checked){
      total += (p.price||0)*qty;
    }

    return `
      <div class="item">
        <input type="checkbox" class="cart-checkbox" data-index="${index}" ${checked?"checked":""}>
        <img src="${p.img||''}">
        <div class="info">
          <b>${p.name||'Không tên'}</b><br>
          <div class="price-new">${(p.price||0).toLocaleString()}đ</div>
          ${p.oldPrice ? `<div class="price-old">${p.oldPrice.toLocaleString()}đ</div>` : ""}
          <div class="qty">
            <button onclick="changeQty(${index},-1)">-</button>
            <span>${qty}</span>
            <button onclick="changeQty(${index},1)">+</button>
          </div>
        </div>
        <button class="remove" onclick="removeItem(${index})">🗑</button>
      </div>
    `;
  }).join("");

  totalBox.innerHTML = "Tổng tiền: "+total.toLocaleString()+"đ";

  actionBox.innerHTML = `<button class="checkout">💳 Đặt hàng</button>`;

  // Gắn checkbox
  document.querySelectorAll(".cart-checkbox").forEach(cb=>{
    cb.addEventListener("change", function(){
      const i = Number(this.dataset.index);
      cart[i].checked = this.checked;
      localStorage.setItem("cart",JSON.stringify(cart));
      renderCart(); // render lại mới đúng tổng
    });
  });

  // checkout
  const checkoutBtn = actionBox.querySelector(".checkout");
  if(checkoutBtn){
    checkoutBtn.onclick = function(e){
      e.preventDefault();
      const selected = cart.filter(item => item.checked !== false);
      if(selected.length === 0){ alert("Bạn chưa chọn sản phẩm nào!"); return; }

      const totalAmount = selected.reduce((sum,item)=>{
        const p = products.find(x=>String(x.id)===String(item.id)) || item;
        return sum + (p.price||0)*(item.quantity||1);
      },0);

      const orderNumber = "DH"+Date.now();
      const customerName = "Khách lẻ";

      sendTelegramNotification(orderNumber, customerName, totalAmount.toLocaleString()+"đ");

      localStorage.setItem("checkoutItems", JSON.stringify(selected));
      window.location.href = "checkout.html";
    }
  }
}

/* =========================
   CHANGE QTY
========================= */
function changeQty(i,delta){
  cart[i].quantity = (cart[i].quantity || 1) + delta;
  if(cart[i].quantity < 1) cart[i].quantity = 1;
  localStorage.setItem("cart",JSON.stringify(cart));
  renderCart();
}

/* =========================
   REMOVE ITEM
========================= */
function removeItem(i){
  cart.splice(i,1);
  localStorage.setItem("cart",JSON.stringify(cart));
  renderCart();
}

/* =========================
   ADD TO CART
========================= */
function addToCart(product){
  const index = cart.findIndex(item => item.id === product.id);
  if(index!==-1){
    cart[index].quantity = (cart[index].quantity||1)+1;
  } else {
    cart.push({id:product.id, quantity:1});
  }
  localStorage.setItem("cart",JSON.stringify(cart));
  renderCart();
}

/* =========================
   SEARCH
========================= */
document.getElementById("searchInput").addEventListener("input",function(){
  const keyword = this.value.toLowerCase();
  const filtered = cart.filter(item=>{
    const products = getProducts();
    const p = products.find(x=>String(x.id)===String(item.id)) || item;
    return (p.name||'').toLowerCase().includes(keyword);
  });
  renderCartFiltered(filtered);
});

function renderCartFiltered(filtered){
  const box = document.getElementById("cartList");
  const totalBox = document.getElementById("total");
  if(filtered.length===0){
    box.innerHTML = "<p class='empty'>Không tìm thấy sản phẩm</p>";
    totalBox.innerHTML = "";
    return;
  }
  // tạm render giống renderCart
  const products = getProducts();
  let total = 0;
  box.innerHTML = filtered.map((item,index)=>{
    const p = products.find(x => String(x.id) === String(item.id)) || item;
    const qty = item.quantity || 1;
    const checked = item.checked !== false;
    if(checked) total += (p.price||0)*qty;
    return `
      <div class="item">
        <input type="checkbox" class="cart-checkbox" data-index="${index}" ${checked?"checked":""}>
        <img src="${p.img||''}">
        <div class="info">
          <b>${p.name||'Không tên'}</b><br>
          <div class="price-new">${(p.price||0).toLocaleString()}đ</div>
        </div>
      </div>
    `;
  }).join("");
  totalBox.innerHTML = "Tổng tiền: "+total.toLocaleString()+"đ";
}

/* =========================
   TELEGRAM NOTIFY
========================= */
function sendTelegramNotification(orderNumber, customerName, total){
  const botToken = "8752443026:AAEHrvCIDLqEDfE_inDeAAI9dzClm3WZyz4";
  const chatId = "6087791909";

  const message = `📦 Đơn hàng mới!\nMã đơn: ${orderNumber}\nKhách hàng: ${customerName}\nTổng tiền: ${total}`;

  fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`)
    .then(res=>res.json())
    .then(data=>{ if(data.ok) console.log("✅ Đã gửi Telegram!"); else console.error("❌ Lỗi Telegram:",data); })
    .catch(err=>console.error("❌ Lỗi fetch Telegram:",err));
}

/* =========================
   LOAD
========================= */
renderCart();

</script>

</body>
</html>
