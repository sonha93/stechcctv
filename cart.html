

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giỏ hàng-Stechcctv</title>
<link rel="stylesheet" href="stylecart.css">
<style>
/* =========================
   RESET
========================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#f5f5f5;
  color:#333;
}


/* =========================
   OVERLAY + SIDEBAR
========================= */
#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  opacity:0;
  visibility:hidden;
  transition:.2s;
  z-index:9998;
}
#overlay.active{
  opacity:1;
  visibility:visible;
}

.sidebar{
  position:fixed;
  top:0;
  left:-280px;
  width:260px;
  height:100vh;

  padding:20px;
  z-index:99999;
  transition:.25s;
}
.sidebar.active{
  left:0;
}
.sidebar a{
  display:block;
  padding:14px;
  margin-bottom:10px;
  border-radius:12px;
  background:#f5f5f5;
  text-decoration:none;
  color:#111;
  font-weight:bold;
}


/* =========================
   HEADER (FIX PRO)
========================= */
.top-header{
  display:flex;
  align-items:center;

  justify-content:flex-start; /* 👈 QUAN TRỌNG NHẤT */

  gap:10px;
  padding:8px 12px;

  background:linear-gradient(90deg,#1fb4c7,#159aaa);
}
/* MENU BUTTON */
.menu-btn{
  width:48px;
  height:48px;
  border-radius:14px;
  background:#159aaa;
}

/* LOGO (đẩy sát trái hơn) */
.logo{
  width:52px;
  height:52px;
  min-width:52px;
  border-radius:14px;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;

  margin-right:0px; /* 👈 kéo sát menu */
}


.search-box{
  width:100%;
  display:flex;
  justify-content:center;
  margin-left:40px;
  margin-right:10px;
}
.search-box input{
  width:100%;
  max-width:400px;
}
.search-box input{
  width:100%;
  height:46px;
  border:none;
  outline:none;
  border-radius:14px;
  padding:0 16px;
  background:#ffffff;
  font-weight:600;
}
.search-item{
  display:flex;
  gap:10px;
  padding:10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
.search-item img{
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:6px;
}
.search-name{font-weight:bold;}
.search-price{color:red;font-weight:bold;}
.search-oldprice{
  font-size:12px;
  color:#888;
  text-decoration:line-through;
}
/* ICON GROUP */
.header-icons{
  display:flex;
  align-items:center;
  gap:8px;
}
/* ICON */
.icon-btn{
  width:48px;
  height:48px;
  border-radius:14px;
  background:#159aaa;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  border:none;
}

* badge */
.cart-badge{
  position:absolute;
  top:-4px;
  right:-4px;

  width:18px;
  height:18px;

  border-radius:50%;

  background:red;
  color:#fff;

  font-size:10px;
  font-weight:bold;

  display:flex;
  align-items:center;
  justify-content:center;
}

/* =========================
   CART UI
========================= */
.container{
  max-width:900px;
  margin:auto;
  padding:15px;
}
.item{
  display:flex;
  gap:10px;
  background:#fff;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  position:relative;
}
.item img{
  width:80px;
  height:80px;
  border-radius:10px;
}
.check-item{
  position:absolute;
  top:5px;
  left:5px;
  width:20px;
  height:20px;
}
.info{
  flex:1;
  display:flex;
  flex-direction:column;
}
.price-row{
  display:flex;
  justify-content:space-between;
  gap:5px;
}
.price-new{color:red;font-weight:bold;}
.price-old{
  text-decoration:line-through;
  color:#888;
  font-size:13px;
}
.qty{
  display:flex;
  align-items:center;
  border:1px solid #ccc;
  border-radius:8px;
  overflow:hidden;
  margin-top:5px;
}
.qty button{
  border:none;
  background:#eee;
  width:28px;
  height:28px;
  cursor:pointer;
}
.qty span{
  width:28px;
  text-align:center;
}
.remove{
  position:absolute;
  top:5px;
  right:5px;
  background:none;
  border:none;
  font-size:18px;
  cursor:pointer;
}

.total{
  text-align:right;
  font-size:20px;
  font-weight:bold;
  color:red;
  margin-top:10px;
}
.checkout{
  width:100%;
  margin-top:10px;
  padding:12px;
  background:linear-gradient(90deg,#1e88e5,#00acc1,#43a047);
  color:#fff;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
.empty{
  text-align:center;
  margin-top:40px;
}

/* =========================
   MOBILE
========================= */
@media(max-width:768px){
  .top-header{
    gap:6px;
    padding:6px;
  }

  .menu-btn,
  .icon-btn,
  .logo{
    width:44px;
    height:44px;
    min-width:44px;
    border-radius:14px;
  }

  .search-box input{
    height:44px;
    border-radius:14px;
  }

  .cart-badge{
    width:18px;
    height:18px;
    font-size:10px;
  }
   .header-icons{
  display:flex;
  align-items:center;
  gap:10px;
}


.icon-btn{
    background:#111;
    color:#fff;

    text-decoration:none;
    position:relative;

    font-size:20px;
    line-height:1;

    box-shadow:
    0 0 10px rgba(0,0,0,.35),
    0 4px 12px rgba(0,0,0,.25);
}
/* ICON 🛒 chỉnh giữa chuẩn */
.cart-icon{
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1;
  transform:translateY(0px);
}

/* BADGE số */
.cart-badge{
  position:absolute;
  top:-4px;
  right:-4px;

  width:18px;
  height:18px;

  border-radius:50%;
  background:red;
  color:#fff;

  font-size:10px;
  font-weight:bold;

  display:flex;
  align-items:center;
  justify-content:center;
}
   .icon-btn:hover{
  transform:scale(1.05);
  transition:0.2s;
  background:#159aaa;
}
   .icon-btn *{
  color:#fff !important;
}
   .icon-btn{
  background:#1fb4c7 !important;
  color:#fff !important;

  width:44px;
  height:44px;

  display:flex !important;
  align-items:center !important;
  justify-content:center !important;

  border-radius:14px;

  text-decoration:none !important;

  font-size:20px;
  line-height:1;
   } 

/* 💻 PC */
@media(min-width:769px){

   .search-box{
    flex:none;
    max-width:560px;

    margin-left:70px;
    margin-right:40px;
   }
}
   .remove-x{
  position: absolute;
  top: 6px;
  right: 6px;

  width: 22px;
  height: 22px;

  border: 1px solid #ddd;
  border-radius: 50%;

  background: #fff;
  color: #333;

  font-size: 16px;
  font-weight: bold;

  display: flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;

  line-height: 1;
}
   .item{
  position: relative;
}
   .item {
  position: relative;
  display: flex;
  align-items: flex-start;
  overflow: visible;
}
   .item{
  position: relative;
}

.remove-x{
  position: absolute;
  top: 2px;
  right: 2px;

  width: 22px;
  height: 22px;

  border: 1px solid #ddd;
  border-radius: 50%;

  background: #fff;
  color: #333;

  font-size: 16px;
  font-weight: bold;

  display: flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;
  z-index: 10;
}
}
   @media (min-width:769px){

 .remove-x{
  position: absolute;
  top: -6px;
  right: -6px;

  width: 22px;
  height: 22px;

  border: 1px solid #ddd;
  border-radius: 50%;

  background: #fff;
  color: #333;

  font-size: 16px;
  font-weight: bold;

  display: flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;
  z-index: 10;
  }

}
</style>
</head>
<body>

<div id="overlay" onclick="toggleMenu()"></div>
<!-- MENU / SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Danh mục</h3>
  <a href="index.html">Trang chủ</a>
  <a href="camera-trong-nha.html">Camera trong nhà</a>
  <a href="camera-ngoai-troi.html">Camera ngoài trời</a>
  <a href="the-nho.html">Thẻ nhớ</a>
  <a href="combo-khuyenmai.html">Combo khuyến mãi</a>
</div>

<div class="top-header">

  <div class="menu-btn" onclick="toggleMenu()">☰</div>

  <div class="logo">
    <img src="https://i.ibb.co/Z1kv9nJj/logo.png" alt="Stech">
  </div>


</div> <!-- ❗ PHẢI ĐÓNG HEADER Ở ĐÂY -->

<!-- GIỎ HÀNG PHẢI RA NGOÀI -->
<div class="container">
  <h2>🛒 Giỏ hàng</h2>
  <div id="cartList"></div>
  <div class="total" id="total"></div>
  <div id="cartAction"></div>
</div>
    <script type="module" src="./cart.js"></script>
<script>
function toggleMenu() {
  document.getElementById("sidebar")
    .classList.toggle("active");

  document.getElementById("overlay")
    .classList.toggle("active");
}
</script>


</body>
</html>
