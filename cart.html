
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giỏ hàng-Stechcctv</title>
<link rel="stylesheet" href="stylecart.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* =========================
   RESET
========================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#f5f5f5;
  color:#333;
}


/* =========================
   OVERLAY + SIDEBAR
========================= */
#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  opacity:0;
  visibility:hidden;
  transition:.2s;
  z-index:9998;
}
#overlay.active{
  opacity:1;
  visibility:visible;
}

.sidebar{
  position:fixed;
  top:0;
  left:-280px;
  width:260px;
  height:100vh;

  padding:20px;
  z-index:99999;
  transition:.25s;
}
.sidebar.active{
  left:0;
}
.sidebar a{
  display:block;
  padding:14px;
  margin-bottom:10px;
  border-radius:12px;
  background:#f5f5f5;
  text-decoration:none;
  color:#111;
  font-weight:bold;
}


/* ================= HEADER ================= */

.top-header{
    position:sticky;
    top:0;
    z-index:9999;

    height:80px;

    display:flex;
    align-items:center;
    gap:8px;

    padding:8px;

    background:#33A0AB;
}

/* MENU - LOGO - ICON */

.menu-btn,
.logo,
.icon-btn{

    width:48px;
    height:48px;

    min-width:48px;

    border-radius:16px;

    display:flex;
    align-items:center;
    justify-content:center;

    flex-shrink:0;

    position:relative;

    transition:.18s;

    box-shadow:
        6px 6px 12px rgba(0,0,0,.35),
        -3px -3px 8px rgba(255,255,255,.12),
        inset 1px 1px 1px rgba(255,255,255,.06);
}

.menu-btn{

    background:#000;
    color:#fff;

    font-size:24px;
    font-weight:bold;

    cursor:pointer;
}

.logo{

    background:#fff;

    overflow:hidden;
}

.logo img{

    width:80%;
    height:80%;

    object-fit:contain;

    display:block;
}

/* SEARCH */

.search-box{

    flex:1;
    min-width:0;

    max-width:450px;

    margin:0 auto;

    position:relative;
}

.search-box input{

    width:100%;
    height:44px;

    padding:0 14px;

    border-radius:14px;
    border:1px solid #ddd;

    outline:none;

    font-size:15px;
    background:#fff;
}

.search-box input:focus{

    border-color:#33A0AB;
}

/* SEARCH RESULT */

.search-results{

    position:absolute;

    top:100%;
    left:0;
    right:0;

    background:#fff;

    border:1px solid #ddd;

    max-height:400px;

    overflow-y:auto;

    z-index:9999;

    display:none;
}

.search-item{

    display:flex;
    align-items:center;

    gap:10px;

    padding:10px;

    border-bottom:1px solid #eee;

    cursor:pointer;
}

.search-item:hover{

    background:#f5f5f5;
}

.search-item img{

    width:60px;
    height:60px;

    object-fit:cover;

    border-radius:6px;
}

.search-name{

    font-weight:bold;
}

.search-price{

    color:red;
    font-weight:bold;
}

.search-oldprice{

    color:#888;

    font-size:12px;

    text-decoration:line-through;
}

/* RIGHT */

.header-icons{

    display:flex;
    align-items:center;

    gap:8px;

    flex-shrink:0;
}

.icon-btn{

    background:linear-gradient(
        145deg,
        #1c1c1c,
        #0d0d0d
    );

    color:#fff;

    text-decoration:none;

    font-size:20px;
}

.cart-icon{

    display:flex;
    align-items:center;
    justify-content:center;

    width:100%;
    height:100%;

    line-height:1;

    transform:translateY(-1px);
}

/* BADGE */

.cart-badge{

    position:absolute;

    top:-6px;
    right:-6px;

    min-width:20px;
    height:20px;

    border-radius:50%;

    background:red;
    color:#fff;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:11px;
    font-weight:bold;
}

/* ACTIVE */

.logo:active,
.menu-btn:active,
.icon-btn:active{

    transform:scale(.92) translateY(2px);

    box-shadow:
        inset 4px 4px 8px rgba(0,0,0,.25),
        inset -2px -2px 4px rgba(255,255,255,.08);
}

/* MOBILE */

@media(max-width:768px){

.top-header{

    gap:6px;
    padding:6px;
}

.menu-btn,
.logo,
.icon-btn{

    width:44px;
    height:44px;
    min-width:44px;

    border-radius:14px;
}

.search-box input{

    height:44px;
}

.cart-icon{

    font-size:17px;
}

}

/* =========================
   CART UI
========================= */
.container{
  max-width:900px;
  margin:auto;
  padding:15px;
}
.item{
  display:flex;
  gap:10px;
  background:#fff;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  position:relative;
}
.item img{
  width:80px;
  height:80px;
  border-radius:10px;
}
.check-item{
  position:absolute;
  top:5px;
  left:5px;
  width:20px;
  height:20px;
}
.info{
  flex:1;
  display:flex;
  flex-direction:column;
}
.price-row{
  display:flex;
  justify-content:space-between;
  gap:5px;
}
.price-new{color:red;font-weight:bold;}
.price-old{
  text-decoration:line-through;
  color:#888;
  font-size:13px;
}
.qty{
  display:flex;
  align-items:center;
  border:1px solid #ccc;
  border-radius:8px;
  overflow:hidden;
  margin-top:5px;
}
.qty button{
  border:none;
  background:#eee;
  width:28px;
  height:28px;
  cursor:pointer;
}
.qty span{
  width:28px;
  text-align:center;
}
.remove{
  position:absolute;
  top:5px;
  right:5px;
  background:none;
  border:none;
  font-size:18px;
  cursor:pointer;
}

.total{
  text-align:right;
  font-size:20px;
  font-weight:bold;
  color:red;
  margin-top:10px;
}
.checkout{
  width:100%;
  margin-top:10px;
  padding:12px;
  background:linear-gradient(90deg,#1e88e5,#00acc1,#43a047);
  color:#fff;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
.empty{
  text-align:center;
  margin-top:40px;
}

/* =========================
   MOBILE
========================= */
@media(max-width:768px){
  .top-header{
    gap:6px;
    padding:6px;
  }

  .menu-btn,
  .icon-btn,
  .logo{
    width:44px;
    height:44px;
    min-width:44px;
    border-radius:14px;
  }

  .search-box input{
    height:44px;
    border-radius:14px;
  }

  .cart-badge{
    width:18px;
    height:18px;
    font-size:10px;
  }
   .header-icons{
  display:flex;
  align-items:center;
  gap:10px;
}


.icon-btn{
    background:#111;
    color:#fff;

    text-decoration:none;
    position:relative;

    font-size:20px;
    line-height:1;

    box-shadow:
    0 0 10px rgba(0,0,0,.35),
    0 4px 12px rgba(0,0,0,.25);
}
/* ICON 🛒 chỉnh giữa chuẩn */
.cart-icon{
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1;
  transform:translateY(0px);
}

/* BADGE số */
.cart-badge{
  position:absolute;
  top:-4px;
  right:-4px;

  width:18px;
  height:18px;

  border-radius:50%;
  background:red;
  color:#fff;

  font-size:10px;
  font-weight:bold;

  display:flex;
  align-items:center;
  justify-content:center;
}
   .icon-btn:hover{
  transform:scale(1.05);
  transition:0.2s;
  background:#159aaa;
}
   .icon-btn *{
  color:#fff !important;
}
   .icon-btn{
  background:#1fb4c7 !important;
  color:#fff !important;

  width:44px;
  height:44px;

  display:flex !important;
  align-items:center !important;
  justify-content:center !important;

  border-radius:14px;

  text-decoration:none !important;

  font-size:20px;
  line-height:1;
   } 

/* 💻 PC */
@media(min-width:769px){

   .search-box{
    flex:none;
    max-width:560px;

    margin-left:70px;
    margin-right:40px;
   }
}
   .remove-x{
  position: absolute;
  top: 6px;
  right: 6px;

  width: 22px;
  height: 22px;

  border: 1px solid #ddd;
  border-radius: 50%;

  background: #fff;
  color: #333;

  font-size: 16px;
  font-weight: bold;

  display: flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;

  line-height: 1;
}
   .item{
  position: relative;
}
   .item {
  position: relative;
  display: flex;
  align-items: flex-start;
  overflow: visible;
}
   .item{
  position: relative;
}

.remove-x{
  position: absolute;
  top: 2px;
  right: 2px;

  width: 22px;
  height: 22px;

  border: 1px solid #ddd;
  border-radius: 50%;

  background: #fff;
  color: #333;

  font-size: 16px;
  font-weight: bold;

  display: flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;
  z-index: 10;
}
}
   @media (min-width:769px){

 .remove-x{
  position: absolute;
  top: -6px;
  right: -6px;

  width: 22px;
  height: 22px;

  border: 1px solid #ddd;
  border-radius: 50%;

  background: #fff;
  color: #333;

  font-size: 16px;
  font-weight: bold;

  display: flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;
  z-index: 10;
  }

}
</style>
</head>
<body>

<div id="overlay" onclick="toggleMenu()"></div>
<!-- MENU / SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Danh mục</h3>

</div>

<div class="top-header">

  <div class="menu-btn" onclick="toggleMenu()">
    ☰
  </div>

    <img src="https://i.ibb.co/Z1kv9nJj/logo.png" alt="Stech">
  </div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Tìm sản phẩm...">
    <div id="searchResults" class="search-results"></div>
  </div>

  <div class="header-icons">

    <a href="profile.html" class="icon-btn user-icon">
      <i class="fa-solid fa-user"></i>
      <span id="notifyCount" class="cart-badge">0</span>
    </a>

    </a>

  </div>

<!-- GIỎ HÀNG PHẢI RA NGOÀI -->
<div class="container">
  <h2>🛒 Giỏ hàng</h2>
  <div id="cartList"></div>
  <div class="total" id="total"></div>
  <div id="cartAction"></div>
</div>
    <script type="module" src="./cart.js"></script>
<script type="module" src="./search.js"></script>

<script>
function toggleMenu() {
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}
</script>


</body>
</html>
