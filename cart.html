<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giỏ hàng</title>

<style>
body{font-family:Arial;background:#f4f7fb;margin:0;padding:0;}

#overlay{
position:fixed;inset:0;
background:rgba(0,0,0,0.5);
display:none;
z-index:998;
}
#overlay.active{display:block;}

.sidebar{
position:fixed;
left:-260px;top:0;
width:260px;height:100%;
background:#fff;
padding:20px;
transition:0.3s;
z-index:999;
}
.sidebar.active{left:0;}

.sidebar a{
display:block;
padding:10px;
text-decoration:none;
color:#333;
}

header{
display:flex;
align-items:center;
gap:10px;
padding:10px;
background:#2196f3;
color:#fff;
}

.menu-btn{
font-size:24px;
cursor:pointer;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

.item{
display:flex;
gap:10px;
background:#fff;
padding:10px;
margin-bottom:10px;
border-radius:10px;
align-items:center;
position:relative;
}

.item img{
width:70px;height:70px;
border-radius:8px;
}

.info{flex:1;}

.qty button{
width:25px;height:25px;
}

.remove{
position:absolute;
right:10px;top:10px;
border:none;
background:red;
color:#fff;
border-radius:5px;
cursor:pointer;
}

.total{
font-size:20px;
font-weight:bold;
text-align:right;
margin-top:10px;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
  <h3>Menu</h3>
  <a href="index.html">Trang chủ</a>
  <a href="cart.html">Giỏ hàng</a>
</div>

<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <h3>Giỏ hàng</h3>
</header>

<div class="container">
  <div id="cartList"></div>
  <div class="total" id="total"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<!-- CONFIG -->
<script src="firebase-config.js"></script>

<script>
// MENU
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

// AUTH
const auth = firebase.auth();
let currentUser = null;
let cart = [];

// LOGIN
auth.onAuthStateChanged(user=>{
  if(!user){
    window.location.href = "index.html";
    return;
  }
  currentUser = user;
  loadCart();
});

// LOAD CART
function loadCart(){
  const key = "cart_" + currentUser.uid;
  cart = JSON.parse(localStorage.getItem(key)) || [];
  renderCart();
}

// SAVE
function save(){
  const key = "cart_" + currentUser.uid;
  localStorage.setItem(key, JSON.stringify(cart));
  renderCart();
}

// RENDER
function renderCart(){
  const box = document.getElementById("cartList");
  const totalBox = document.getElementById("total");

  if(cart.length === 0){
    box.innerHTML = "<p>Giỏ hàng trống</p>";
    totalBox.innerHTML = "";
    return;
  }

  let total = 0;

  box.innerHTML = cart.map((item,i)=>{
    const qty = item.qty || 1;
    total += item.price * qty;

    return `
    <div class="item">
      <img src="${item.img}">
      <div class="info">
        <b>${item.name}</b><br>
        ${item.price.toLocaleString()}đ

        <div class="qty">
          <button onclick="changeQty(${i},-1)">-</button>
          <span>${qty}</span>
          <button onclick="changeQty(${i},1)">+</button>
        </div>
      </div>

      <button class="remove" onclick="removeItem(${i})">X</button>
    </div>
    `;
  }).join("");

  totalBox.innerHTML = "Tổng: " + total.toLocaleString() + "đ";
}

// CHANGE QTY
function changeQty(i,delta){
  cart[i].qty = (cart[i].qty||1) + delta;
  if(cart[i].qty < 1) cart[i].qty = 1;
  save();
}

// REMOVE
function removeItem(i){
  cart.splice(i,1);
  save();
}
</script>

</body>
</html>
