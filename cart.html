<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giỏ hàng - Stech</title>
<style>
/* ===== RESET ===== */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#f4f7fb;color:#111;overflow-x:hidden;}

/* ===== OVERLAY ===== */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;z-index:998;}
#overlay.active{display:block;}

/* ===== SIDEBAR ===== */
.sidebar{position:fixed;top:0;left:-260px;width:240px;height:100vh;background:#fff;z-index:9999;transition:.3s;padding:20px;box-shadow:0 0 20px rgba(0,0,0,.15);}
.sidebar.active{left:0;}
.sidebar h3{margin-bottom:20px;color:#00acc1;}
.sidebar a{display:block;padding:14px;margin-bottom:10px;border-radius:12px;background:#f5f5f5;text-decoration:none;color:#111;font-weight:bold;}

/* ===== HEADER ===== */
header{display:flex;align-items:center;padding:8px 10px;background:#33A0AB;gap:8px;position:sticky;top:0;z-index:999;}
.menu-btn{width:40px;height:40px;border-radius:12px;background:#00acc1;color:white;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;flex-shrink:0;}
.logo{width:40px;height:40px;border-radius:12px;overflow:hidden;background:#fff;box-shadow:0 2px 5px rgba(0,0,0,0.1);flex-shrink:0;}
.logo img{width:100%;height:100%;object-fit:cover;}
.search-box{flex:1;position:relative;}
.search-box input{width:100%;height:40px;border-radius:12px;border:none;padding:0 12px;font-size:14px;outline:none;}
.header-icons{display:flex;gap:8px;}
.icon-btn{width:40px;height:40px;border-radius:12px;background:#00acc1;color:white;display:flex;align-items:center;justify-content:center;font-size:18px;text-decoration:none;position:relative;cursor:pointer;}
.cart-count{position:absolute;top:-5px;right:-5px;min-width:18px;height:18px;border-radius:50%;background:red;color:white;font-size:11px;font-weight:bold;display:flex;align-items:center;justify-content:center;}

/* ===== GIỎ HÀNG ===== */
.container{max-width:900px;margin:auto;padding:15px;}
.item{display:flex;gap:10px;background:#fff;padding:12px;margin-bottom:10px;border-radius:12px;align-items:center;}
.item img{width:80px;height:80px;border-radius:10px;}
.info{flex:1;}
.price-new{color:red;font-weight:bold;}
.qty{display:flex;align-items:center;border:1px solid #ccc;border-radius:8px;overflow:hidden;margin-top:5px;}
.qty button{border:none;background:#eee;width:30px;height:30px;cursor:pointer;}
.qty span{padding:0 10px;}
.remove{background:none;border:none;font-size:18px;cursor:pointer;}
.total{text-align:right;font-size:20px;font-weight:bold;color:red;margin-top:10px;}
.checkout{width:100%;margin-top:10px;padding:12px;background:linear-gradient(90deg,#1e88e5,#00acc1,#43a047);color:#fff;border:none;border-radius:10px;cursor:pointer;}
.empty{text-align:center;margin-top:40px;font-size:18px;}
</style>
</head>
<body>

<div id="overlay" onclick="toggleMenu()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Menu</h3>
  <a href="index.html">Trang chủ</a>
  <a href="cart.html">Giỏ hàng</a>
  <a href="camera-trong-nha.html">Camera trong nhà</a>
  <a href="camera-ngoai-troi.html">Camera ngoài trời</a>
  <a href="the-nho.html">Thẻ nhớ</a>
</div>

<!-- HEADER ĐỒNG BỘ USER-PROFILE -->
<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="logo"><img src="https://i.ibb.co/Z1kv9nJj/logo.png" alt="logo"></div>
  <div class="search-box"><input id="searchInput" placeholder="Tìm kiếm sản phẩm..."></div>
  <div class="header-icons">
    <div class="icon-btn">🔑</div>
    <div class="icon-btn">🛒<span class="cart-count" id="cartCount">0</span></div>
  </div>
</header>

<!-- GIỎ HÀNG -->
<div class="container">
  <h2>🛒 Giỏ hàng</h2>
  <div id="cartList"></div>
  <div class="total" id="total"></div>
  <div id="cartAction"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<!-- CART.JS Firebase -->
<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDYVcBEYJN1HUCta3XdJAUBe4TGLnmy7y4",
  authDomain: "stech-73b89.firebaseapp.com",
  databaseURL: "https://stech-73b89-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "stech-73b89",
  storageBucket: "stech-73b89.appspot.com",
  messagingSenderId: "873739162979",
  appId: "1:873739162979:web:978f1a4043f025b1cdaf56"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// DOM
const cartList = document.getElementById("cartList");
const totalBox = document.getElementById("total");
const cartAction = document.getElementById("cartAction");
const cartCountEl = document.getElementById("cartCount");

let currentUser = null;
let cartRef = null;

// ================== MENU ==================
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

// ================== AUTH ==================
auth.onAuthStateChanged(user => {
  if(!user){ window.location.href="index.html"; return; }
  currentUser = user;
  cartRef = db.ref("carts/"+currentUser.uid);

  cartRef.on("value", snapshot => {
    const cart = snapshot.val() || [];
    renderCart(cart);
    updateBadge(cart);
  });
});

// ================== ADD ==================
function addToCart(product){
  if(!currentUser) return alert("Bạn cần đăng nhập!");
  cartRef.once("value").then(snapshot=>{
    let cart = snapshot.val() || [];
    const index = cart.findIndex(item=>item.id===product.id);
    if(index!==-1) cart[index].quantity = (cart[index].quantity||1)+1;
    else cart.push({id:product.id,name:product.name,price:product.price,img:product.img,quantity:1});
    cartRef.set(cart);
  });
}

// ================== RENDER ==================
function renderCart(cart){
  cartList.innerHTML = "";
  if(!cart || cart.length===0){
    cartList.innerHTML = "<p class='empty'>Giỏ hàng trống 🛒</p>";
    totalBox.innerHTML=""; cartAction.innerHTML=""; return;
  }
  let total=0;
  cart.forEach(item=>{
    const qty=item.quantity||1;
    total+=item.price*qty;
    const div=document.createElement("div");
    div.className="item";
    div.innerHTML=`
      <img src="${item.img||''}">
      <div class="info">
        <b>${item.name}</b><br>
        <div class="price-new">${item.price.toLocaleString()}đ × ${qty} = <b style="color:#e53935">${(item.price*qty).toLocaleString()}đ</b></div>
        <div class="qty">
          <button onclick="changeQty('${item.id}',-1)">-</button>
          <span>${qty}</span>
          <button onclick="changeQty('${item.id}',1)">+</button>
        </div>
      </div>
      <button class="remove" onclick="removeItem('${item.id}')">🗑</button>
    `;
    cartList.appendChild(div);
  });
  totalBox.innerHTML="Tổng: "+total.toLocaleString()+"đ";
  cartAction.innerHTML=`<button class="checkout" onclick="checkout()">Đặt hàng</button>`;
}

// ================== REMOVE ==================
function removeItem(id){
  if(!currentUser) return;
  cartRef.once("value").then(snapshot=>{
    let cart = snapshot.val()||[];
    cart = cart.filter(item=>item.id!==id);
    cartRef.set(cart);
  });
}

// ================== QTY ==================
function changeQty(id,delta){
  if(!currentUser) return;
  cartRef.once("value").then(snapshot=>{
    let cart = snapshot.val()||[];
    const index = cart.findIndex(item=>item.id===id);
    if(index===-1) return;
    cart[index].quantity=(cart[index].quantity||1)+delta;
    if(cart[index].quantity<1) cart[index].quantity=1;
    cartRef.set(cart);
  });
}

// ================== CHECKOUT ==================
function checkout(){
  if(!currentUser) return alert("Bạn cần đăng nhập!");
  cartRef.once("value").then(snapshot=>{
    const cart = snapshot.val()||[];
    if(cart.length===0) return alert("Giỏ hàng trống!");
    const ordersRef = db.ref("orders/"+currentUser.uid);
    const orderKey = ordersRef.push().key;
    ordersRef.child(orderKey).set({
      items: cart,
      status: "Đang xử lý",
      createdAt: new Date().toISOString()
    }).then(()=>{ cartRef.remove(); alert("Đặt hàng thành công!"); });
  });
}

// ================== BADGE ==================
function updateBadge(cart){
  if(!cartCountEl) return;
  let count = cart.reduce((sum,item)=>sum+(item.quantity||1),0);
  cartCountEl.innerText = count;
}
</script>

</body>
</html>
