<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giỏ hàng</title>
<link rel="stylesheet" href="stylecart.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#f4f7fb;}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;z-index:998;}
#overlay.active{display:block;}
.sidebar{position:fixed;left:-260px;top:0;width:260px;height:100%;background:#fff;padding:20px;transition:0.3s;z-index:999;}
.sidebar.active{left:0;}
.sidebar a{display:block;padding:10px;border-radius:8px;text-decoration:none;color:#333;}
header{display:flex;align-items:center;gap:10px;padding:10px;background:linear-gradient(90deg,#1e88e5,#00acc1,#43a047);position:sticky;top:0;z-index:1000;}
.menu-btn{width:40px;height:40px;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;}
.logo img{width:40px;height:40px;border-radius:50%;}
header input{flex:1;padding:10px;border:none;border-radius:20px;background:#e0e0e0;}
.container{max-width:900px;margin:auto;padding:15px;}
.item{display:flex;gap:10px;background:#fff;padding:12px;margin-bottom:10px;border-radius:12px;align-items:center;position:relative;}
.item img{width:80px;height:80px;border-radius:10px;}
.check-item{position:absolute;top:5px;left:5px;width:20px;height:20px;cursor:pointer;}
.info{flex:1;display:flex;flex-direction:column;justify-content:center;min-width:180px;}
.price-row{display:flex;justify-content:space-between;flex-wrap:nowrap;gap:5px;align-items:center;}
.price-new{color:red;font-weight:bold;white-space:nowrap;}
.price-old{text-decoration:line-through;color:#888;font-size:13px;white-space:nowrap;}
.qty{display:flex;align-items:center;border:1px solid #ccc;border-radius:8px;overflow:hidden;gap:4px;margin-top:5px;}
.qty button{border:none;background:#eee;width:28px;height:28px;border-radius:6px;cursor:pointer;}
.qty span{display:inline-block;width:28px;text-align:center;}
.remove{position:absolute;top:5px;right:5px;background:none;border:none;font-size:18px;cursor:pointer;}
.total{text-align:right;font-size:20px;font-weight:bold;color:red;margin-top:10px;}
.checkout{width:100%;margin-top:10px;padding:12px;background:linear-gradient(90deg,#1e88e5,#00acc1,#43a047);color:#fff;border:none;border-radius:10px;cursor:pointer;}
.empty{text-align:center;margin-top:40px;}
.login-form{display:flex;gap:5px;margin-bottom:10px;}
.login-form input{flex:1;padding:8px;border-radius:6px;border:1px solid #ccc;}
.login-form button{padding:8px 10px;border:none;border-radius:6px;background:#1e88e5;color:#fff;cursor:pointer;}
</style>
</head>
<body>

<div id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
  <h3>Danh mục</h3>
  <a href="admin.html">Admin</a>
  <a href="cart.html">Giỏ hàng</a>
  <a href="index.html">Trang chủ</a>
  <a href="camera-trong-nha.html">Camera trong nhà</a>
  <a href="camera-ngoai-troi.html">Camera ngoài trời</a>
  <a href="the-nho.html">Thẻ nhớ</a>
  <a href="combo-khuyenmai.html">Combo khuyến mãi</a>
</div>

<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="logo"><img src="https://i.ibb.co/Z1kv9nJj/logo.png"></div>
  <input id="searchInput" placeholder="Tìm kiếm">
</header>

<div class="container">
  <!-- LOGIN -->
  <div class="login-form" id="loginSection">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Mật khẩu">
    <button id="loginBtn">Đăng nhập</button>
    <button id="logoutBtn" style="display:none;">Đăng xuất</button>
  </div>

  <h2>🛒 Giỏ hàng</h2>
  <div id="cartList"></div>
  <div class="total" id="total"></div>
  <div id="cartAction"></div>
</div>

<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js"></script>

<script>
// ==========================
// MENU
// ==========================
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

// ==========================
// FIREBASE CONFIG
// ==========================
const firebaseConfig = {
  apiKey: "AIzaSyDYVcBEYJN1HUCta3XdJAUBe4TGLnmy7y4",
  authDomain: "stech-73b89.firebaseapp.com",
  databaseURL: "https://stech-73b89-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "stech-73b89",
  storageBucket: "stech-73b89.appspot.com",
  messagingSenderId: "873739162979",
  appId: "1:873739162979:web:978f1a4043f025b1cdaf56"
};

if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let currentUser = null;

// ==========================
// LOGIN/LOGOUT
// ==========================
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");

loginBtn.addEventListener("click", async ()=>{
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  try{ await auth.signInWithEmailAndPassword(email,password); }
  catch(err){ alert("Lỗi: "+err.message); }
});

logoutBtn.addEventListener("click", async ()=>{
  await auth.signOut();
});

// ==========================
// AUTH STATE
// ==========================
auth.onAuthStateChanged(user=>{
  if(user){
    currentUser = user;
    document.getElementById("loginSection").style.display="none";
    logoutBtn.style.display="inline";
    loadCart();
  }else{
    currentUser = null;
    document.getElementById("loginSection").style.display="flex";
    logoutBtn.style.display="none";
    document.getElementById("cartList").innerHTML="";
    document.getElementById("total").innerHTML="";
    document.getElementById("cartAction").innerHTML="";
  }
});

// ==========================
// CART FUNCTIONS
// ==========================
let cart = [];

function loadCart(){
  if(!currentUser) return;
  const cartRef = db.ref("carts/"+currentUser.uid);
  cartRef.on("value", snapshot=>{
    cart = snapshot.val() || [];
    renderCart();
  });
}

function renderCart(){
  const box = document.getElementById("cartList");
  const totalBox = document.getElementById("total");
  const actionBox = document.getElementById("cartAction");
  if(cart.length===0){
    box.innerHTML="<p class='empty'>Giỏ trống</p>";
    totalBox.innerHTML="";
    actionBox.innerHTML="";
    return;
  }
  let total=0;
  box.innerHTML=cart.map((item,i)=>{
    if(item.checked===undefined)item.checked=true;
    if(item.checked) total+=item.price*(item.qty||1);
    return `<div class="item">
      <input type="checkbox" class="check-item" ${item.checked?"checked":""} onclick="toggleCheck(${i})">
      <img src="${item.img}">
      <div class="info">
        <b>${item.name}</b>
        <div class="price-row">
          <span class="price-new">${item.price.toLocaleString()}đ</span>
                 ${item.oldPrice?`<span class="price-old">${item.oldPrice.toLocaleString()}đ</span>`:""}
          <span>${item.qty||1} × ${item.price.toLocaleString()}đ</span>
        </div>
        <div class="qty">
          <button onclick="changeQty(${i},-1)">-</button>
          <span>${item.qty||1}</span>
          <button onclick="changeQty(${i},1)">+</button>
        </div>
      </div>
      <button class="remove" onclick="removeItem(${i})">🗑</button>
    </div>`;
  }).join("");
  totalBox.innerHTML = "Tổng: "+total.toLocaleString()+"đ";
  actionBox.innerHTML = `<button class="checkout" onclick="checkout()">Đặt hàng</button>`;
}

// TOGGLE CHECKBOX
function toggleCheck(i){
  cart[i].checked = !cart[i].checked;
  updateCart();
}

// CHANGE QTY
function changeQty(i, delta){
  cart[i].qty = (cart[i].qty||1) + delta;
  if(cart[i].qty < 1) cart[i].qty = 1;
  updateCart();
}

// REMOVE ITEM
function removeItem(i){
  cart.splice(i,1);
  updateCart();
}

// UPDATE CART FIREBASE
async function updateCart(){
  if(!currentUser) return;
  await db.ref("carts/"+currentUser.uid).set(cart);
  renderCart();
}

// CHECKOUT
function checkout(){
  let checkedItems = cart.filter(i=>i.checked!==false);
  if(checkedItems.length===0){ alert("Chọn ít nhất 1 sản phẩm!"); return; }
  // Ở đây bạn có thể điều hướng sang checkout.html
  window.location.href = "checkout.html";
}

// SEARCH
document.getElementById("searchInput").addEventListener("input", function(){
  const key = this.value.toLowerCase();
  renderCart(cart.filter(i=>i.name.toLowerCase().includes(key)));
});

// ==========================
// ADD PRODUCT EXAMPLE
// ==========================
// Nếu muốn test thêm sản phẩm:
// addToCartFirebase({id:1,name:"Camera test",price:1200000,oldPrice:1500000,img:"https://i.ibb.co/xyz.jpg"})

async function addToCartFirebase(product){
  if(!currentUser){ alert("Bạn cần đăng nhập!"); return; }
  const cartRef = db.ref("carts/"+currentUser.uid);
  const snapshot = await cartRef.once("value");
  let userCart = snapshot.val() || [];
  const existIndex = userCart.findIndex(i=>String(i.id)===String(product.id));
  if(existIndex!==-1){
    userCart[existIndex].qty = (userCart[existIndex].qty||1) + 1;
  } else {
    userCart.push({...product, qty:1, checked:true});
  }
  await cartRef.set(userCart);
}

// ==========================
// LOAD INITIAL CART
// ==========================
renderCart();
</script>
</body>
</html>
