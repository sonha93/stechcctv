<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giỏ hàng</title>
<link rel="stylesheet" href="stylecart.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#f4f7fb;}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;z-index:998;}
#overlay.active{display:block;}
.sidebar{position:fixed;left:-260px;top:0;width:260px;height:100%;background:#fff;padding:20px;transition:0.3s;z-index:999;}
.sidebar.active{left:0;}
.sidebar a{display:block;padding:10px;border-radius:8px;text-decoration:none;color:#333;}
header{display:flex;align-items:center;gap:10px;padding:10px;background:linear-gradient(90deg,#1e88e5,#00acc1,#43a047);position:sticky;top:0;z-index:1000;}
.menu-btn{width:40px;height:40px;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;}
.logo img{width:40px;height:40px;border-radius:50%;}
header input{flex:1;padding:10px;border:none;border-radius:20px;background:#e0e0e0;}
.container{max-width:900px;margin:auto;padding:15px;}
.item{display:flex;gap:10px;background:#fff;padding:12px;margin-bottom:10px;border-radius:12px;align-items:center;position:relative;}
.item img{width:80px;height:80px;border-radius:10px;}
.check-item{position:absolute;top:5px;left:5px;width:20px;height:20px;cursor:pointer;}
.info{flex:1;display:flex;flex-direction:column;justify-content:center;min-width:180px;}
.price-row{display:flex;justify-content:space-between;flex-wrap:nowrap;gap:5px;align-items:center;}
.price-new{color:red;font-weight:bold;white-space:nowrap;}
.price-old{text-decoration:line-through;color:#888;font-size:13px;white-space:nowrap;}
.qty{display:flex;align-items:center;border:1px solid #ccc;border-radius:8px;overflow:hidden;gap:4px;margin-top:5px;}
.qty button{border:none;background:#eee;width:28px;height:28px;border-radius:6px;cursor:pointer;}
.qty span{display:inline-block;width:28px;text-align:center;}
.remove{position:absolute;top:5px;right:5px;background:none;border:none;font-size:18px;cursor:pointer;}
.total{text-align:right;font-size:20px;font-weight:bold;color:red;margin-top:10px;}
.checkout{width:100%;margin-top:10px;padding:12px;background:linear-gradient(90deg,#1e88e5,#00acc1,#43a047);color:#fff;border:none;border-radius:10px;cursor:pointer;}
.empty{text-align:center;margin-top:40px;}
  }
 .search-results{
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;

  width: 100%;        /* 👈 ăn theo search-box */
  background: #fff;
  border: 1px solid #ddd;

  max-height: 350px;
  overflow-y: auto;

  z-index: 9999;
}

.search-item{
  display:flex;
  gap:10px;
  padding:10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.search-item img{
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:6px;
}

.search-info{
  display:flex;
  flex-direction:column;
}

.search-name{
  font-weight:bold;
}

.search-price{
  color:red;
  font-weight:bold;
}

.search-oldprice{
  font-size:12px;
  color:#888;
  text-decoration:line-through;
}
  /* =========================
   MOBILE HEADER FINAL FIX
========================= */

@media(max-width:768px){

  .top-header{
    gap:6px;
    padding:6px;
    align-items:center;
  }
.cart-icon{
    font-size:17px;
    transform:translateY(-1px);
  }


  /* MENU + ICON */
  .menu-btn,
  .icon-btn,
  .logo{
    width:44px !important;
    height:44px !important;
    min-width:44px !important;

    border-radius:14px;

    display:flex;
    align-items:center;
    justify-content:center;

    flex-shrink:0;

    box-sizing:border-box;
  }

  /* SEARCH */
  .search-box input{
    height:44px !important;
    border-radius:14px;
  }

  /* ICON */
  .icon-btn{
    font-size:18px !important;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:0 !important;
  }

  .menu-btn{
    font-size:22px !important;
  }

  /* BADGE */
  .cart-badge{
    top:-2px !important;
    right:-2px !important;

    min-width:18px !important;
    height:18px !important;

    font-size:10px !important;

    border:2px solid #1fb4c7;

    box-sizing:border-box;

    display:flex;
    align-items:center;
    justify-content:center;

    line-height:1;
  }

  /* FIX ICON */
  .icon-btn span{
    line-height:1;
  }
}

/* FINAL PERFECT MOBILE ALIGN */

.icon-btn,
.menu-btn,
.logo{
  box-sizing:border-box;
}

.icon-btn{
  display:flex;
  align-items:center;
  justify-content:center;

  padding:0 !important;
}

.cart-badge{
  box-sizing:border-box;

  display:flex;
  align-items:center;
  justify-content:center;

  line-height:1;
}
  
/* =========================
   RESET
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#f5f5f5;
  font-family:Arial,sans-serif;
}

/* =========================
   HEADER FIX FINAL
========================= */

.top-header{
  position:sticky;
  top:0;
  z-index:9999;

  display:flex;
  align-items:center;

  gap:10px;

  padding:8px;

  background:#33A0AB;
}

/* MENU + ICON */

.menu-btn,
.icon-btn{
  width:54px;
  height:54px;

  min-width:54px;

  border-radius:18px;

  background:#1fb4c7;
  color:#fff;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:24px;

  cursor:pointer;

  position:relative;

  flex-shrink:0;

  text-decoration:none;
  border:none;
}

/* ADMIN */

.admin-btn{
  background:#6c55e0;
}

/* LOGO */

.logo{
  width:58px;
  height:58px;

  min-width:58px;

  border-radius:18px;

  overflow:hidden;

  background:#fff;

  display:flex;
  align-items:center;
  justify-content:center;

  flex-shrink:0;
}

/* FIX LOGO */

.logo img{
  width:100% !important;
  height:100% !important;

  object-fit:contain;

  padding:2px;

  display:block;

  border:none !important;
  outline:none !important;
  box-shadow:none !important;

  background:#fff;
}

/* SEARCH */

.search-box{
  position: relative;
  width: 100%;
  max-width: 450px;   /* 👈 chỉnh độ rộng khung search */
  margin: 0 auto;     /* 👈 căn giữa màn hình */
}

.search-box input{
  width:100%;
  height:48px;

  border:none;
  outline:none;

  border-radius:18px;

  padding:0 18px;

  background:#f1f1f1;

  font-size:15px;
  font-weight:bold;
}

/* RIGHT */

.header-icons{
  display:flex;
  align-items:center;
  gap:8px;

  flex-shrink:0;
}

/* BADGE */

.cart-badge{
  position:absolute;

  top:2px;
  right:2px;

  min-width:20px;
  height:20px;
  border-radius:50%;

  background:red;
  color:#fff;

  font-size:11px;
  font-weight:bold;

  display:flex;
  align-items:center;
  justify-content:center;
}

/* OVERLAY FIX */

#overlay{
  position:fixed;
  inset:0;

  background:rgba(0,0,0,.4);

  opacity:0;
  visibility:hidden;

  transition:.2s;

  z-index:9998;
}

#overlay.active{
  opacity:1;
  visibility:visible;
}

/* SIDEBAR */

.sidebar{
  position:fixed;

  top:0;
  left:-280px;

  width:260px;
  height:100vh;

  background:#fff;

  z-index:99999;

  transition:.25s;

  padding:20px;
}

.sidebar.active{
  left:0;
}

/* =========================
   FORCE FIX HEADER
========================= */

.top-header{
  overflow:visible !important;
}

/* FORCE LOGO */

.top-header .logo{
  display:flex !important;
  align-items:center !important;
  justify-content:center !important;

  overflow:hidden !important;

  background:#fff !important;
}

.top-header .logo img{
  width:100% !important;
  height:100% !important;

  display:block !important;

  object-fit:contain !important;

  visibility:visible !important;
  opacity:1 !important;
}

/* FIX ICON */

.top-header .icon-btn,
.top-header .menu-btn{
  font-family:Arial !important;

  line-height:1 !important;

  text-decoration:none !important;

  overflow:hidden !important;
}

/* SIDEBAR LINK */

.sidebar a{
  display:block;

  padding:14px;

  margin-bottom:10px;

  border-radius:12px;

  background:#f5f5f5;

  text-decoration:none;

  color:#111;

  font-weight:bold;
}/* FIX FLEX HEADER */

.top-header{
  display:flex !important;
  align-items:center !important;
  flex-wrap:nowrap !important;
}

.top-header .search-box{
  flex:1 1 auto !important;
  width:auto !important;
  min-width:0 !important;
}

.top-header .header-icons{
  display:flex !important;
  flex-direction:row !important;
}

/* FIX INPUT */

.top-header input{
  width:100% !important;
  min-width:0 !important;
}




.header-icons{
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
}

.icon-btn{
  flex-shrink:0;
}
.cart-icon{
  display:flex;
  align-items:center;
  justify-content:center;

  width:100%;
  height:100%;

  font-size:18px;
  line-height:1;

  transform:translateY(-1px);
}
</style>
</head>
<body>

<div id="overlay" onclick="toggleMenu()"></div>
<!-- MENU / SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Danh mục</h3>
  <a href="index.html">Trang chủ</a>
   <a href="cart.html">Giỏ hàng</a>
  <a href="camera-trong-nha.html">Camera trong nhà</a>
  <a href="camera-ngoai-troi.html">Camera ngoài trời</a>
  <a href="the-nho.html">Thẻ nhớ</a>
  <a href="combo-khuyenmai.html">Combo khuyến mãi</a>
</div>

<div class="top-header">

  <div class="menu-btn" onclick="toggleMenu()">
    ☰
  </div>

  <div class="logo">

  <img
  src="https://i.ibb.co/Z1kv9nJj/logo.png"
  alt="Stech"
>
</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Tìm sản phẩm...">
  <div id="searchResults" class="search-results"></div>
</div>

<div class="container">
  <h2>🛒 Giỏ hàng</h2>
  <div id="cartList"></div>
  <div class="total" id="total"></div>
<div id="cartAction"></div>
</div>
    <script type="module" src="./cart.js"></script>
<script>
function toggleMenu() {
  document.getElementById("sidebar")
    .classList.toggle("active");

  document.getElementById("overlay")
    .classList.toggle("active");
}
</script>



</body>
</html>
