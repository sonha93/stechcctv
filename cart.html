<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giỏ hàng - Stech</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#f4f7fb;color:#111;}

/* HEADER */
header{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#33A0AB;position:sticky;top:0;z-index:1000;}
.menu-btn{width:40px;height:40px;border-radius:12px;background:#00acc1;color:white;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;}
.logo{width:40px;height:40px;border-radius:12px;overflow:hidden;background:#fff;display:flex;align-items:center;justify-content:center;}
.logo img{width:100%;height:100%;object-fit:cover;}
.search-box{flex:1;}
.search-box input{width:100%;height:36px;border-radius:18px;border:none;padding:0 12px;font-size:14px;}
.header-icons{display:flex;gap:8px;position:relative;}
.icon-btn{width:40px;height:40px;border-radius:12px;background:#00acc1;color:white;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;position:relative;}
.cart-count{position:absolute;top:-5px;right:-5px;min-width:18px;height:18px;border-radius:50%;background:red;color:white;font-size:11px;font-weight:bold;display:flex;align-items:center;justify-content:center;}

/* SIDEBAR */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:998;opacity:0;visibility:hidden;transition:.3s;}
#overlay.active{opacity:1;visibility:visible;}
.sidebar{position:fixed;left:-260px;top:0;width:260px;height:100vh;background:#fff;z-index:999;transition:.3s;padding:20px;}
.sidebar.active{left:0;}
.sidebar h3{margin-bottom:20px;color:#00acc1;}
.sidebar a{display:block;padding:10px;margin-bottom:10px;border-radius:8px;text-decoration:none;color:#111;}

/* CART */
.container{max-width:900px;margin:auto;padding:15px;}
.item{display:flex;gap:10px;background:#fff;padding:12px;margin-bottom:10px;border-radius:12px;align-items:center;}
.item img{width:80px;height:80px;border-radius:10px;}
.check{width:20px;height:20px;}
.info{flex:1;}
.price-new{color:red;font-weight:bold;}
.price-old{text-decoration:line-through;color:#888;font-size:13px;}
.qty{display:flex;align-items:center;border:1px solid #ccc;border-radius:8px;overflow:hidden;margin-top:4px;}
.qty button{border:none;background:#eee;width:30px;height:30px;cursor:pointer;}
.qty span{padding:0 10px;}
.remove{background:none;border:none;font-size:18px;cursor:pointer;}
.total{text-align:right;font-size:20px;font-weight:bold;color:red;margin-top:10px;}
.checkout{width:100%;margin-top:10px;padding:12px;background:linear-gradient(90deg,#1e88e5,#00acc1,#43a047);color:#fff;border:none;border-radius:10px;cursor:pointer;}
.empty{text-align:center;margin-top:40px;}
</style>
</head>

<body>

<div id="overlay" onclick="toggleMenu()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Menu</h3>
  <a href="index.html">Trang chủ</a>
  <a href="cart.html">Giỏ hàng</a>
  <a href="camera-trong-nha.html">Camera trong nhà</a>
  <a href="camera-ngoai-troi.html">Camera ngoài trời</a>
  <a href="the-nho.html">Thẻ nhớ</a>
  <a href="combo-khuyenmai.html">Combo khuyến mãi</a>
</div>

<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="logo"><img src="https://i.ibb.co/Z1kv9nJj/logo.png"></div>
  <div class="search-box"><input id="searchInput" placeholder="Tìm kiếm"></div>
  <div class="header-icons">
    <div class="icon-btn" id="logoutArrow">🔑</div>
    <a href="cart.html" class="icon-btn">🛒<span class="cart-count" id="cartCount">0</span></a>
  </div>
</header>

<div class="container">
  <h2>🛒 Giỏ hàng</h2>
  <div id="cartList"></div>
  <div class="total" id="total"></div>
  <div id="cartAction"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// Firebase config
const firebaseConfig={apiKey:"AIzaSyDYVcBEYJN1HUCta3XdJAUBe4TGLnmy7y4",authDomain:"stech-73b89.firebaseapp.com",databaseURL:"https://stech-73b89-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"stech-73b89",storageBucket:"stech-73b89.appspot.com",messagingSenderId:"873739162979",appId:"1:873739162979:web:978f1a4043f025b1cdaf56"};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();
let currentUser = null;
let cart = [];

const cartList = document.getElementById("cartList");
const totalBox = document.getElementById("total");
const cartAction = document.getElementById("cartAction");
const cartCountEl = document.getElementById("cartCount");

// Menu toggle
function toggleMenu() {
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

// Load giỏ hàng theo uid
auth.onAuthStateChanged(user => {
  if(!user) window.location.href="index.html";
  currentUser = user;
  loadCart();
});

// Load cart Firebase
function loadCart() {
  if (!currentUser) return;
  db.ref("carts/"+currentUser.uid).on("value", snap=>{
    cart = snap.val() || [];
    renderCart();
  });
}

// Save cart Firebase
function saveCart(){
  if(!currentUser) return;
  db.ref("carts/"+currentUser.uid).set(cart);
  updateBadge();
}

// Update badge
function updateBadge(){
  if(!cartCountEl) return;
  let count = 0;
  cart.forEach(item=>{count += item.qty || 1});
  cartCountEl.innerText = count;
}

// Render cart
function renderCart(filteredList=null){
  const list = filteredList || cart;
  cartList.innerHTML=""; cartAction.innerHTML=""; totalBox.innerHTML="";
  if(!list.length){cartList.innerHTML="<p class='empty'>Giỏ hàng trống 🛒</p>"; return;}
  let total = 0;
  list.forEach((item,i)=>{
    let qty = item.qty || 1;
    const checked = item.checked!==false;
    if(checked) total += item.price*qty;
    cartList.innerHTML += `
    <div class="item">
      <input type="checkbox" class="check" ${checked?"checked":""} onchange="toggleCheck(${i})">
      <img src="${item.img}">
      <div class="info">
        <b>${item.name}</b>
        <div class="price-new">${item.price.toLocaleString()}đ</div>
        ${item.oldPrice?`<div class="price-old">${item.oldPrice.toLocaleString()}đ</div>`:""}
        <div class="qty">
          <button onclick="changeQty(${i},-1)">-</button>
          <span>${qty}</span>
          <button onclick="changeQty(${i},1)">+</button>
        </div>
      </div>
      <button class="remove" onclick="removeItem(${i})">🗑</button>
    </div>
    `;
  });
  totalBox.innerHTML = "Tổng: "+total.toLocaleString()+"đ";
  cartAction.innerHTML = `<button class="checkout" onclick="checkout()">Đặt hàng</button>`;
  updateBadge();
}

// Check/uncheck
function toggleCheck(i){ cart[i].checked = !cart[i].checked; saveCart(); }

// Change qty
function changeQty(i,delta){ cart[i].qty=(cart[i].qty||1)+delta; if(cart[i].qty<1) cart[i].qty=1; saveCart(); }

// Remove item
function removeItem(i){ cart.splice(i,1); saveCart(); }

// Checkout
function checkout(){ window.location.href="checkout.html"; }

// Add to cart
function addToCart(product){
  let index = cart.findIndex(item=>item.id===product.id);
  if(index!==-1) cart[index].qty=(cart[index].qty||1)+1;
  else cart.push({...product,qty:1,checked:true});
  saveCart();
}

// Search
const searchInput = document.getElementById("searchInput");
if(searchInput){
  searchInput.addEventListener("input", function(){
    const keyword = this.value.toLowerCase();
    const filtered = cart.filter(item=>item.name.toLowerCase().includes(keyword));
    renderCart(filtered);
  });
}

// INIT
renderCart();
</script>
</body>
</html>
