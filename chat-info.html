<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Thông tin đoạn chat</title>

<link rel="stylesheet" href="chat-info.css">
<link rel="stylesheet" href="theme.css">
</head>


<body>


<div class="chat-info">



<!-- HEADER -->

<header>

<button id="backBtn" class="icon-btn">

<svg viewBox="0 0 24 24">
<path d="M15 18l-6-6 6-6"/>
</svg>

</button>


<h3>Thông tin</h3>


<button id="menuBtn" class="icon-btn">

<svg viewBox="0 0 24 24">
<circle cx="12" cy="5" r="2"/>
<circle cx="12" cy="12" r="2"/>
<circle cx="12" cy="19" r="2"/>
</svg>

</button>


</header>





<!-- PROFILE -->

<section class="profile">


<img id="avatar"
src="default-avatar.png">


<h2 class="profile-name">

    <span id="username">
        Người dùng
    </span>

    <span id="verified"></span>

</h2>


</section>






<!-- QUICK ACTION -->

<section class="quick-action">


<button onclick="openProfile()">


<div class="round-icon">

<svg viewBox="0 0 24 24">
<path d="M12 12a5 5 0 100-10 5 5 0 000 10z"/>
<path d="M3 22c0-5 18-5 18 0"/>
</svg>

</div>


<span>
Trang cá nhân
</span>


</button>





<button onclick="changeNickname()">



<div class="round-icon">

<svg viewBox="0 0 24 24">
<path d="M3 17.25V21h3.75L17.8 9.95l-3.75-3.75L3 17.25z"/>
</svg>

</div>


<span>
Biệt danh
</span>


</button>






<button>


<div class="round-icon">

<svg viewBox="0 0 24 24">
<circle cx="11" cy="11" r="7"/>
<line x1="20" y1="20" x2="16" y2="16"/>
</svg>

</div>


<span>
Tìm kiếm
</span>


</button>

<button id="themeBtn">

<div class="round-icon">

<svg viewBox="0 0 24 24">
<path d="M12 2l3 6 7 1-5 5 1 7-6-3-6 3 1-7-5-5 7-1z"/>
</svg>

</div>

<span>Theme</span>

</button>
</section>
<!-- MEDIA -->

<section class="menu">


<h3>Thông tin đoạn chat</h3>

<div class="item" id="mediaToggle">

    <svg viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="16" rx="2"/>
        <circle cx="8" cy="9" r="2"/>
        <path d="M21 15l-5-5L5 20"/>
    </svg>

    Ảnh & video

</div>

<div id="mediaList"></div>

<div class="item" id="fileToggle">

    <svg viewBox="0 0 24 24">
        <path d="M6 2h9l3 3v17H6z"/>
    </svg>

    File

</div>
<div id="fileList"></div>
<div class="item" id="linkToggle">

    <svg viewBox="0 0 24 24">
        <path d="M10 13a5 5 0 007 0l3-3a5 5 0 00-7-7l-1 1"/>
        <path d="M14 11a5 5 0 01-7 0l-3 3a5 5 0 007 7l1-1"/>
    </svg>

    Link

</div>
<div id="linkList"></div>
<div class="item" id="pinnedToggle">

    <svg viewBox="0 0 24 24">
        <path d="M12 17l-5 3 1-6-4-4 6-.8L12 3l2 6.2 6 .8-4 4 1 6z"/>
    </svg>

    Tin nhắn ghim

</div>
<div id="pinnedList"></div>


</section>









<!-- SETTINGS -->


<section class="menu">


<div class="item">


<svg viewBox="0 0 24 24">
<path d="M12 3a9 9 0 000 18"/>
</svg>


Tắt thông báo


<input id="mute"
type="checkbox">


</div>






<div class="item">


<svg viewBox="0 0 24 24">
<path d="M12 5v14M5 12h14"/>
</svg>


Thông báo & âm thanh


</div>






<div class="item">


<svg viewBox="0 0 24 24">
<path d="M16 21v-2a4 4 0 00-8 0v2"/>
<circle cx="12" cy="7" r="4"/>
</svg>


Tạo nhóm


</div>







<div class="item">


<svg viewBox="0 0 24 24">
<path d="M12 5v14"/>
<path d="M5 12h14"/>
</svg>


Tự động lưu ảnh


</div>



</section>









<!-- DANGER -->


<section class="danger">


<button id="blockBtn" onclick="blockUser()">

🚫 Chặn

</button>



<button onclick="deleteChat()">

🗑 Xóa đoạn chat

</button>



<button>

⚠️ Báo cáo

</button>


</section>
<!-- Avatar Viewer -->

<div id="avatarViewer" hidden>

    <button id="closeAvatarViewer">&times;</button>

    <img id="avatarViewerImg" src="" alt="Avatar">

</div>
<!-- =========================
THEME MODAL
========================= -->

<div id="themeModal" class="theme-modal hidden">
<div class="theme-window">

<div class="theme-header">

<h2>Theme cuộc trò chuyện</h2>

<button id="closeTheme">

<svg viewBox="0 0 24 24">

<path d="M6 6l12 12"/>

<path d="M18 6L6 18"/>

</svg>

</button>

</div>

<div class="theme-body">

    <div class="current-theme">

        <img id="currentThemePreview"
             src="themes/default.jpg"
             alt="Theme">

        <div class="current-theme-info">

            <h4 id="currentThemeName">
                Mặc định
            </h4>

            <p>Theme hiện đang sử dụng</p>

        </div>

    </div>
    <hr>

    <h3>Ảnh nền</h3>

    <button id="customTheme"
            class="theme-card custom-card">

        <svg viewBox="0 0 24 24">
            <path d="M12 5v14"/>
            <path d="M5 12h14"/>
        </svg>

        <span>Chọn ảnh từ thiết bị</span>

    </button>
<input 
id="themeUpload"
type="file"
accept="image/*"
hidden>
</div>

<div class="theme-footer">

    <button id="cancelTheme"
            class="gray-btn">

        Hủy

    </button>

    <button id="saveTheme"
            class="btn">

        Áp dụng

    </button>

</div>
</div>

</div>


<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>


<!-- INIT -->
<script type="module" src="firebase-init.js"></script>


<!-- CHAT INFO -->
<script type="module" src="chat-info.js"></script>


</body>
</html>
