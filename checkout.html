<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thanh toán</title>

<style>
body{
  font-family: Arial;
  background:#f5f5f5;
  margin:0;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.box{
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

.title-box{
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  font-size:20px;
  font-weight:bold;
}

.item{
  display:flex;
  gap:10px;
  padding:10px 0;
  border-bottom:1px solid #eee;
}

.item img{
  width:70px;
  height:70px;
  object-fit:contain;
  border-radius:8px;
}

.calc{
  font-size:12px;
  color:#666;
  margin-top:5px;
}

input, textarea, select{
  width:100%;
  padding:10px;
  margin-top:6px;
  margin-bottom:10px;
  border:1px solid #ddd;
  border-radius:8px;
}

.btn{
  width:100%;
  padding:12px;
  background:linear-gradient(90deg,#1e88e5,#00acc1,#43a047);
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}

.total{
  text-align:right;
  font-size:18px;
  font-weight:bold;
  color:#b71c1c;
  margin-top:10px;
}

.back-btn{
  display:inline-block;
  margin-bottom:15px;
  background:#fff;
  color:#00acc1;
  padding:8px 12px;
  border-radius:10px;
  text-decoration:none;
  font-size:13px;
}

#bankInfo{
  display:none;
  margin-top:10px;
  padding:10px;
  border:1px dashed #ccc;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back-btn">← Quay lại</a>

<div class="title-box">💳 Thanh toán đơn hàng</div>
<script src="price-engine.js"></script>
<!-- GIỎ HÀNG -->
<div class="box" id="cartBox"></div>

<!-- THÔNG TIN -->
<div class="box">
  <h3>📦 Thông tin giao hàng</h3>
  <input id="name" placeholder="Họ tên">
  <input id="phone" placeholder="Số điện thoại">
  <textarea id="address" placeholder="Địa chỉ"></textarea>
</div>

<!-- THANH TOÁN -->
<div class="box">
  <h3>💰 Thanh toán</h3>

  <select id="payment">
    <option value="cod">COD</option>
    <option value="bank">Chuyển khoản</option>
  </select>

  <div id="bankInfo">
    <h3>🏦 Vietinbank</h3>
    <p>HOANG ANH SON</p>
    <p>101005245058</p>

    <img id="qr" style="width:100%;max-width:250px;">
  </div>
</div>

<button class="btn" onclick="placeOrder()">🛒 Đặt hàng</button>

</div>

<script src="order.js"></script>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* ===== HIỂN THỊ GIỎ ===== */
function renderCart(){
  const box = document.getElementById("cartBox");
  box.innerHTML = "";

  if(cart.length === 0){
    box.innerHTML = "🛒 Giỏ hàng trống";
    return;
  }

  let total = 0;

  cart.forEach(p=>{
    let qty = p.qty || 1;
    let sub = qty * p.price;
    total += sub;

    box.innerHTML += `
      <div class="item">
        <img src="${p.img}">
        <div>
          <b>${p.name}</b>
          <div class="calc">
            ${qty} × ${p.price.toLocaleString()}đ = ${sub.toLocaleString()}đ
          </div>
        </div>
      </div>
    `;
  });

  box.innerHTML += `
    <div class="total">
      Tổng tiền: ${total.toLocaleString()}đ
    </div>
  `;
}

/* ===== BANK ===== */
document.getElementById("payment").addEventListener("change", updateBank);

function updateBank(){
  let payment = document.getElementById("payment").value;
  let bank = document.getElementById("bankInfo");

  let total = cart.reduce((sum,p)=> sum + p.price*(p.qty||1), 0);

  if(payment === "bank"){
    bank.style.display = "block";
    document.getElementById("qr").src =
      "https://img.vietqr.io/image/ICB-101005245058-compact2.png?amount="
      + total +
      "&addInfo=Thanh%20toan";
  } else {
    bank.style.display = "none";
  }
}

/* ===== ĐẶT HÀNG (ĐÃ FIX) ===== */
function placeOrder(){

  if(cart.length === 0){
    alert("🛒 Giỏ hàng trống!");
    return;
  }

  let name = document.getElementById("name").value.trim();
  let phone = document.getElementById("phone").value.trim();
  let address = document.getElementById("address").value.trim();
  let payment = document.getElementById("payment").value;

  if(!name || !phone || !address){
    alert("⚠️ Nhập đầy đủ thông tin!");
    return;
  }

  let order = {
    id: Date.now(),
    name,
    phone,
    address,
    payment,
    cart,
    time: new Date().toLocaleString()
  };

  // 🔥 FIX QUAN TRỌNG: dùng order.js
  let ok = addOrder(order);

  if(!ok){
    return;
  }

  localStorage.removeItem("cart");

  alert("🎉 Đặt hàng thành công!");

  window.location.href = "success.html";
}

renderCart();
updateBank();
</script>

</body>
</html>
