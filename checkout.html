<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

document.getElementById("phone").addEventListener("input", function(){
  this.value = this.value.replace(/\D/g, "");
});

function renderCart(){
  const box = document.getElementById("cartBox");
  box.innerHTML = "";

  if(cart.length === 0){
    box.innerHTML = "🛒 Giỏ hàng trống";
    return;
  }

  let originalTotal = 0;
  let finalTotal = 0;

  cart.forEach(p=>{
    let qty = p.qty || 1;
    let price = parseFloat(p.price.toString().replace(/,/g,'')) || 0;
    let old = parseFloat(p.oldPrice?.toString().replace(/,/g,'') || price);

    let subFinal = qty * price;
    let subOld = qty * old;

    finalTotal += subFinal;
    originalTotal += subOld;

    box.innerHTML += `
      <div class="item">
        <img src="${p.img}">
        <div>
          <b>${p.name}</b>
          <div class="calc">
            <div class="sale-price">${price.toLocaleString()}đ</div>
            ${old > price ? `<div class="old-price">${old.toLocaleString()}đ</div>` : ""}
            <div>${qty} × ${price.toLocaleString()}đ = ${subFinal.toLocaleString()}đ</div>
          </div>
        </div>
      </div>
    `;
  });

  let discount = originalTotal - finalTotal;

  box.innerHTML += `
    <div class="total-box">
      <div class="row">
        <span>Tổng giá gốc</span>
        <b>${originalTotal.toLocaleString()}đ</b>
      </div>
      <div class="row discount">
        <span>Tiết kiệm</span>
        <b>-${discount.toLocaleString()}đ</b>
      </div>
      <div class="row final">
        <span>Cần thanh toán</span>
        <b>${finalTotal.toLocaleString()}đ</b>
      </div>
    </div>
  `;
}

document.getElementById("payment").addEventListener("change", updateBank);

function updateBank(){
  let payment = document.getElementById("payment").value;
  let bank = document.getElementById("bankInfo");

  let total = cart.reduce((sum,p)=> sum + (parseFloat(p.price.toString().replace(/,/g,''))||0)*(p.qty||1), 0);

  if(payment === "bank"){
    bank.style.display = "block";
    document.getElementById("qr").src =
      "https://img.vietqr.io/image/ICB-101005245058-compact2.png?amount="
      + total +
      "&addInfo=Thanh%20toan";
  } else {
    bank.style.display = "none";
  }
}

function placeOrder(){

  if(cart.length === 0){
    alert("🛒 Giỏ hàng trống!");
    return;
  }

  let name = document.getElementById("name").value.trim();
  let phone = document.getElementById("phone").value.trim();
  let address = document.getElementById("address").value.trim();

  if(!name || !phone || !address){
    alert("⚠️ Nhập đầy đủ thông tin!");
    return;
  }

  const phoneRegex = /^(03|05|07|08|09)\d{8}$/;
  if(!phoneRegex.test(phone)){
    alert("⚠️ SĐT không hợp lệ!");
    return;
  }

  let order = {
    id: Date.now(),
    name,
    phone,
    address,
    cart,
    time: new Date().toLocaleString()
  };

  let orders = JSON.parse(localStorage.getItem("orders")) || [];
  orders.push(order);
  localStorage.setItem("orders", JSON.stringify(orders));

  // ✅ Xóa giỏ hàng để giỏ trống sau khi đặt
  localStorage.removeItem("cart");

  document.getElementById("loading").style.display = "flex";
  document.querySelector(".btn").disabled = true;

  setTimeout(() => {
    window.location.href = "success.html";
  }, 1000);
}

renderCart();
updateBank();
</script>
