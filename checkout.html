<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thanh toán</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  margin:0;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.box{
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

.title-box{
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  font-size:20px;
  font-weight:bold;
}

.item{
  display:flex;
  gap:10px;
  padding:10px 0;
  border-bottom:1px solid #eee;
  align-items:center;
}

.item img{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:8px;
}

.sale-price{
  color:#e53935;
  font-weight:bold;
  font-size:16px;
}

.old-price{
  text-decoration:line-through;
  color:#999;
  font-size:13px;
  margin-left:5px;
}

.total-box{
  margin-top:12px;
  padding-top:10px;
  border-top:1px solid #eee;
}

.total-box .row{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
}

.total-box .final{
  border-top:1px solid #ddd;
  margin-top:8px;
  padding-top:10px;
  font-size:18px;
  font-weight:bold;
}

.total-box .final b{
  color:#e53935;
}

input,
textarea,
select{
  width:100%;
  padding:10px;
  margin-top:6px;
  margin-bottom:10px;
  border:1px solid #ddd;
  border-radius:8px;
  box-sizing:border-box;
}

.btn{
  width:100%;
  padding:12px;
  background:linear-gradient(90deg,#1e88e5,#00acc1,#43a047);
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}

.back-btn{
  display:inline-block;
  margin-bottom:15px;
  background:#fff;
  color:#00acc1;
  padding:8px 12px;
  border-radius:10px;
  text-decoration:none;
  font-size:13px;
}

#bankInfo{
  display:none;
  margin-top:10px;
  padding:10px;
  border:1px dashed #ccc;
  border-radius:8px;
}

#loading{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
  color:#fff;
}

.spinner{
  width:40px;
  height:40px;
  border:4px solid #fff;
  border-top:4px solid transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin-bottom:10px;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

@media (max-width:768px){
  .container{
    max-width:100%;
    padding:10px;
  }
}
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back-btn">
← Quay lại
</a>

<div class="title-box">
💳 Thanh toán đơn hàng
</div>

<!-- CART -->
<div class="box" id="cartBox"></div>

<!-- SHIPPING -->
<div class="box">

  <h3>📦 Thông tin giao hàng</h3>

  <input
    id="name"
    placeholder="Họ tên"
  >

  <input
    id="phone"
    placeholder="Số điện thoại"
    maxlength="10"
  >

  <textarea
    id="address"
    placeholder="Địa chỉ"
  ></textarea>

</div>

<!-- PAYMENT -->
<div class="box">

  <h3>💰 Thanh toán</h3>

  <select id="payment">

    <option value="cod">
      COD
    </option>

    <option value="bank">
      Chuyển khoản
    </option>

  </select>

  <div id="bankInfo">

    <h3>🏦 Vietinbank</h3>

    <p>HOANG ANH SON</p>

    <p>101005245058</p>

    <img
      id="qr"
      style="width:100%;max-width:250px;"
    >

  </div>

</div>

<button
  class="btn"
  onclick="placeOrder()"
>
🛒 Đặt hàng
</button>

</div>

<!-- LOADING -->
<div id="loading">

  <div class="spinner"></div>

  <p>Đang xử lý đơn hàng...</p>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<!-- CHECKOUT JS -->
<script type="module" src="checkout.js"></script>

</body>
</html>
