<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Combo Khuyến mãi - Stech</title>
<link rel="stylesheet" href="stylecombo.css">
<style>
/* ===== RESET ===== */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#f4f7fb;}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;z-index:998;}
#overlay.active{display:block;}
.sidebar{position:fixed;left:-260px;top:0;width:260px;height:100%;background:#fff;padding:20px;transition:0.3s;z-index:999;}
.sidebar.active{left:0;}
.sidebar a{display:block;padding:10px;margin-bottom:5px;border-radius:8px;text-decoration:none;color:#333;font-weight:bold;}
header{display:flex;align-items:center;gap:10px;padding:10px;background:#00acc1;position:sticky;top:0;z-index:1000;}
.menu-btn{width:40px;height:40px;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;}
.logo img{width:40px;height:40px;border-radius:50%;}
header input{flex:1;padding:10px;border:none;border-radius:20px;background:#e0e0e0;}
.header-icons{display:flex;gap:10px;align-items:center;}
.icon-btn{position:relative;cursor:pointer;font-size:20px;color:#fff;}
.cart-count{position:absolute;top:-5px;right:-5px;min-width:18px;height:18px;border-radius:50%;background:red;color:white;font-size:11px;display:flex;align-items:center;justify-content:center;}
.container{max-width:1200px;margin:auto;padding:15px;}
.products{display:flex;flex-wrap:wrap;gap:15px;}
.item{background:#fff;padding:10px;border-radius:12px;width:calc(33.33% - 10px);}
.item img{width:100%;height:150px;object-fit:cover;border-radius:10px;cursor:pointer;}
.item h4{margin:5px 0;font-size:16px;}
.price-box{margin:5px 0;}
.price-new{color:red;font-weight:bold;}
.old-price{text-decoration:line-through;color:#888;margin-left:5px;font-size:14px;}
.discount-text{color:#4caf50;margin-left:5px;font-weight:bold;}
.spec-btn,.cart-btn{width:100%;margin-top:5px;padding:8px;border:none;border-radius:8px;cursor:pointer;}
.spec-btn{background:#00acc1;color:#fff;}
.cart-btn{background:#e53935;color:#fff;}
.spec-box{background:#f1f1f1;padding:8px;margin-top:5px;border-radius:8px;}
.cart{background:#fff;padding:15px;border-radius:12px;margin-top:20px;}
.cart h3{margin-bottom:10px;}
.cart-items div{margin-bottom:8px;}
</style>
</head>
<body>

<div id="overlay" onclick="toggleMenu()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Menu</h3>
  <a href="index.html">Trang chủ</a>
  <a href="cart.html">Giỏ hàng</a>
  <a href="camera-trong-nha.html">Camera trong nhà</a>
  <a href="camera-ngoai-troi.html">Camera ngoài trời</a>
  <a href="the-nho.html">Thẻ nhớ</a>
  <a href="combo-khuyenmai.html">Combo khuyến mãi</a>
</div>

<!-- HEADER -->
<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="logo"><img src="https://i.ibb.co/Z1kv9nJj/logo.png" alt="logo"></div>
  <input id="searchInput" placeholder="Tìm kiếm sản phẩm...">
  <div class="header-icons">
    <div class="icon-btn">🔑</div>
    <div class="icon-btn">🛒<span class="cart-count" id="cartCount">0</span></div>
  </div>
</header>

<div class="container">
  <h2>🎁 Combo Khuyến mãi</h2>
  <div class="products" id="products"></div>

  <div class="cart">
    <h3>🛒 Giỏ hàng</h3>
    <div class="cart-items" id="cartItems"></div>
    <p><b>Tổng tiền:</b> <span id="cartTotal">0</span>đ</p>
    <button onclick="checkout()">Đặt hàng</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDYVcBEYJN1HUCta3XdJAUBe4TGLnmy7y4",
  authDomain: "stech-73b89.firebaseapp.com",
  databaseURL: "https://stech-73b89-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "stech-73b89",
  storageBucket: "stech-73b89.appspot.com",
  messagingSenderId: "873739162979",
  appId: "1:873739162979:web:978f1a4043f025b1cdaf56"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// DOM
const productsEl = document.getElementById("products");
const cartItemsEl = document.getElementById("cartItems");
const cartTotalEl = document.getElementById("cartTotal");
const cartCountEl = document.getElementById("cartCount");

let currentUser = null;
let cartRef = null;

// ================== MENU ==================
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

// ================== AUTH ==================
auth.onAuthStateChanged(user => {
  if(!user){ alert("Bạn cần đăng nhập!"); return; }
  currentUser = user;
  cartRef = db.ref("carts/" + currentUser.uid);

  cartRef.on("value", snapshot => {
    const cart = snapshot.val() || [];
    renderCart(cart);
    updateBadge(cart);
  });
});

// ================== RENDER PRODUCTS ==================
function renderProducts(list){
  productsEl.innerHTML = "";
  if(!list || list.length===0){
    productsEl.innerHTML = "<p>Chưa có sản phẩm</p>";
    return;
  }
  list.forEach(p=>{
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <img src="${p.img||''}" onclick="goDetail('${p.id}')" />
      <h4>${p.name}</h4>
      <div class="price-box">
        <span class="price-new">${Number(p.price).toLocaleString()}đ</span>
      </div>
      <button class="spec-btn" onclick="toggleSpec('${p.id}')">⚙️ Xem thông số</button>
      <button class="cart-btn" onclick="addToCart('${p.id}')">🛒 Thêm vào giỏ</button>
      <div class="spec-box" id="spec-${p.id}" style="display:none;">${p.desc||''}</div>
    `;
    productsEl.appendChild(div);
  });
}

window.toggleSpec = function(id){
  const el = document.getElementById("spec-" + id);
  if(!el) return;
  el.style.display = el.style.display==="block" ? "none":"block";
}

window.goDetail = function(id){
  window.location.href = `logo.html?id=${id}`;
}

// ================== ADD TO CART ==================
window.addToCart = function(id){
  if(!currentUser) return alert("Bạn cần đăng nhập!");
  // Lấy sản phẩm từ localStorage
  const product = JSON.parse(localStorage.getItem("products") || "[]").find(p=>p.id===id);
  if(!product) return;

  cartRef.once("value").then(snapshot=>{
    let cart = snapshot.val() || [];
    const index = cart.findIndex(item=>item.id===id);
    if(index!==-1) cart[index].quantity = (cart[index].quantity||1)+1;
    else cart.push({id:product.id,name:product.name,price:product.price,img:product.img,quantity:1});
    cartRef.set(cart);
  });
}

// ================== RENDER CART ==================
function renderCart(cart){
  cartItemsEl.innerHTML = "";
  if(!cart || cart.length===0){
    cartItemsEl.innerHTML = "<p>Giỏ hàng trống 🛒</p>";
    cartTotalEl.innerText = 0;
    return;
  }
  let total=0;
  cart.forEach(item=>{
    const qty = item.quantity || 1;
    total += item.price*qty;
    const div = document.createElement("div");
    div.innerText = `${item.name} - ${item.price.toLocaleString()}đ x ${qty}`;
    cartItemsEl.appendChild(div);
  });
  cartTotalEl.innerText = total.toLocaleString();
}

// ================== BADGE ==================
function updateBadge(cart){
  if(!cartCountEl) return;
  let count = cart.reduce((sum,item)=>sum+(item.quantity||1),0);
  cartCountEl.innerText = count;
}

// ================== CHECKOUT ==================
function checkout(){
  if(!currentUser) return alert("Bạn cần đăng nhập!");
  cartRef.once("value").then(snapshot=>{
    const cart = snapshot.val()||[];
    if(cart.length===0) return alert("Giỏ hàng trống!");
    const ordersRef = db.ref("orders/"+currentUser.uid);
    const orderKey = ordersRef.push().key;
    ordersRef.child(orderKey).set({
      items: cart,
      status: "Đang xử lý",
      createdAt: new Date().toISOString()
    }).then(()=>{
      cartRef.remove();
      alert("Đặt hàng thành công!");
    });
  });
}

// ================== INIT ==================
document.addEventListener("DOMContentLoaded", ()=>{
  const data = JSON.parse(localStorage.getItem("products") || "[]");
  renderProducts(data);
});
</script>
</body>
</html>
