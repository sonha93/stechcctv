<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Camera Pro</title>

<link rel="stylesheet" href="styletrong-nha.css">

<style>

/* ================== GIỮ NGUYÊN CSS CỦA BẠN ================== */

/* LOGO KHÔNG VIỀN */
.logo img{
  height:38px;
  width:auto;
  border:0;
  outline:0;
  box-shadow:none;
  display:block;
  background:transparent;
}

/* POPUP LOGIN/REGISTER */
#authModal{
  position:fixed;
  top:0; left:0; right:0; bottom:0;
  display:none;
  background:rgba(0,0,0,0.6);
  align-items:center;
  justify-content:center;
  z-index:9999;
}
#authModal .auth-content{
  background:#fff;
  padding:20px;
  border-radius:8px;
  max-width:350px;
  width:90%;
}
#authModal h2{
  text-align:center;
  margin-bottom:10px;
}
#authModal input{
  width:100%;
  padding:8px;
  margin:6px 0;
  border-radius:4px;
  border:1px solid #aaa;
}
#authModal button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  background:#007BFF;
  color:white;
  font-weight:bold;
  cursor:pointer;
  border-radius:4px;
}
#authModal #closeAuth{
  background:#f44336;
  margin-top:5px;
}
#authModal #authMessage{
  text-align:center;
  margin-top:8px;
  color:red;
}

/* SIDEBAR USER INFO */
#userInfoPreview{
  display:none;
  margin-top:10px;
  text-align:center;
  cursor:pointer;
}
#userInfoPreview img{
  width:40px; height:40px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:5px;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  z-index: 1000;
}

/* 2 CỘT SẢN PHẨM */
#products{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}

.product-card{
  background:#fff;
  border:1px solid #ccc;
  border-radius:8px;
  overflow:hidden;
  text-align:center;
  padding:0px;
}

.product-card img{
  width:100%;
  height:auto;
  border-bottom:1px solid #ccc;
  border-radius:4px;
  object-fit:cover;
}

@media(min-width:1200px){
  #products{
    grid-template-columns:repeat(4,1fr);
  }
}

.product-card .product-info{
  margin-top:8px;
}

.discount-text{
  position:absolute;
  top:3px;
  left:0px;
  font-size:11px;
  padding:2px 5px;
  background:red;
  color:white;
  border-radius:6px;
  z-index:10;
}

.item{
  position:relative;
}

/* NÚT XEM THÊM */
#loadMoreBtn{
  display:block;
  margin:20px auto;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#111;
  color:#fff;
  cursor:pointer;
}

/* ================== CHỈ THÊM HEADER (KHÔNG ĐỤNG CODE CŨ) ================== */

header{
  position:sticky;
  top:0;
  z-index:999;
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  background:#33A0AB;
}

.menu-btn{
  font-size:22px;
  cursor:pointer;
  width:40px;
  text-align:center;
}

.logo{
  display:flex;
  align-items:center;
}

#search{
  flex:1;
  height:40px;
  border:none;
  border-radius:12px;
  padding:0 12px;
  outline:none;
}

/* overlay riêng cho menu (KHÔNG đụng auth overlay) */
#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  opacity:0;
  visibility:hidden;
  transition:.3s;
  z-index:9998;
}

#overlay.active{
  opacity:1;
  visibility:visible;
}

</style>
</head>

<body>

<!-- OVERLAY MENU (KHÔNG ĐỤNG AUTH MODAL) -->
<div id="overlay" onclick="toggleMenu()"></div>

<!-- MENU / SIDEBAR (GIỮ NGUYÊN 100%) -->
<div class="sidebar" id="sidebar">
  <h3>Danh mục</h3>

  <a href="index.html">Trang chủ</a>
  <a href="cart.html">Giỏ hàng</a>
  <a href="camera-trong-nha.html">Camera trong nhà</a>
  <a href="camera-ngoai-troi.html">Camera ngoài trời</a>
  <a href="the-nho.html">Thẻ nhớ</a>
  <a href="combo-khuyenmai.html">Combo khuyến mãi</a>
</div>

<!-- HEADER (CHỈ THÊM STYLE, KHÔNG XOÁ HTML CŨ) -->
<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>

  <div class="logo">
    <img src="https://i.ibb.co/Z1kv9nJj/logo.png" alt="logo">
  </div>

  <input id="search" placeholder="Tìm kiếm sản phẩm...">
</header>

<!-- ================== GIỮ NGUYÊN CONTENT 100% ================== -->
<div class="container">

  <div class="products" id="products"></div>

  <button id="loadMoreBtn"></button>

  <div class="cart">
    <h3>🛒 Giỏ hàng</h3>
    <div id="cart"></div>
    <hr>
    <p><b>Tổng tiền:</b> <span id="total">0</span>đ</p>
    <button onclick="clearCart()">Xoá giỏ hàng</button>
  </div>

</div>

<!-- SCRIPT GIỮ NGUYÊN -->
<script type="module" src="combo-khuyenmai.js"></script>

<script>
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}
</script>

</body>
</html>
