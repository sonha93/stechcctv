<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Chi tiết sản phẩm</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f5f5f5;
color:#111;
overflow-x:hidden;
}

/* HEADER */
header{
position:sticky;
top:0;
z-index:999;
display:flex;
align-items:center;
gap:10px;
padding:12px;
background:#33A0AB;
}

.menu-btn,
.icon-btn{
width:46px;
height:46px;
border:none;
border-radius:14px;
background:#00acc1;
color:#fff;
font-size:22px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
text-decoration:none;
position:relative;
}

.admin-btn{
background:#6a5acd;
}

.logo{
width:46px;
height:46px;
border-radius:14px;
overflow:hidden;
background:#fff;
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

.search-box{
flex:1;
position:relative;
}

.search-box input{
width:100%;
height:46px;
border:none;
border-radius:14px;
padding:0 14px;
font-size:14px;
outline:none;
}

.cart-count{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:#fff;
font-size:11px;
min-width:20px;
height:20px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
left:-280px;
width:260px;
height:100vh;
background:#fff;
z-index:9999;
transition:.3s;
padding:20px;
}

.sidebar.active{
left:0;
}

.sidebar a{
display:block;
padding:14px;
margin-bottom:10px;
background:#f5f5f5;
border-radius:12px;
text-decoration:none;
color:#111;
font-weight:bold;
}

#overlay,
#panelOverlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
opacity:0;
visibility:hidden;
transition:.3s;
z-index:9998;
}

#overlay.active,
#panelOverlay.active{
opacity:1;
visibility:visible;
}

/* DETAIL */
.container{
display:flex;
gap:20px;
max-width:1000px;
margin:20px auto;
padding:10px;
align-items:flex-start;
}

.left{
width:220px;
}

.left img{
width:100%;
border-radius:16px;
background:#fff;
}

.right{
flex:1;
display:flex;
flex-direction:column;
gap:10px;
}

.product-name{
font-size:24px;
font-weight:800;
}

.price{
font-size:26px;
font-weight:bold;
color:red;
}

.old-price{
text-decoration:line-through;
color:#666;
}

.sale{
background:red;
color:#fff;
padding:4px 8px;
border-radius:8px;
display:inline-block;
}

.action-wrap{
display:flex;
flex-direction:column;
gap:10px;
}

.buy-btn,
.spec-open-btn{
height:45px;
border:none;
border-radius:12px;
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.buy-btn{
background:#111;
}

.spec-open-btn{
background:#00acc1;
}

.desc{
background:#fff;
padding:14px;
border-radius:12px;
line-height:1.6;
}

/* PANEL */
#specPanel{
position:fixed;
top:0;
right:-100%;
width:600px;
max-width:100%;
height:100vh;
background:#fff;
z-index:9999;
transition:.3s;
overflow-y:auto;
}

#specPanel.active{
right:0;
}

.panel-top{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
border-bottom:1px solid #eee;
}

.close-panel{
width:40px;
height:40px;
border:none;
border-radius:10px;
font-size:20px;
cursor:pointer;
}

.spec-tabs{
display:flex;
border-bottom:1px solid #eee;
}

.spec-tab{
flex:1;
padding:14px;
border:none;
background:#fff;
font-weight:bold;
cursor:pointer;
}

.spec-tab.active{
border-bottom:3px solid red;
color:red;
}

.panel-body{
padding:15px;
}

.spec-content{
display:none;
}

.spec-content.active{
display:block;
}

.spec-row{
display:flex;
padding:10px 0;
border-bottom:1px solid #eee;
}

.spec-label{
width:130px;
color:#666;
}

.search-results{
position:absolute;
width:100%;
background:#fff;
border-radius:12px;
overflow:hidden;
z-index:999;
margin-top:5px;
}

.search-result-item{
display:flex;
gap:10px;
padding:10px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.search-result-item img{
width:50px;
height:50px;
object-fit:cover;
border-radius:8px;
}
</style>
</head>

<body>

<div id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
<h3>Danh mục</h3>

<a href="index.html">Trang chủ</a>
<a href="camera-trong-nha.html">Camera trong nhà</a>
<a href="camera-ngoai-troi.html">Camera ngoài trời</a>
</div>

<header>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="logo">
<img src="https://i.ibb.co/Z1kv9nJj/logo.png">
</div>

<div class="search-box">
<input
id="searchInput"
type="text"
placeholder="Tìm kiếm sản phẩm..."
oninput="searchProduct()"
>

<div id="searchResults" class="search-results"></div>
</div>

<div style="display:flex;gap:10px;">

<a href="admin.html" class="icon-btn admin-btn">
🔐
</a>

<a href="cart.html" class="icon-btn">
🛒
<span class="cart-count" id="cartCount">0</span>
</a>

</div>

</header>

<div class="container">

<div class="left">
<img id="detailImg">
</div>

<div class="right">

<div class="product-name" id="detailName"></div>

<div class="price" id="detailPrice"></div>

<div class="old-price" id="detailOldPrice"></div>

<div class="sale" id="detailSale"></div>

<div class="action-wrap">

<button class="spec-open-btn" onclick="openPanel()">
⚙️ Xem thông số
</button>

<button class="buy-btn" onclick="addToCart()">
🛒 Thêm giỏ hàng
</button>

</div>

<div class="desc" id="detailDesc"></div>

</div>

</div>

<div id="panelOverlay" onclick="closePanel()"></div>

<div id="specPanel">

<div class="panel-top">

<h3>Thông số sản phẩm</h3>

<button class="close-panel" onclick="closePanel()">
✕
</button>

</div>

<div class="spec-tabs">

<button
class="spec-tab active"
onclick="showTab('infoTab',this)">
Thông tin
</button>

<button
class="spec-tab"
onclick="showTab('configTab',this)">
Cấu hình
</button>

</div>

<div class="panel-body">

<div class="spec-content active" id="infoTab">

<div class="spec-row">
<div class="spec-label">Model</div>
<div id="detailModel"></div>
</div>

<div class="spec-row">
<div class="spec-label">Xuất xứ</div>
<div id="detailOrigin"></div>
</div>

</div>

<div class="spec-content" id="configTab">

<div class="spec-row">
<div class="spec-label">Độ phân giải</div>
<div id="detailResolution"></div>
</div>

<div class="spec-row">
<div class="spec-label">Kết nối</div>
<div id="detailConnect"></div>
</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyDYVcBEYJN1HUCta3XdJAUBe4TGLnmy7y4",
authDomain:"stech-73b89.firebaseapp.com",
projectId:"stech-73b89",
storageBucket:"stech-73b89.firebasestorage.app",
messagingSenderId:"873739162979",
appId:"1:873739162979:web:978f1a4043f025b1cdaf56"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const id =
new URLSearchParams(location.search).get("id");

let products = [];
let product = null;

async function loadProduct(){

const querySnapshot =
await getDocs(collection(db,"products"));

querySnapshot.forEach(doc=>{

const data = doc.data();

if(!data.id){
data.id = doc.id;
}

products.push(data);

});

product = products.find(
p => String(p.id) === String(id)
);

if(!product){
detailName.innerText =
"Không tìm thấy sản phẩm";
return;
}

detailImg.src =
product.img || "";

detailName.innerText =
product.name || "";

detailPrice.innerText =
Number(product.price || 0)
.toLocaleString() + "đ";

detailOldPrice.innerText =
product.oldPrice
? Number(product.oldPrice)
.toLocaleString() + "đ"
: "";

detailSale.innerText =
product.sale || "";

detailDesc.innerText =
product.desc || "";

detailModel.innerText =
product.model || "";

detailOrigin.innerText =
product.xuatXu || "";

detailResolution.innerText =
product.doPhanGiai || "";

detailConnect.innerText =
product.ketNoi || "";

}

loadProduct();

/* CART */
function addToCart(){

if(!product) return;

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

const exist =
cart.find(x => x.id == product.id);

if(exist){

exist.qty += 1;

}else{

cart.push({
...product,
qty:1
});

}

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

updateCartCount();

alert("Đã thêm vào giỏ");

}

function updateCartCount(){

const cart =
JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;

cart.forEach(item=>{

total += item.qty || 1;

});

cartCount.innerText = total;

}

updateCartCount();

/* MENU */
function toggleMenu(){

sidebar.classList.toggle("active");
overlay.classList.toggle("active");

}

/* PANEL */
function openPanel(){

specPanel.classList.add("active");
panelOverlay.classList.add("active");

}

function closePanel(){

specPanel.classList.remove("active");
panelOverlay.classList.remove("active");

}

function showTab(id,btn){

document
.querySelectorAll(".spec-content")
.forEach(el=>el.classList.remove("active"));

document
.querySelectorAll(".spec-tab")
.forEach(el=>el.classList.remove("active"));

document
.getElementById(id)
.classList.add("active");

btn.classList.add("active");

}

/* SEARCH */
function searchProduct(){

const term =
searchInput.value.toLowerCase();

searchResults.innerHTML = "";

if(term === "") return;

const filtered =
products.filter(
p =>
p.name &&
p.name.toLowerCase().includes(term)
);

filtered.forEach(p=>{

const div =
document.createElement("div");

div.className =
"search-result-item";

div.innerHTML = `
<img src="${p.img}">
<div>
<strong>${p.name}</strong>
<div style="color:red;">
${Number(p.price).toLocaleString()}đ
</div>
</div>
`;

div.onclick = ()=>{

window.location.href =
`detail.html?id=${p.id}`;

};

searchResults.appendChild(div);

});

}

/* EXPORT */
window.toggleMenu = toggleMenu;
window.openPanel = openPanel;
window.closePanel = closePanel;
window.showTab = showTab;
window.addToCart = addToCart;
window.searchProduct = searchProduct;

</script>

</body>
</html>
