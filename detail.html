<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi tiết sản phẩm</title>
<!-- CSS chung -->
<link rel="stylesheet" href="styletrong-nha.css">
</head>
<body>

<!-- MENU OVERLAY -->
<div id="overlay" onclick="toggleMenu()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Danh mục</h3>
  <a href="index.html">Trang chủ</a>
  <a href="camera-trong-nha.html">Camera trong nhà</a>
  <a href="camera-ngoai-troi.html">Camera ngoài trời</a>
</div>

<!-- HEADER -->
<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="logo"><img src="https://i.ibb.co/Z1kv9nJj/logo.png" alt="Logo"></div>
  <div class="header-icons">
    <a href="admin.html" class="icon-btn admin-btn">🔐</a>
    <a href="cart.html" class="icon-btn">🛒<span class="cart-count" id="cartCount">0</span></a>
  </div>
</header>

<!-- CONTENT -->
<div class="container">
  <!-- Hình ảnh -->
  <div class="left">
    <img id="detailImg" src="" alt="Hình sản phẩm">
  </div>

  <!-- Thông tin sản phẩm -->
  <div class="right">
    <div class="product-name" id="detailName"></div>
    <div class="price-row">
      <div class="price" id="detailPrice"></div>
      <div class="old-price" id="detailOldPrice"></div>
      <div class="sale" id="detailSale"></div>
    </div>
    <div class="action-wrap">
      <button class="spec-open-btn" onclick="openPanel()">⚙️ Xem thông số</button>
      <button class="buy-btn" onclick="addToCart()">🛒 Thêm giỏ hàng</button>
    </div>
    <div class="desc" id="detailDesc"></div>
  </div>
</div>

<div id="panelOverlay" onclick="closePanel()"></div>

<!-- PANEL THÔNG SỐ -->
<div id="specPanel">
  <div class="panel-top">
    <div class="panel-product">
      <img id="panelProductImg" src="" alt="Hình sản phẩm">
      <div class="panel-product-info"><h3 id="panelProductName"></h3></div>
    </div>
    <button class="close-panel" onclick="closePanel()">✕</button>
  </div>

  <!-- TAB -->
  <div class="spec-tabs">
    <button class="spec-tab active" onclick="showTab('infoTab', this)">Thông tin</button>
    <button class="spec-tab" onclick="showTab('designTab', this)">Thiết kế</button>
    <button class="spec-tab" onclick="showTab('basicTab', this)">Cấu hình</button>
  </div>

  <!-- BODY -->
  <div class="panel-body">
    <div class="spec-content active" id="infoTab">
      <div class="spec-group-title">Thông tin hàng hóa</div>
      <div class="spec-row"><div class="spec-label">Model</div><div class="spec-value" id="detailModel"></div></div>
      <div class="spec-row"><div class="spec-label">Xuất xứ</div><div class="spec-value" id="detailOrigin"></div></div>
      <div class="spec-row"><div class="spec-label">Bảo hành</div><div class="spec-value" id="detailBaoHanh"></div></div>
    </div>
    <div class="spec-content" id="designTab">
      <div class="spec-group-title">Thiết kế</div>
      <div class="spec-row"><div class="spec-label">Chất liệu</div><div class="spec-value" id="detailMaterial"></div></div>
      <div class="spec-row"><div class="spec-label">Thiết kế</div><div class="spec-value" id="detailDesign"></div></div>
      <div class="spec-row"><div class="spec-label">Kích thước</div><div class="spec-value" id="detailSize"></div></div>
    </div>
    <div class="spec-content" id="basicTab">
      <div class="spec-group-title">Thông số cơ bản</div>
      <div class="spec-row"><div class="spec-label">Độ phân giải</div><div class="spec-value" id="detailResolution"></div></div>
      <div class="spec-row"><div class="spec-label">Kết nối</div><div class="spec-value" id="detailConnect"></div></div>
      <div class="spec-row"><div class="spec-label">Góc nhìn</div><div class="spec-value" id="detailView"></div></div>
    </div>
  </div>
</div>

<!-- JS -->
<script src="app.js"></script> <!-- app.js chứa products.js -->
<script src="loadProducts.js"></script> <!-- loadProducts.js để load sản phẩm vào index -->

<script>
// ===== MENU + PANEL =====
function toggleMenu() { document.getElementById("sidebar").classList.toggle("active"); document.getElementById("overlay").classList.toggle("active"); }
function openPanel() { document.getElementById("specPanel").classList.add("active"); document.getElementById("panelOverlay").classList.add("active"); }
function closePanel() { document.getElementById("specPanel").classList.remove("active"); document.getElementById("panelOverlay").classList.remove("active"); }
function showTab(tabId, btn) { document.querySelectorAll(".spec-content").forEach(t => t.classList.remove("active")); document.querySelectorAll(".spec-tab").forEach(t => t.classList.remove("active")); document.getElementById(tabId).classList.add("active"); btn.classList.add("active"); }

// ===== GET PRODUCT =====
const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const products = JSON.parse(localStorage.getItem("products")) || [];
const product = products.find(p => String(p.id) === String(id));

if (product) {
  document.getElementById("detailImg").src = product.img;
  document.getElementById("panelProductImg").src = product.img;
  document.getElementById("detailName").innerText = product.name;
  document.getElementById("panelProductName").innerText = product.name;
  document.getElementById("detailPrice").innerText = Number(product.price).toLocaleString()+"đ";
  document.getElementById("detailOldPrice").innerText = product.oldPrice ? Number(product.oldPrice).toLocaleString()+"đ" : "";
  document.getElementById("detailDesc").innerText = product.desc || "";
  document.getElementById("detailModel").innerText = product.model || "Đang cập nhật";
  document.getElementById("detailOrigin").innerText = product.xuatXu || "Đang cập nhật";
  document.getElementById("detailBaoHanh").innerText = product.baoHanh || "Đang cập nhật";
  document.getElementById("detailMaterial").innerText = product.chatLieu || "Đang cập nhật";
  document.getElementById("detailDesign").innerText = product.thietKe || "Đang cập nhật";
  document.getElementById("detailSize").innerText = product.kichThuoc || "Đang cập nhật";
  document.getElementById("detailResolution").innerText = product.doPhanGiai || "Đang cập nhật";
  document.getElementById("detailConnect").innerText = product.ketNoi || "Đang cập nhật";
  document.getElementById("detailView").innerText = product.gocNhin || "Đang cập nhật";
} else {
  document.body.innerHTML = "<h2>Sản phẩm không tồn tại</h2>";
}

// ===== CART =====
function addToCart() {
  if (!product) return;
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  const exist = cart.find(x => String(x.id) === String(product.id));
  if (exist) { exist.qty += 1; } else { cart.push({ ...product, qty: 1 }); }
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartCount();
  alert("Đã thêm vào giỏ 🛒");
}

function updateCartCount() {
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  let total = 0;
  cart.forEach(item => total += item.qty || 1);
  document.getElementById("cartCount").innerText = total;
}
updateCartCount();
</script>

</body>
</html>
