<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tìm sản phẩm theo ID</title>
<style>
  body { font-family: Arial; padding: 20px; }
  input { padding: 8px; width: 250px; margin-right: 10px; }
  #productInfo img { max-width: 200px; display: block; margin-top: 10px; }
  #notFound { color: red; margin-top: 10px; }
</style>
</head>
<body>

<h2>Nhập ID ảnh để xem thông tin sản phẩm</h2>
<input type="text" id="inputID" placeholder="Nhập mã ID ảnh">
<div id="productInfo">
  <h3 id="productName"></h3>
  <p id="productPrice"></p>
  <img id="productImg" />
  <p id="productDesc"></p>
</div>
<div id="notFound"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// ==========================
// Cấu hình Firebase của bạn
// ==========================
const firebaseConfig = {
  apiKey: "AIzaSyDYVcBEYJN1HUCta3XdJAUBe4TGLnmy7y4",
  authDomain: "stech-73b89.firebaseapp.com",
  databaseURL: "https://stech-73b89-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "stech-73b89",
  storageBucket: "stech-73b89.appspot.com",
  messagingSenderId: "873739162979",
  appId: "1:873739162979:web:978f1a4043f025b1cdaf56"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const input = document.getElementById('inputID');
const productName = document.getElementById('productName');
const productPrice = document.getElementById('productPrice');
const productImg = document.getElementById('productImg');
const productDesc = document.getElementById('productDesc');
const notFound = document.getElementById('notFound');

// ==========================
// Hàm hiển thị sản phẩm
// ==========================
async function showProductByID(id) {
  if(!id) {
    productName.textContent = '';
    productPrice.textContent = '';
    productImg.src = '';
    productDesc.textContent = '';
    notFound.textContent = '';
    return;
  }

  try {
    const dbRef = ref(db);
    const snapshot = await get(child(dbRef, `products/${id}`));
    if(snapshot.exists()) {
      const product = snapshot.val();
      productName.textContent = product.name;
      productPrice.textContent = 'Giá: ' + product.price;
      productImg.src = product.imgUrl;
      productDesc.textContent = product.description;
      notFound.textContent = '';
    } else {
      productName.textContent = '';
      productPrice.textContent = '';
      productImg.src = '';
      productDesc.textContent = '';
      notFound.textContent = 'Không tìm thấy sản phẩm với ID này!';
    }
  } catch(error) {
    console.error(error);
    notFound.textContent = 'Lỗi khi truy vấn sản phẩm!';
  }
}

// ==========================
// Lắng nghe khi người dùng gõ ID
// ==========================
input.addEventListener('input', () => {
  const id = input.value.trim();
  showProductByID(id);
});

</script>
</body>
</html>
