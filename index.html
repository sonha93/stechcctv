<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Camera Pro</title>
<style>
/* RESET */
* { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
body { background:#f5f5f5; }

/* HEADER */
header {
  display:flex;
  align-items:center;
  padding:8px 10px;
  background:#33A0AB; /* nền đồng màu */
  gap:8px;
  position:sticky;
  top:0;
  z-index:999;
}

/* MENU ICON */
.menu-btn {
  width:40px; height:40px;
  border-radius:12px;
  background:#00acc1;
  color:white;
  display:flex; align-items:center; justify-content:center;
  font-size:20px;
  cursor:pointer;
  flex-shrink:0;
}

/* LOGO */
.logo {
  width:40px; height:40px;
  border-radius:12px;
  overflow:hidden;
  background:#fff;
  display:flex; align-items:center; justify-content:center;
}
.logo img {
  width:100%; height:100%; object-fit:contain;
}

/* SEARCH BOX */
.search-box {
  flex:1; position:relative;
}
.search-box input {
  width:100%; height:40px;
  border-radius:12px;
  border:none;
  padding:0 12px;
  font-size:14px;
  outline:none;
}

/* HEADER ICONS */
.header-icons {
  display:flex;
  gap:8px; /* tách icon ra */
  margin-left:auto;
}
.icon-btn {
  width:40px; height:40px;
  border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  background:#00acc1;
  color:white;
  font-size:18px;
  cursor:pointer;
  position:relative;
}
.cart-count {
  position:absolute;
  top:-5px; right:-5px;
  min-width:18px; height:18px;
  border-radius:50%;
  background:red; color:white;
  font-size:11px; font-weight:bold;
  display:flex; align-items:center; justify-content:center;
}

/* SIDEBAR */
.sidebar {
  position:fixed; top:0; left:-280px;
  width:260px; height:100vh;
  background:#fff;
  z-index:9999; transition:.3s;
  padding:20px; box-shadow:0 0 20px rgba(0,0,0,.15);
}
.sidebar.active { left:0; }
.sidebar h3 { margin-bottom:20px; color:#00acc1; }
.sidebar a { display:block; padding:14px; margin-bottom:10px; border-radius:12px; background:#f5f5f5; text-decoration:none; color:#111; font-weight:bold; }

/* OVERLAY */
#overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.45);
  z-index:9998; opacity:0; visibility:hidden;
  transition:.3s;
}
#overlay.active { opacity:1; visibility:visible; }

/* MOBILE */
@media(max-width:768px){
  .search-box input { font-size:13px; height:36px; }
  .logo, .menu-btn, .icon-btn { width:36px; height:36px; }
  .header-icons { gap:6px; }
}
</style>
</head>
<body>

<!-- OVERLAY -->
<div id="overlay" onclick="toggleMenu()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Danh mục</h3>
  <a href="index.html">Trang chủ</a>
  <a href="cart.html">Giỏ Hàng</a>
  <a href="camera-trong-nha.html">Camera Trong Nhà</a>
  <a href="camera-ngoai-troi.html">Camera Ngoài Trời</a>
  <a href="the-nho.html">Thẻ Nhớ</a>
  <a href="combo-khuyenmai.html">Combo Khuyến Mãi</a>
</div>

<!-- HEADER -->
<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="logo"><img src="https://i.ibb.co/Z1kv9nJj/logo.png" alt="logo"></div>
  <div class="search-box">
    <input type="text" placeholder="Tìm kiếm sản phẩm..." id="searchInput">
  </div>
  <div class="header-icons">
    <a href="cart.html" class="icon-btn">🛒<span class="cart-count" id="cartCount">0</span></a>
    <a href="#" class="icon-btn" onclick="openLoginModal()">🔐</a>
  </div>
</header>

<script>
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}
function openLoginModal(){ alert("Mở popup đăng nhập"); }
</script>
<script src="app.js"></script>
<div id="productContainer" class="product-grid"></div>
<script src="notify.js"></script>
<script src="banner.js"></script>
</body>
</html>
