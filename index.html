<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Camera Pro</title>
<link rel="stylesheet" href="styletrong-nha.css">

<style>

/* =========================
   HEADER STYLE (MỚI GHÉP)
========================= */

header{
  position:sticky;
  top:0;
  z-index:999;
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px;
  background:#33A0AB;
}

.menu-btn{
  width:44px;
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#00acc1;
  color:#fff;
  border-radius:10px;
  font-size:22px;
  cursor:pointer;
}

.logo img{
  height:38px;
  width:auto;
  display:block;
}

.search-box{
  flex:1;
  position:relative;
}

.search-box input{
  width:100%;
  height:44px;
  border:none;
  border-radius:10px;
  padding:0 10px;
  outline:none;
}

.icon-group{
  display:flex;
  gap:8px;
  align-items:center;
}

.icon-btn{
  width:44px;
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  background:#00acc1;
  color:#fff;
  text-decoration:none;
  position:relative;
}

.admin-btn{
  background:#6a5acd;
}

.cart-count{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:#fff;
  width:18px;
  height:18px;
  border-radius:50%;
  font-size:11px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* SEARCH DROPDOWN */
.search-results{
  position:absolute;
  top:46px;
  width:100%;
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  z-index:9999;
}

.search-result-item{
  display:flex;
  gap:8px;
  padding:8px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.search-result-item img{
  width:45px;
  height:45px;
  object-fit:cover;
  border-radius:6px;
}

/* =========================
   SIDEBAR FIX
========================= */

.sidebar {
  position: fixed;
  z-index: 1000;
  left:-260px;
  top:0;
  width:240px;
  height:100vh;
  background:#fff;
  transition:.3s;
  padding:15px;
}

.sidebar.active{
  left:0;
}

#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  opacity:0;
  visibility:hidden;
  transition:.3s;
  z-index:999;
}

#overlay.active{
  opacity:1;
  visibility:visible;
}

/* =========================
   PRODUCTS (GIỮ NGUYÊN)
========================= */

#products{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}

@media(min-width:1200px){
  #products{
    grid-template-columns:repeat(4,1fr);
  }
}

.product-card{
  background:#fff;
  border:1px solid #ccc;
  border-radius:8px;
  overflow:hidden;
  text-align:center;
}

</style>
</head>

<body>

<!-- OVERLAY -->
<div id="overlay" onclick="toggleMenu()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Danh mục</h3>
  <a href="index.html">Trang chủ</a>
  <a href="admin-panel.html">Admin</a>
  <a href="profile.html">Thông Tin</a>
  <a href="cart.html">Giỏ hàng</a>
  <a href="camera-trong-nha.html">Camera trong nhà</a>
  <a href="camera-ngoai-troi.html">Camera ngoài trời</a>
</div>

<!-- HEADER -->
<header>

  <!-- MENU -->
  <div class="menu-btn" onclick="toggleMenu()">☰</div>

  <!-- LOGO -->
  <div class="logo">
    <img src="https://i.ibb.co/Z1kv9nJj/logo.png">
  </div>

  <!-- SEARCH -->
  <div class="search-box">
    <input id="search" placeholder="Tìm kiếm sản phẩm..." oninput="searchProduct()">
    <div id="searchResults" class="search-results"></div>
  </div>

  <!-- ICON -->
  <div class="icon-group">

    <a href="admin-panel.html" class="icon-btn admin-btn">🔐</a>

    <a href="cart.html" class="icon-btn">
      🛒
      <span class="cart-count" id="cartCount">0</span>
    </a>

  </div>

</header>

<!-- CONTENT -->
<div class="product-slider">
  <div class="product-track" id="products"></div>
</div>

<button id="loadMoreBtn"></button>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-container">
    <h3>StechCamera</h3>
    <p>Website chuyên cung cấp camera an ninh chính hãng</p>
  </div>
</footer>

<!-- LOGIN MODAL GIỮ NGUYÊN -->
<div id="authModal">
  <div class="auth-content">
    <h2>Đăng ký / Đăng nhập</h2>
    <input type="email" id="authEmail" placeholder="Email">
    <input type="password" id="authPassword" placeholder="Mật khẩu">
    <button id="authRegisterBtn">Đăng ký</button>
    <button id="authLoginBtn">Đăng nhập</button>
    <button id="closeAuth">Đóng</button>
    <p id="authMessage"></p>
  </div>
</div>

<script>
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}
</script>

<script type="module" src="user.js"></script>
<script type="module" src="auth.js"></script>
<script type="module" src="home.js"></script>
<script src="banner.js"></script>

</body>
</html>
