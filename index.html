<!-- ZOOM (GIỮ 1 BẢN DUY NHẤT) -->
<div id="imgZoom" onclick="closeZoom()">
  <img id="zoomImg">
</div>

<style>
#imgZoom{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

#imgZoom img{
  max-width:90%;
  max-height:90%;
  transform:scale(1);
  transition:0.2s;
  cursor:zoom-in;
}
</style>

<script>
let zoomLevel = 1;

function openZoom(src){
  const box = document.getElementById("imgZoom");
  const img = document.getElementById("zoomImg");

  img.src = src;
  box.style.display = "flex";

  zoomLevel = 1;
  img.style.transform = "scale(1)";
}

function closeZoom(){
  document.getElementById("imgZoom").style.display = "none";
}

document.getElementById("zoomImg").addEventListener("click", function(e){
  e.stopPropagation();

  zoomLevel += 0.3;
  if(zoomLevel > 2.5) zoomLevel = 1;

  this.style.transform = `scale(${zoomLevel})`;
});
</script>
