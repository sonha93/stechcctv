<style>
/* Product list & Load More */
.product-track{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  max-height:720px;
  overflow-y:auto;
}

.product-card{
  background:#fff;
  border-radius:8px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  height:350px;
  position:relative;
}

.product-card img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:4px;
  border-bottom:1px solid #ccc;
}

.product-info{
  padding:10px;
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.product-name{
  font-weight:bold;
  font-size:16px;
  color:#111;
}

.price{
  color:red;
  font-weight:bold;
  font-size:20px;
}

.old-price{
  color:#777;
  text-decoration:line-through;
  font-size:14px;
  margin-top:3px;
}

.discount-text{
  position:absolute;
  top:8px;
  left:8px;
  background:red;
  color:#fff;
  padding:3px 6px;
  font-size:12px;
  border-radius:6px;
  z-index:10;
}

#loadMoreBtn{
  display:block;
  margin:20px auto;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#111;
  color:#fff;
  cursor:pointer;
}
</style>

<script type="module">
import { app } from "./auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const db = getFirestore(app);
let products = [];
let currentIndex = 0;
const pageSize = 5;

async function loadProducts(){
  const querySnapshot = await getDocs(collection(db,"products"));
  products = [];
  querySnapshot.forEach(docSnap => products.push({id:docSnap.id, ...docSnap.data()}));
  renderProducts();
}

function renderProducts(loadMore=false){
  const container = document.getElementById("products");
  if(!loadMore) container.innerHTML = "";
  const end = Math.min(currentIndex + pageSize, products.length);
  for(let i=currentIndex; i<end; i++){
    const p = products[i];
    const div = document.createElement("div");
    div.className = "product-card";
    div.innerHTML = `
      <span class="discount-text">${p.oldPrice && p.oldPrice>p.price ? "-" + Math.round((p.oldPrice-p.price)/p.oldPrice*100) + "%" : ""}</span>
      <img src="${p.img}" onerror="this.src='https://via.placeholder.com/150'">
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="price">${Number(p.price).toLocaleString()}đ</div>
        <div class="old-price">${p.oldPrice ? Number(p.oldPrice).toLocaleString()+"đ" : ""}</div>
      </div>
    `;
    div.onclick = ()=> window.location.href = "product-detail.html?id=" + p.id;
    container.appendChild(div);
  }
  currentIndex = end;
  document.getElementById("loadMoreBtn").style.display = (currentIndex < products.length) ? 'block' : 'none';
}

// Load More button
document.getElementById("loadMoreBtn").onclick = ()=> renderProducts(true);

// Search
function searchProduct(){
  const term = document.getElementById("searchInput").value.toLowerCase();
  const resultBox = document.getElementById("searchResults");
  resultBox.innerHTML = "";
  if(!term) return;
  const filtered = products.filter(p => p.name && p.name.toLowerCase().includes(term)).slice(0,10);
  filtered.forEach(p=>{
    const div = document.createElement("div");
    div.className="search-result-item";
    div.innerHTML = `
      <img src="${p.img}" onerror="this.src='https://via.placeholder.com/50'">
      <div class="product-info">
        <strong>${p.name}</strong>
        <div class="price">${Number(p.price).toLocaleString()}đ</div>
        ${p.oldPrice ? `<div class="old-price">${Number(p.oldPrice).toLocaleString()}đ</div>` : ""}
      </div>
    `;
    div.onclick = ()=> { resultBox.innerHTML=""; window.location.href="product-detail.html?id="+p.id; };
    resultBox.appendChild(div);
  });
}

// INIT
loadProducts();

window.searchProduct = searchProduct;
</script>
