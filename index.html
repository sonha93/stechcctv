<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Camera Pro</title>

<link rel="stylesheet" href="styletrong-nha.css">

<style>

/* ================= LOGO ================= */
.logo img{
  height:38px;
  width:auto;
  border:0;
  box-shadow:none;
  display:block;
}

/* ================= HEADER ================= */
header{
  position:sticky;
  top:0;
  z-index:9999;
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px;
  background:#33A0AB;
}

/* MENU */
header .menu-btn{
  width:42px;
  height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#00acc1;
  border-radius:12px;
  color:#fff;
  font-size:20px;
  cursor:pointer;
}

/* LOGO */
.logo{
  width:42px;
  height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#fff;
  border-radius:10px;
  overflow:hidden;
}

/* SEARCH */
.search-box{
  flex:1;
  position:relative;
}

.search-box input,
#search{
  width:100%;
  height:42px;
  border:none;
  border-radius:12px;
  padding:0 12px;
  outline:none;
}

/* SEARCH DROPDOWN */
.search-results{
  position:absolute;
  top:48px;
  left:0;
  right:0;
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  z-index:99999;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.search-result-item{
  display:flex;
  gap:10px;
  padding:8px;
  border-bottom:1px solid #eee;
  cursor:pointer;
  align-items:center;
}

.search-result-item img{
  width:45px;
  height:45px;
  object-fit:cover;
  border-radius:8px;
}

/* ICON */
.icon-btn{
  width:42px;
  height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#00acc1;
  border-radius:12px;
  color:#fff;
  position:relative;
  text-decoration:none;
}

/* CART COUNT */
.cart-count{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:#fff;
  font-size:11px;
  min-width:18px;
  height:18px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ================= SIDEBAR ================= */
.sidebar {
  position: fixed;
  top:0;
  left:-260px;
  width:240px;
  height:100vh;
  background:#fff;
  z-index:9999;
  padding:15px;
  transition:.3s;
}

.sidebar.active{
  left:0;
}

#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  opacity:0;
  visibility:hidden;
  transition:.3s;
  z-index:9998;
}

#overlay.active{
  opacity:1;
  visibility:visible;
}

/* ================= PRODUCTS ================= */
#products{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}

@media(min-width:1200px){
  #products{
    grid-template-columns:repeat(4,1fr);
  }
}

.product-card{
  background:#fff;
  border-radius:8px;
  overflow:hidden;
  text-align:center;
}

/* ================= AUTH ================= */
#authModal{
  position:fixed;
  inset:0;
  display:none;
  background:rgba(0,0,0,0.6);
  align-items:center;
  justify-content:center;
  z-index:99999;
}

#authModal .auth-content{
  background:#fff;
  padding:20px;
  border-radius:8px;
  width:90%;
  max-width:350px;
}

#authModal input{
  width:100%;
  padding:8px;
  margin:6px 0;
}

#authModal button{
  width:100%;
  padding:10px;
  margin-top:8px;
  background:#007BFF;
  color:#fff;
  border:none;
  cursor:pointer;
}

</style>
</head>

<body>

<div id="overlay" onclick="toggleMenu()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Danh mục</h3>
  <a href="index.html">Trang chủ</a>
  <a href="admin-panel.html">Admin</a>
  <a href="cart.html">Giỏ hàng</a>
  <a href="camera-trong-nha.html">Camera trong nhà</a>
</div>

<!-- HEADER -->
<header>

  <div class="menu-btn" onclick="toggleMenu()">☰</div>

  <div class="logo">
    <img src="https://i.ibb.co/Z1kv9nJj/logo.png">
  </div>

  <div class="search-box">
    <input id="search" placeholder="Tìm kiếm sản phẩm..." oninput="searchProduct()">
    <div id="searchResults" class="search-results"></div>
  </div>

  <a href="cart.html" class="icon-btn">
    🛒
    <span class="cart-count" id="cartCount">0</span>
  </a>

  <a href="#" class="icon-btn">👤</a>

</header>

<!-- CONTENT -->
<div class="product-slider">
  <div class="product-track" id="products"></div>
</div>

<button id="loadMoreBtn"></button>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-container">
    <h3>StechCamera</h3>
  </div>
</footer>

<!-- AUTH -->
<div id="authModal">
  <div class="auth-content">
    <h2>Đăng nhập</h2>
    <input id="authEmail" placeholder="Email">
    <input id="authPassword" placeholder="Mật khẩu">
    <button id="authLoginBtn">Đăng nhập</button>
    <button id="authRegisterBtn">Đăng ký</button>
    <button id="closeAuth">Đóng</button>
  </div>
</div>

<script>
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}
</script>

<script type="module" src="user.js"></script>
<script type="module" src="auth.js"></script>
<script type="module" src="home.js"></script>
<script src="banner.js"></script>

</body>
</html>
