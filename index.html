<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Camera Pro</title>
<link rel="stylesheet" href="styletrong-nha.css">
<style>
/* LOGO KHÔNG VIỀN */
.logo img{ height:38px; width:auto; border:0; outline:0; box-shadow:none; display:block; background:transparent; }
/* SIDEBAR */
.sidebar { position: fixed; z-index:1000; background:#fff; padding:10px; width:250px; left:-260px; top:0; height:100%; transition: left 0.3s; }
.sidebar.active{left:0;}
#overlay{position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); display:none; z-index:500;}
#overlay.active{display:block;}
#userInfoPreview{display:none; margin-top:10px; text-align:center; cursor:pointer;}
#userInfoPreview img{width:40px; height:40px; border-radius:50%; object-fit:cover; margin-bottom:5px;}
#products{display:grid; grid-template-columns:1fr 1fr; gap:20px;}
.product-card{background:#fff; border:1px solid #ccc; border-radius:8px; overflow:hidden; text-align:center; padding:10px;}
.product-card img{width:100%; height:auto; border-bottom:1px solid #ccc; border-radius:4px; object-fit:cover;}
.product-card .product-info{margin-top:8px;}
</style>
</head>
<body>

<div id="overlay" onclick="toggleMenu()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Danh mục</h3>
  <a href="index.html">Trang chủ</a>
  <a href="user-profile.html">Thông Tin</a>
  <a href="cart.html">Giỏ hàng</a>
  <a href="camera-trong-nha.html">Camera trong nhà</a>
  <a href="camera-ngoai-troi.html">Camera ngoài trời</a>
  <a href="the-nho.html">Thẻ nhớ</a>
  <a href="combo-khuyenmai.html">Combo khuyến mãi</a>
  <hr>
  <a href="#" id="loginLink">Đăng nhập / Đăng ký</a>
  <a href="#" id="logoutLink" style="display:none;">Đăng xuất</a>

  <!-- USER INFO PREVIEW -->
  <div id="userInfoPreview">
    <img id="sidebarUserAvatarPreview" src="https://via.placeholder.com/40" alt="Avatar">
    <p id="sidebarUserNamePreview" style="margin:0; font-size:14px; color:#007BFF;">Người dùng</p>
  </div>
</div>

<!-- HEADER -->
<header>
  <div onclick="toggleMenu()" style="cursor:pointer;">☰</div>
  <div class="logo">
    <img src="https://i.ibb.co/Z1kv9nJj/logo.png" alt="logo">
  </div>
  <input id="search" placeholder="Tìm kiếm sản phẩm...">
</header>

<!-- USER PROFILE -->
<div class="profile-container" style="max-width:400px;margin:80px auto;padding:20px;border:2px solid #40C4C0;border-radius:8px;background:#f9f9f9;text-align:center;">
  <h2>Thông tin người dùng</h2>
  <img id="avatarPreview" src="https://via.placeholder.com/100" alt="Avatar" style="width:100px;height:100px;border-radius:50%;object-fit:cover;margin:10px auto;border:1px solid #ccc;">
  <input type="file" id="avatarInput">
  <input type="text" id="nameInput" placeholder="Họ và tên">
  <input type="email" id="emailInput" placeholder="Email" disabled>
  <input type="text" id="phoneInput" placeholder="Số điện thoại">
  <input type="text" id="addressInput" placeholder="Địa chỉ">
  <input type="date" id="dobInput" placeholder="Ngày sinh">
  <button id="saveProfileBtn">Lưu thông tin</button>
  <button id="logoutBtn">Đăng xuất</button>
  <p id="saveStatus"></p>
</div>

<!-- POPUP LOGIN / REGISTER -->
<div id="authModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;z-index:9999;">
  <div class="auth-content" style="background:#fff;padding:20px;border-radius:8px;max-width:350px;width:90%;">
    <h2>Đăng ký / Đăng nhập</h2>
    <input type="email" id="authEmail" placeholder="Email">
    <input type="password" id="authPassword" placeholder="Mật khẩu">
    <button id="authRegisterBtn">Đăng ký</button>
    <button id="authLoginBtn">Đăng nhập</button>
    <button id="closeAuth" style="background:#f44336;margin-top:5px;">Đóng</button>
    <p id="authMessage"></p>
  </div>
</div>

<!-- FIREBASE & PROFILE JS -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="user-profile.js"></script>

<script>
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active"); 
  document.getElementById("overlay").classList.toggle("active"); 
}
</script>
</body>
</html>
