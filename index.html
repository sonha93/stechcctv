<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Camera Pro</title>

<link rel="stylesheet" href="styletrong-nha.css">

<style>

/* ======================
   RESET
====================== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* ======================
   HEADER
====================== */
header{
  position:sticky;
  top:0;
  z-index:999;
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px;
  background:#33A0AB;
}

/* MENU */
.menu-btn{
  width:44px;
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#00acc1;
  color:#fff;
  border-radius:10px;
  font-size:22px;
  cursor:pointer;
}

/* LOGO */
.logo img{
  height:38px;
  width:auto;
  display:block;
}

/* SEARCH */
.search-box{
  flex:1;
  position:relative;
}

.search-box input{
  width:100%;
  height:44px;
  border:none;
  border-radius:10px;
  padding:0 10px;
  outline:none;
}

/* ICON */
.icon-group{
  display:flex;
  gap:8px;
  align-items:center;
}

.icon-btn{
  width:44px;
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  background:#00acc1;
  color:#fff;
  text-decoration:none;
  position:relative;
}

.admin-btn{
  background:#6a5acd;
}

/* CART COUNT */
.cart-count{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:#fff;
  width:18px;
  height:18px;
  border-radius:50%;
  font-size:11px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ======================
   SEARCH DROPDOWN
====================== */
.search-results{
  position:absolute;
  top:48px;
  left:0;
  right:0;
  background:#fff;
  border-radius:10px;
  overflow:auto;
  max-height:300px;
  z-index:2000;
  box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.search-result-item{
  display:flex;
  gap:10px;
  padding:8px;
  border-bottom:1px solid #eee;
  cursor:pointer;
  align-items:center;
}

.search-result-item img{
  width:45px;
  height:45px;
  object-fit:cover;
  border-radius:6px;
}

/* ======================
   SIDEBAR + OVERLAY
====================== */
.sidebar{
  position:fixed;
  top:0;
  left:-260px;
  width:240px;
  height:100vh;
  background:#fff;
  z-index:1000;
  padding:15px;
  transition:.25s;
}

.sidebar.active{
  left:0;
}

#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  opacity:0;
  visibility:hidden;
  transition:.25s;
  z-index:999;
}

#overlay.active{
  opacity:1;
  visibility:visible;
}

/* ======================
   PRODUCT GRID
====================== */
#products{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}

@media(min-width:1200px){
  #products{
    grid-template-columns:repeat(4,1fr);
  }
}

.product-card{
  background:#fff;
  border:1px solid #ccc;
  border-radius:8px;
  overflow:hidden;
  text-align:center;
}

</style>
</head>

<body>

<!-- OVERLAY -->
<div id="overlay"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Danh mục</h3>
  <a href="index.html">Trang chủ</a>
  <a href="cart.html">Giỏ hàng</a>
  <a href="camera-trong-nha.html">Camera trong nhà</a>
  <a href="camera-ngoai-troi.html">Camera ngoài trời</a>
</div>

<!-- HEADER -->
<header>

  <div class="menu-btn" onclick="toggleMenu()">☰</div>

  <div class="logo">
    <img src="https://i.ibb.co/Z1kv9nJj/logo.png">
  </div>

  <div class="search-box">
    <input id="search" placeholder="Tìm kiếm sản phẩm..." oninput="searchProduct()">
    <div id="searchResults" class="search-results"></div>
  </div>

  <div class="icon-group">

    <a href="admin-panel.html" class="icon-btn admin-btn">🔐</a>

    <a href="cart.html" class="icon-btn">
      🛒
      <span class="cart-count" id="cartCount">0</span>
    </a>

  </div>

</header>

<!-- CONTENT -->
<div id="products"></div>

<!-- SCRIPTS -->
<script type="module">

let products = [];

window.products = products;

/* ======================
   MENU FIX
====================== */
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

document.getElementById("overlay").onclick = function(){
  document.getElementById("sidebar").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");
};

window.toggleMenu = toggleMenu;

/* ======================
   SEARCH FIX
====================== */
function searchProduct(){

  const term = document.getElementById("search").value.toLowerCase();
  const box = document.getElementById("searchResults");

  box.innerHTML = "";

  if(!term) return;

  const result = products
    .filter(p => p.name?.toLowerCase().includes(term))
    .slice(0,10);

  result.forEach(p => {

    const div = document.createElement("div");
    div.className = "search-result-item";

    div.innerHTML = `
      <img src="${p.img}">
      <div>
        <div>${p.name}</div>
        <b style="color:red">${Number(p.price).toLocaleString()}đ</b>
      </div>
    `;

    div.onclick = () => {
      window.location.href = "logo.html?id=" + p.id;
    };

    box.appendChild(div);

  });

}

window.searchProduct = searchProduct;

/* ======================
   FIREBASE LOAD (GIỮ NGUYÊN HOẶC GẮN SAU)
====================== */
// bạn gắn home.js hoặc firebase vào đây

</script>

<script type="module" src="home.js"></script>

</body>
</html>
