<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Camera Pro</title>
<link rel="stylesheet" href="styletrong-nha.css">
<style>
/* HEADER */
header{
  position:sticky;top:0;z-index:999;display:flex;align-items:center;gap:10px;padding:12px;background:#33A0AB;box-shadow:0 2px 10px rgba(0,0,0,.08);
}
.menu-btn, .logo, .icon-btn{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.menu-btn{background:#00acc1;color:#fff;font-size:24px;cursor:pointer;}
.logo{background:#fff;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.08);}
.logo img{width:100%;height:100%;object-fit:cover;}
.search-box{flex:1;position:relative;}
.search-box input{width:100%;height:46px;border:none;border-radius:14px;background:#fff;padding:0 14px;font-size:14px;outline:none;}
.header-icons{display:flex;gap:10px;}
.icon-btn{background:#00acc1;color:#fff;font-size:22px;text-decoration:none;position:relative;cursor:pointer;}
.cart-count{position:absolute;top:-5px;right:-5px;min-width:20px;height:20px;border-radius:50%;background:red;color:#fff;font-size:11px;font-weight:bold;display:flex;align-items:center;justify-content:center;}
/* SIDEBAR */
.sidebar{position:fixed;top:0;left:-280px;width:260px;height:100vh;background:#fff;z-index:9999;transition:.3s;padding:20px;box-shadow:0 0 20px rgba(0,0,0,.15);}
.sidebar.active{left:0;}
.sidebar h3{margin-bottom:20px;color:#00acc1;}
.sidebar a{display:block;padding:14px;margin-bottom:10px;border-radius:12px;background:#f5f5f5;text-decoration:none;color:#111;font-weight:bold;}
/* OVERLAY */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9998;opacity:0;visibility:hidden;transition:.3s;}
#overlay.active{opacity:1;visibility:visible;}
</style>
</head>
<body>

<!-- OVERLAY -->
<div id="overlay" onclick="toggleMenu()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Danh mục</h3>
  <a href="index.html">Trang chủ</a>
  <a href="cart.html">Giỏ Hàng</a>
  <a href="camera-trong-nha.html">Camera Trong Nhà</a>
  <a href="camera-ngoai-troi.html">Camera Ngoài Trời</a>
  <a href="the-nho.html">Thẻ Nhớ</a>
  <a href="combo-khuyenmai.html">Combo Khuyến Mãi</a>
</div>

<!-- HEADER -->
<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="logo"><img src="https://i.ibb.co/Z1kv9nJj/logo.png" alt="logo"></div>
  <div class="search-box">
    <input type="text" placeholder="Tìm kiếm sản phẩm..." id="searchInput">
  </div>
  <div class="header-icons">
    <a href="cart.html" class="icon-btn">🛒<span class="cart-count" id="cartCount">0</span></a>
    <a href="#" class="icon-btn" onclick="openLoginModal()">🔐</a>
  </div>
</header>

<!-- CONTENT -->
<div id="products"></div>

<!-- FOOTER -->
<footer>
  <h3>StechCamera</h3>
  <p>Website chuyên cung cấp camera an ninh chính hãng</p>
  <p>Hotline: 0985.678.245</p>
  <p>Email: support@stechcamera.vn</p>
</footer>

<!-- POPUP LOGIN -->
<div id="authModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;z-index:10000;">
  <div style="background:#fff;padding:20px;border-radius:8px;max-width:350px;width:90%;">
    <h2>Đăng ký / Đăng nhập</h2>
    <input type="email" id="authEmail" placeholder="Email" style="width:100%;padding:8px;margin:6px 0;border-radius:4px;border:1px solid #aaa;">
    <input type="password" id="authPassword" placeholder="Mật khẩu" style="width:100%;padding:8px;margin:6px 0;border-radius:4px;border:1px solid #aaa;">
    <button id="authRegisterBtn" style="width:100%;padding:10px;margin-top:10px;background:#33A0AB;color:white;border:none;border-radius:4px;cursor:pointer;">Đăng Ký</button>
    <button id="authLoginBtn" style="width:100%;padding:10px;margin-top:10px;background:#33A0AB;color:white;border:none;border-radius:4px;cursor:pointer;">Đăng Nhập</button>
    <button id="closeAuth" style="width:100%;padding:10px;margin-top:10px;background:#f44336;color:white;border:none;border-radius:4px;cursor:pointer;" onclick="closeLoginModal()">Đóng</button>
  </div>
</div>

<!-- JS -->
<script src="app.js"></script>
<script src="user-profile.js"></script>
<script>
// TOGGLE SIDEBAR
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}
function openLoginModal(){document.getElementById("authModal").style.display="flex";}
function closeLoginModal(){document.getElementById("authModal").style.display="none";}
</script>
</body>
</html>
