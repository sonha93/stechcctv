<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Camera Pro</title>
<style>
/* RESET */
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
body { background:#f5f5f5; color:#111; overflow-x:hidden; }

/* HEADER */
header {
  display:flex;
  align-items:center;
  padding:8px 10px;
  background:#33A0AB;
  gap:8px;
  position:sticky;
  top:0;
  z-index:999;
}

/* Menu icon */
.menu-btn {
  width:40px; height:40px;
  border-radius:12px;
  background:#00acc1; color:white;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; cursor:pointer; flex-shrink:0;
}

/* Logo */
.logo {
  width:40px; height:40px;
  border-radius:12px; overflow:hidden;
  background:#fff; box-shadow:0 2px 5px rgba(0,0,0,0.1);
  flex-shrink:0;
}
.logo img { width:100%; height:100%; object-fit:cover; }

/* Search box */
.search-box { flex:1; position:relative; }
.search-box input {
  width:100%; height:40px; border-radius:12px;
  border:none; padding:0 12px; font-size:14px; outline:none;
}
.search-results {
  position:absolute; background:#fff; width:100%;
  max-height:250px; overflow-y:auto;
  border:1px solid #ddd; border-radius:10px;
  margin-top:4px; z-index:1000;
}
.search-result-item {
  display:flex; align-items:center; gap:8px;
  padding:8px; cursor:pointer; border-bottom:1px solid #eee;
}
.search-result-item img { width:50px; height:50px; object-fit:cover; border-radius:6px; }
.search-result-item strong { font-size:14px; color:#111; }
.search-result-item span { font-size:13px; color:#d70018; font-weight:bold; }
.search-result-item:hover { background:#f7f7f7; }

/* Header icons */
.header-icons { display:flex; gap:8px; }
.icon-btn {
  width:40px; height:40px; border-radius:12px;
  background:#00acc1; color:white; display:flex;
  align-items:center; justify-content:center; font-size:18px;
  text-decoration:none; position:relative; cursor:pointer;
}
.cart-count {
  position:absolute; top:-5px; right:-5px;
  min-width:18px; height:18px; border-radius:50%;
  background:red; color:white; font-size:11px;
  font-weight:bold; display:flex; align-items:center; justify-content:center;
}

/* SIDEBAR */
.sidebar {
  position:fixed; top:0; left:-280px; width:260px; height:100vh;
  background:#fff; z-index:9999; transition:.3s;
  padding:20px; box-shadow:0 0 20px rgba(0,0,0,.15);
}
.sidebar.active { left:0; }
.sidebar h3 { margin-bottom:20px; color:#00acc1; }
.sidebar a {
  display:block; padding:14px; margin-bottom:10px;
  border-radius:12px; background:#f5f5f5;
  text-decoration:none; color:#111; font-weight:bold;
}

/* OVERLAY */
#overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:9998; opacity:0; visibility:hidden; transition:.3s; }
#overlay.active { opacity:1; visibility:visible; }

/* PRODUCTS */
#products {
  display:grid; grid-template-columns:1fr 1fr; gap:15px; padding:10px;
}
.product-card {
  background:#fff; border-radius:12px; overflow:hidden; padding:10px; text-align:center;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}
.product-card img { width:100%; height:auto; border-radius:8px; object-fit:cover; margin-bottom:6px; }
.product-card .name { font-weight:bold; margin-bottom:4px; }
.product-card .price { color:#d70018; font-weight:bold; margin-bottom:6px; }
.product-card button {
  width:100%; padding:8px; border:none; border-radius:8px;
  background:#33A0AB; color:white; cursor:pointer; font-weight:bold;
}
.product-card button:hover { opacity:0.85; }

/* FOOTER */
footer { text-align:center; padding:15px; background:#f5f5f5; margin-top:20px; font-size:14px; color:#333; }
</style>
</head>
<body>

<!-- OVERLAY -->
<div id="overlay" onclick="toggleMenu()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Danh mục</h3>
  <a href="index.html">Trang chủ</a>
  <a href="cart.html">Giỏ Hàng</a>
  <a href="camera-trong-nha.html">Camera Trong Nhà</a>
  <a href="camera-ngoai-troi.html">Camera Ngoài Trời</a>
  <a href="the-nho.html">Thẻ Nhớ</a>
  <a href="combo-khuyenmai.html">Combo Khuyến Mãi</a>
</div>

<!-- HEADER -->
<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="logo"><img src="https://i.ibb.co/Z1kv9nJj/logo.png" alt="logo"></div>
  <div class="search-box">
    <input type="text" placeholder="Tìm kiếm sản phẩm..." id="searchInput">
    <div id="searchResults"></div>
  </div>
  <div class="header-icons">
    <a href="cart.html" class="icon-btn">🛒<span class="cart-count" id="cartCount">0</span></a>
    <a href="#" class="icon-btn" onclick="openLoginModal()">🔐</a>
  </div>
</header>

<!-- PRODUCTS -->
<div id="products">
  <div class="product-card">
    <img src="https://via.placeholder.com/150" alt="SP1">
    <div class="name">Camera 1</div>
    <div class="price">2,500,000đ</div>
    <button>Thêm vào giỏ</button>
  </div>
  <div class="product-card">
    <img src="https://via.placeholder.com/150" alt="SP2">
    <div class="name">Camera 2</div>
    <div class="price">3,500,000đ</div>
    <button>Thêm vào giỏ</button>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <div>StechCamera</div>
  <div>Website chuyên cung cấp camera an ninh chính hãng</div>
  <div>Hotline: 0985.678.245</div>
  <div>Email: support@stechcamera.vn</div>
</footer>

<!-- LOGIN MODAL -->
<div id="authModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;z-index:10000;">
  <div style="background:#fff;padding:20px;border-radius:8px;max-width:350px;width:90%;">
    <h2>Đăng ký / Đăng nhập</h2>
    <input type="email" id="authEmail" placeholder="Email" style="width:100%;padding:8px;margin:6px 0;border-radius:4px;border:1px solid #aaa;">
    <input type="password" id="authPassword" placeholder="Mật khẩu" style="width:100%;padding:8px;margin:6px 0;border-radius:4px;border:1px solid #aaa;">
    <button id="authRegisterBtn" style="width:100%;padding:10px;margin-top:10px;background:#33A0AB;color:white;border:none;border-radius:4px;cursor:pointer;">Đăng Ký</button>
    <button id="authLoginBtn" style="width:100%;padding:10px;margin-top:10px;background:#33A0AB;color:white;border:none;border-radius:4px;cursor:pointer;">Đăng Nhập</button>
    <button style="width:100%;padding:10px;margin-top:10px;background:#f44336;color:white;border:none;border-radius:4px;cursor:pointer;" onclick="closeLoginModal()">Đóng</button>
  </div>
</div>

<script>
function toggleMenu(){document.getElementById("sidebar").classList.toggle("active");document.getElementById("overlay").classList.toggle("active");}
function openLoginModal(){document.getElementById("authModal").style.display="flex";}
function closeLoginModal(){document.getElementById("authModal").style.display="none";}
</script>
</body>
</html>
