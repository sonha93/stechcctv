<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Camera Pro</title>

<link rel="stylesheet" href="styletrong-nha.css">

<style>

/* ===== LOGO ===== */
.logo img{
  height:38px;
  width:auto;
  border:0;
  outline:0;
  box-shadow:none;
  display:block;
  background:transparent;
}

/* ===== POPUP AUTH ===== */
#authModal{
  position:fixed;
  top:0; left:0; right:0; bottom:0;
  display:none;
  background:rgba(0,0,0,0.6);
  align-items:center;
  justify-content:center;
  z-index:9999;
}
#authModal .auth-content{
  background:#fff;
  padding:20px;
  border-radius:8px;
  max-width:350px;
  width:90%;
}

/* ===== SIDEBAR ===== */
.sidebar {
  position: fixed;
  z-index: 1000;
}

/* ===== PRODUCTS GRID ===== */
#products{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}

/* ===== LOAD MORE ===== */
#loadMoreBtn{
  display:block;
  margin:20px auto;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#111;
  color:#fff;
  cursor:pointer;
}

/* ===== SEARCH BOX ===== */
.search-box{
  position:relative;
  flex:1;
}

#search{
  width:100%;
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

/* DROPDOWN */
.search-results{
  position:absolute;
  top:45px;
  left:0;
  right:0;

  background:#fff;
  border:1px solid #ddd;
  border-radius:8px;

  max-height:320px;
  overflow-y:auto;

  display:none;
  z-index:99999;
}

/* ITEM */
.search-item{
  display:flex;
  gap:10px;
  padding:8px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.search-item:hover{
  background:#f5f5f5;
}

.search-item img{
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:6px;
}

/* TEXT */
.search-info{
  display:flex;
  flex-direction:column;
  justify-content:center;
  flex:1;
}

.search-name{
  font-size:14px;
  font-weight:600;
}

.search-price{
  color:red;
  font-weight:bold;
  font-size:13px;
}

.search-oldprice{
  font-size:12px;
  color:#888;
  text-decoration:line-through;
}

</style>
</head>

<body>

<div id="overlay" onclick="toggleMenu()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Danh mục</h3>
  <a href="index.html">Trang chủ</a>
  <a href="admin-panel.html">Admin</a>
  <a href="profile.html">Thông Tin</a>
  <a href="cart.html">Giỏ hàng</a>
  <hr>
</div>

<!-- HEADER -->
<header style="display:flex; gap:10px; align-items:center;">
  <div onclick="toggleMenu()">☰</div>

  <div class="logo">
    <img src="https://i.ibb.co/Z1kv9nJj/logo.png">
  </div>

  <!-- SEARCH -->
  <div class="search-box">
    <input id="search" placeholder="Tìm kiếm sản phẩm...">
    <div id="searchResults" class="search-results"></div>
  </div>
</header>

<!-- PRODUCTS -->
<div class="product-slider">
  <div class="product-track" id="products"></div>
</div>

<button id="loadMoreBtn">Xem thêm</button>

<!-- FOOTER -->
<footer>
  <div style="text-align:center;padding:20px;">
    <h3>StechCamera</h3>
    <p>Camera an ninh chính hãng</p>
  </div>
</footer>

<!-- AUTH -->
<div id="authModal">
  <div class="auth-content">
    <h2>Đăng nhập</h2>
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Mật khẩu">
    <button>OK</button>
  </div>
</div>

<script>
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

/* ===== SEARCH ===== */

const searchInput = document.getElementById("search");
const searchBox = document.getElementById("searchResults");

/* ⚠️ products phải tồn tại từ home.js */
searchInput.addEventListener("input", function () {

  const keyword = this.value.toLowerCase().trim();

  if(!keyword){
    searchBox.style.display="none";
    searchBox.innerHTML="";
    return;
  }

  const result = (window.products || [])
    .filter(p => p.name.toLowerCase().includes(keyword))
    .slice(0,5);

  renderSearch(result);
});

function renderSearch(list){

  if(list.length === 0){
    searchBox.innerHTML = `<div style="padding:10px">Không tìm thấy</div>`;
    searchBox.style.display="block";
    return;
  }

  searchBox.innerHTML = list.map(p => `
    <div class="search-item" onclick="goDetail('${p.id}')">
      <img src="${p.image}">

      <div class="search-info">
        <div class="search-name">${p.name}</div>

        <div class="search-price">
          ${Number(p.price).toLocaleString()}₫
        </div>

        <div class="search-oldprice">
          ${p.oldPrice ? Number(p.oldPrice).toLocaleString()+"₫" : ""}
        </div>
      </div>
    </div>
  `).join("");

  searchBox.style.display="block";
}

document.addEventListener("click", e=>{
  if(!e.target.closest(".search-box")){
    searchBox.style.display="none";
  }
});

function goDetail(id){
  window.location.href = `logo.html?id=${id}`;
}

</script>

<script type="module" src="user.js"></script>
<script type="module" src="auth.js"></script>
<script type="module" src="home.js"></script>
<script src="banner.js"></script>

</body>
</html>
