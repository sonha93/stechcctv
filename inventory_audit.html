<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Inventory Audit</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    padding:20px;
}

.audit-header{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

#openAudit{
    background:#00acc1;
    color:white;
}

#closeAudit{
    background:red;
    color:white;
}

#auditStatus{
    margin:15px 0;
    font-weight:bold;
    font-size:18px;
}

.audit-item{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
}

.audit-item input{
    width:150px;
    padding:8px;
}
.audit-item{
    background:white;
    border-radius:12px;
    padding:20px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.audit-top{
    margin-bottom:10px;
}

.audit-stt{
    background:#111;
    color:white;
    padding:4px 10px;
    border-radius:6px;
    font-size:12px;
    font-weight:bold;
}

.audit-product-name{
    font-size:24px;
    font-weight:bold;
    margin-bottom:5px;
}

.audit-product-id{
    color:#777;
    font-size:13px;
    margin-bottom:15px;
}

.actualStock{
    width:220px;
    padding:12px;
    font-size:16px;
    border:1px solid #ddd;
    border-radius:8px;
}
    .audit-item.done{
    border:2px solid #22c55e;
    background:#f0fdf4;
}
</style>
</head>

<body>

<h2>📦 Inventory Audit</h2>

<div class="audit-header">

    <button id="openAudit">
        Mở kiểm kê
    </button>

    <button id="closeAudit">
        Đóng kiểm kê
    </button>

</div>

<div id="auditStatus">
    🔴 ĐANG ĐÓNG
</div>


<div id="auditProducts">
</div>

<button id="submitAudit">
     📋 Gửi kết quả kiểm kê
</button>
</div>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
<script type="module" src="inventory_audit.js"></script>
</body>
</html>
