<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập / Đăng ký Firebase</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.6.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.6.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.6.1/firebase-analytics.js"></script>

<style>
  body { font-family: Arial; padding: 20px; max-width: 400px; margin: auto; }
  h1, h2 { text-align: center; }
  input, button { display: block; margin: 10px 0; padding: 10px; width: 100%; }
  button { cursor: pointer; }
</style>
</head>
<body>

<h1>Firebase Auth Demo</h1>

<h2>Đăng nhập Google</h2>
<button id="google-login-btn">Đăng nhập bằng Google</button>

<h2>Đăng nhập Email/Password</h2>
<input type="email" id="login-email" placeholder="Email">
<input type="password" id="login-password" placeholder="Mật khẩu">
<button id="login-btn">Đăng nhập</button>

<h2>Đăng ký Email/Password</h2>
<input type="email" id="register-email" placeholder="Email">
<input type="password" id="register-password" placeholder="Mật khẩu">
<button id="register-btn">Đăng ký</button>

<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyDYVcBEYJN1HUCta3XdJAUBe4TGLnmy7y4",
    authDomain: "stech-73b89.firebaseapp.com",
    projectId: "stech-73b89",
    storageBucket: "stech-73b89.firebasestorage.app",
    messagingSenderId: "873739162979",
    appId: "1:873739162979:web:978f1a4043f025b1cdaf56",
    measurementId: "G-98Q3927PHZ"
  };

  const app = firebase.initializeApp(firebaseConfig);
  const analytics = firebase.analytics();
  const auth = firebase.auth();

  // Google login
  const googleProvider = new firebase.auth.GoogleAuthProvider();
  document.getElementById("google-login-btn").addEventListener("click", () => {
    auth.signInWithPopup(googleProvider)
      .then(result => {
        alert("Google login thành công: " + result.user.email);
        window.location.href = "index.html"; // quay về trang chủ
      })
      .catch(err => {
        console.error(err);
        alert("Lỗi đăng nhập Google");
      });
  });

  // Email/Password login
  document.getElementById("login-btn").addEventListener("click", () => {
    const email = document.getElementById("login-email").value;
    const password = document.getElementById("login-password").value;
    auth.signInWithEmailAndPassword(email, password)
      .then(result => {
        alert("Đăng nhập thành công: " + result.user.email);
        window.location.href = "index.html"; // quay về trang chủ
      })
      .catch(err => {
        console.error(err);
        alert("Lỗi đăng nhập Email");
      });
  });

  // Email/Password register
  document.getElementById("register-btn").addEventListener("click", () => {
    const email = document.getElementById("register-email").value;
    const password = document.getElementById("register-password").value;
    auth.createUserWithEmailAndPassword(email, password)
      .then(result => {
        alert("Đăng ký thành công: " + result.user.email);
        window.location.href = "index.html"; // quay về trang chủ
      })
      .catch(err => {
        console.error(err);
        alert("Lỗi đăng ký Email");
      });
  });
</script>

</body>
</html>
