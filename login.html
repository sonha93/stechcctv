<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng ký / Đăng nhập</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>
  <h2>Đăng ký</h2>
  <form id="registerForm">
    <input type="email" id="registerEmail" placeholder="Email" required><br>
    <input type="password" id="registerPassword" placeholder="Mật khẩu" required><br>
    <button type="submit">Đăng ký</button>
  </form>

  <h2>Đăng nhập</h2>
  <form id="loginForm">
    <input type="email" id="loginEmail" placeholder="Email" required><br>
    <input type="password" id="loginPassword" placeholder="Mật khẩu" required><br>
    <button type="submit">Đăng nhập</button>
  </form>

  <p id="message"></p>

  <script src="firebase-config.js"></script> <!-- file config của bạn -->
  <script src="auth.js"></script> <!-- file JS xử lý auth -->
</body>
</html>
