<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Thông số sản phẩm</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#f5f5f5;
}

/* OVERLAY */
.detail-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  z-index:9998;
}

/* PANEL */
.detail-panel{
  position:fixed;
  top:0;
  right:-100%;
  width:100%;
  max-width:520px;
  height:100vh;
  background:#fff;
  z-index:9999;
  overflow-y:auto;
  transition:.35s;
}

.detail-panel.active{
  right:0;
}

/* HEADER */
.detail-header{
  background:#00acc1;
  color:#fff;
  padding:22px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.detail-header h2{
  font-size:32px;
  font-weight:bold;
}

.close-btn{
  width:65px;
  height:65px;
  border-radius:50%;
  background:#fff;
  color:#111;
  border:none;
  font-size:40px;
  cursor:pointer;
}

/* IMAGE */
.detail-img{
  width:100%;
  height:330px;
  object-fit:cover;
  background:#fff;
}

/* CONTENT */
.detail-content{
  padding:20px;
}

.product-name{
  font-size:30px;
  font-weight:bold;
  margin-bottom:15px;
  line-height:1.4;
}

.price-wrap{
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:25px;
}

.price{
  color:red;
  font-size:35px;
  font-weight:bold;
}

.old-price{
  color:#888;
  text-decoration:line-through;
  font-size:24px;
}

.sale{
  background:red;
  color:#fff;
  padding:6px 10px;
  border-radius:8px;
  font-size:18px;
}

/* TABS */
.tabs{
  display:flex;
  gap:12px;
  margin-bottom:20px;
}

.tab-btn{
  flex:1;
  border:none;
  padding:16px;
  border-radius:14px;
  background:#eee;
  font-size:22px;
  cursor:pointer;
}

.tab-btn.active{
  background:#00acc1;
  color:#fff;
}

/* TAB CONTENT */
.tab-content{
  display:none;
}

.tab-content.active{
  display:block;
}

/* INFO BOX */
.info-box{
  background:#f7f7f7;
  border-radius:20px;
  padding:22px;
  margin-bottom:18px;
  line-height:1.8;
}

.info-title{
  font-size:22px;
  font-weight:bold;
  margin-bottom:8px;
}

.info-value{
  font-size:20px;
  color:#222;
}

.buy-btn{
  width:100%;
  border:none;
  padding:18px;
  background:#111;
  color:#fff;
  font-size:24px;
  border-radius:16px;
  margin-top:20px;
  cursor:pointer;
}

@media(max-width:768px){

  .detail-header h2{
    font-size:24px;
  }

  .close-btn{
    width:50px;
    height:50px;
    font-size:28px;
  }

  .product-name{
    font-size:24px;
  }

  .price{
    font-size:28px;
  }

  .old-price{
    font-size:18px;
  }

  .tab-btn{
    font-size:18px;
    padding:12px;
  }

  .info-title{
    font-size:18px;
  }

  .info-value{
    font-size:16px;
  }

}

</style>
</head>

<body>

<div class="detail-overlay"
onclick="closeDetail()"></div>

<div class="detail-panel"
id="detailPanel">

  <div class="detail-header">

    <h2>Thông số sản phẩm</h2>

    <button class="close-btn"
    onclick="closeDetail()">
      ×
    </button>

  </div>

  <img id="detailImg"
  class="detail-img">

  <div class="detail-content">

    <div class="product-name"
    id="detailName">
    </div>

    <div class="price-wrap">

      <div class="price"
      id="detailPrice">
      </div>

      <div class="old-price"
      id="detailOldPrice">
      </div>

      <div class="sale"
      id="detailSale">
      </div>

    </div>

    <!-- TABS -->
    <div class="tabs">

      <button class="tab-btn active"
      onclick="openTab('info')">
        Thông tin
      </button>

      <button class="tab-btn"
      onclick="openTab('design')">
        Thiết kế
      </button>

      <button class="tab-btn"
      onclick="openTab('config')">
        Cấu hình
      </button>

    </div>

    <!-- INFO -->
    <div class="tab-content active"
    id="info">

      <div class="info-box">
        <div class="info-title">
          Danh mục:
        </div>

        <div class="info-value"
        id="detailCategory">
        </div>
      </div>

      <div class="info-box">
        <div class="info-title">
          Bảo hành:
        </div>

        <div class="info-value"
        id="detailBaoHanh">
        </div>
      </div>

      <div class="info-box">
        <div class="info-title">
          Mô tả:
        </div>

        <div class="info-value"
        id="detailDesc">
        </div>
      </div>

    </div>

    <!-- DESIGN -->
    <div class="tab-content"
    id="design">

      <div class="info-box">
        <div class="info-title">
          Thiết kế:
        </div>

        <div class="info-value"
        id="detailDesign">
        </div>
      </div>

      <div class="info-box">
        <div class="info-title">
          Chất liệu:
        </div>

        <div class="info-value"
        id="detailMaterial">
        </div>
      </div>

    </div>

    <!-- CONFIG -->
    <div class="tab-content"
    id="config">

      <div class="info-box">
        <div class="info-title">
          Model:
        </div>

        <div class="info-value"
        id="detailModel">
        </div>
      </div>

      <div class="info-box">
        <div class="info-title">
          Kết nối:
        </div>

        <div class="info-value"
        id="detailConnect">
        </div>
      </div>

      <div class="info-box">
        <div class="info-title">
          Độ phân giải:
        </div>

        <div class="info-value"
        id="detailResolution">
        </div>
      </div>

    </div>

    <button class="buy-btn"
    onclick="addCurrentToCart()">

      🛒 Thêm vào giỏ hàng

    </button>

  </div>

</div>

<script>

let currentProduct = null;

/* OPEN DETAIL */
function openDetail(id){

  const products =
    JSON.parse(
      localStorage.getItem("products")
    ) || [];

  const p =
    products.find(
      x => String(x.id) === String(id)
    );

  if(!p) return;

  currentProduct = p;

  document
  .getElementById("detailImg")
  .src = p.img || "";

  document
  .getElementById("detailName")
  .innerText = p.name || "";

  document
  .getElementById("detailPrice")
  .innerText =
    Number(p.price || 0)
    .toLocaleString() + "đ";

  document
  .getElementById("detailOldPrice")
  .innerText =
    p.oldPrice
    ? Number(p.oldPrice)
      .toLocaleString() + "đ"
    : "";

  /* SALE */
  let sale = "";

  if(
    p.oldPrice &&
    p.oldPrice > p.price
  ){

    const percent =
      Math.round(
        (1 - p.price / p.oldPrice) * 100
      );

    sale = "-" + percent + "%";
  }

  document
  .getElementById("detailSale")
  .innerText = sale;

  document
  .getElementById("detailCategory")
  .innerText =
    p.categoryName || p.category;

  document
  .getElementById("detailBaoHanh")
  .innerText =
    p.baoHanh || "Đang cập nhật";

  document
  .getElementById("detailDesc")
  .innerText =
    p.desc || "Không có mô tả";

  document
  .getElementById("detailDesign")
  .innerText =
    p.thietKe || "Đang cập nhật";

  document
  .getElementById("detailMaterial")
  .innerText =
    p.chatLieu || "Đang cập nhật";

  document
  .getElementById("detailModel")
  .innerText =
    p.model || "Đang cập nhật";

  document
  .getElementById("detailConnect")
  .innerText =
    p.ketNoi || "Đang cập nhật";

  document
  .getElementById("detailResolution")
  .innerText =
    p.doPhanGiai || "Đang cập nhật";

  setTimeout(()=>{

    document
    .getElementById("detailPanel")
    .classList.add("active");

  },50);

}

/* CLOSE */
function closeDetail(){

  document
  .getElementById("detailPanel")
  .classList.remove("active");

}

/* TAB */
function openTab(id){

  document
  .querySelectorAll(".tab-content")
  .forEach(tab=>{

    tab.classList.remove("active");

  });

  document
  .querySelectorAll(".tab-btn")
  .forEach(btn=>{

    btn.classList.remove("active");

  });

  document
  .getElementById(id)
  .classList.add("active");

  event.target
  .classList.add("active");

}

/* ADD CART */
function addCurrentToCart(){

  if(!currentProduct) return;

  let cart =
    JSON.parse(
      localStorage.getItem("cart")
    ) || [];

  const exist =
    cart.find(
      x =>
      String(x.id) ===
      String(currentProduct.id)
    );

  if(exist){

    exist.qty += 1;

  }else{

    cart.push({

      ...currentProduct,

      qty:1

    });

  }

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  alert("Đã thêm vào giỏ 🛒");

}

</script>

</body>
</html>
