<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Thông số sản phẩm</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial;
  background:#f3f3f3;
}

/* HEADER */
.topbar{
  background:#00acc1;
  color:#fff;
  padding:25px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.topbar h2{
  font-size:22px;
  font-weight:normal;
}

.close-btn{
  width:60px;
  height:60px;
  border-radius:50%;
  background:#fff;
  color:#111;
  border:none;
  font-size:34px;
  cursor:pointer;
}

/* TABS */
.tabs{
  display:flex;
  gap:15px;
  padding:25px 20px 10px;
}

.tab-btn{
  border:none;
  background:#e9e9e9;
  padding:15px 28px;
  border-radius:18px;
  font-size:18px;
  cursor:pointer;
}

.tab-btn.active{
  background:#00acc1;
  color:#fff;
}

/* CONTENT */
.content{
  padding:10px 20px 30px;
}

.info-box{
  background:#f7f7f7;
  border-radius:22px;
  padding:28px;
  margin-bottom:20px;
  font-size:20px;
  line-height:1.8;
}

.info-box b{
  display:block;
  margin-bottom:8px;
  color:#111;
}

/* MOBILE */
@media(max-width:768px){

  .topbar{
    padding:20px;
  }

  .topbar h2{
    font-size:18px;
  }

  .close-btn{
    width:50px;
    height:50px;
    font-size:28px;
  }

  .tabs{
    gap:10px;
    padding:20px 15px 10px;
  }

  .tab-btn{
    padding:12px 20px;
    font-size:16px;
  }

  .content{
    padding:10px 15px 20px;
  }

  .info-box{
    padding:22px;
    border-radius:18px;
    font-size:17px;
  }

}

</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">

  <h2>
    Thông số sản phẩm
  </h2>

  <button
    class="close-btn"
    onclick="history.back()">

    ×

  </button>

</div>

<!-- TAB -->
<div class="tabs">

  <button
    class="tab-btn active"
    onclick="showTab('info',this)">

    Thông tin

  </button>

  <button
    class="tab-btn"
    onclick="showTab('design',this)">

    Thiết kế

  </button>

  <button
    class="tab-btn"
    onclick="showTab('config',this)">

    Cấu hình

  </button>

</div>

<!-- CONTENT -->
<div class="content">

  <!-- INFO -->
  <div id="info-tab"
    class="tab-content">

    <div class="info-box">
      <b>Danh mục:</b>
      <span id="category"></span>
    </div>

    <div class="info-box">
      <b>Bảo hành:</b>
      <span id="baohanh"></span>
    </div>

    <div class="info-box">
      <b>Mô tả:</b>
      <span id="mota"></span>
    </div>

  </div>

  <!-- DESIGN -->
  <div id="design-tab"
    class="tab-content"
    style="display:none;">

    <div class="info-box">
      <b>Thiết kế:</b>
      <span id="thietke"></span>
    </div>

    <div class="info-box">
      <b>Chất liệu:</b>
      <span id="chatlieu"></span>
    </div>

  </div>

  <!-- CONFIG -->
  <div id="config-tab"
    class="tab-content"
    style="display:none;">

    <div class="info-box">
      <b>Model:</b>
      <span id="model"></span>
    </div>

    <div class="info-box">
      <b>Độ phân giải:</b>
      <span id="dophangiai"></span>
    </div>

    <div class="info-box">
      <b>Kết nối:</b>
      <span id="ketnoi"></span>
    </div>

  </div>

</div>

<script>

/* =========================
   GET PRODUCT
========================= */

const params =
  new URLSearchParams(
    window.location.search
  );

const id =
  params.get("id");

const products =
  JSON.parse(
    localStorage.getItem("products")
  ) || [];

const product =
  products.find(
    p => String(p.id) === String(id)
  );

/* =========================
   SHOW DATA
========================= */

if(product){

  document.getElementById("category")
  .innerText =
    product.categoryName ||
    product.category ||
    "Không rõ";

  document.getElementById("baohanh")
  .innerText =
    product.baoHanh ||
    "Đang cập nhật";

  document.getElementById("mota")
  .innerText =
    product.desc ||
    "Không có mô tả";

  document.getElementById("thietke")
  .innerText =
    product.thietKe ||
    "Đang cập nhật";

  document.getElementById("chatlieu")
  .innerText =
    product.chatLieu ||
    "Đang cập nhật";

  document.getElementById("model")
  .innerText =
    product.model ||
    "Đang cập nhật";

  document.getElementById("dophangiai")
  .innerText =
    product.doPhanGiai ||
    "Đang cập nhật";

  document.getElementById("ketnoi")
  .innerText =
    product.ketNoi ||
    "Đang cập nhật";

}

/* =========================
   TAB
========================= */

function showTab(tab,btn){

  document
  .querySelectorAll(".tab-content")
  .forEach(el => {
    el.style.display = "none";
  });

  document
  .querySelectorAll(".tab-btn")
  .forEach(el => {
    el.classList.remove("active");
  });

  document.getElementById(
    tab + "-tab"
  ).style.display = "block";

  btn.classList.add("active");

}

</script>

</body>
</html>
