<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Chi tiết sản phẩm</title>

<link rel="stylesheet"
href="logo-mobile.css">

</head>

<body>

<!-- OVERLAY -->
<div id="overlay"
onclick="closePanel()"></div>

<!-- SIDEBAR -->
<div class="sidebar"
id="sidebar">

  <h3>Danh mục</h3>

  <a href="index.html">
    Trang chủ
  </a>

  <a href="cart.html">
    Giỏ hàng
  </a>

  <a href="camera-trong-nha.html">
    Camera trong nhà
  </a>

  <a href="camera-ngoai-troi.html">
    Camera ngoài trời
  </a>

  <a href="the-nho.html">
    Thẻ nhớ
  </a>

  <a href="combo-khuyenmai.html">
    Combo khuyến mãi
  </a>

  <a href="admin.html">
    Admin
  </a>

</div>

<!-- HEADER -->
<header class="header-pro">

  <!-- MENU -->
  <div class="menu-btn"
    onclick="toggleMenu()">

    ☰

  </div>

  <!-- LOGO -->
  <div class="logo">

    <img
      src="https://i.ibb.co/Z1kv9nJj/logo.png"
      alt="logo">

  </div>

  <!-- SEARCH -->
  <div class="search-box">

    <input
      type="text"
      placeholder="Tìm kiếm sản phẩm...">

  </div>

  <!-- CART -->
  <a href="cart.html"
    class="cart-mobile">

    🛒

    <span id="cart-count">
      0
    </span>

  </a>

</header>

<!-- CONTAINER -->
<div class="container">

  <!-- IMAGE -->
  <div class="left">

    <img
      id="detailImg"
      src="">

  </div>

  <!-- INFO -->
  <div class="right">

    <h2 id="detailName">
      Camera Wifi Ezviz
    </h2>

    <!-- GIÁ -->
    <div class="price-row">

      <span class="price"
        id="detailPrice">

        1.290.000đ

      </span>

      <span class="old"
        id="detailOldPrice">

        1.690.000đ

      </span>

    </div>

    <!-- BUTTON -->
    <button class="btn"
      onclick="addCurrentToCart()">

      🛒 Thêm vào giỏ

    </button>

  </div>

</div>

<!-- TABS -->
<div class="tabs">

  <button class="active"
    onclick="openTab('info',this)">

    Thông tin

  </button>

  <button
    onclick="openTab('design',this)">

    Thiết kế

  </button>

  <button
    onclick="openTab('config',this)">

    Cấu hình

  </button>

</div>

<!-- INFO -->
<div class="spec-box tab-content active"
id="info">

  <div class="spec-line">

    <b>Danh mục:</b><br>

    <span id="detailCategory">
    </span>

  </div>

  <div class="spec-line">

    <b>Bảo hành:</b><br>

    <span id="detailBaoHanh">
    </span>

  </div>

  <div class="spec-line">

    <b>Mô tả:</b><br>

    <span id="detailDesc">
    </span>

  </div>

</div>

<!-- DESIGN -->
<div class="spec-box tab-content"
id="design">

  <div class="spec-line">

    <b>Thiết kế:</b><br>

    <span id="detailDesign">
    </span>

  </div>

  <div class="spec-line">

    <b>Chất liệu:</b><br>

    <span id="detailMaterial">
    </span>

  </div>

</div>

<!-- CONFIG -->
<div class="spec-box tab-content"
id="config">

  <div class="spec-line">

    <b>Model:</b><br>

    <span id="detailModel">
    </span>

  </div>

  <div class="spec-line">

    <b>Kết nối:</b><br>

    <span id="detailConnect">
    </span>

  </div>

  <div class="spec-line">

    <b>Độ phân giải:</b><br>

    <span id="detailResolution">
    </span>

  </div>

</div>

<script>

/* GET PRODUCT */
const params =
new URLSearchParams(
  window.location.search
);

const id = params.get("id");

const products =
JSON.parse(
  localStorage.getItem("products")
) || [];

const product =
products.find(
  p => String(p.id) === String(id)
);

/* SHOW */
if(product){

  document
  .getElementById("detailImg")
  .src = product.img || "";

  document
  .getElementById("detailName")
  .innerText =
  product.name || "";

  document
  .getElementById("detailPrice")
  .innerText =
  Number(product.price || 0)
  .toLocaleString() + "đ";

  document
  .getElementById("detailOldPrice")
  .innerText =
  product.oldPrice
  ? Number(product.oldPrice)
    .toLocaleString() + "đ"
  : "";

  document
  .getElementById("detailCategory")
  .innerText =
  product.categoryName ||
  product.category || "";

  document
  .getElementById("detailBaoHanh")
  .innerText =
  product.baoHanh ||
  "Đang cập nhật";

  document
  .getElementById("detailDesc")
  .innerText =
  product.desc ||
  "Không có mô tả";

  document
  .getElementById("detailDesign")
  .innerText =
  product.thietKe ||
  "Đang cập nhật";

  document
  .getElementById("detailMaterial")
  .innerText =
  product.chatLieu ||
  "Đang cập nhật";

  document
  .getElementById("detailModel")
  .innerText =
  product.model ||
  "Đang cập nhật";

  document
  .getElementById("detailConnect")
  .innerText =
  product.ketNoi ||
  "Đang cập nhật";

  document
  .getElementById("detailResolution")
  .innerText =
  product.doPhanGiai ||
  "Đang cập nhật";

}

/* TAB */
function openTab(id,btn){

  document
  .querySelectorAll(".tab-content")
  .forEach(el=>{
    el.classList.remove("active");
  });

  document
  .querySelectorAll(".tabs button")
  .forEach(el=>{
    el.classList.remove("active");
  });

  document
  .getElementById(id)
  .classList.add("active");

  btn.classList.add("active");
}

/* MENU */
function toggleMenu(){

  document
  .getElementById("sidebar")
  .classList.toggle("active");

  document
  .getElementById("overlay")
  .classList.toggle("active");
}

/* ADD CART */
function addCurrentToCart(){

  if(!product) return;

  let cart =
  JSON.parse(
    localStorage.getItem("cart")
  ) || [];

  const exist =
  cart.find(
    x =>
    String(x.id) ===
    String(product.id)
  );

  if(exist){

    exist.qty += 1;

  }else{

    cart.push({
      ...product,
      qty:1
    });

  }

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  updateCartCount();

  alert("Đã thêm vào giỏ 🛒");
}

/* COUNT */
function updateCartCount(){

  const cart =
  JSON.parse(
    localStorage.getItem("cart")
  ) || [];

  let total = 0;

  cart.forEach(i=>{
    total += i.qty || 1;
  });

  document
  .getElementById("cart-count")
  .innerText = total;
}

updateCartCount();

</script>

</body>
</html>
