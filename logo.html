<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi tiết sản phẩm</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
  font-weight:bold;
}

body{
  background:#f5f5f5;
  color:#111;
}

/* HEADER */
header{
  position:sticky;
  top:0;
  z-index:999;
  display:flex;
  align-items:center;
  gap:5px;
  padding:10px;
  background:#33A0AB;
  flex-wrap:wrap;
}

.menu-btn,.icon-btn{
  width:40px;
  height:40px;
  border-radius:12px;
  background:#00acc1;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  cursor:pointer;
  text-decoration:none;
  position:relative;
}

.admin-btn{ background:#6a5acd; }

.logo{
  width:40px;
  height:40px;
  border-radius:12px;
  overflow:hidden;
  background:#fff;
}

.logo img{ width:100%; height:100%; object-fit:cover; }

.search-box{
  flex:1;
  position:relative;
  margin:5px 0;
}

.search-box input{
  width:100%;
  height:40px;
  border:none;
  border-radius:12px;
  padding:0 12px;
  outline:none;
}

.cart-count{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:#fff;
  min-width:18px;
  height:18px;
  border-radius:50%;
  font-size:10px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  left:-260px;
  width:220px;
  height:100vh;
  background:#fff;
  z-index:9999;
  transition:.3s;
  padding:20px;
}

.sidebar.active{ left:0; }

.sidebar a{
  display:block;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  background:#f5f5f5;
  text-decoration:none;
  color:#111;
}

/* OVERLAY */
#overlay, #panelOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  opacity:0;
  visibility:hidden;
  transition:.3s;
  z-index:9998;
}
#overlay.active, #panelOverlay.active{ opacity:1; visibility:visible; }

/* DETAIL */
.container{
  max-width:1000px;
  margin:15px auto;
  padding:0 10px;
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.left{
  width:300px;
  flex-shrink:0;
}

.left img{
  width:100%;
  height:300px;
  object-fit:cover;
  border-radius:16px;
  background:#fff;
}

.right{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.product-name{ font-size:24px; line-height:1.4; }
.price-row{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.price{ color:red; font-size:26px; font-weight:bold; }
.old-price{ color:#555; text-decoration:line-through; font-size:16px; }
.sale{ background:red; color:#fff; padding:4px 8px; border-radius:6px; font-size:12px; }

.action-wrap{ display:flex; flex-direction:column; gap:8px; }

.buy-btn,.spec-open-btn{
  height:44px;
  border:none;
  border-radius:12px;
  color:#fff;
  font-size:14px;
  cursor:pointer;
}

.buy-btn{ background:#111; }
.spec-open-btn{ background:#00acc1; }

.desc{
  background:#fff;
  padding:12px;
  border-radius:12px;
  line-height:1.6;
  margin-top:10px;
}

/* PANEL */
#specPanel{
  position:fixed;
  top:0;
  right:-100%;
  width:90%;
  max-width:600px;
  height:100vh;
  background:#fff;
  z-index:9999;
  transition:.3s;
  overflow-y:auto;
}

#specPanel.active{ right:0; }

.panel-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  border-bottom:1px solid #eee;
}

.panel-product{
  display:flex;
  align-items:center;
  gap:10px;
}

.panel-product img{
  width:50px;
  height:50px;
  object-fit:cover;
  border-radius:10px;
}

.close-panel{
  width:35px;
  height:35px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.spec-tabs{ display:flex; border-bottom:1px solid #eee; flex-wrap:wrap; }
.spec-tab{ border:none; background:none; padding:10px; cursor:pointer; font-weight:bold; }
.spec-tab.active{ color:red; border-bottom:3px solid red; }

.panel-body{ padding:12px; }
.spec-content{ display:none; }
.spec-content.active{ display:block; }
.spec-row{ display:flex; gap:8px; padding:6px 0; border-bottom:1px solid #eee; flex-wrap:wrap; }
.spec-label{ width:120px; color:#666; font-size:14px; }
.spec-value{ flex:1; font-size:14px; }

/* SEARCH */
.search-results{
  position:absolute;
  width:100%;
  background:#fff;
  border-radius:12px;
  margin-top:8px;
  overflow:hidden;
  z-index:999;
}
.search-result-item{
  display:flex;
  gap:6px;
  padding:6px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
.search-result-item img{
  width:50px;
  height:50px;
  object-fit:cover;
  border-radius:6px;
}

/* COMMENT */
.rating-wrap, .comment-section{ margin-top:15px; }
.comment-section input, .comment-section textarea{
  width:100%;
  padding:6px;
  margin-bottom:6px;
  font-size:14px;
}
.comment-section button{
  padding:6px 10px;
  margin-bottom:12px;
  font-size:14px;
  cursor:pointer;
}
.comment-section img.comment-img{
  max-width:100%;
  max-height:150px;
  object-fit:cover;
  border-radius:6px;
  margin-top:6px;
  display:block;
}

/* MEDIA QUERIES */
@media(max-width:768px){
  .container{ flex-direction:column; gap:12px; }
  .left{ width:100%; }
  .left img{ height:200px; }
  .right{ gap:8px; }
  .product-name{ font-size:20px; }
  .price{ font-size:20px; }
  .old-price{ font-size:14px; }
  .buy-btn,.spec-open-btn{ height:40px; font-size:14px; }
}
</style>
</head>
<body>

<div id="overlay"></div>

<div class="sidebar" id="sidebar">
  <a href="index.html">Trang chủ</a>
  <a href="camera-trong-nha.html">Camera trong nhà</a>
  <a href="camera-ngoai-troi.html">Camera ngoài trời</a>
</div>

<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="logo"><img src="https://i.ibb.co/Z1kv9nJj/logo.png"></div>
  <div class="search-box">
    <input type="text" placeholder="Tìm kiếm sản phẩm..." id="searchInput" oninput="searchProduct()">
    <div id="searchResults" class="search-results"></div>
  </div>
  <div style="display:flex;gap:10px;">
    <a href="admin.html" class="icon-btn admin-btn">🔐</a>
    <a href="cart.html" class="icon-btn">🛒<span class="cart-count" id="cartCount">0</span></a>
  </div>
</header>

<div class="container">
  <div class="left"><img id="detailImg"></div>
  <div class="right">
    <div class="product-name" id="detailName"></div>
    <div class="price-row">
      <div class="price" id="detailPrice"></div>
      <div class="old-price" id="detailOldPrice"></div>
      <div class="sale" id="detailSale"></div>
    </div>
    <div class="action-wrap">
      <button class="spec-open-btn" onclick="openPanel()">⚙️ Xem thông số</button>
      <button class="buy-btn" onclick="addToCart()">🛒 Thêm giỏ hàng</button>
    </div>
    <div class="desc" id="detailDesc"></div>

    <!-- RATING + COMMENT -->
    <div class="rating-wrap" id="ratingWrap">
      <div id="starRating" style="font-size:22px; cursor:pointer;">
        <span data-value="1">★</span>
        <span data-value="2">★</span>
        <span data-value="3">★</span>
        <span data-value="4">★</span>
        <span data-value="5">★</span>
      </div>
      <div id="ratingValue" style="margin-top:4px; font-size:14px;">0/5</div>
    </div>

    <div class="comment-section" id="commentSection">
      <input type="text" id="commentName" placeholder="Tên của bạn">
      <textarea id="commentText" placeholder="Viết bình luận..."></textarea>
      <input type="file" id="commentImage">
      <button onclick="submitComment()">Gửi bình luận</button>
      <div id="commentList"></div>
    </div>

  </div>
</div>

<div id="panelOverlay"></div>

<div id="specPanel">
  <div class="panel-top">
    <div class="panel-product">
      <img id="panelProductImg">
      <h3 id="panelProductName"></h3>
    </div>
    <button class="close-panel" onclick="closePanel()">✕</button>
  </div>
  <div class="spec-tabs">
    <button class="spec-tab active" onclick="showTab('infoTab',this)">Thông tin</button>
    <button class="spec-tab" onclick="showTab('configTab',this)">Cấu hình</button>
    <button class="spec-tab" onclick="showTab('designTab',this)">Thiết kế</button>
  </div>
  <div class="panel-body">
    <div class="spec-content active" id="infoTab">
      <div class="spec-row"><div class="spec-label">Model</div><div class="spec-value" id="detailModel"></div></div>
      <div class="spec-row"><div class="spec-label">Xuất xứ</div><div class="spec-value" id="detailOrigin"></div></div>
      <div class="spec-row"><div class="spec-label">Bảo hành</div><div class="spec-value" id="detailWarranty"></div></div>
    </div>
    <div class="spec-content" id="configTab">
      <div class="spec-row"><div class="spec-label">Độ phân giải</div><div class="spec-value" id="detailResolution"></div></div>
      <div class="spec-row"><div class="spec-label">Góc nhìn</div><div class="spec-value" id="detailViewAngle"></div></div>
      <div class="spec-row"><div class="spec-label">Kết nối</div><div class="spec-value" id="detailConnect"></div></div>
    </div>
    <div class="spec-content" id="designTab">
      <div class="spec-row"><div class="spec-label">Thiết kế</div><div class="spec-value" id="detailThietKe"></div></div>
      <div class="spec-row"><div class="spec-label">Chất liệu</div><div class="spec-value" id="detailChatLieu"></div></div>
      <div class="spec-row"><div class="spec-label">Công suất</div><div class="spec-value" id="detailCongSuat"></div></div>
    </div>
  </div>
</div>

<script type="module">
// JS logic giống như bản trước (Firebase, loadProduct, addToCart, searchProduct, submitComment)
</script>
</body>
</html>
