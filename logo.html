<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Chi tiết sản phẩm</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#f5f5f5;
  color:#111;
}

/* HEADER */

header{
  position:sticky;
  top:0;
  z-index:999;
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  background:#33A0AB;
}

.menu-btn,
.icon-btn{
  width:46px;
  height:46px;
  border-radius:14px;
  background:#00acc1;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  font-size:22px;
  cursor:pointer;
  position:relative;
}

.admin-btn{
  background:#6a5acd;
}

.logo{
  width:46px;
  height:46px;
  border-radius:14px;
  overflow:hidden;
  background:#fff;
}

.logo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.search-box{
  flex:1;
  position:relative;
}

.search-box input{
  width:100%;
  height:46px;
  border:none;
  border-radius:14px;
  padding:0 14px;
  outline:none;
}

.cart-count{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:#fff;
  min-width:20px;
  height:20px;
  border-radius:50%;
  font-size:11px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* SIDEBAR */

.sidebar{
  position:fixed;
  top:0;
  left:-280px;
  width:260px;
  height:100vh;
  background:#fff;
  z-index:9999;
  transition:.3s;
  padding:20px;
}

.sidebar.active{
  left:0;
}

.sidebar a{
  display:block;
  padding:14px;
  margin-bottom:10px;
  border-radius:12px;
  background:#f5f5f5;
  text-decoration:none;
  color:#111;
  font-weight:bold;
}

#overlay,
#panelOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  opacity:0;
  visibility:hidden;
  transition:.3s;
  z-index:9998;
}

#overlay.active,
#panelOverlay.active{
  opacity:1;
  visibility:visible;
}

/* DETAIL */

.container{
  max-width:1000px;
  margin:10px auto;
  padding:10px;

  display:flex;
  align-items:flex-start;
  gap:14px;
}

.left{
  width:150px;
  flex-shrink:0;
}

.left img{
  width:150px;
  height:150px;
  object-fit:cover;
  border-radius:16px;
  display:block;
}

.right{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:10px;
  padding-top:2px;
}

.product-name{
  font-size:22px;
  font-weight:800;
  line-height:1.4;
}

.price-row{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.price{
  color:red;
  font-size:24px;
  font-weight:bold;
}

.old-price{
  text-decoration:line-through;
  color:#666;
}

.sale{
  background:red;
  color:#fff;
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
}

.action-wrap{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.buy-btn,
.spec-open-btn{
  height:42px;
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.buy-btn{
  background:#111;
}

.spec-open-btn{
  background:#00acc1;
}

.desc{
  background:#fff;
  border-radius:14px;
  padding:12px;
  line-height:1.6;
}

/* PANEL */

#specPanel{
  position:fixed;
  top:0;
  right:-100%;
  width:620px;
  max-width:100%;
  height:100vh;
  background:#fff;
  z-index:9999;
  transition:.3s;
  overflow-y:auto;
}

#specPanel.active{
  right:0;
}

.panel-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  border-bottom:1px solid #eee;
}

.panel-product{
  display:flex;
  align-items:center;
  gap:10px;
}

.panel-product img{
  width:50px;
  height:50px;
  object-fit:cover;
  border-radius:10px;
}

.close-panel{
  width:40px;
  height:40px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.spec-tabs{
  display:flex;
  border-bottom:1px solid #eee;
}

.spec-tab{
  border:none;
  background:none;
  padding:14px;
  cursor:pointer;
  font-weight:bold;
}

.spec-tab.active{
  color:red;
  border-bottom:3px solid red;
}

.panel-body{
  padding:14px;
}

.spec-content{
  display:none;
}

.spec-content.active{
  display:block;
}

.spec-row{
  display:flex;
  gap:10px;
  padding:12px 0;
  border-bottom:1px solid #eee;
}

.spec-label{
  width:120px;
  color:#666;
}

.spec-value{
  flex:1;
}

/* SEARCH */

.search-results{
  position:absolute;
  width:100%;
  background:#fff;
  border-radius:12px;
  margin-top:4px;
  overflow:hidden;
  z-index:999;
}

.search-result-item{
  display:flex;
  gap:8px;
  padding:8px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.search-result-item img{
  width:40px;
  height:40px;
  object-fit:cover;
  border-radius:6px;
}

@media(max-width:768px){

  .container{
    gap:10px;
  }

  .left{
    width:120px;
  }

  .left img{
    width:120px;
    height:120px;
  }

}
</style>
</head>

<body>

<div id="overlay"></div>

<div class="sidebar" id="sidebar">
  <a href="index.html">Trang chủ</a>
  <a href="camera-trong-nha.html">Camera trong nhà</a>
  <a href="camera-ngoai-troi.html">Camera ngoài trời</a>
</div>

<header>

  <div class="menu-btn" onclick="toggleMenu()">☰</div>

  <div class="logo">
    <img src="https://i.ibb.co/Z1kv9nJj/logo.png">
  </div>

  <div class="search-box">

    <input
      type="text"
      placeholder="Tìm kiếm sản phẩm..."
      id="searchInput"
      oninput="searchProduct()"
    >

    <div id="searchResults" class="search-results"></div>

  </div>

  <div style="display:flex;gap:10px;">

    <a href="admin.html" class="icon-btn admin-btn">🔐</a>

    <a href="cart.html" class="icon-btn">
      🛒
      <span class="cart-count" id="cartCount">0</span>
    </a>

  </div>

</header>

<div class="container">

  <div class="left">
    <img id="detailImg">
  </div>

  <div class="right">

    <div class="product-name" id="detailName"></div>

    <div class="price-row">
      <div class="price" id="detailPrice"></div>
      <div class="old-price" id="detailOldPrice"></div>
      <div class="sale" id="detailSale"></div>
    </div>

    <div class="action-wrap">

      <button class="spec-open-btn" onclick="openPanel()">
        ⚙️ Xem thông số
      </button>

      <button class="buy-btn" onclick="addToCart()">
        🛒 Thêm giỏ hàng
      </button>

    </div>

    <div class="desc" id="detailDesc"></div>

  </div>

</div>

<div id="panelOverlay"></div>

<div id="specPanel">

  <div class="panel-top">

    <div class="panel-product">
      <img id="panelProductImg">
      <h3 id="panelProductName"></h3>
    </div>

    <button class="close-panel" onclick="closePanel()">✕</button>

  </div>

  <div class="spec-tabs">

    <button class="spec-tab active" onclick="showTab('infoTab',this)">
      Thông tin
    </button>

    <button class="spec-tab" onclick="showTab('basicTab',this)">
      Cấu hình
    </button>

  </div>

  <div class="panel-body">

    <div class="spec-content active" id="infoTab">

      <div class="spec-row">
        <div class="spec-label">Model</div>
        <div class="spec-value" id="detailModel"></div>
      </div>

      <div class="spec-row">
        <div class="spec-label">Xuất xứ</div>
        <div class="spec-value" id="detailOrigin"></div>
      </div>

    </div>

    <div class="spec-content" id="basicTab">

      <div class="spec-row">
        <div class="spec-label">Độ phân giải</div>
        <div class="spec-value" id="detailResolution"></div>
      </div>

      <div class="spec-row">
        <div class="spec-label">Kết nối</div>
        <div class="spec-value" id="detailConnect"></div>
      </div>

    </div>

  </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

  apiKey:"AIzaSyDYVcBEYJN1HUCta3XdJAUBe4TGLnmy7y4",

  authDomain:"stech-73b89.firebaseapp.com",

  projectId:"stech-73b89",

  storageBucket:"stech-73b89.firebasestorage.app",

  messagingSenderId:"873739162979",

  appId:"1:873739162979:web:978f1a4043f025b1cdaf56"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let products = [];
let product = null;

async function loadProduct(){

  const querySnapshot =
  await getDocs(collection(db,"products"));

  querySnapshot.forEach(doc=>{

    products.push(doc.data());

  });

  product = products.find(
    p => String(p.id) === String(id)
  );

  if(!product) return;

  detailImg.src = product.img || "";
  panelProductImg.src = product.img || "";

  detailName.innerText = product.name || "";
  panelProductName.innerText = product.name || "";

  detailPrice.innerText =
    Number(product.price || 0).toLocaleString()+"đ";

  detailOldPrice.innerText =
    product.oldPrice
    ? Number(product.oldPrice).toLocaleString()+"đ"
    : "";

  detailDesc.innerText =
    product.desc || "Không có mô tả";

  detailModel.innerText =
    product.model || "Đang cập nhật";

  detailOrigin.innerText =
    product.xuatXu || "Đang cập nhật";

  detailResolution.innerText =
    product.doPhanGiai || "Đang cập nhật";

  detailConnect.innerText =
    product.ketNoi || "Đang cập nhật";

  if(
    product.oldPrice &&
    Number(product.oldPrice) > Number(product.price)
  ){

    const sale = Math.round(
      ((product.oldPrice-product.price)/product.oldPrice)*100
    );

    detailSale.innerText = "-" + sale + "%";

  }else{

    detailSale.style.display = "none";

  }

}

loadProduct();

function toggleMenu(){

  sidebar.classList.toggle("active");
  overlay.classList.toggle("active");

}

function openPanel(){

  specPanel.classList.add("active");
  panelOverlay.classList.add("active");

}

function closePanel(){

  specPanel.classList.remove("active");
  panelOverlay.classList.remove("active");

}

function showTab(tabId,btn){

  document
  .querySelectorAll(".spec-content")
  .forEach(el=>el.classList.remove("active"));

  document
  .querySelectorAll(".spec-tab")
  .forEach(el=>el.classList.remove("active"));

  document
  .getElementById(tabId)
  .classList.add("active");

  btn.classList.add("active");

}

function addToCart(){

  if(!product) return;

  let cart =
  JSON.parse(localStorage.getItem("cart")) || [];

  const exist = cart.find(
    x => String(x.id) === String(product.id)
  );

  if(exist){

    exist.qty += 1;

  }else{

    cart.push({
      ...product,
      qty:1
    });

  }

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  updateCartCount();

  alert("Đã thêm vào giỏ");

}

function updateCartCount(){

  const cart =
  JSON.parse(localStorage.getItem("cart")) || [];

  let total = 0;

  cart.forEach(item=>{

    total += item.qty || 1;

  });

  cartCount.innerText = total;

}

updateCartCount();

function searchProduct(){

  const term =
  searchInput.value.toLowerCase();

  searchResults.innerHTML = "";

  if(term === "") return;

  const filtered =
  products.filter(
    p => p.name.toLowerCase().includes(term)
  );

  filtered.forEach(p=>{

    const div =
    document.createElement("div");

    div.className = "search-result-item";

    div.innerHTML = `
      <img src="${p.img}">
      <div>
        <strong>${p.name}</strong>
        <div style="color:red;font-weight:bold;">
          ${Number(p.price).toLocaleString()}đ
        </div>
      </div>
    `;

    div.onclick = ()=>{

      window.location.href =
      "logo.html?id=" + p.id;

    };

    searchResults.appendChild(div);

  });

}

window.toggleMenu = toggleMenu;
window.openPanel = openPanel;
window.closePanel = closePanel;
window.showTab = showTab;
window.addToCart = addToCart;
window.searchProduct = searchProduct;

</script>

</body>
</html>
