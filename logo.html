<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Chi tiết sản phẩm</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
   font-weight:bold;
}

body{
  background:#f5f5f5;
  color:#111;
}

/* HEADER */

header{
  position:sticky;
  top:0;
  z-index:999;
  display:flex;
  align-items:center;
  gap:5px;
  padding:12px;
  background:#33A0AB;
}

.menu-btn,
.icon-btn{
  width:46px;
  height:46px;
  border-radius:14px;
  background:#00acc1;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  font-size:22px;
  cursor:pointer;
  position:relative;
}

.admin-btn{
  background:#6a5acd;
}

.logo{
  width:46px;
  height:46px;
  border-radius:14px;
  overflow:hidden;
  background:#fff;
}

.logo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.search-box{
  flex:1;
  position:relative;
}

.search-box input{
  width:100%;
  height:46px;
  border:none;
  border-radius:14px;
  padding:0 14px;
  outline:none;
}

.cart-count{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:#fff;
  min-width:20px;
  height:20px;
  border-radius:50%;
  font-size:11px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* SIDEBAR */

.sidebar{
  position:fixed;
  top:0;
  left:-280px;
  width:260px;
  height:100vh;
  background:#fff;
  z-index:9999;
  transition:.3s;
  padding:20px;
}

.sidebar.active{
  left:0;
}

.sidebar a{
  display:block;
  padding:14px;
  margin-bottom:10px;
  border-radius:12px;
  background:#f5f5f5;
  text-decoration:none;
  color:#111;
  font-weight:bold;
}

#overlay,
#panelOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  opacity:0;
  visibility:hidden;
  transition:.3s;
  z-index:9998;
}

#overlay.active,
#panelOverlay.active{
  opacity:1;
  visibility:visible;
}

/* DETAIL */

.container{
  max-width:1000px;
  margin:0auto;
  padding:0px;
  display:flex;
  gap:18px;
  align-items:flex-start;
}

.left{
  width:330px;
  flex-shrink:0;
}

.left img{
  width:100%;
  height:330px;
  object-fit:cover;
  border-radius:18px;
  background:#fff;
}

.right{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.product-name{
  font-size:28px;
  font-weight:800;
  line-height:1.4;
}

.price-row{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.price{
  color:red;
  font-size:32px;
  font-weight:bold;
}

.old-price{
  color:#555;
  text-decoration:line-through;
  font-size:18px;
}

.sale{
  background:red;
  color:#fff;
  padding:5px 10px;
  border-radius:8px;
  font-size:13px;
  font-weight:bold;
}

.action-wrap{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.buy-btn,
.spec-open-btn{
  height:48px;
  border:none;
  border-radius:14px;
  color:#fff;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.buy-btn{
  background:#111;
}

.spec-open-btn{
  background:#00acc1;
}

.desc{
  background:#fff;
  padding:14px;
  border-radius:16px;
  line-height:1.7;
}

/* PANEL */

#specPanel{
  position:fixed;
  top:0;
  right:-100%;
  width:620px;
  max-width:100%;
  height:100vh;
  background:#fff;
  z-index:9999;
  transition:.3s;
  overflow-y:auto;
}

#specPanel.active{
  right:0;
}

.panel-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  border-bottom:1px solid #eee;
}

.panel-product{
  display:flex;
  align-items:center;
  gap:10px;
}

.panel-product img{
  width:50px;
  height:50px;
  object-fit:cover;
  border-radius:10px;
}

.close-panel{
  width:40px;
  height:40px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.spec-tabs{
  display:flex;
  border-bottom:1px solid #eee;
}

.spec-tab{
  border:none;
  background:none;
  padding:14px;
  cursor:pointer;
  font-weight:bold;
}

.spec-tab.active{
  color:red;
  border-bottom:3px solid red;
}

.panel-body{
  padding:14px;
}

.spec-content{
  display:none;
}

.spec-content.active{
  display:block;
}

.spec-row{
  display:flex;
  gap:10px;
  padding:8px 0;
  border-bottom:1px solid #eee;
}

.spec-label{
  width:120px;
  color:#666;
}

.spec-value{
  flex:1;
}

/* SEARCH */

.search-results{
  position:absolute;
  width:100%;
  background:#fff;
  border-radius:12px;
  margin-top:10px;
  overflow:hidden;
  z-index:999;
}

.search-result-item{
  display:flex;
  gap:8px;
  padding:8px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.search-result-item img{
  width:50px;
  height:50px;
  object-fit:cover;
  border-radius:8px;
}

@media(max-width:768px){
.menu-btn,
  .icon-btn{
    width:42px;
    height:42px;
    font-size:20px;
  }

  .logo{
    width:39px;
    height:39px;
  }

  
  .container{
    flex-direction:row;
    align-items:flex-start;
    gap:14px;
    padding:1px; 
      
  }
}

  .left{
    width:120px;
    flex-shrink:0;
  }

  .left img{
    width:130px;
    height:178px;
    border-radius:18px;
    object-fit:cover;
  }

  .right{
    flex:1;
    gap:10px;
    padding-top:2px;
  }

  .product-name{
    font-size:18px;
    line-height:1.4;
  }

  .price{
    font-size:22px;
  }

  .old-price{
    font-size:14px;
  }

  .sale{
    font-size:12px;
    padding:4px 8px;
    border-radius:10px;
  }

  .buy-btn,
  .spec-open-btn{
    height:46px;
    font-size:15px;
    border-radius:18px;
  }

}

</style>
</head>

<body>

<div id="overlay"></div>

<div class="sidebar" id="sidebar">
  <a href="index.html">Trang chủ</a>
  <a href="camera-trong-nha.html">Camera trong nhà</a>
   <a href="idproduct.html">ID sản phẩm</a>
  <a href="camera-ngoai-troi.html">Camera ngoài trời</a>
</div>

<header>

  <div class="menu-btn" onclick="toggleMenu()">☰</div>

  <div class="logo">
    <img src="https://i.ibb.co/Z1kv9nJj/logo.png">
  </div>

  <div class="search-box">

    <input
      type="text"
      placeholder="Tìm kiếm sản phẩm..."
      id="searchInput"
      oninput="searchProduct()"
    >

    <div id="searchResults" class="search-results"></div>

  </div>

  <div style="display:flex;gap:10px;">

    <a href="admin.html" class="icon-btn admin-btn">🔐</a>

    <a href="cart.html" class="icon-btn">
      🛒
      <span class="cart-count" id="cartCount">0</span>
    </a>

  </div>

</header>

<div class="container">

  <div class="left">
    <img id="detailImg">
  </div>

  <div class="right">

    <div class="product-name" id="detailName"></div>

    <div class="price-row">
      <div class="price" id="detailPrice"></div>
      <div class="old-price" id="detailOldPrice"></div>
      <div class="sale" id="detailSale"></div>
    </div>

    <div class="action-wrap">

      <button class="spec-open-btn" onclick="openPanel()">
        ⚙️ Xem thông số
      </button>

      <button class="buy-btn" onclick="addToCart()">
        🛒 Thêm giỏ hàng
      </button>

    </div>

    <div class="desc" id="detailDesc"></div>

  </div>

</div>

<div id="panelOverlay"></div>

<div id="specPanel">

  <div class="panel-top">

    <div class="panel-product">
      <img id="panelProductImg">
      <h3 id="panelProductName"></h3>
    </div>

    <button class="close-panel" onclick="closePanel()">✕</button>

  </div>

  <div class="spec-tabs">

    <button class="spec-tab active" onclick="showTab('infoTab',this)">
      Thông tin
    </button>

    <button class="spec-tab" onclick="showTab('configTab',this)">
      Cấu hình
    </button>

    <button class="spec-tab" onclick="showTab('designTab',this)">
      Thiết kế
    </button>

  </div>

  <div class="panel-body">

    <!-- THÔNG TIN -->

    <div class="spec-content active" id="infoTab">

      <div class="spec-row">
        <div class="spec-label">Model</div>
        <div class="spec-value" id="detailModel"></div>
      </div>

      <div class="spec-row">
        <div class="spec-label">Xuất xứ</div>
        <div class="spec-value" id="detailOrigin"></div>
      </div>

      <div class="spec-row">
        <div class="spec-label">Bảo hành</div>
        <div class="spec-value" id="detailWarranty"></div>
      </div>

    </div>

    <!-- CẤU HÌNH -->

    <div class="spec-content" id="configTab">

      <div class="spec-row">
        <div class="spec-label">Độ phân giải</div>
        <div class="spec-value" id="detailResolution"></div>
      </div>

      <div class="spec-row">
        <div class="spec-label">Góc nhìn</div>
        <div class="spec-value" id="detailViewAngle"></div>
      </div>

      <div class="spec-row">
        <div class="spec-label">Kết nối</div>
        <div class="spec-value" id="detailConnect"></div>
      </div>

    </div>

    <!-- THIẾT KẾ -->

    <div class="spec-content" id="designTab">

      <div class="spec-row">
        <div class="spec-label">Thiết kế</div>
        <div class="spec-value" id="detailThietKe"></div>
      </div>

      <div class="spec-row">
        <div class="spec-label">Chất liệu</div>
        <div class="spec-value" id="detailChatLieu"></div>
      </div>

      <div class="spec-row">
        <div class="spec-label">Công suất</div>
        <div class="spec-value" id="detailCongSuat"></div>
      </div>

    </div>

  </div>

</div>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

document.getElementById("overlay").onclick = function(){

  document
  .getElementById("sidebar")
  .classList.remove("active");

  document
  .getElementById("overlay")
  .classList.remove("active");

}

const firebaseConfig = {
  apiKey:"AIzaSyDYVcBEYJN1HUCta3XdJAUBe4TGLnmy7y4",
  authDomain:"stech-73b89.firebaseapp.com",
  projectId:"stech-73b89",
  storageBucket:"stech-73b89.firebasestorage.app",
  messagingSenderId:"873739162979",
  appId:"1:873739162979:web:978f1a4043f025b1cdaf56"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let products = [];
let product = null;

async function loadProduct(){

  const querySnapshot =
  await getDocs(collection(db,"products"));

  querySnapshot.forEach(doc=>{
    products.push(doc.data());
  });

  product = products.find(
    p => String(p.id) === String(id)
  );

  if(!product) return;

  document.getElementById("detailImg").src = product.img || "";
  document.getElementById("panelProductImg").src = product.img || "";

  document.getElementById("detailName").innerText = product.name || "";
  document.getElementById("panelProductName").innerText = product.name || "";

  document.getElementById("detailPrice").innerText =
  Number(product.price || 0).toLocaleString()+"đ";

  document.getElementById("detailOldPrice").innerText =
  product.oldPrice
  ? Number(product.oldPrice).toLocaleString()+"đ"
  : "";

  document.getElementById("detailDesc").innerText =
  product.desc || "Không có mô tả";

  document.getElementById("detailModel").innerText =
  product.model || "Đang cập nhật";

  document.getElementById("detailOrigin").innerText =
  product.xuatXu || "Đang cập nhật";

  document.getElementById("detailWarranty").innerText =
  product.baoHanh || "Đang cập nhật";

  document.getElementById("detailResolution").innerText =
  product.doPhanGiai || "Đang cập nhật";

  document.getElementById("detailConnect").innerText =
  product.ketNoi || "Đang cập nhật";

  document.getElementById("detailViewAngle").innerText =
  product.gocNhin || "Đang cập nhật";

  document.getElementById("detailThietKe").innerText =
  product.thietKe || "Đang cập nhật";

  document.getElementById("detailChatLieu").innerText =
  product.chatLieu || "Đang cập nhật";

  document.getElementById("detailCongSuat").innerText =
  product.congSuat || "Đang cập nhật";

  const saleBox =
  document.getElementById("detailSale");

  if(
    product.oldPrice &&
    Number(product.oldPrice) > Number(product.price)
  ){

    const sale = Math.round(
      (
        (Number(product.oldPrice) - Number(product.price))
        / Number(product.oldPrice)
      ) * 100
    );

    saleBox.style.display = "inline-block";
    saleBox.innerText = "-" + sale + "%";

  }else{

    saleBox.style.display = "none";

  }

}

loadProduct();

function toggleMenu(){

  document
  .getElementById("sidebar")
  .classList.toggle("active");

  document
  .getElementById("overlay")
  .classList.toggle("active");

}

function openPanel(){

  document
  .getElementById("specPanel")
  .classList.add("active");

  document
  .getElementById("panelOverlay")
  .classList.add("active");

}

function closePanel(){

  document
  .getElementById("specPanel")
  .classList.remove("active");

  document
  .getElementById("panelOverlay")
  .classList.remove("active");

}

function showTab(tabId,btn){

  document
  .querySelectorAll(".spec-content")
  .forEach(el=>el.classList.remove("active"));

  document
  .querySelectorAll(".spec-tab")
  .forEach(el=>el.classList.remove("active"));

  document
  .getElementById(tabId)
  .classList.add("active");

  btn.classList.add("active");

}

function addToCart(){

  if(!product) return;

  let cart =
  JSON.parse(localStorage.getItem("cart")) || [];

  const exist = cart.find(
    x => String(x.id) === String(product.id)
  );

  if(exist){

    exist.qty += 1;

  }else{

    cart.push({
      ...product,
      qty:1
    });

  }

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  updateCartCount();

  alert("Đã thêm vào giỏ");

}

function updateCartCount(){

  const cart =
  JSON.parse(localStorage.getItem("cart")) || [];

  let total = 0;

  cart.forEach(item=>{
    total += item.qty || 1;
  });

  document.getElementById("cartCount").innerText =
  total;

}

updateCartCount();

function searchProduct(){

  const term =
  document.getElementById("searchInput")
  .value
  .toLowerCase();

  const resultBox =
  document.getElementById("searchResults");

  resultBox.innerHTML = "";

  if(term === "") return;

  const filtered =
  products.filter(
    p => p.name.toLowerCase().includes(term)
  );

  filtered.forEach(p=>{

    const div =
    document.createElement("div");

    div.className = "search-result-item";

    div.innerHTML = `
      <img src="${p.img}">
      <div>
        <strong>${p.name}</strong>
        <div style="color:red;font-weight:bold;">
          ${Number(p.price).toLocaleString()}đ
        </div>
      </div>
    `;

    div.onclick = ()=>{

      window.location.href =
      "logo.html?id=" + p.id;

    };

    resultBox.appendChild(div);

  });

}

window.toggleMenu = toggleMenu;
window.openPanel = openPanel;
window.closePanel = closePanel;
window.showTab = showTab;
window.addToCart = addToCart;
window.searchProduct = searchProduct;

</script>

</body>
</html>
