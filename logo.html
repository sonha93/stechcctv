<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Chi tiết sản phẩm</title>

<style>
/* ===== GIỮ NGUYÊN STYLE CỦA BẠN ===== */
*{margin:0;padding:0;box-sizing:border-box;font-weight:bold;}
body{background:#f5f5f5;color:#111;}

/* HEADER */
header{
  position:sticky;
  top:0;
  z-index:999;
  display:flex;
  align-items:center;
  gap:5px;
  padding:12px;
  background:#33A0AB;
}

.menu-btn,.icon-btn{
  width:46px;height:46px;
  border-radius:14px;
  background:#00acc1;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.logo{width:46px;height:46px;border-radius:14px;overflow:hidden;background:#fff;}
.logo img{width:100%;height:100%;object-fit:cover;}

.search-box{flex:1;position:relative;}
.search-box input{
  width:100%;height:46px;
  border:none;border-radius:14px;padding:0 14px;
}

.cart-count{
  position:absolute;top:-5px;right:-5px;
  background:red;color:#fff;
  width:20px;height:20px;
  border-radius:50%;
  font-size:11px;
  display:flex;align-items:center;justify-content:center;
}

/* SIDEBAR */
.sidebar{position:fixed;top:0;left:-280px;width:260px;height:100vh;background:#fff;transition:.3s;padding:20px;}
.sidebar.active{left:0;}
.sidebar a{display:block;padding:14px;margin-bottom:10px;background:#f5f5f5;border-radius:12px;text-decoration:none;}

#overlay,#panelOverlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.4);
  opacity:0;visibility:hidden;transition:.3s;
}
#overlay.active,#panelOverlay.active{opacity:1;visibility:visible;}

/* LAYOUT */
.container{max-width:1000px;margin:0 auto;padding:10px;display:flex;gap:18px;}
.left{width:330px;}
.left img{width:100%;height:330px;object-fit:cover;border-radius:18px;background:#fff;}

#thumbList{
  display:flex;
  gap:6px;
  margin-top:10px;
  flex-wrap:wrap;
}

#thumbList img{
  width:60px;height:60px;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
  border:1px solid #ddd;
}

.right{flex:1;}
.product-name{font-size:28px;}
.price{color:red;font-size:32px;}
.old-price{text-decoration:line-through;color:#555;}
.sale{background:red;color:#fff;padding:5px 10px;border-radius:8px;}
</style>
</head>

<body>

<div id="overlay"></div>

<div class="sidebar" id="sidebar">
  <a href="index.html">Trang chủ</a>
  <a href="camera-trong-nha.html">Camera trong nhà</a>
  <a href="camera-ngoai-troi.html">Camera ngoài trời</a>
</div>

<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>

  <div class="logo">
    <img src="https://i.ibb.co/Z1kv9nJj/logo.png">
  </div>

  <div class="search-box">
    <input id="searchInput" oninput="searchProduct()" placeholder="Tìm kiếm...">
    <div id="searchResults"></div>
  </div>

  <a class="icon-btn" href="cart.html">🛒</a>
</header>

<div class="container">

  <div class="left">
    <img id="detailImg">
    <div id="thumbList"></div>
  </div>

  <div class="right">
    <div class="product-name" id="detailName"></div>

    <div>
      <span class="price" id="detailPrice"></span>
      <span class="old-price" id="detailOldPrice"></span>
      <span class="sale" id="detailSale"></span>
    </div>

    <button onclick="addToCart()">Thêm giỏ hàng</button>

    <div id="detailDesc"></div>
  </div>

</div>

<script type="module">

import { app } from "./auth.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { addToCart as addToCartFirebase } from "./cart.js";

const db = getFirestore(app);

const id = new URLSearchParams(location.search).get("id");

let products = [];
let product = null;

/* MENU SAFE */
window.toggleMenu = function(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
};

/* LOAD LIST */
async function loadProducts(){
  const snap = await getDocs(collection(db,"products"));
  products = snap.docs.map(d => ({id:d.id,...d.data()}));
}

/* LOAD DETAIL SAFE + FIX IMAGE CRASH */
async function loadProduct(){

  const snap = await getDoc(doc(db,"products",id));
  if(!snap.exists()) return;

  product = snap.data();

  /* =========================
     SAFE IMAGE FIX (KHÔNG CRASH)
  ========================= */

  const images =
    (product.images && Array.isArray(product.images) && product.images.length)
      ? product.images
      : (product.img ? [product.img] : []);

  const mainImg = document.getElementById("detailImg");
  if(mainImg && images.length) mainImg.src = images[0];

  const thumbBox = document.getElementById("thumbList");
  if(thumbBox){
    thumbBox.innerHTML = "";

    images.forEach(img=>{
      const el = document.createElement("img");
      el.src = img;

      el.onclick = ()=>{
        if(mainImg) mainImg.src = img;
      };

      thumbBox.appendChild(el);
    });
  }

  /* TEXT */
  document.getElementById("detailName").innerText = product.name || "";
  document.getElementById("detailPrice").innerText = (product.price||0).toLocaleString()+"đ";
  document.getElementById("detailOldPrice").innerText = product.oldPrice ? (product.oldPrice).toLocaleString()+"đ" : "";
  document.getElementById("detailDesc").innerText = product.desc || "";

  /* SALE */
  const sale = document.getElementById("detailSale");
  if(product.oldPrice > product.price){
    sale.innerText = "-" + Math.round((1 - product.price/product.oldPrice)*100) + "%";
  } else {
    sale.style.display = "none";
  }
}

/* ADD CART SAFE */
window.addToCart = async function(){
  if(!product) return;
  await addToCartFirebase(product);
  alert("Đã thêm giỏ");
};

/* SEARCH SAFE */
window.searchProduct = function(){
  const key = document.getElementById("searchInput").value.toLowerCase();
  const box = document.getElementById("searchResults");

  box.innerHTML = "";
  if(!key) return;

  products
    .filter(p=>p.name?.toLowerCase().includes(key))
    .slice(0,8)
    .forEach(p=>{
      const div = document.createElement("div");
      div.innerText = p.name;
      div.onclick = ()=> location.href="logo.html?id="+p.id;
      box.appendChild(div);
    });
};

/* INIT SAFE */
loadProducts();
loadProduct();

</script>

</body>
</html>
