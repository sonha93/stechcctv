<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Chi tiết sản phẩm</title>
<link rel="stylesheet" href="logo-mobile.css">
<style>

/* RESET */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#f5f5f5;
  color:#111;
  overflow-x:hidden;
}

/* HEADER */

header{
  position:sticky;
  top:0;
  z-index:999;

  display:flex;
  align-items:center;
  gap:10px;

  padding:12px;

  background:#fff;

  box-shadow:
  0 2px 10px rgba(0,0,0,.08);
}

/* MENU BTN */

.menu-btn{
  width:46px;
  height:46px;

  border-radius:14px;

  background:#00acc1;
  color:#fff;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:24px;

  cursor:pointer;

  flex-shrink:0;
}

/* LOGO */

.logo{
  width:46px;
  height:46px;

  border-radius:14px;

  overflow:hidden;

  background:#fff;

  box-shadow:
  0 2px 10px rgba(0,0,0,.08);

  flex-shrink:0;
}

.logo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* SEARCH */

.search-box{
  flex:1;
}

.search-box input{
  width:100%;
  height:46px;

  border:none;

  border-radius:14px;

  background:#f1f1f1;

  padding:0 14px;

  font-size:14px;

  outline:none;
}

/* ICON */

.header-icons{
  display:flex;
  gap:10px;
}

.icon-btn{
  width:46px;
  height:46px;

  border-radius:14px;

  background:#00acc1;
  color:#fff;

  display:flex;
  align-items:center;
  justify-content:center;

  text-decoration:none;

  font-size:22px;

  position:relative;
}

.admin-btn{
  background:#6a5acd;
}

.cart-count{
  position:absolute;

  top:-5px;
  right:-5px;

  min-width:20px;
  height:20px;

  border-radius:50%;

  background:red;
  color:#fff;

  font-size:11px;
  font-weight:bold;

  display:flex;
  align-items:center;
  justify-content:center;
}

/* MENU */

.sidebar{
  position:fixed;

  top:0;
  left:-280px;

  width:260px;
  height:100vh;

  background:#fff;

  z-index:9999;

  transition:.3s;

  padding:20px;

  box-shadow:
  0 0 20px rgba(0,0,0,.15);
}

.sidebar.active{
  left:0;
}

.sidebar h3{
  margin-bottom:20px;
  color:#00acc1;
}

.sidebar a{
  display:block;

  padding:14px;

  margin-bottom:10px;

  border-radius:12px;

  background:#f5f5f5;

  text-decoration:none;

  color:#111;
  font-weight:bold;
}

/* OVERLAY */

#overlay,
#panelOverlay{
  position:fixed;
  inset:0;

  background:rgba(0,0,0,.45);

  z-index:9998;

  opacity:0;
  visibility:hidden;

  transition:.3s;
}

#overlay.active,
#panelOverlay.active{
  opacity:1;
  visibility:visible;
}

/* CONTAINER */

.container{
  max-width:1180px;

  margin:auto;

  padding:18px;

  display:flex;
  gap:18px;

  align-items:flex-start;
}

/* LEFT */

.left{
  width:33%;

  background:#fff;

  border-radius:20px;

  padding:12px;

  box-shadow:
  0 2px 10px rgba(0,0,0,.05);
}

.left img{
  width:100%;
  height:300px;

  object-fit:contain;

  border-radius:16px;
}

/* RIGHT */

.right{
  width:67%;

  background:#fff;

  border-radius:20px;

  padding:18px;

  box-shadow:
  0 2px 10px rgba(0,0,0,.05);
}

/* TITLE */

.product-name{
  font-size:28px;
  font-weight:800;

  line-height:1.5;

  margin-bottom:10px;
}

/* PRICE */

.price-row{
  display:flex;
  align-items:center;
  gap:10px;

  flex-wrap:wrap;

  margin-bottom:18px;
}

.price{
  color:#d70018;

  font-size:32px;
  font-weight:bold;
}

.old-price{
  color:#888;

  text-decoration:line-through;

  font-size:17px;
}

.sale{
  background:red;
  color:#fff;

  padding:5px 9px;

  border-radius:9px;

  font-size:13px;

  font-weight:bold;
}

/* ACTION */

.action-wrap{
  display:flex;
  flex-direction:column;
  gap:8px;

  margin-bottom:16px;

  width:260px;
}

.buy-btn,
.spec-open-btn{

  width:100%;

  height:42px;

  border:none;

  border-radius:12px;

  color:#fff;

  font-size:14px;
  font-weight:bold;

  cursor:pointer;

  transition:.2s;
}

.buy-btn{
  background:#111;
}

.spec-open-btn{
  background:#00acc1;
}

.buy-btn:hover,
.spec-open-btn:hover{
  transform:translateY(-2px);
}

/* DESC */

.desc{
  background:#f7f7f7;

  border-radius:16px;

  padding:16px;

  line-height:1.7;

  font-size:14px;
}

/* PANEL */

#specPanel{
  position:fixed;

  top:0;
  right:-100%;

  width:620px;

  max-width:100%;

  height:100vh;

  background:#fff;

  z-index:9999;

  transition:.35s;

  overflow-y:auto;

  box-shadow:
  -5px 0 20px rgba(0,0,0,.15);
}

#specPanel.active{
  right:0;
}

/* PANEL TOP */

.panel-top{
  position:sticky;
  top:0;

  background:#fff;

  z-index:20;

  padding:12px 16px;

  display:flex;
  align-items:center;
  justify-content:space-between;

  border-bottom:1px solid #eee;
}

.panel-product{
  display:flex;
  align-items:center;
  gap:10px;
}

.panel-product img{
  width:50px;
  height:50px;

  object-fit:contain;

  border-radius:10px;

  background:#f5f5f5;
}

.panel-product-info h3{
  font-size:17px;
  line-height:1.4;
}

.close-panel{
  width:40px;
  height:40px;

  border:none;

  border-radius:10px;

  background:#f5f5f5;

  font-size:22px;

  cursor:pointer;
}

/* TAB */

.spec-tabs{
  position:sticky;
  top:74px;

  background:#fff;

  z-index:19;

  display:flex;

  overflow-x:auto;

  border-bottom:1px solid #eee;
}

.spec-tab{
  flex-shrink:0;

  border:none;
  background:none;

  padding:12px 16px;

  font-size:14px;
  font-weight:bold;

  cursor:pointer;

  border-bottom:3px solid transparent;

  white-space:nowrap;
}

.spec-tab.active{
  color:#d70018;
  border-color:#d70018;
}

/* PANEL BODY */

.panel-body{
  padding:14px 16px;
}

.spec-content{
  display:none;
}

.spec-content.active{
  display:block;
}

.spec-group-title{
  font-size:20px;
  font-weight:800;

  margin-bottom:12px;
}

/* ROW */

.spec-row{
  display:flex;

  border-bottom:1px solid #f0f0f0;

  padding:10px 0;

  gap:10px;
}

.spec-label{
  width:180px;

  color:#666;

  font-size:14px;

  line-height:1.5;
}

.spec-value{
  flex:1;

  color:#111;

  font-size:14px;

  line-height:1.5;

  font-weight:500;
}

/* MOBILE */

@media(max-width:768px){

  header{
    padding:10px;
    gap:8px;
  }

  .menu-btn,
  .logo,
  .icon-btn{
    width:42px;
    height:42px;
  }

  .search-box input{
    height:42px;
    font-size:13px;
  }

  .container{
    flex-direction:column;
    padding:10px;
  }

  .left,
  .right{
    width:100%;
  }

  .left img{
    height:220px;
  }

  .right{
    padding:14px;
  }

  .product-name{
    font-size:20px;
  }

  .price{
    font-size:27px;
  }

  .action-wrap{
    width:100%;
  }

  #specPanel{
    width:100%;
  }

  .spec-row{
    flex-direction:column;
    gap:4px;
  }

  .spec-label{
    width:100%;
  }

}

</style>
</head>

<body>

<div id="overlay"
onclick="toggleMenu()"></div>

<!-- MENU -->
<div class="sidebar"
id="sidebar">

  <h3>Danh mục</h3>

  <a href="index.html">
    Trang chủ
  </a>

  <a href="camera-trong-nha.html">
    Camera trong nhà
  </a>

  <a href="camera-ngoai-troi.html">
    Camera ngoài trời
  </a>

</div>

<!-- HEADER -->
<header>

  <div class="menu-btn"
  onclick="toggleMenu()">
    ☰
  </div>

  <div class="logo">
    <img
    src="https://i.ibb.co/Z1kv9nJj/logo.png">
  </div>

  <div class="search-box">
    <input
    type="text"
    placeholder="Tìm kiếm sản phẩm...">
  </div>

  <div class="header-icons">

    <a href="admin.html"
    class="icon-btn admin-btn">
      🔐
    </a>

    <a href="cart.html"
    class="icon-btn">

      🛒

      <span
      class="cart-count"
      id="cartCount">
        0
      </span>

    </a>

  </div>

</header>

<!-- CONTENT -->
<div class="container">

  <!-- IMAGE -->
  <div class="left">

    <img
    id="detailImg"
    src="">

  </div>

  <!-- INFO -->
  <div class="right">

    <div class="product-name"
    id="detailName">
    </div>

    <div class="price-row">

      <div class="price"
      id="detailPrice">
      </div>

      <div class="old-price"
      id="detailOldPrice">
      </div>

      <div class="sale"
      id="detailSale">
      </div>

    </div>

    <!-- BUTTON -->
    <div class="action-wrap">

      <button
      class="spec-open-btn"
      onclick="openPanel()">

        ⚙️ Xem thông số

      </button>

      <button
      class="buy-btn"
      onclick="addToCart()">

        🛒 Thêm giỏ hàng

      </button>

    </div>

    <!-- DESC -->
    <div class="desc"
    id="detailDesc">
    </div>

  </div>

</div>

<!-- OVERLAY -->
<div id="panelOverlay"
onclick="closePanel()"></div>

<!-- PANEL -->
<div id="specPanel">

  <div class="panel-top">

    <div class="panel-product">

      <img
      id="panelProductImg"
      src="">

      <div class="panel-product-info">

        <h3 id="panelProductName">
        </h3>

      </div>

    </div>

    <button
    class="close-panel"
    onclick="closePanel()">

      ✕

    </button>

  </div>

  <!-- TAB -->
  <div class="spec-tabs">

    <button
    class="spec-tab active"
    onclick="showTab('infoTab',this)">
      Thông tin
    </button>

    <button
    class="spec-tab"
    onclick="showTab('designTab',this)">
      Thiết kế
    </button>

    <button
    class="spec-tab"
    onclick="showTab('basicTab',this)">
      Cấu hình
    </button>

  </div>

  <!-- BODY -->
  <div class="panel-body">

    <!-- TAB 1 -->
    <div class="spec-content active"
    id="infoTab">

      <div class="spec-group-title">
        Thông tin hàng hóa
      </div>

      <div class="spec-row">
        <div class="spec-label">Model</div>
        <div class="spec-value" id="detailModel"></div>
      </div>

      <div class="spec-row">
        <div class="spec-label">Xuất xứ</div>
        <div class="spec-value" id="detailOrigin"></div>
      </div>

      <div class="spec-row">
        <div class="spec-label">Bảo hành</div>
        <div class="spec-value" id="detailBaoHanh"></div>
      </div>

    </div>

    <!-- TAB 2 -->
    <div class="spec-content"
    id="designTab">

      <div class="spec-group-title">
        Thiết kế
      </div>

      <div class="spec-row">
        <div class="spec-label">Chất liệu</div>
        <div class="spec-value" id="detailMaterial"></div>
      </div>

      <div class="spec-row">
        <div class="spec-label">Thiết kế</div>
        <div class="spec-value" id="detailDesign"></div>
      </div>

      <div class="spec-row">
        <div class="spec-label">Kích thước</div>
        <div class="spec-value" id="detailSize"></div>
      </div>

    </div>

    <!-- TAB 3 -->
    <div class="spec-content"
    id="basicTab">

      <div class="spec-group-title">
        Thông số cơ bản
      </div>

      <div class="spec-row">
        <div class="spec-label">Độ phân giải</div>
        <div class="spec-value" id="detailResolution"></div>
      </div>

      <div class="spec-row">
        <div class="spec-label">Kết nối</div>
        <div class="spec-value" id="detailConnect"></div>
      </div>

      <div class="spec-row">
        <div class="spec-label">Góc nhìn</div>
        <div class="spec-value" id="detailView"></div>
      </div>

    </div>

  </div>

</div>

<script>

/* MENU */

function toggleMenu(){

  document
  .getElementById("sidebar")
  .classList.toggle("active");

  document
  .getElementById("overlay")
  .classList.toggle("active");

}

/* PANEL */

function openPanel(){

  document
  .getElementById("specPanel")
  .classList.add("active");

  document
  .getElementById("panelOverlay")
  .classList.add("active");

}

function closePanel(){

  document
  .getElementById("specPanel")
  .classList.remove("active");

  document
  .getElementById("panelOverlay")
  .classList.remove("active");

}

/* TAB */

function showTab(tabId,btn){

  document
  .querySelectorAll(".spec-content")
  .forEach(tab=>{

    tab.classList.remove("active");

  });

  document
  .querySelectorAll(".spec-tab")
  .forEach(tab=>{

    tab.classList.remove("active");

  });

  document
  .getElementById(tabId)
  .classList.add("active");

  btn.classList.add("active");

}

/* GET PRODUCT */

const params =
new URLSearchParams(
window.location.search
);

const id =
params.get("id");

const products =
JSON.parse(
localStorage.getItem("products")
) || [];

const product =
products.find(
p => String(p.id) === String(id)
);

/* LOAD DATA */

if(product){

  document
  .getElementById("detailImg")
  .src =
  product.img || "";

  document
  .getElementById("panelProductImg")
  .src =
  product.img || "";

  document
  .getElementById("detailName")
  .innerText =
  product.name || "";

  document
  .getElementById("panelProductName")
  .innerText =
  product.name || "";

  document
  .getElementById("detailPrice")
  .innerText =
  Number(product.price || 0)
  .toLocaleString() + "đ";

  document
  .getElementById("detailOldPrice")
  .innerText =
  product.oldPrice
  ? Number(product.oldPrice)
  .toLocaleString() + "đ"
  : "";

  /* FIX % */

  if(
    product.oldPrice &&
    Number(product.oldPrice) >
    Number(product.price)
  ){

    const sale =
    Math.round(
      (
        (
          Number(product.oldPrice) -
          Number(product.price)
        ) /
        Number(product.oldPrice)
      ) * 100
    );

    document
    .getElementById("detailSale")
    .innerText =
    "-" + sale + "%";

  }else{

    document
    .getElementById("detailSale")
    .style.display = "none";

  }

  document
  .getElementById("detailDesc")
  .innerText =
  product.desc ||
  "Không có mô tả";

  document
  .getElementById("detailModel")
  .innerText =
  product.model ||
  "Đang cập nhật";

  document
  .getElementById("detailOrigin")
  .innerText =
  product.xuatXu ||
  "Đang cập nhật";

  document
  .getElementById("detailBaoHanh")
  .innerText =
  product.baoHanh ||
  "Đang cập nhật";

  document
  .getElementById("detailMaterial")
  .innerText =
  product.chatLieu ||
  "Đang cập nhật";

  document
  .getElementById("detailDesign")
  .innerText =
  product.thietKe ||
  "Đang cập nhật";

  document
  .getElementById("detailSize")
  .innerText =
  product.kichThuoc ||
  "Đang cập nhật";

  document
  .getElementById("detailResolution")
  .innerText =
  product.doPhanGiai ||
  "Đang cập nhật";

  document
  .getElementById("detailConnect")
  .innerText =
  product.ketNoi ||
  "Đang cập nhật";

  document
  .getElementById("detailView")
  .innerText =
  product.gocNhin ||
  "Đang cập nhật";

}

/* ADD TO CART */

function addToCart(){

  if(!product) return;

  let cart =
  JSON.parse(
    localStorage.getItem("cart")
  ) || [];

  const exist =
  cart.find(
    x =>
    String(x.id) ===
    String(product.id)
  );

  if(exist){

    exist.qty += 1;

  }else{

    cart.push({
      ...product,
      qty:1
    });

  }

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  updateCartCount();

  alert("Đã thêm vào giỏ 🛒");

}

/* CART COUNT */

function updateCartCount(){

  const cart =
  JSON.parse(
    localStorage.getItem("cart")
  ) || [];

  let total = 0;

  cart.forEach(item=>{

    total += item.qty || 1;

  });

  document
  .getElementById("cartCount")
  .innerText =
  total;

}

updateCartCount();

</script>

</body>
</html>
