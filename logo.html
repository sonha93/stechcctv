<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Chi tiết sản phẩm</title>

<link rel="stylesheet" href="styletrong-nha.css">

</head>

<body>

<div id="overlay"
onclick="toggleMenu()"></div>

<div class="sidebar"
id="sidebar">

  <h3>Menu</h3>

  <a href="index.html">
    Trang chủ
  </a>

  <a href="cart.html">
    Giỏ hàng
  </a>

  <a href="orders.html">
    Đơn hàng
  </a>

</div>

<header class="header-pro">

  <div class="logo">
    <img src="https://i.ibb.co/Z1kv9nJj/logo.png">
  </div>

  <div class="menu-btn"
    onclick="toggleMenu()">
    ☰
  </div>

  <div class="search-box">
    <input placeholder="Tìm kiếm...">
    <span class="search-icon">🔍</span>
  </div>

  <div class="header-right">

    <div class="link-btn"
      onclick="goHome()">
      Trang chủ
    </div>

    <div class="cart"
      onclick="goCart()">
      🛒
    </div>

  </div>

</header>

<div class="container">

  <div class="left">
    <img id="img">
  </div>

  <div class="right">

    <h2 id="name"></h2>

    <div class="price-wrap">

      <span class="price"
        id="price">
      </span>

      <span class="old"
        id="old">
      </span>

    </div>

    <button class="btn"
      onclick="openPanel()">

      ⚙️ Xem thông số

    </button>

  </div>

</div>

<div id="panel">

  <div class="panel-header">

    <h3>Thông số sản phẩm</h3>

    <button class="close-btn"
      onclick="closePanel()">
      ✕
    </button>

  </div>

  <div class="tabs">

    <button class="tab-btn active"
      onclick="showTab('t1',this)">
      Thông tin
    </button>

    <button class="tab-btn"
      onclick="showTab('t2',this)">
      Thiết kế
    </button>

    <button class="tab-btn"
      onclick="showTab('t3',this)">
      Cấu hình
    </button>

  </div>

  <div id="t1"
    class="tab active">
  </div>

  <div id="t2"
    class="tab">
  </div>

  <div id="t3"
    class="tab">
  </div>

</div>

<div id="overlay2"
onclick="closePanel()"></div>

<script>

/* =========================
   MENU
========================= */

function toggleMenu(){

  document
    .getElementById("sidebar")
    .classList.toggle("active");

  document
    .getElementById("overlay")
    .classList.toggle("active");

}

/* =========================
   LINK
========================= */

function goHome(){
  window.location.href =
    "index.html";
}

function goCart(){
  window.location.href =
    "cart.html";
}

/* =========================
   GET ID
========================= */

const params =
  new URLSearchParams(
    window.location.search
  );

const id =
  params.get("id");

/* =========================
   GET PRODUCTS
========================= */

let products =
  JSON.parse(
    localStorage.getItem("products")
  ) || [];

/* =========================
   FIND PRODUCT
========================= */

let p =
  products.find(
    x => String(x.id) === String(id)
  );

/* =========================
   LOAD PRODUCT
========================= */

if(p){

  document.getElementById("img").src =
    p.img || "";

  document.getElementById("name").innerText =
    p.name || "Không tên";

  document.getElementById("price").innerText =
    Number(p.price || 0)
    .toLocaleString() + "đ";

  document.getElementById("old").innerText =
    p.oldPrice
    ? Number(p.oldPrice)
      .toLocaleString() + "đ"
    : "";

  /* ===== TAB 1 ===== */

  let infoHTML = `

    <div class="spec-box">
      <b>Danh mục:</b><br>
      ${p.categoryName || p.category || "Đang cập nhật"}
    </div>

    <div class="spec-box">
      <b>Mô tả:</b><br>
      ${p.desc || "Không có mô tả"}
    </div>

  `;

  if(p.spec?.model){

    infoHTML += `

      <div class="spec-box">
        <b>Model:</b><br>
        ${p.spec.model}
      </div>

    `;
  }

  if(p.spec?.xuatXu){

    infoHTML += `

      <div class="spec-box">
        <b>Xuất xứ:</b><br>
        ${p.spec.xuatXu}
      </div>

    `;
  }

  if(p.spec?.baoHanh){

    infoHTML += `

      <div class="spec-box">
        <b>Bảo hành:</b><br>
        ${p.spec.baoHanh}
      </div>

    `;
  }

  document.getElementById("t1").innerHTML =
    infoHTML;

  /* ===== TAB 2 ===== */

  let designHTML = "";

  if(p.spec?.chatLieu){

    designHTML += `

      <div class="spec-box">
        <b>Chất liệu:</b><br>
        ${p.spec.chatLieu}
      </div>

    `;
  }

  if(p.category === "combo"){

    designHTML += `

      <div class="spec-box">
        <b>Thông tin combo:</b><br>
        ${p.spec?.moTaCombo || ""}
      </div>

    `;
  }

  if(designHTML === ""){

    designHTML = `

      <div class="spec-box">
        Đang cập nhật
      </div>

    `;
  }

  document.getElementById("t2").innerHTML =
    designHTML;

  /* ===== TAB 3 ===== */

  let configHTML = "";

  if(p.spec?.dungLuong){

    configHTML += `

      <div class="spec-box">
        <b>Dung lượng:</b><br>
        ${p.spec.dungLuong}
      </div>

    `;
  }

  if(p.spec?.tocDo){

    configHTML += `

      <div class="spec-box">
        <b>Tốc độ:</b><br>
        ${p.spec.tocDo}
      </div>

    `;
  }

  if(p.spec?.loai){

    configHTML += `

      <div class="spec-box">
        <b>Loại:</b><br>
        ${p.spec.loai}
      </div>

    `;
  }

  if(p.spec?.doPhanGiai){

    configHTML += `

      <div class="spec-box">
        <b>Độ phân giải:</b><br>
        ${p.spec.doPhanGiai}
      </div>

    `;
  }

  if(configHTML === ""){

    configHTML = `

      <div class="spec-box">
        Đang cập nhật
      </div>

    `;
  }

  document.getElementById("t3").innerHTML =
    configHTML;

}else{

  document.body.innerHTML = `

    <h2 style="
      padding:40px;
      text-align:center;
      color:red;
    ">
      Không tìm thấy sản phẩm
    </h2>

  `;
}

/* =========================
   PANEL
========================= */

function openPanel(){

  document
    .getElementById("panel")
    .classList.add("active");

  document
    .getElementById("overlay2")
    .classList.add("active");
}

function closePanel(){

  document
    .getElementById("panel")
    .classList.remove("active");

  document
    .getElementById("overlay2")
    .classList.remove("active");
}

/* =========================
   TAB
========================= */

function showTab(id,btn){

  document
    .querySelectorAll(".tab")
    .forEach(t =>
      t.classList.remove("active")
    );

  document
    .getElementById(id)
    .classList.add("active");

  document
    .querySelectorAll(".tab-btn")
    .forEach(b =>
      b.classList.remove("active")
    );

  btn.classList.add("active");
}

</script>

</body>
</html>
