<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Chi tiết sản phẩm - STECH</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#f4f7fb;
  color:#111;
  overflow-x:hidden;
}

/* HEADER */

header{
  position:sticky;
  top:0;
  z-index:999;
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px;
  background:#33A0AB;
  box-shadow:0 2px 10px rgba(0,0,0,.12);
}

.menu-btn,
.icon-btn{
  width:42px;
  height:42px;
  border:none;
  border-radius:12px;
  background:#0f8d98;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  cursor:pointer;
  font-size:18px;
  position:relative;
  transition:.2s;
}

.menu-btn:hover,
.icon-btn:hover{
  transform:scale(.96);
}

.admin-btn{
  background:#6a5acd;
}

.logo{
  width:42px;
  height:42px;
  border-radius:12px;
  overflow:hidden;
  background:#fff;
  flex-shrink:0;
}

.logo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.search-box{
  flex:1;
  position:relative;
}

.search-box input{
  width:100%;
  height:40px;
  border:none;
  outline:none;
  border-radius:12px;
  padding:0 14px;
  font-size:14px;
}

.cart-count{
  position:absolute;
  top:-5px;
  right:-5px;
  min-width:18px;
  height:18px;
  border-radius:50%;
  background:red;
  color:#fff;
  font-size:11px;
  font-weight:bold;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* SIDEBAR */

.sidebar{
  position:fixed;
  top:0;
  left:-270px;
  width:250px;
  height:100vh;
  background:#fff;
  z-index:9999;
  transition:.3s;
  padding:20px;
  box-shadow:0 0 20px rgba(0,0,0,.2);
}

.sidebar.active{
  left:0;
}

.sidebar a{
  display:block;
  text-decoration:none;
  color:#111;
  background:#f5f5f5;
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
  font-weight:bold;
  transition:.2s;
}

.sidebar a:hover{
  background:#dff7fa;
}

#overlay,
#panelOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  opacity:0;
  visibility:hidden;
  transition:.3s;
  z-index:9998;
}

#overlay.active,
#panelOverlay.active{
  opacity:1;
  visibility:visible;
}

/* CONTAINER */

.container{
  max-width:1200px;
  margin:auto;
  padding:18px;
}

/* PRODUCT CARD */

.product-card{
  background:#fff;
  border-radius:24px;
  padding:18px;
  box-shadow:0 5px 20px rgba(0,0,0,.06);
}

.product-main{
  display:flex;
  gap:22px;
  align-items:flex-start;
}

/* LEFT */

.left{
  width:360px;
  flex-shrink:0;
}

.left img{
  width:100%;
  height:360px;
  object-fit:cover;
  border-radius:20px;
  background:#f3f3f3;
}

/* RIGHT */

.right{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.product-name{
  font-size:30px;
  font-weight:800;
  line-height:1.5;
}

.price-row{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.price{
  color:red;
  font-size:34px;
  font-weight:bold;
}

.old-price{
  color:#666;
  text-decoration:line-through;
  font-size:18px;
}

.sale{
  background:red;
  color:#fff;
  padding:5px 10px;
  border-radius:10px;
  font-size:13px;
  font-weight:bold;
}

.action-wrap{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.buy-btn,
.spec-open-btn{
  flex:1;
  min-width:180px;
  height:50px;
  border:none;
  border-radius:16px;
  color:#fff;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
}

.buy-btn:hover,
.spec-open-btn:hover{
  transform:translateY(-2px);
}

.buy-btn{
  background:#111;
}

.spec-open-btn{
  background:#00acc1;
}

.desc{
  background:#f8fbff;
  border:1px solid #e3eef7;
  padding:16px;
  border-radius:18px;
  line-height:1.8;
  font-size:15px;
}

/* REVIEW */

.review-box{
  margin-top:18px;
  background:#fff;
  border-radius:20px;
  padding:18px;
  box-shadow:0 5px 20px rgba(0,0,0,.05);
}

.review-title{
  font-size:22px;
  margin-bottom:14px;
}

.review-input{
  width:100%;
  min-height:90px;
  border:none;
  outline:none;
  resize:none;
  background:#f5f7fb;
  border-radius:14px;
  padding:14px;
  font-size:14px;
}

.review-btn{
  margin-top:12px;
  width:100%;
  height:46px;
  border:none;
  border-radius:14px;
  background:#00acc1;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.review-list{
  margin-top:18px;
}

.review-item{
  background:#f8fbff;
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
  line-height:1.7;
}

.review-user{
  color:#00acc1;
  margin-bottom:6px;
  font-size:14px;
  font-weight:bold;
}

/* SEARCH */

.search-results{
  position:absolute;
  top:50px;
  left:0;
  width:100%;
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  z-index:999;
  box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.search-result-item{
  display:flex;
  gap:10px;
  padding:10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.search-result-item:hover{
  background:#f5fbff;
}

.search-result-item img{
  width:55px;
  height:55px;
  object-fit:cover;
  border-radius:10px;
}

/* PANEL */

#specPanel{
  position:fixed;
  top:0;
  right:-100%;
  width:620px;
  max-width:100%;
  height:100vh;
  background:#fff;
  z-index:9999;
  transition:.3s;
  overflow-y:auto;
}

#specPanel.active{
  right:0;
}

.panel-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  border-bottom:1px solid #eee;
}

.panel-product{
  display:flex;
  align-items:center;
  gap:10px;
}

.panel-product img{
  width:52px;
  height:52px;
  border-radius:10px;
  object-fit:cover;
}

.close-panel{
  width:40px;
  height:40px;
  border:none;
  border-radius:12px;
  background:#f3f3f3;
  cursor:pointer;
}

.spec-tabs{
  display:flex;
  border-bottom:1px solid #eee;
}

.spec-tab{
  flex:1;
  height:48px;
  border:none;
  background:none;
  cursor:pointer;
  font-weight:bold;
}

.spec-tab.active{
  color:#00acc1;
  border-bottom:3px solid #00acc1;
}

.panel-body{
  padding:14px;
}

.spec-content{
  display:none;
}

.spec-content.active{
  display:block;
}

.spec-row{
  display:flex;
  gap:12px;
  padding:12px 0;
  border-bottom:1px solid #eee;
}

.spec-label{
  width:120px;
  color:#666;
}

.spec-value{
  flex:1;
}

/* MOBILE */

@media(max-width:768px){

  .container{
    padding:10px;
  }

  .product-card{
    padding:12px;
    border-radius:18px;
  }

  .product-main{
    flex-direction:column;
    gap:12px;
  }

  .left{
    width:100%;
  }

  .left img{
    width:100%;
    height:320px;
    border-radius:18px;
  }

  .right{
    width:100%;
  }

  .product-name{
    font-size:22px;
    line-height:1.5;
  }

  .price{
    font-size:28px;
  }

  .old-price{
    font-size:14px;
  }

  .desc{
    font-size:14px;
  }

  .action-wrap{
    flex-direction:column;
  }

  .buy-btn,
  .spec-open-btn{
    width:100%;
  }

  .review-title{
    font-size:19px;
  }

}

</style>
</head>

<body>

<div id="overlay"></div>
<div id="panelOverlay"></div>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

  <a href="index.html">🏠 Trang chủ</a>

  <a href="camera-trong-nha.html">
    📷 Camera trong nhà
  </a>

  <a href="camera-ngoai-troi.html">
    🌤 Camera ngoài trời
  </a>

</div>

<!-- HEADER -->

<header>

  <div class="menu-btn" onclick="toggleMenu()">
    ☰
  </div>

  <div class="logo">
    <img src="https://i.ibb.co/Z1kv9nJj/logo.png">
  </div>

  <div class="search-box">

    <input
      type="text"
      placeholder="Tìm kiếm sản phẩm..."
      id="searchInput"
      oninput="searchProduct()"
    >

    <div id="searchResults" class="search-results"></div>

  </div>

  <a href="admin.html" class="icon-btn admin-btn">
    🔐
  </a>

  <a href="cart.html" class="icon-btn">

    🛒

    <span class="cart-count" id="cartCount">
      0
    </span>

  </a>

</header>

<!-- MAIN -->

<div class="container">

  <div class="product-card">

    <div class="product-main">

      <!-- LEFT -->

      <div class="left">

        <img id="detailImg">

      </div>

      <!-- RIGHT -->

      <div class="right">

        <div class="product-name" id="detailName"></div>

        <div class="price-row">

          <div class="price" id="detailPrice"></div>

          <div class="old-price" id="detailOldPrice"></div>

          <div class="sale" id="detailSale"></div>

        </div>

        <div class="action-wrap">

          <button class="spec-open-btn" onclick="openPanel()">
            ⚙️ Xem thông số
          </button>

          <button class="buy-btn" onclick="addToCart()">
            🛒 Thêm giỏ hàng
          </button>

        </div>

        <div class="desc" id="detailDesc"></div>

      </div>

    </div>

  </div>

  <!-- REVIEW -->

  <div class="review-box">

    <div class="review-title">
      ⭐ Đánh giá & bình luận
    </div>

    <textarea
      class="review-input"
      id="reviewInput"
      placeholder="Nhập bình luận của bạn..."
    ></textarea>

    <button class="review-btn" onclick="sendReview()">
      Gửi bình luận
    </button>

    <div class="review-list" id="reviewList"></div>

  </div>

</div>

<!-- PANEL -->

<div id="specPanel">

  <div class="panel-top">

    <div class="panel-product">

      <img id="panelProductImg">

      <h3 id="panelProductName"></h3>

    </div>

    <button class="close-panel" onclick="closePanel()">
      ✕
    </button>

  </div>

  <div class="spec-tabs">

    <button class="spec-tab active" onclick="showTab('infoTab',this)">
      Thông tin
    </button>

    <button class="spec-tab" onclick="showTab('configTab',this)">
      Cấu hình
    </button>

    <button class="spec-tab" onclick="showTab('designTab',this)">
      Thiết kế
    </button>

  </div>

  <div class="panel-body">

    <div class="spec-content active" id="infoTab">

      <div class="spec-row">
        <div class="spec-label">Model</div>
        <div class="spec-value" id="detailModel"></div>
      </div>

      <div class="spec-row">
        <div class="spec-label">Xuất xứ</div>
        <div class="spec-value" id="detailOrigin"></div>
      </div>

      <div class="spec-row">
        <div class="spec-label">Bảo hành</div>
        <div class="spec-value" id="detailWarranty"></div>
      </div>

    </div>

    <div class="spec-content" id="configTab">

      <div class="spec-row">
        <div class="spec-label">Độ phân giải</div>
        <div class="spec-value" id="detailResolution"></div>
      </div>

      <div class="spec-row">
        <div class="spec-label">Góc nhìn</div>
        <div class="spec-value" id="detailViewAngle"></div>
      </div>

      <div class="spec-row">
        <div class="spec-label">Kết nối</div>
        <div class="spec-value" id="detailConnect"></div>
      </div>

    </div>

    <div class="spec-content" id="designTab">

      <div class="spec-row">
        <div class="spec-label">Thiết kế</div>
        <div class="spec-value" id="detailThietKe"></div>
      </div>

      <div class="spec-row">
        <div class="spec-label">Chất liệu</div>
        <div class="spec-value" id="detailChatLieu"></div>
      </div>

      <div class="spec-row">
        <div class="spec-label">Công suất</div>
        <div class="spec-value" id="detailCongSuat"></div>
      </div>

    </div>

  </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {
  apiKey:"AIzaSyDYVcBEYJN1HUCta3XdJAUBe4TGLnmy7y4",
  authDomain:"stech-73b89.firebaseapp.com",
  projectId:"stech-73b89",
  storageBucket:"stech-73b89.firebasestorage.app",
  messagingSenderId:"873739162979",
  appId:"1:873739162979:web:978f1a4043f025b1cdaf56"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* DATA */

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let products = [];
let product = null;

/* LOAD PRODUCT */

async function loadProduct(){

  const querySnapshot =
  await getDocs(collection(db,"products"));

  querySnapshot.forEach(doc=>{
    products.push(doc.data());
  });

  product = products.find(
    p => String(p.id) === String(id)
  );

  if(!product) return;

  document.getElementById("detailImg").src =
  product.img || "";

  document.getElementById("panelProductImg").src =
  product.img || "";

  document.getElementById("detailName").innerText =
  product.name || "";

  document.getElementById("panelProductName").innerText =
  product.name || "";

  document.getElementById("detailPrice").innerText =
  Number(product.price || 0).toLocaleString()+"đ";

  document.getElementById("detailOldPrice").innerText =
  product.oldPrice
  ? Number(product.oldPrice).toLocaleString()+"đ"
  : "";

  document.getElementById("detailDesc").innerText =
  product.desc || "Không có mô tả";

  document.getElementById("detailModel").innerText =
  product.model || "Đang cập nhật";

  document.getElementById("detailOrigin").innerText =
  product.xuatXu || "Đang cập nhật";

  document.getElementById("detailWarranty").innerText =
  product.baoHanh || "Đang cập nhật";

  document.getElementById("detailResolution").innerText =
  product.doPhanGiai || "Đang cập nhật";

  document.getElementById("detailConnect").innerText =
  product.ketNoi || "Đang cập nhật";

  document.getElementById("detailViewAngle").innerText =
  product.gocNhin || "Đang cập nhật";

  document.getElementById("detailThietKe").innerText =
  product.thietKe || "Đang cập nhật";

  document.getElementById("detailChatLieu").innerText =
  product.chatLieu || "Đang cập nhật";

  document.getElementById("detailCongSuat").innerText =
  product.congSuat || "Đang cập nhật";

  const saleBox =
  document.getElementById("detailSale");

  if(
    product.oldPrice &&
    Number(product.oldPrice) > Number(product.price)
  ){

    const sale = Math.round(
      (
        (Number(product.oldPrice) - Number(product.price))
        / Number(product.oldPrice)
      ) * 100
    );

    saleBox.style.display = "inline-block";
    saleBox.innerText = "-" + sale + "%";

  }else{

    saleBox.style.display = "none";

  }

}

loadProduct();

/* MENU */

function toggleMenu(){

  document
  .getElementById("sidebar")
  .classList.toggle("active");

  document
  .getElementById("overlay")
  .classList.toggle("active");

}

document.getElementById("overlay")
.onclick = toggleMenu;

/* PANEL */

function openPanel(){

  document
  .getElementById("specPanel")
  .classList.add("active");

  document
  .getElementById("panelOverlay")
  .classList.add("active");

}

function closePanel(){

  document
  .getElementById("specPanel")
  .classList.remove("active");

  document
  .getElementById("panelOverlay")
  .classList.remove("active");

}

document.getElementById("panelOverlay")
.onclick = closePanel;

function showTab(tabId,btn){

  document
  .querySelectorAll(".spec-content")
  .forEach(el=>el.classList.remove("active"));

  document
  .querySelectorAll(".spec-tab")
  .forEach(el=>el.classList.remove("active"));

  document
  .getElementById(tabId)
  .classList.add("active");

  btn.classList.add("active");

}

/* CART */

function addToCart(){

  if(!product) return;

  let cart =
  JSON.parse(localStorage.getItem("cart")) || [];

  const exist =
  cart.find(
    x => String(x.id) === String(product.id)
  );

  if(exist){

    exist.qty += 1;

  }else{

    cart.push({
      ...product,
      qty:1
    });

  }

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  updateCartCount();

  alert("Đã thêm vào giỏ hàng");

}

function updateCartCount(){

  const cart =
  JSON.parse(localStorage.getItem("cart")) || [];

  let total = 0;

  cart.forEach(item=>{
    total += item.qty || 1;
  });

  document.getElementById("cartCount").innerText =
  total;

}

updateCartCount();

/* SEARCH */

function searchProduct(){

  const term =
  document.getElementById("searchInput")
  .value
  .toLowerCase();

  const resultBox =
  document.getElementById("searchResults");

  resultBox.innerHTML = "";

  if(term === "") return;

  const filtered =
  products.filter(
    p => p.name &&
    p.name.toLowerCase().includes(term)
  );

  filtered.forEach(p=>{

    const div =
    document.createElement("div");

    div.className = "search-result-item";

    div.innerHTML = `
      <img src="${p.img}">
      <div>
        <strong>${p.name}</strong>
        <div style="color:red;font-weight:bold;margin-top:4px;">
          ${Number(p.price).toLocaleString()}đ
        </div>
      </div>
    `;

    div.onclick = ()=>{

      window.location.href =
      "logo.html?id=" + p.id;

    };

    resultBox.appendChild(div);

  });

}

/* REVIEW */

function sendReview(){

  const input =
  document.getElementById("reviewInput");

  const review =
  input.value.trim();

  if(review === "") return;

  const reviewList =
  document.getElementById("reviewList");

  const div =
  document.createElement("div");

  div.className = "review-item";

  div.innerHTML = `
    <div class="review-user">
      👤 Người dùng STECH
    </div>

    <div>
      ${review}
    </div>
  `;

  reviewList.prepend(div);

  input.value = "";

}

/* GLOBAL */

window.toggleMenu = toggleMenu;
window.openPanel = openPanel;
window.closePanel = closePanel;
window.showTab = showTab;
window.addToCart = addToCart;
window.searchProduct = searchProduct;
window.sendReview = sendReview;

</script>

</body>
</html>
