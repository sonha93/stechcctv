<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Chi tiết sản phẩm</title>
<style>
/* === RESET + BODY === */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#f5f5f5;color:#111;overflow-x:hidden;}

/* === HEADER === */
header{position:sticky;top:0;z-index:999;display:flex;align-items:center;gap:10px;padding:12px;background:#33A0AB;box-shadow:0 2px 10px rgba(0,0,0,.08);}
.menu-btn{width:46px;height:46px;border-radius:14px;background:#00acc1;color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;flex-shrink:0;}
.logo{width:46px;height:46px;border-radius:14px;overflow:hidden;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.08);flex-shrink:0;}
.logo img{width:100%;height:100%;object-fit:cover;}
.search-box{flex:1;position:relative;}
.search-box input{width:100%;height:46px;border:none;border-radius:14px;background:#f1f1f1;padding:0 14px;font-size:14px;outline:none;}
.search-results{position:absolute;background:#fff;width:100%;max-height:300px;overflow-y:auto;border:1px solid #ddd;border-radius:12px;margin-top:4px;z-index:1000;}
.search-result-item{display:flex;align-items:center;gap:8px;padding:8px;cursor:pointer;border-bottom:1px solid #eee;}
.search-result-item img{width:50px;height:50px;object-fit:cover;border-radius:6px;}
.search-result-item strong{font-size:14px;color:#111;}
.search-result-item span{font-size:13px;color:#d70018;font-weight:bold;}
.search-result-item:hover{background:#f7f7f7;}
.header-icons{display:flex;gap:10px;}
.icon-btn{width:46px;height:46px;border-radius:14px;background:#00acc1;color:#fff;display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:22px;position:relative;}
.admin-btn{background:#6a5acd;}
.cart-count{position:absolute;top:-5px;right:-5px;min-width:20px;height:20px;border-radius:50%;background:red;color:#fff;font-size:11px;font-weight:bold;display:flex;align-items:center;justify-content:center;}

/* === MENU === */
.sidebar{position:fixed;top:0;left:-280px;width:260px;height:100vh;background:#fff;z-index:9999;transition:.3s;padding:20px;box-shadow:0 0 20px rgba(0,0,0,.15);}
.sidebar.active{left:0;}
.sidebar h3{margin-bottom:20px;color:#00acc1;}
.sidebar a{display:block;padding:14px;margin-bottom:10px;border-radius:12px;background:#f5f5f5;text-decoration:none;color:#111;font-weight:bold;}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9998;opacity:0;visibility:hidden;transition:.3s;}
#overlay.active{opacity:1;visibility:visible;}

/* === PRODUCT CARD === */
.product-card{display:flex;flex-direction:column;background:#fff;border-radius:20px;box-shadow:0 2px 10px rgba(0,0,0,.05);max-width:600px;margin:auto;overflow:hidden;}
.product-card img{width:100%;height:300px;object-fit:cover;display:block;}
.product-card > div{padding:12px;display:flex;flex-direction:column;gap:8px;}
.product-card .product-name{font-size:22px;font-weight:800;margin-bottom:8px;}
.price-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.price{color:#d70018;font-size:24px;font-weight:bold;}
.old-price{color:#888;text-decoration:line-through;font-size:16px;}
.sale{background:red;color:#fff;padding:4px 8px;border-radius:9px;font-size:13px;font-weight:bold;}
.action-wrap{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;width:100%;}
.buy-btn,.spec-open-btn{width:100%;height:42px;border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:bold;cursor:pointer;transition:.2s;}
.buy-btn{background:#111;}
.spec-open-btn{background:#00acc1;}
.buy-btn:hover,.spec-open-btn:hover{transform:translateY(-2px);}
.desc{background:#f7f7f7;border-radius:16px;padding:16px;line-height:1.7;font-size:14px;}

/* === PANEL === */
#specPanel{position:fixed;top:0;right:-100%;width:620px;max-width:100%;height:100vh;background:#fff;z-index:9999;transition:.35s;overflow-y:auto;box-shadow:-5px 0 20px rgba(0,0,0,.15);}
#specPanel.active{right:0;}
.panel-top{position:sticky;top:0;background:#fff;z-index:20;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #eee;}
.panel-product{display:flex;align-items:center;gap:10px;}
.panel-product img{width:50px;height:50px;object-fit:contain;border-radius:10px;background:#f5f5f5;}
.panel-product-info h3{font-size:17px;line-height:1.4;}
.close-panel{width:40px;height:40px;border:none;border-radius:10px;background:#f5f5f5;font-size:22px;cursor:pointer;}
.spec-tabs{position:sticky;top:74px;background:#fff;z-index:19;display:flex;overflow-x:auto;border-bottom:1px solid #eee;}
.spec-tab{flex-shrink:0;border:none;background:none;padding:12px 16px;font-size:14px;font-weight:bold;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
.spec-tab.active{color:#d70018;border-color:#d70018;}
.panel-body{padding:14px 16px;}
.spec-content{display:none;}
.spec-content.active{display:block;}
.spec-group-title{font-size:20px;font-weight:800;margin-bottom:12px;}
.spec-row{display:flex;border-bottom:1px solid #f0f0f0;padding:10px 0;gap:10px;}
.spec-label{width:180px;color:#666;font-size:14px;line-height:1.5;}
.spec-value{flex:1;color:#111;font-size:14px;line-height:1.5;font-weight:500;}

/* MOBILE */
@media(max-width:768px){
  .product-card{flex-direction:row;gap:0;padding:0;max-width:100%;}
  .product-card img{width:35%;height:180px;object-fit:cover;margin:0;}
  .product-card > div{width:65%;padding:12px;flex-direction:column;justify-content:flex-start;}
  .product-card .product-name{font-size:18px;margin-bottom:4px;}
  .price-row{gap:6px;flex-wrap:wrap;margin-bottom:8px;}
  .price{font-size:20px;}
  .old-price{font-size:14px;}
  .sale{font-size:12px;padding:3px 6px;}
  .action-wrap{flex-direction:row;gap:6px;margin-bottom:8px;}
  .action-wrap .spec-open-btn,.action-wrap .buy-btn{flex:1;height:36px;font-size:14px;}
  .desc{font-size:13px;margin-top:4px;}
  #specPanel{width:100%;}
  .spec-row{flex-direction:column;gap:4px;}
  .spec-label{width:100%;}
}
</style>
</head>
<body>

<div id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
  <h3>Danh mục</h3>
  <a href="index.html">Trang chủ</a>
  <a href="orders.html">Lịch sử đơn hàng</a>
  <a href="camera-trong-nha.html">Camera trong nhà</a>
  <a href="camera-ngoai-troi.html">Camera ngoài trời</a>
</div>

<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="logo"><img src="https://i.ibb.co/Z1kv9nJj/logo.png"></div>
  <div class="search-box">
    <input type="text" placeholder="Tìm kiếm sản phẩm..." id="searchInput" oninput="searchProduct()">
    <div id="searchResults" class="search-results"></div>
  </div>
  <div class="header-icons">
    <a href="admin.html" class="icon-btn admin-btn">🔐</a>
    <a href="cart.html" class="icon-btn">🛒<span class="cart-count" id="cartCount">0</span></a>
  </div>
</header>

<div class="product-card" id="productCard">
  <img id="detailImg" src="">
  <div>
    <div class="product-name" id="detailName"></div>
    <div class="price-row">
      <div class="price" id="detailPrice"></div>
      <div class="old-price" id="detailOldPrice"></div>
      <div class="sale" id="detailSale"></div>
    </div>
    <div class="action-wrap">
      <button class="spec-open-btn" onclick="openPanel()">⚙️ Xem thông số</button>
      <button class="buy-btn" onclick="addToCart()">🛒 Thêm giỏ hàng</button>
    </div>
    <div class="desc" id="detailDesc"></div>
  </div>
</div>

<div id="panelOverlay" onclick="closePanel()"></div>

<div id="specPanel">
  <div class="panel-top">
    <div class="panel-product">
      <img id="panelProductImg" src="">
      <div class="panel-product-info"><h3 id="panelProductName"></h3></div>
    </div>
    <button class="close-panel" onclick="closePanel()">✕</button>
  </div>
  <div class="spec-tabs">
    <button class="spec-tab active" onclick="showTab('infoTab',this)">Thông tin</button>
    <button class="spec-tab" onclick="showTab('designTab',this)">Thiết kế</button>
    <button class="spec-tab" onclick="showTab('basicTab',this)">Cấu hình</button>
  </div>
  <div class="panel-body">
    <div class="spec-content active" id="infoTab">
      <div class="spec-group-title">Thông tin hàng hóa</div>
      <div class="spec-row"><div class="spec-label">Model</div><div class="spec-value" id="detailModel"></div></div>
      <div class="spec-row"><div class="spec-label">Xuất xứ</div><div class="spec-value" id="detailOrigin"></div></div>
      <div class="spec-row"><div class="spec-label">Bảo hành</div><div class="spec-value" id="detailBaoHanh"></div></div>
    </div>
    <div class="spec-content" id="designTab">
      <div class="spec-group-title">Thiết kế</div>
      <div class="spec-row"><div class="spec-label">Chất liệu</div><div class="spec-value" id="detailMaterial"></div></div>
      <div class="spec-row"><div class="spec-label">Thiết kế</div><div class="spec-value" id="detailDesign"></div></div>
      <div class="spec-row"><div class="spec-label">Kích thước</div><div class="spec-value" id="detailSize"></div></div>
    </div>
    <div class="spec-content" id="basicTab">
      <div class="spec-group-title">Thông số cơ bản</div>
      <div class="spec-row"><div class="spec-label">Độ phân giải</div><div class="spec-value" id="detailResolution"></div></div>
      <div class="spec-row"><div class="spec-label">Kết nối</div><div class="spec-value" id="detailConnect"></div></div>
      <div class="spec-row"><div class="spec-label">Góc nhìn</div><div class="spec-value" id="detailView"></div></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey:"AIzaSyDYVcBEYJN1HUCta3XdJAUBe4TGLnmy7y4",
  authDomain:"stech-73b89.firebaseapp.com",
  projectId:"stech-73b89",
  storageBucket:"stech-73b89.appspot.com",
  messagingSenderId:"873739162979",
  appId:"1:873739162979:web:978f1a4043f025b1cdaf56"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const id = params.get("id");
let currentProduct = null;

async function loadProduct(){
  if(!id) return;
  try{
    const docRef = doc(db,"products",id);
    const docSnap = await getDoc(docRef);
    if(!docSnap.exists()) return;
    const p = docSnap.data();
    p.id = id;
    currentProduct = p;

    document.getElementById("detailImg").src = p.img||"";
    document.getElementById("panelProductImg").src = p.img||"";
    document.getElementById("detailName").innerText = p.name||"";
    document.getElementById("panelProductName").innerText = p.name||"";
    document.getElementById("detailPrice").innerText = Number(p.price||0).toLocaleString()+"đ";
    document.getElementById("detailOldPrice").innerText = p.oldPrice?Number(p.oldPrice).toLocaleString()+"đ":"";
    if(p.oldPrice && Number(p.oldPrice)>Number(p.price)){
      const sale=Math.round(((Number(p.oldPrice)-Number(p.price))/Number(p.oldPrice))*100);
      document.getElementById("detailSale").innerText="-"+sale+"%";
    } else { document.getElementById("detailSale").style.display="none"; }
    document.getElementById("detailDesc").innerText = p.desc||"Không có mô tả";
    document.getElementById("detailModel").innerText = p.model||"Đang cập nhật";
    document.getElementById("detailOrigin").innerText = p.xuatXu||"Đang cập nhật";
    document.getElementById("detailBaoHanh").innerText = p.baoHanh||"Đang cập nhật";
    document.getElementById("detailMaterial").innerText = p.chatLieu||"Đang cập nhật";
    document.getElementById("detailDesign").innerText = p.thietKe||"Đang cập nhật";
    document.getElementById("detailSize").innerText = p.kichThuoc||"Đang cập nhật";
    document.getElementById("detailResolution").innerText = p.doPhanGiai||"Đang cập nhật";
    document.getElementById("detailConnect").innerText = p.ketNoi||"Đang cập nhật";
    document.getElementById("detailView").innerText = p.gocNhin||"Đang cập nhật";

  }catch(err){ console.error(err); }
}

// CART
function addToCart(){
  if(!currentProduct) return;
  let cart = JSON.parse(localStorage.getItem("cart"))||[];
  const exist = cart.find(x=>x.id===currentProduct.id);
  if(exist) exist.qty +=1;
  else cart.push({...currentProduct, qty:1});
  localStorage.setItem("cart",JSON.stringify(cart));
  updateCartCount();
  alert("Đã thêm vào giỏ 🛒");
}

function updateCartCount(){
  const cart = JSON.parse(localStorage.getItem("cart"))||[];
  let total=0;
  cart.forEach(item=>total+=item.qty||1);
  document.getElementById("cartCount").innerText=total;
}
updateCartCount();

// SEARCH
const productsCollection = "products";
async function searchProduct(){
  const term = document.getElementById("searchInput").value.toLowerCase();
  const results = document.getElementById("searchResults");
  results.innerHTML="";
  if(term==="") return;

  // Lấy tất cả product từ Firestore để search
  const querySnapshot = await getDocs(collection(db, productsCollection));
  querySnapshot.forEach(docSnap=>{
    const p = docSnap.data();
    p.id = docSnap.id;
    if(p.name.toLowerCase().includes(term)){
      const div=document.createElement("div");
      div.className="search-result-item";
      div.innerHTML=`<img src="${p.img}" alt="${p.name}"><div><strong>${p.name}</strong><span>${Number(p.price).toLocaleString()}đ</span></div>`;
      div.onclick=()=>{window.location.href=`logo.html?id=${p.id}`;};
      results.appendChild(div);
    }
  });
}

// PANEL + TABS
