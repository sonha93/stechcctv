<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Chi tiết sản phẩm</title>
<link rel="stylesheet" href="stylecart.css">
<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial;
  background:#f5f5f5;
}

/* ===== HEADER ===== */

.header-pro{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 12px;
  background:#00acc1;
  color:#fff;
}

.logo{
  width:42px;
  height:42px;
  border-radius:12px;
  overflow:hidden;
  background:#fff;
}

.logo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.menu-btn{
  background:rgba(255,255,255,.2);
  padding:7px 10px;
  border-radius:20px;
  cursor:pointer;
}

.search-box{
  flex:1;
  position:relative;
}

.search-box input{
  width:100%;
  padding:10px 40px;
  border:none;
  border-radius:30px;
}

.search-icon{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
}

/* ===== RIGHT ===== */

.header-right{
  display:flex;
  gap:10px;
  align-items:center;
}

.link-btn{
  background:rgba(255,255,255,.2);
  padding:7px 12px;
  border-radius:20px;
  cursor:pointer;
  font-size:13px;
}

.cart{
  background:rgba(0,0,0,.25);
  padding:7px 10px;
  border-radius:20px;
  cursor:pointer;
}

/* ===== SIDEBAR ===== */

.sidebar{
  position:fixed;
  left:-260px;
  top:0;
  width:260px;
  height:100%;
  background:#fff;
  padding:15px;
  transition:.3s;
  z-index:1000;
}

.sidebar.active{
  left:0;
}

.sidebar h3{
  margin-bottom:15px;
}

.sidebar a{
  display:block;
  padding:10px;
  border-radius:8px;
  text-decoration:none;
  color:#333;
  margin-bottom:5px;
}

.sidebar a:hover{
  background:#e0f7fa;
  color:#00acc1;
}

/* ===== OVERLAY ===== */

#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  z-index:999;
}

#overlay.active{
  display:block;
}

/* ===== PRODUCT ===== */

.container{
  display:flex;
  gap:25px;
  padding:20px;
}

.left{
  flex:1;
}

.left img{
  width:100%;
  border-radius:14px;
  background:#fff;
  padding:10px;
}

.right{
  flex:1;
  background:#fff;
  padding:20px;
  border-radius:14px;
}

.right h2{
  margin-bottom:14px;
  color:#111;
}

.price{
  color:#e53935;
  font-size:30px;
  font-weight:bold;
}

.old{
  text-decoration:line-through;
  color:#777;
  margin-left:10px;
}

.btn{
  border:none;
  background:#00acc1;
  color:#fff;
  padding:12px 18px;
  border-radius:10px;
  cursor:pointer;
  margin-top:16px;
  font-weight:bold;
}

/* ===== PANEL ===== */

#panel{
  position:fixed;
  right:-420px;
  top:0;
  width:400px;
  max-width:100%;
  height:100%;
  background:#fff;
  transition:.35s;
  z-index:9999;
  overflow:auto;
  box-shadow:-10px 0 30px rgba(0,0,0,.2);
}

#panel.active{
  right:0;
}

.panel-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px;
  background:#00acc1;
  color:#fff;
}

.close-btn{
  border:none;
  width:34px;
  height:34px;
  border-radius:50%;
  background:#fff;
  cursor:pointer;
  font-weight:bold;
}

.tabs{
  display:flex;
  gap:8px;
  padding:14px;
}

.tabs button{
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  background:#eee;
}

.tabs button.active{
  background:#00acc1;
  color:#fff;
}

.tab{
  display:none;
  padding:0 16px 20px;
}

.tab.active{
  display:block;
}

.spec-box{
  background:#f7f7f7;
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
  line-height:1.7;
}

#overlay2{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  z-index:9998;
}

#overlay2.active{
  display:block;
}

/* ===== MOBILE ===== */

@media(max-width:768px){

  .container{
    flex-direction:column;
  }

  #panel{
    width:100%;
    right:-100%;
  }

}

</style>
</head>

<body>

<div id="overlay"
onclick="toggleMenu()"></div>

<div class="sidebar"
id="sidebar">

  <h3>Menu</h3>

  <a href="index.html">
    Trang chủ
  </a>

  <a href="cart.html">
    Giỏ hàng
  </a>

  <a href="orders.html">
    Đơn hàng
  </a>

</div>

<header class="header-pro">

  <div class="logo">
    <img src="https://i.ibb.co/Z1kv9nJj/logo.png">
  </div>

  <div class="menu-btn"
    onclick="toggleMenu()">
    ☰
  </div>

  <div class="search-box">
    <input placeholder="Tìm kiếm...">
    <span class="search-icon">🔍</span>
  </div>

  <div class="header-right">

    <div class="link-btn"
      onclick="goHome()">
      Trang chủ
    </div>

    <div class="cart"
      onclick="goCart()">
      🛒
    </div>

  </div>

</header>

<div class="container">

  <div class="left">
    <img id="img">
  </div>

  <div class="right">

    <h2 id="name"></h2>

    <div>

      <span class="price"
        id="price">
      </span>

      <span class="old"
        id="old">
      </span>

    </div>

    <button class="btn"
      onclick="openPanel()">

      ⚙️ Xem thông số

    </button>

  </div>

</div>

<div id="panel">

  <div class="panel-header">

    <h3>Thông số sản phẩm</h3>

    <button class="close-btn"
      onclick="closePanel()">
      ✕
    </button>

  </div>

  <div class="tabs">

    <button class="tab-btn active"
      onclick="showTab('t1',this)">
      Thông tin
    </button>

    <button class="tab-btn"
      onclick="showTab('t2',this)">
      Thiết kế
    </button>

    <button class="tab-btn"
      onclick="showTab('t3',this)">
      Cấu hình
    </button>

  </div>

  <div id="t1"
    class="tab active">
  </div>

  <div id="t2"
    class="tab">
  </div>

  <div id="t3"
    class="tab">
  </div>

</div>

<div id="overlay2"
onclick="closePanel()"></div>

<script>

/* =========================
   MENU
========================= */

function toggleMenu(){

  document
    .getElementById("sidebar")
    .classList.toggle("active");

  document
    .getElementById("overlay")
    .classList.toggle("active");

}

/* =========================
   LINK
========================= */

function goHome(){
  window.location.href =
    "index.html";
}

function goCart(){
  window.location.href =
    "cart.html";
}

/* =========================
   GET ID
========================= */

const params =
  new URLSearchParams(
    window.location.search
  );

const id =
  params.get("id");

/* =========================
   GET PRODUCTS
========================= */

let products =
  JSON.parse(
    localStorage.getItem("products")
  ) || [];

/* =========================
   FIND PRODUCT
========================= */

let p =
  products.find(
    x => String(x.id) === String(id)
  );

/* =========================
   LOAD PRODUCT
========================= */

if(p){

  document.getElementById("img").src =
    p.img || "";

  document.getElementById("name").innerText =
    p.name || "Không tên";

  document.getElementById("price").innerText =
    Number(p.price || 0)
    .toLocaleString() + "đ";

  document.getElementById("old").innerText =
    p.oldPrice
    ? Number(p.oldPrice)
      .toLocaleString() + "đ"
    : "";

  /* ===== TAB 1 ===== */

  let infoHTML = "";

  if(
    p.category === "cam-in" ||
    p.category === "cam-ngoai" ||
    p.category === "home"
  ){

    infoHTML = `

      <div class="spec-box">
        <b>Danh mục:</b><br>
        ${p.categoryName || ""}
      </div>

      <div class="spec-box">
        <b>Bảo hành:</b><br>
        ${p.spec?.baoHanh || "Đang cập nhật"}
      </div>

      <div class="spec-box">
        <b>Mô tả:</b><br>
        ${p.desc || "Không có mô tả"}
      </div>

    `;
  }

  else if(p.category === "sd"){

    infoHTML = `

      <div class="spec-box">
        <b>Dung lượng:</b><br>
        ${p.spec?.dungLuong || "Đang cập nhật"}
      </div>

      <div class="spec-box">
        <b>Tốc độ:</b><br>
        ${p.spec?.tocDo || "Đang cập nhật"}
      </div>

      <div class="spec-box">
        <b>Bảo hành:</b><br>
        ${p.spec?.baoHanh || "Đang cập nhật"}
      </div>

    `;
  }

  else if(p.category === "combo"){

    infoHTML = `

      <div class="spec-box">
        <b>Combo:</b><br>
        ${p.spec?.moTaCombo || "Đang cập nhật"}
      </div>

    `;
  }

  document.getElementById("t1").innerHTML =
    infoHTML;

  /* ===== TAB 2 ===== */

  let designHTML = "";

  if(
    p.category === "cam-in" ||
    p.category === "cam-ngoai" ||
    p.category === "home"
  ){

    designHTML = `

      <div class="spec-box">
        <b>Góc nhìn:</b><br>
        ${p.spec?.gocNhin || "Đang cập nhật"}
      </div>

      <div class="spec-box">
        <b>Kết nối:</b><br>
        ${p.spec?.ketNoi || "Đang cập nhật"}
      </div>

    `;
  }

  else if(p.category === "sd"){

    designHTML = `

      <div class="spec-box">
        <b>Loại thẻ:</b><br>
        ${p.spec?.loai || "Đang cập nhật"}
      </div>

    `;
  }

  else{

    designHTML = `

      <div class="spec-box">
        Không có dữ liệu
      </div>

    `;
  }

  document.getElementById("t2").innerHTML =
    designHTML;

  /* ===== TAB 3 ===== */

  let configHTML = "";

  if(
    p.category === "cam-in" ||
    p.category === "cam-ngoai" ||
    p.category === "home"
  ){

    configHTML = `

      <div class="spec-box">
        <b>Độ phân giải:</b><br>
        ${p.spec?.doPhanGiai || "Đang cập nhật"}
      </div>

      <div class="spec-box">
        <b>Kết nối:</b><br>
        ${p.spec?.ketNoi || "Đang cập nhật"}
      </div>

    `;
  }

  else if(p.category === "sd"){

    configHTML = `

      <div class="spec-box">
        <b>Dung lượng:</b><br>
        ${p.spec?.dungLuong || "Đang cập nhật"}
      </div>

      <div class="spec-box">
        <b>Tốc độ:</b><br>
        ${p.spec?.tocDo || "Đang cập nhật"}
      </div>

    `;
  }

  else{

    configHTML = `

      <div class="spec-box">
        ${p.spec?.moTaCombo || "Đang cập nhật"}
      </div>

    `;
  }

  document.getElementById("t3").innerHTML =
    configHTML;

}else{

  document.body.innerHTML = `
    <h2 style="
      padding:40px;
      text-align:center;
      color:red;
    ">
      Không tìm thấy sản phẩm
    </h2>
  `;
}

/* =========================
   PANEL
========================= */

function openPanel(){

  document
    .getElementById("panel")
    .classList.add("active");

  document
    .getElementById("overlay2")
    .classList.add("active");
}

function closePanel(){

  document
    .getElementById("panel")
    .classList.remove("active");

  document
    .getElementById("overlay2")
    .classList.remove("active");
}

/* =========================
   TAB
========================= */

function showTab(id,btn){

  document
    .querySelectorAll(".tab")
    .forEach(t =>
      t.classList.remove("active")
    );

  document
    .getElementById(id)
    .classList.add("active");

  document
    .querySelectorAll(".tab-btn")
    .forEach(b =>
      b.classList.remove("active")
    );

  btn.classList.add("active");
}

</script>

</body>
</html>
