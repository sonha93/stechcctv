<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Chi tiết sản phẩm</title>

<style>
/* ===== GIỮ NGUYÊN STYLE CỦA BẠN ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-weight:bold;
}

body{
  background:#f5f5f5;
  color:#111;
}

/* HEADER */
header{
  position:sticky;
  top:0;
  z-index:999;
  display:flex;
  align-items:center;
  gap:5px;
  padding:12px;
  background:#33A0AB;
}

.menu-btn,.icon-btn{
  width:46px;height:46px;
  border-radius:14px;
  background:#00acc1;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  font-size:22px;
  cursor:pointer;
}

.logo{
  width:46px;height:46px;
  border-radius:14px;
  overflow:hidden;
  background:#fff;
}

.logo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.search-box{flex:1;position:relative;}

.search-box input{
  width:100%;
  height:46px;
  border:none;
  border-radius:14px;
  padding:0 14px;
}

.cart-count{
  position:absolute;
  top:-5px;right:-5px;
  background:red;
  color:#fff;
  width:20px;height:20px;
  border-radius:50%;
  font-size:11px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* LAYOUT */
.container{
  max-width:1000px;
  margin:0 auto;
  padding:10px;
  display:flex;
  gap:18px;
}

.left{width:330px;}

.left img{
  width:100%;
  height:330px;
  object-fit:cover;
  border-radius:18px;
  background:#fff;
}

/* THUMB */
#thumbList{
  display:flex;
  gap:6px;
  margin-top:10px;
  flex-wrap:wrap;
}

#thumbList img{
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
  border:1px solid #ddd;
}

.right{flex:1;}

.product-name{font-size:28px;}

.price{color:red;font-size:32px;}

.old-price{text-decoration:line-through;color:#555;}

.sale{background:red;color:#fff;padding:5px 10px;border-radius:8px;}
</style>
</head>

<body>

<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>

  <div class="logo">
    <img src="https://i.ibb.co/Z1kv9nJj/logo.png">
  </div>

  <div class="search-box">
    <input type="text" id="searchInput" oninput="searchProduct()" placeholder="Tìm kiếm...">
    <div id="searchResults"></div>
  </div>

  <a class="icon-btn" href="cart.html">🛒</a>
</header>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <img id="detailImg">

    <!-- THUMBNAIL -->
    <div id="thumbList"></div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="product-name" id="detailName"></div>

    <div>
      <span class="price" id="detailPrice"></span>
      <span class="old-price" id="detailOldPrice"></span>
      <span class="sale" id="detailSale"></span>
    </div>

    <button onclick="addToCart()">Thêm giỏ hàng</button>

    <div id="detailDesc"></div>
  </div>

</div>

<script type="module">

import { app } from "./auth.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { addToCart as addToCartFirebase } from "./cart.js";

const db = getFirestore(app);

const id = new URLSearchParams(location.search).get("id");

let product = null;
let products = [];

/* LOAD LIST (SEARCH) */
async function loadProducts(){
  const snap = await getDocs(collection(db,"products"));
  products = snap.docs.map(d => ({id:d.id,...d.data()}));
}

/* LOAD DETAIL */
async function loadProduct(){

  const snap = await getDoc(doc(db,"products",id));

  if(!snap.exists()) return;

  product = {id:snap.id,...snap.data()};

  const images =
    product.images && product.images.length
      ? product.images
      : [product.img];

  // MAIN IMAGE
  document.getElementById("detailImg").src = images[0];

  // THUMBS
  document.getElementById("thumbList").innerHTML =
    images.map(img => `
      <img src="${img}"
        onclick="document.getElementById('detailImg').src='${img}'">
    `).join("");

  // INFO
  document.getElementById("detailName").innerText = product.name || "";
  document.getElementById("detailPrice").innerText = Number(product.price||0).toLocaleString()+"đ";
  document.getElementById("detailOldPrice").innerText = product.oldPrice ? Number(product.oldPrice).toLocaleString()+"đ" : "";
  document.getElementById("detailDesc").innerText = product.desc || "";

  if(product.oldPrice > product.price){
    const sale = Math.round((1 - product.price/product.oldPrice)*100);
    document.getElementById("detailSale").innerText = "-"+sale+"%";
  }
}

/* ADD CART */
window.addToCart = async function(){
  if(!product) return;
  await addToCartFirebase(product);
  alert("Đã thêm giỏ");
}

/* MENU */
window.toggleMenu = function(){
  document.getElementById("sidebar")?.classList.toggle("active");
  document.getElementById("overlay")?.classList.toggle("active");
}

/* SEARCH */
window.searchProduct = function(){
  const key = document.getElementById("searchInput").value.toLowerCase();
  const box = document.getElementById("searchResults");

  box.innerHTML="";

  if(!key) return;

  products
    .filter(p=>p.name?.toLowerCase().includes(key))
    .slice(0,8)
    .forEach(p=>{
      const div = document.createElement("div");
      div.innerHTML = `
        <div>${p.name}</div>
      `;
      div.onclick=()=>{
        location.href="logo.html?id="+p.id;
      };
      box.appendChild(div);
    });
}

/* INIT */
loadProducts();
loadProduct();

</script>

</body>
</html>
