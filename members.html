<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý Member</title>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  padding:10px;
  margin:0;
}

.box{
  width:100%;
  max-width:100%;
  overflow-x:auto;
  box-sizing:border-box;
}

table{
  min-width:700px;
  width:700px;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:left;
}

th{
  background:#fafafa;
}

.search{
  width:100%;
  padding:10px;
  margin-bottom:15px;
  border:1px solid #ddd;
  border-radius:8px;
}
  @media (max-width:768px){

  body{
    padding:10px;
  }

  .box{
    padding:10px;
    overflow-x:auto;
  }

  table{
    min-width:650px;
  }

  th,
  td{
    padding:8px;
    font-size:14px;
    white-space:nowrap;
  }

  h2{
    font-size:22px;
  }
      th,
  td{
    padding:4px 6px;
    font-size:12px;
    white-space:nowrap;
  }

  table{
    min-width:auto;
    width:100%;
  }
    th,
  td{
    padding:3px;
    font-size:11px;
  }

}

</style>
</head>
<body>

<div class="box">

<h2>👑 Thành viên</h2>

<input
  id="search"
  class="search"
  placeholder="Tìm tên hoặc SĐT..."
>

<table>

<thead>
<tr>
  <th>Tên</th>
  <th>SĐT</th>
  <th>Điểm</th>
  <th>Tổng chi tiêu</th>
  <th>Hạng</th>
  <th>Thao tác</th>
</tr>
</thead>

<tbody id="memberBody">
<tr>
<td colspan="5">Đang tải...</td>
</tr>
</tbody>

</table>
<h3 style="margin-top:30px">
Lịch sử giao dịch
</h3>

<table>

<thead>

<tr>
<th>Ngày</th>
<th>Loại</th>
<th>Sản phẩm</th>
<th>Tổng đơn</th>
<th>Dùng điểm</th>
<th>Giảm</th>
<th>Được cộng</th>
<th>Điểm còn</th>
</tr>

</thead>

<tbody id="historyBody">

<tr>
<td colspan="8">
Chọn thành viên để xem
</td>
</tr>

</tbody>

</table>
</div>


<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script type="module">
import { db } from "./firebase-init.js";

let allMembers = [];

async function loadMembers(){

const snap = await db
  .collection("members")
  .get();

allMembers = snap.docs.map(doc => ({
  id: doc.id,
  ...doc.data()
}));
  renderMembers();
}

function renderMembers(){

  const keyword =
    document
      .getElementById("search")
      .value
      .trim()
      .toLowerCase();

  const body =
    document.getElementById("memberBody");

  let html = "";

  allMembers
    .filter(m => {

      const name =
        (m.name || "")
        .toLowerCase();

      const phone =
        (m.phone || "")
        .toLowerCase();

      return (
        name.includes(keyword) ||
        phone.includes(keyword)
      );

    })
    .forEach(m => {
     
      html += `
<tr>


  <td>${m.name || "-"}</td>

  <td>${m.phone || "-"}</td>

  <td>
    ${(Number(m.points || 0) * 100).toLocaleString("vi-VN")}đ
  </td>

  <td>
    ${Number(m.totalSpent || 0).toLocaleString("vi-VN")}đ
  </td>

  <td>
    ${m.level || "Silver"}
  </td>

  <td>
    <button onclick="giftPoints('${m.id}')">
      🎁 Tặng điểm
    </button>
    <button onclick="showHistory('${m.id}')">
    📋 Lịch sử
  </button>
</td>
  </td>

</tr>
`;
      
  }); 
  if(!html){

    html = `
    <tr>
      <td colspan="5">
        Không có member
      </td>
    </tr>
    `;
  }

  body.innerHTML = html;
}

document
  .getElementById("search")
  .addEventListener(
    "input",
    renderMembers
  );
window.giftPoints = async function(memberId){

  const input = prompt("Nhập số điểm muốn tặng:");

  if(input === null) return;

  const points = Number(input);

  if(isNaN(points) || points <= 0){
    alert("Điểm không hợp lệ");
    return;
  }

  const ref = db.collection("members").doc(memberId);

  const snap = await ref.get();

  if(!snap.exists) return;

  const data = snap.data();

  await ref.update({
    points: Number(data.points || 0) + points
  });

  await db.collection("member_history").add({
    memberId,
    type: "gift_points",
    points,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  alert("Đã tặng " + points + " điểm");

  loadMembers();
};
loadMembers();
window.showHistory = async function(memberId){

const snap = await db
.collection("member_history")
.where("memberId","==",memberId)
.get();

const body =
document.getElementById("historyBody");

let html = "";

snap.docs
.sort((a,b)=>
(b.data().createdAt||0)
-
(a.data().createdAt||0)
)
.forEach(doc=>{

const h = doc.data();

const products =
(h.items||[])
.map(i=>`${i.name} x${i.qty}`)
.join("<br>");

html += `
<tr>

<td>
${new Date(h.createdAt).toLocaleString("vi-VN")}
</td>

<td>
${h.type}
</td>

<td>
${products}
</td>

<td>
${Number(h.total||0).toLocaleString("vi-VN")}đ
</td>

<td>
${h.usedPoints||0}
</td>

<td>
${Number(h.discountAmount||0).toLocaleString("vi-VN")}đ
</td>

<td>
${h.earnPoints||0}
</td>

<td>
${h.remainPoints||0}
</td>

</tr>
`;

});

if(!html){

html=`
<tr>
<td colspan="8">
Chưa có lịch sử
</td>
</tr>
`;

}

body.innerHTML=html;

};
</script>

</body>
</html>
