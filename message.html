<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nhắn tin</title>


<link rel="stylesheet" href="message.css">
<link rel="stylesheet" href="verified-users.css">

</head>


<body>


<div class="chat-container">


   <!-- HEADER -->

<div class="chat-header">

    <button id="backBtn">
        ←
    </button>

    <img
        id="chatAvatar"
        class="chat-avatar"
        src="default-avatar.png">

    <div class="header-info">

        <div id="chatTitle">
            Người dùng
        </div>

    </div>

    <button
        id="infoBtn"
        class="info-btn"
        title="Thông tin cuộc trò chuyện">

        <svg viewBox="0 0 24 24" fill="currentColor">

            <path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 4.5a1.25 1.25 0 110 2.5 1.25 1.25 0 010-2.5zm1.5 11h-3v-1.5h.75V11h-1V9.5h2.5v6h.75v2z"/>

        </svg>

    </button>

</div>




    <!-- MESSAGE AREA -->

    <div id="messageBox"
    class="message-box">

    </div>


<div id="typingStatus"></div>



   <!-- INPUT -->

<div class="chat-input">


   <input
id="imageInput"
type="file"
accept="image/*,video/*"
multiple
hidden>

    <button id="imageBtn">

        <svg 
        viewBox="0 0 24 24"
        width="22"
        height="22"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round">

            <rect 
            x="3" 
            y="3" 
            width="18" 
            height="18" 
            rx="3"/>

            <circle 
            cx="8.5" 
            cy="8.5" 
            r="1.5"/>

            <path 
            d="M21 15l-5-5L5 21"/>

        </svg>

    </button>


<div id="imagePreview"></div>
    <input 
    id="messageInput"
    type="text"
    placeholder="Nhập tin nhắn...">



    <button id="sendBtn">
        Gửi
    </button>


</div>
</div>




<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script type="module" src="message.js"></script>

</body>

</html>
