<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nhắn tin</title>


<link rel="stylesheet" href="message.css">
<link rel="stylesheet" href="verified-users.css">

</head>


<body>


<div class="chat-container">


<!-- HEADER -->

<div class="chat-header">

    <button id="backBtn">
        ←
    </button>


    <img
    id="chatAvatar"
    class="chat-avatar"
    src="default-avatar.png">


    <div class="header-info">

        <div id="chatTitle">
            Người dùng
        </div>

    </div>


    <button
    id="infoBtn"
    class="info-btn">


        <svg viewBox="0 0 24 24" fill="currentColor">

            <path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 4.5a1.25 1.25 0 110 2.5 1.25 1.25 0 010-2.5zm1.5 11h-3v-1.5h.75V11h-1V9.5h2.5v6h.75v2z"/>

        </svg>


    </button>


</div>





<!-- MESSAGE AREA -->


<div id="messageBox"
class="message-box">

</div>


<div id="replyPreview"></div>





<!-- INPUT -->


<div class="chat-input">



<input
id="imageInput"
type="file"
accept="image/*,video/*"
multiple
hidden>



<!-- IMAGE BUTTON -->

<button id="imageBtn">


<svg 
viewBox="0 0 24 24"
width="22"
height="22"
fill="none"
stroke="currentColor"
stroke-width="2"
stroke-linecap="round"
stroke-linejoin="round">


<rect 
x="3"
y="3"
width="18"
height="18"
rx="3"/>


<circle 
cx="8.5"
cy="8.5"
r="1.5"/>


<path 
d="M21 15l-5-5L5 21"/>


</svg>


</button>




<div id="imagePreview"></div>





<input 
id="messageInput"
type="text"
placeholder="Nhập tin nhắn...">







<!-- MIC BUTTON -->

<button id="openRecorderBtn"
class="voice-btn">


<svg 
viewBox="0 0 24 24"
width="24"
height="24"
fill="currentColor">


<path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/>


<path d="M17 11a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21H8v2h8v-2h-3v-3.08A7 7 0 0 0 19 11h-2z"/>


</svg>


</button>





<!-- SEND -->

<button id="sendBtn">

    Gửi

</button>



</div>




<!-- VOICE PANEL -->

<div id="voicePanel" class="voice-popup hidden">


    <canvas
    id="waveCanvas"
    width="220"
    height="60">
    </canvas>
<div id="recordTime">
    00:00
</div>

    <!-- XÓA GHI ÂM -->

    <button id="cancelRecordBtn"
    class="voice-trash">

        <svg viewBox="0 0 24 24">
            <path fill="currentColor"
            d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM8 9h8v10H8V9zm7.5-5l-1-1h-5l-1 1H5v2h14V4z"/>
        </svg>

    </button>



    <!-- GỬI -->

    <button id="sendRecordBtn"
    class="voice-send">

        <svg viewBox="0 0 24 24">

            <path fill="currentColor"
            d="M2 21L23 12 2 3v7l15 2-15 2z"/>

        </svg>

    </button>


</div>


</div>







</div>






<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>


<script type="module" src="firebase-init.js"></script>


<script type="module" src="theme.js"></script>

<script type="module" src="message.js"></script>

<script type="module" src="voice-recorder.js"></script>



</body>

</html>
