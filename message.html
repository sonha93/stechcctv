<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nhắn tin</title>


<link rel="stylesheet" href="message.css">
<link rel="stylesheet" href="verified-users.css">

</head>


<body>


<div class="chat-container">


<!-- HEADER -->

<div class="chat-header">

    <button id="backBtn">
        ←
    </button>

    <img
    id="chatAvatar"
    class="chat-avatar"
    src="default-avatar.png">

    <div class="header-info">
        <div id="chatTitle">
            Người dùng
        </div>
    </div>

   <!-- GỌI THOẠI -->
<button id="audioCallBtn" class="call-btn">
    <svg
        viewBox="0 0 24 24"
        width="20"
        height="20"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round">

        <path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 3.09 5.18 2 2 0 0 1 5.08 3h3a2 2 0 0 1 2 1.72c.12.9.33 1.78.63 2.62a2 2 0 0 1-.45 2.11L9.09 10.91a16 16 0 0 0 4 4l1.46-1.17a2 2 0 0 1 2.11-.45c.84.3 1.72.51 2.62.63A2 2 0 0 1 22 16.92z"/>

    </svg>

</button>

    <button
    id="infoBtn"
    class="info-btn">

        <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 4.5a1.25 1.25 0 110 2.5 1.25 1.25 0 010-2.5zm1.5 11h-3v-1.5h.75V11h-1V9.5h2.5v6h.75v2z"/>
        </svg>

    </button>

</div>





<!-- MESSAGE AREA -->


<div id="messageBox"
class="message-box">

</div>


<div id="replyPreview"></div>





<!-- INPUT -->


<div class="chat-input">



<input
id="imageInput"
type="file"
accept="image/*,video/*"
multiple
hidden>



<!-- IMAGE BUTTON -->

<button id="imageBtn">


<svg 
viewBox="0 0 24 24"
width="22"
height="22"
fill="none"
stroke="currentColor"
stroke-width="2"
stroke-linecap="round"
stroke-linejoin="round">


<rect 
x="3"
y="3"
width="18"
height="18"
rx="3"/>


<circle 
cx="8.5"
cy="8.5"
r="1.5"/>


<path 
d="M21 15l-5-5L5 21"/>


</svg>


</button>




<div id="imagePreview"></div>





<input 
id="messageInput"
type="text"
placeholder="Nhập tin nhắn...">







<!-- MIC BUTTON -->

<button id="openRecorderBtn"
class="voice-btn">


<svg 
viewBox="0 0 24 24"
width="24"
height="24"
fill="currentColor">


<path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/>


<path d="M17 11a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21H8v2h8v-2h-3v-3.08A7 7 0 0 0 19 11h-2z"/>


</svg>


</button>





<!-- SEND -->

<button id="sendBtn">

    Gửi

</button>



</div>




<!-- VOICE PANEL -->

<div id="voicePanel" class="voice-popup hidden">

    <canvas id="waveCanvas" width="260" height="60"></canvas>

    <div id="recordTime">00:00</div>

    <div class="voice-actions">

        <!-- XÓA -->
        <button id="cancelRecordBtn" class="voice-action">

            <svg viewBox="0 0 24 24">
                <path fill="currentColor"
                d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM8 9h8v10H8V9zm7.5-5l-1-1h-5l-1 1H5v2h14V4z"/>
            </svg>

            <span>Xóa</span>

        </button>

        <!-- GỬI -->
        <button id="sendRecordBtn" class="voice-send">

            <svg viewBox="0 0 24 24">
                <path fill="currentColor"
                d="M8 5v14l11-7z"/>
            </svg>

            <span>Gửi</span>

        </button>

        <!-- NGHE LẠI -->
        <button id="previewRecordBtn" class="voice-action">

            <svg viewBox="0 0 24 24">
                <path fill="currentColor"
                d="M12 5V2L7 7l5 5V9a4 4 0 110 8 4 4 0 01-3.87-3H6.05A6.002 6.002 0 0012 20a6 6 0 000-12z"/>
            </svg>

            <span>Nghe lại</span>

        </button>

    </div>

</div>

</div>
<!-- CALL POPUP -->
<div id="callPopup" class="call-popup hidden">

    <img
    id="callAvatar"
    class="call-avatar"
    src="default-avatar.png">

    <div class="call-info">

        <div id="callName">
            Người dùng
        </div>

        <div id="callStatus">
            Đang gọi...
        </div>
        <div id="callTimer">
        00:00
        </div>
    </div>

    <div class="call-buttons">

        <!-- TỪ CHỐI -->
       <button id="rejectBtn" class="call-reject">

            <svg viewBox="0 -960 960 960" fill="currentColor">
                <path d="M200-520q58-46 127.5-73T480-620q83 0 152.5 27T760-520l-56 58q-46-35-102.5-56.5T480-540q-65 0-121.5 21.5T256-462l-56-58Z"/>
            </svg>

        </button>

        <!-- NHẬN -->
        <button id="acceptBtn" class="call-accept">

            <svg viewBox="0 -960 960 960" fill="currentColor">
                <path d="M798-120q-119 0-247.5-60.5T318-352Q207-463 146.5-591.5T86-839q0-24 16.5-40.5T143-896h154q20 0 35 13t20 33l25 113q4 18-1 34t-18 28l-74 74q29 52 69.5 99.5T443-413q48 48 95.5 88.5T638-255l74-74q12-12 28-17t34-1l113 25q20 5 33 20t13 35v154q0 24-16.5 40.5T798-120Z"/>
            </svg>

        </button>

        <!-- KẾT THÚC -->
<button id="endBtn" class="call-end hidden">

            <svg viewBox="0 -960 960 960" fill="currentColor">
                <path d="M200-520q58-46 127.5-73T480-620q83 0 152.5 27T760-520l-56 58q-46-35-102.5-56.5T480-540q-65 0-121.5 21.5T256-462l-56-58Z"/>
            </svg>

        </button>

    </div>

</div>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>


<script type="module" src="firebase-init.js"></script>


<script type="module" src="theme.js"></script>

<script type="module" src="message.js"></script>

<script type="module" src="voice-recorder.js"></script>
<script type="module" src="call/call-listener.js"></script>

<audio id="ringtone" loop>
    <source
        src="assets/sounds/ring.mp3"
        type="audio/mpeg">
</audio>

<audio id="remoteAudio" autoplay></audio>
<audio id="callingTone" loop>
    <source
        src="assets/sounds/calling.mp3"
        type="audio/mpeg">
</audio>
</body>

</html>
