<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Chi tiết đơn hàng</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
color:#111;
}

.container{
max-width:760px;
margin:auto;
padding-bottom:30px;
}

/* HEADER */

.header{

position:sticky;
top:0;

height:60px;

background:#fff;

display:flex;
align-items:center;

padding:0 16px;

border-bottom:1px solid #eee;

z-index:1000;

}

.back{

font-size:28px;
text-decoration:none;
color:#111;

margin-right:15px;

}

.header-title{

font-size:20px;
font-weight:bold;

}

/* STATUS */

.status-box{

background:linear-gradient(135deg,#ff6b6b,#ff2d55);

color:#fff;

padding:22px 18px;

}

.status-name{

font-size:24px;

font-weight:bold;

margin-bottom:8px;

}

.status-desc{

font-size:15px;

opacity:.95;

}

/* CARD */

.card{

background:#fff;

margin-top:10px;

padding:16px;

}

/* PRODUCT */

.product{

display:flex;

gap:12px;

padding:12px 0;

border-bottom:1px solid #eee;

}

.product:last-child{

border-bottom:none;

}

.product img{

width:90px;
height:90px;

border-radius:12px;

object-fit:cover;

background:#eee;

}

.product-info{

flex:1;

display:flex;
flex-direction:column;

}

.product-name{

font-weight:bold;

font-size:16px;

line-height:1.4;

margin-bottom:6px;

}

.product-qty{

font-size:14px;

color:#777;

}

.product-price{

margin-top:auto;

font-size:18px;

font-weight:bold;

color:#ff2d55;

}

/* ROW */

.row{

display:flex;

justify-content:space-between;

align-items:flex-start;

gap:20px;

padding:8px 0;

}

.row-title{

color:#666;

font-size:15px;

}

.row-value{

font-weight:bold;

text-align:right;

word-break:break-word;

}

/* TOTAL */

.total{

font-size:24px;

font-weight:bold;

color:#ff2d55;

}

/* TIMELINE */

.timeline{

margin-top:18px;

position:relative;

}

.timeline::before{

content:"";

position:absolute;

left:11px;

top:0;
bottom:0;

width:2px;

background:#ddd;

}

.timeline-item{

position:relative;

display:flex;

gap:15px;

margin-bottom:22px;

}

.timeline-icon{

width:24px;
height:24px;

border-radius:50%;

background:#ddd;

display:flex;
justify-content:center;
align-items:center;

color:#fff;

font-size:13px;

z-index:2;

flex-shrink:0;

}

.timeline-item.active .timeline-icon{

background:#16c784;

}

.timeline-title{

font-weight:bold;

margin-bottom:4px;

}

.timeline-time{

font-size:13px;

color:#888;

}

/* LOADING */

.loading{

padding:80px 20px;

text-align:center;

font-size:18px;

color:#666;

}

/* MOBILE */

@media(max-width:768px){

.container{

max-width:100%;

}

.product img{

width:80px;
height:80px;

}

.status-name{

font-size:20px;

}

.total{

font-size:22px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<a
href="javascript:history.back()"
class="back">

←

</a>

<div class="header-title">

Chi tiết đơn hàng

</div>

</div>

<div id="loading" class="loading">

Đang tải đơn hàng...

</div>

<div id="page" style="display:none;">

<div class="status-box">

<div
id="statusName"
class="status-name">

Đang tải...

</div>

<div
id="statusDesc"
class="status-desc">

Vui lòng chờ...

</div>

</div>

<div
class="card"
id="productList">

</div>

<div class="card">

<div class="row">

<div class="row-title">

Người nhận

</div>

<div
id="customerName"
class="row-value">

</div>

</div>

<div class="row">

<div class="row-title">

Số điện thoại

</div>

<div
id="phone"
class="row-value">

</div>

</div>

<div class="row">

<div class="row-title">

Địa chỉ

</div>

<div
id="address"
class="row-value">

</div>

</div>

<div class="row">

<div class="row-title">

Thanh toán

</div>

<div
id="payment"
class="row-value">

</div>

</div>

</div>

<div class="card">

<div class="row">
<div class="row-title">
Tổng giá gốc
</div>
<div id="originalTotal" class="row-value">
0đ
</div>
</div>

<div class="row">
<div class="row-title">
Tiết kiệm
</div>
<div id="discountTotal"
class="row-value"
style="color:#ff2d55;">
-0đ
</div>
</div>

<div class="row">
<div class="row-title">
Dùng điểm
</div>
<div id="pointTotal"
class="row-value"
style="color:#ff2d55;">
-0đ
</div>
</div>

<hr style="margin:10px 0;border:none;border-top:1px solid #eee;">

<div class="row">
<div class="row-title"
style="font-size:18px;font-weight:bold;color:#111;">
Cần thanh toán
</div>

<div
id="total"
class="total">
0đ
</div>

</div>

</div>
<div class="card">

<h3 style="margin-bottom:18px;">

Lịch sử đơn hàng

</h3>

<div
id="timeline"
class="timeline">

</div>

</div>

</div>
<script type="module">

import { app } from "./auth.js";

import {
    getFirestore,
    doc,
    getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const db = getFirestore(app);

const loading = document.getElementById("loading");
const page = document.getElementById("page");

const params = new URLSearchParams(location.search);

const orderId = params.get("id");

if(!orderId){

    alert("Không tìm thấy đơn hàng");

    history.back();

}

const snap = await getDoc(
    doc(db,"orders",orderId)
);

if(!snap.exists()){

    alert("Đơn hàng không tồn tại");

    history.back();

}

const order = snap.data();

loading.style.display="none";

page.style.display="block";

/* =======================
HIỂN THỊ THÔNG TIN
======================= */

document.getElementById("customerName").innerText =
order.customerName || "";

document.getElementById("phone").innerText =
order.phone || "";

document.getElementById("address").innerText =
order.address || "";

document.getElementById("payment").innerText =
order.payment=="bank"
?"Chuyển khoản"
:"Thanh toán khi nhận hàng";

const pay = Number(order.total || 0);
const point = Number(order.cashbackAmount || 0);

let originalTotal = Number(order.originalTotal || 0);

// Đơn cũ chưa lưu originalTotal thì tính lại từ products
if (!originalTotal) {

    originalTotal = 0;

    for (const item of (order.items || [])) {

        const qty = Number(item.qty || 1);

        let oldPrice = Number(item.oldPrice || 0);

        if (!oldPrice && item.productId) {

            const productSnap = await getDoc(
                doc(db, "products", item.productId)
            );

            if (productSnap.exists()) {

                const p = productSnap.data();

                oldPrice = Number(p.oldPrice || item.price);

            } else {

                oldPrice = Number(item.price);

            }

        }

        originalTotal += oldPrice * qty;
    }
}

const discount = Math.max(
    0,
    originalTotal - pay - point
);

document.getElementById("originalTotal").innerText =
originalTotal.toLocaleString() + "đ";

document.getElementById("discountTotal").innerText =
"-" + discount.toLocaleString() + "đ";

document.getElementById("pointTotal").innerText =
"-" + point.toLocaleString() + "đ";

document.getElementById("total").innerText =
pay.toLocaleString() + "đ";
/* =======================
TRẠNG THÁI
======================= */

const statusUI = {

pending:{
title:"🟡 Đơn hàng đang chờ xác nhận",
desc:"Shop sẽ xác nhận đơn hàng của bạn sớm nhất."
},

confirmed:{
title:"✅ Đơn hàng đã được xác nhận",
desc:"Shop đã xác nhận và chuẩn bị đóng gói."
},

shipping:{
title:"🚚 Đơn hàng đang vận chuyển",
desc:"Đơn hàng đang trên đường giao tới bạn."
},

completed:{
title:"🎉 Đơn hàng đã giao thành công",
desc:"Cảm ơn bạn đã mua hàng."
},

returned:{
title:"↩️ Đơn hàng đã trả hàng",
desc:"Yêu cầu trả hàng của bạn đã được cửa hàng chấp nhận."
},

cancelled:{
title:"❌ Đơn hàng đã bị hủy",
desc:"Đơn hàng không thể tiếp tục xử lý."
}

};

let current = statusUI[order.status] || statusUI.pending;

// Đang chờ duyệt trả
if(order.returnRequested === true &&
   order.returnStatus === "pending"){

    current = {
        title:"📦 Đang chờ duyệt trả hàng",
        desc:"Yêu cầu trả hàng của bạn đang được cửa hàng xem xét."
    };

}

// Đã duyệt trả
if(order.returnRequested === true &&
   order.returnStatus === "approved"){

    current = statusUI.returned;

}

// Từ chối trả
if(order.returnRequested === true &&
   order.returnStatus === "rejected"){

    current = {
        title:"⛔ Yêu cầu trả hàng bị từ chối",
        desc:"Yêu cầu trả hàng của bạn đã bị cửa hàng từ chối."
    };

}

if(!current){
    current = statusUI.pending;
}

document.getElementById("statusName").innerText = current.title;
document.getElementById("statusDesc").innerText = current.desc;

/* =======================
SẢN PHẨM
======================= */

const productList =
document.getElementById("productList");

productList.innerHTML="";

(order.items || []).forEach(item => {

    const qty = Number(item.qty || 1);

    const price = Number(item.price || 0);

    const oldPrice = Number(item.oldPrice || price);

    productList.innerHTML += `

<div class="product">

<img src="${item.img}">

<div class="product-info">

<div class="product-name">

${item.name}

</div>

<div class="product-qty">

Số lượng: x${qty}

</div>

<div style="margin-top:auto;">

    ${
        oldPrice > price
        ? `
        <div style="
            color:#999;
            text-decoration:line-through;
            font-size:14px;
            margin-bottom:4px;">
            ${oldPrice.toLocaleString()}đ
        </div>
        `
        : ""
    }

    <div class="product-price">
        ${price.toLocaleString()}đ
    </div>

</div>

</div>

</div>

`;

});

/* =======================
TIMELINE
======================= */

const timeline =
document.getElementById("timeline");

const stepIndex={

pending:1,
confirmed:2,
shipping:3,
completed:4,
returned:5,
cancelled:0

};
const currentStep =
stepIndex[order.status] || 1;

let createdTime = "";

if (order.createdAt?.toDate) {
    createdTime = order.createdAt
        .toDate()
        .toLocaleString("vi-VN");
} else {
    createdTime = new Date(order.createdAt)
        .toLocaleString("vi-VN");
}
    function formatTime(time){

    if(!time) return "Đang chờ";

    if(time?.toDate){
        return time.toDate().toLocaleString("vi-VN");
    }

    return new Date(time).toLocaleString("vi-VN");

}
const steps = [
{
    title:"Đơn hàng đã được tạo",
    time: formatTime(order.createdAt, true)
},
{
    title:"Đơn hàng đã được xác nhận",
    time: formatTime(
        order.confirmedAt,
        ["confirmed","shipping","completed","returned"].includes(order.status)
    )
},
{
    title:"Đơn hàng đang vận chuyển",
    time: formatTime(
        order.shippingAt,
        ["shipping","completed","returned"].includes(order.status)
    )
},
{
    title:"Đơn hàng đã giao",
    time: formatTime(
        order.completedAt,
        ["completed","returned"].includes(order.status)
    )
},
{
    title:"Đơn hàng đã trả",
    time: formatTime(
        order.returnApprovedAt || order.returnedAt,
        order.status === "returned"
    )
}
];
timeline.innerHTML = "";

steps.forEach((step,index)=>{

timeline.innerHTML += `
<div class="timeline-item ${index < currentStep ? "active" : ""}">
    <div class="timeline-icon">
        ${index < currentStep ? "✓" : ""}
    </div>

    <div>
        <div class="timeline-title">
            ${step.title}
        </div>

        <div class="timeline-time">
            ${step.time}
        </div>
    </div>
</div>
`;

});

</script>
</body>
</html>
