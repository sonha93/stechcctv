<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Chi tiết đơn hàng</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
color:#111;
}

.container{

max-width:700px;
margin:auto;
padding-bottom:30px;

}

/* HEADER */

.header{

position:sticky;
top:0;

background:#fff;

display:flex;
align-items:center;

gap:15px;

padding:15px;

border-bottom:1px solid #eee;

z-index:100;

}

.back{

font-size:26px;
text-decoration:none;
color:#111;

}

.title{

font-size:20px;
font-weight:bold;

}

/* STATUS */

.status-box{

background:#fff;

padding:18px;

margin-top:10px;

}

.status-title{

font-size:24px;

font-weight:bold;

margin-bottom:6px;

}

.status-text{

color:#ff4d4f;

font-size:16px;

font-weight:bold;

}

/* CARD */

.card{

background:#fff;

margin-top:10px;

padding:15px;

}

/* PRODUCT */

.product{

display:flex;

gap:12px;

padding:12px 0;

border-bottom:1px solid #eee;

}

.product:last-child{

border:none;

}

.product img{

width:82px;
height:82px;

border-radius:10px;

object-fit:cover;

}

.product-info{

flex:1;

}

.product-name{

font-weight:bold;

margin-bottom:8px;

font-size:16px;

}

.product-price{

color:#ff2d55;

font-size:17px;

font-weight:bold;

margin-top:5px;

}

/* ROW */

.row{

display:flex;

justify-content:space-between;

margin:10px 0;

font-size:15px;

}

.row span:first-child{

color:#666;

}

/* TIMELINE */

.timeline{

margin-top:15px;

position:relative;

}

.timeline::before{

content:"";

position:absolute;

left:11px;

top:0;

bottom:0;

width:2px;

background:#ddd;

}

.step{

display:flex;

gap:15px;

position:relative;

margin-bottom:22px;

}

.dot{

width:24px;
height:24px;

border-radius:50%;

background:#ddd;

z-index:2;

display:flex;

justify-content:center;
align-items:center;

color:#fff;

font-size:14px;

}

.step.active .dot{

background:#16c784;

}

.step-content{

padding-top:2px;

}

.step-title{

font-weight:bold;

}

.step-time{

font-size:13px;

color:#888;

margin-top:3px;

}

/* TOTAL */

.total{

font-size:22px;

font-weight:bold;

color:#ff2d55;

}

/* MOBILE */

@media(max-width:768px){

.container{

max-width:100%;

}

.product img{

width:72px;
height:72px;

}

.status-title{

font-size:20px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<a
href="javascript:history.back()"
class="back">

←

</a>

<div class="title">

Chi tiết đơn hàng

</div>

</div>

<!-- STATUS -->

<div class="status-box">

<div id="orderCode"
class="status-title">

Đơn hàng

</div>

<div id="statusText"
class="status-text">

Đang tải...

</div>

</div>

<!-- DANH SÁCH SẢN PHẨM -->

<div
class="card"
id="productList">

</div>

<!-- THÔNG TIN -->

<div class="card">

<div class="row">

<span>Người nhận</span>

<b id="customerName"></b>

</div>

<div class="row">

<span>Số điện thoại</span>

<b id="phone"></b>

</div>

<div class="row">

<span>Địa chỉ</span>

<b id="address"></b>

</div>

<div class="row">

<span>Thanh toán</span>

<b id="payment"></b>

</div>

</div>

<!-- TỔNG -->

<div class="card">

<div class="row">

<span>Tổng thanh toán</span>

<div
id="total"
class="total">

0đ

</div>

</div>

</div>

<!-- TIMELINE -->

<div
class="card">

<h3>

Trạng thái đơn hàng

</h3>

<div
id="timeline"
class="timeline">

</div>

</div>

</div>
<script type="module">

import { app } from "./auth.js";

import {
    getFirestore,
    doc,
    getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const db = getFirestore(app);

/* =========================
   LẤY ID ĐƠN HÀNG
========================= */

const params = new URLSearchParams(location.search);

const orderId = params.get("id");

if(!orderId){

    alert("Không tìm thấy đơn hàng");

    history.back();

}

/* =========================
   ĐỌC FIRESTORE
========================= */

const orderRef = doc(db,"orders",orderId);

const orderSnap = await getDoc(orderRef);

if(!orderSnap.exists()){

    alert("Đơn hàng không tồn tại");

    history.back();

}

const order = orderSnap.data();

/* =========================
   THÔNG TIN CHUNG
========================= */

document.getElementById("orderCode").innerHTML =
"Đơn hàng <br><small style='font-size:14px;color:#666'>" +
orderId +
"</small>";

document.getElementById("customerName").innerText =
order.customerName || "";

document.getElementById("phone").innerText =
order.phone || "";

document.getElementById("address").innerText =
order.address || "";

document.getElementById("payment").innerText =
order.payment=="bank"
?"Chuyển khoản"
:"Thanh toán khi nhận hàng";

document.getElementById("total").innerText =
Number(order.total||0).toLocaleString()+"đ";

/* =========================
   DANH SÁCH SẢN PHẨM
========================= */

const list =
document.getElementById("productList");

list.innerHTML="";

(order.items||[]).forEach(item=>{

const price =
Number(item.price||0);

const qty =
Number(item.qty||1);

list.innerHTML += `

<div class="product">

<img src="${item.img}">

<div class="product-info">

<div class="product-name">

${item.name}

</div>

<div>

Số lượng: x${qty}

</div>

<div class="product-price">

${price.toLocaleString()}đ

</div>

</div>

</div>

`;

});

/* =========================
   TRẠNG THÁI
========================= */

const statusMap={

pending:{
text:"🟡 Chờ xác nhận",
step:1
},

confirmed:{
text:"✅ Đã xác nhận",
step:2
},

shipping:{
text:"🚚 Đang giao",
step:3
},

delivered:{
text:"🎉 Đã giao",
step:4
},

cancelled:{
text:"❌ Đã hủy",
step:0
}

};

const current =
statusMap[order.status]||
statusMap.pending;

document.getElementById("statusText").innerText =
current.text;

</script>
<script type="module">

/* =========================
   TIMELINE
========================= */

const timeline = document.getElementById("timeline");

const steps = [

{
    key:"pending",
    title:"Đơn hàng đã được tạo",
    time: order.createdAt
        ? new Date(order.createdAt).toLocaleString("vi-VN")
        : ""
},

{
    key:"confirmed",
    title:"Đơn hàng đã được xác nhận",
    time:"Đang chờ xác nhận"
},

{
    key:"shipping",
    title:"Đơn hàng đang được giao",
    time:"Đang chờ vận chuyển"
},

{
    key:"delivered",
    title:"Đơn hàng đã giao thành công",
    time:"Đang chờ giao hàng"
}

];

timeline.innerHTML="";

steps.forEach((item,index)=>{

const active = index < current.step;

timeline.innerHTML += `

<div class="step ${active ? "active":""}">

<div class="dot">

${active ? "✓":""}

</div>

<div class="step-content">

<div class="step-title">

${item.title}

</div>

<div class="step-time">

${item.time}

</div>

</div>

</div>

`;

});

/* =========================
   NẾU ĐƠN HỦY
========================= */

if(order.status==="cancelled"){

document.getElementById("timeline").innerHTML=`

<div class="step active">

<div class="dot">

✕

</div>

<div class="step-content">

<div class="step-title">

Đơn hàng đã bị hủy

</div>

<div class="step-time">

${order.createdAt
? new Date(order.createdAt).toLocaleString("vi-VN")
: ""}

</div>

</div>

</div>

`;

}

</script>

</body>
</html>
