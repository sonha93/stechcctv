<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đơn hàng của bạn</title>

<style>
  *{
  margin:0;
  padding:0;
  box-sizing:border-box;
}
body{
  font-family: Arial;
  background:#f5f5f5;
  margin:0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

.container{
  width: 100%;
  max-width: 1000px;
  margin: auto;
  padding: 20px;
  flex: 1;
}

.title-box{
  background:#e53935;
  color:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  font-size:20px;
  font-weight:bold;
}

.order-box{
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

.order-title{
  background:#e53935;
  color:#fff;
  padding:8px 12px;
  border-radius:8px;
  display:inline-block;
  margin-bottom:8px;
}

.item{
  display:flex;
  gap:10px;
  padding:10px 0;
  border-bottom:1px solid #eee;
  align-items:center;
}

.item img{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:8px;
}

.sale-price{
  color:#e53935;
  font-weight:bold;
  font-size:16px;
}

.old-price{
  text-decoration:line-through;
  color:#999;
  font-size:13px;
}

.calc{
  font-size:12px;
  color:#666;
  margin-top:4px;
}

.total-box{
  margin-top:12px;
  padding-top:10px;
  border-top:1px solid #eee;
}

.total-box .row{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
}

.total-box .discount b{
  color:#e53935;
}

.total-box .final{
  border-top:1px solid #ddd;
  margin-top:8px;
  padding-top:10px;
  font-size:18px;
  font-weight:bold;
}

.total-box .final b{
  color:#e53935;
}

.back-btn{
  display:inline-block;
  margin-bottom:15px;
  background:#fff;
  color:#00acc1;
  padding:8px 12px;
  border-radius:10px;
  text-decoration:none;
  font-size:13px;
}

/* 🔥 PAGINATION */
#pagination{
  text-align:center;
  margin-top:10px;
}

#pagination button{
  margin:3px;
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
/* 📱 MOBILE FULL SCREEN */
@media (max-width: 768px){

  .container{
    max-width:100%;
    padding:10px;
  }

  .order-box{
    padding:12px;
  }

  .item{
    gap:8px;
  }

  .item img{
    width:60px;
    height:60px;
  }

  .title-box{
    font-size:18px;
    padding:12px;
  }

  .order-title{
    font-size:14px;
    padding:6px 10px;
  }
  .item img{
    width:90px;
    height:90px;
    object-fit:cover;
    border-radius:10px;
    border:1px solid #ddd;
   background:#fff;
  }
}
body{
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  margin: 0;
}
 overflow-x:hidden;
}
.container{
  flex: 1;
}

.footer{
  background: #000;
  color: #fff;
  text-align: center;
  padding: 20px 10px;
}
  
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back-btn">← Quay lại</a>

<div class="title-box">📦 Đơn hàng của bạn</div>

<div id="orders"></div>

<!-- 🔥 PHÂN TRANG -->

</div>
