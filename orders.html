<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đơn hàng của bạn</title>

<style>
body{
  font-family: Arial;
  background:#f5f5f5;
  margin:0;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.title-box{
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  font-size:20px;
  font-weight:bold;
}

.order-box{
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

.item{
  display:flex;
  gap:10px;
  padding:10px 0;
  border-bottom:1px solid #eee;
  align-items:center;
}

.item img{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:8px;
}

.sale-price{
  color:#e53935;
  font-weight:bold;
  font-size:16px;
}

.old-price{
  text-decoration:line-through;
  color:#999;
  font-size:13px;
}

.calc{
  font-size:12px;
  color:#666;
  margin-top:4px;
}

.total-box{
  margin-top:12px;
  padding-top:10px;
  border-top:1px solid #eee;
}

.total-box .row{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
}

.total-box .discount b{
  color:#e53935;
}

.total-box .final{
  border-top:1px solid #ddd;
  margin-top:8px;
  padding-top:10px;
  font-size:18px;
  font-weight:bold;
}

.total-box .final b{
  color:#e53935;
}

.back-btn{
  display:inline-block;
  margin-bottom:15px;
  background:#fff;
  color:#00acc1;
  padding:8px 12px;
  border-radius:10px;
  text-decoration:none;
  font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back-btn">← Quay lại</a>

<div class="title-box">📦 Đơn hàng của bạn</div>

<div id="orders"></div>

</div>

<script>
function renderOrders(){
  const box = document.getElementById("orders");
  let orders = JSON.parse(localStorage.getItem("orders")) || [];

  if(orders.length === 0){
    box.innerHTML = "Chưa có đơn hàng";
    return;
  }

  box.innerHTML = "";

  orders.reverse().forEach(order => {

    let originalTotal = 0;
    let finalTotal = 0;

    let itemsHTML = "";

    order.cart.forEach(p => {

      let qty = p.qty || 1;

      let price = Number(p.price) || 0;
      let old = Number(p.oldPrice) || price;

      let subFinal = qty * price;
      let subOld = qty * old;

      finalTotal += subFinal;
      originalTotal += subOld;

      itemsHTML += `
        <div class="item">
          <img src="${p.img}">

          <div>
            <b>${p.name}</b>

            <div class="calc">

              <div class="sale-price">
                ${price.toLocaleString()}đ
              </div>

              ${
                old > price
                ? `<div class="old-price">${old.toLocaleString()}đ</div>`
                : ""
              }

              <div>
                ${qty} × ${price.toLocaleString()}đ = ${subFinal.toLocaleString()}đ
              </div>

            </div>

          </div>
        </div>
      `;
    });

    let discount = originalTotal - finalTotal;

    box.innerHTML += `
      <div class="order-box">

        <h3>Đơn hàng #${order.id}</h3>
        <p><b>Khách hàng: ${order.name}</b> - ${order.phone}</p>
        <p>Địa chỉ: ${order.address}</p>
        <p>Ngày đặt hàng: ${order.time}</p>
        <p>Hình thức thanh toán: ${order.payment}</p>

        ${itemsHTML}

        <div class="total-box">

          <div class="row">
            <span>Tổng giá gốc</span>
            <b>${originalTotal.toLocaleString()}đ</b>
          </div>

          <div class="row discount">
            <span>Tiết kiệm</span>
            <b>-${discount.toLocaleString()}đ</b>
          </div>

          <div class="row final">
            <span>Thanh toán</span>
            <b>${finalTotal.toLocaleString()}đ</b>
          </div>

        </div>

      </div>
    `;
  });
}

renderOrders();
</script>

</body>
</html>
