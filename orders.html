<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý đơn hàng</title>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  margin:0;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* 🔥 NÚT QUAY LẠI (MỚI THÊM - KHÔNG ĐỤNG CHỨC NĂNG CŨ) */
.back-btn{
  display:inline-block;
  margin-bottom:15px;
  background:#fff;
  color:#00acc1;
  padding:8px 12px;
  border-radius:10px;
  text-decoration:none;
  font-size:13px;
  font-weight:bold;
  border:1px solid #e0f7fa;
  transition:0.2s;
}

.back-btn:hover{
  background:#e0f7fa;
}

/* ORDER */
.order{
  background:#fff;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

/* GIỮ NGUYÊN ITEM */
.item{
  border-top:1px solid #eee;
  padding:5px 0;
  font-size:14px;
}

.badge{
  color:#fff;
  background:#ee4d2d;
  padding:3px 8px;
  border-radius:5px;
  font-size:12px;
}

/* ====== THÊM STYLE (KHÔNG SỬA CHỮ CŨ) ====== */
.product-line{
  display:flex;
  justify-content:space-between;
  font-size:14px;
  padding:3px 0;
}

.total-box{
  margin-top:10px;
  padding-top:10px;
  border-top:1px solid #ddd;
  font-weight:bold;
  color:#d32f2f;
  text-align:right;
}
</style>
</head>

<body>

<div class="container">

<!-- 🔥 CHỨC NĂNG MỚI: QUAY LẠI -->
<a href="index.html" class="back-btn">← Quay lại trang chủ</a>

<h2>📦 Quản lý đơn hàng</h2>

<div id="orders"></div>

<!-- GIỮ NGUYÊN FILE JS CỦA BẠN -->
<script src="order.js"></script>

</div>

<script>
let orders = JSON.parse(localStorage.getItem("orders")) || [];

function renderOrders(){
  const box = document.getElementById("orders");
  box.innerHTML = "";

  if(orders.length === 0){
    box.innerHTML = "Chưa có đơn hàng nào";
    return;
  }

  orders.reverse().forEach(o=>{

    // tính tổng tiền (KHÔNG THAY ĐỔI CHỮ CŨ)
    let total = 0;

    let productHTML = o.cart.map(p=>{
      let qty = p.qty || 1;
      let sub = qty * p.price;
      total += sub;

      return `
        <div class="product-line">
          <span>${p.name} - ${p.price.toLocaleString()}đ x ${p.qty}</span>
          <span>${sub.toLocaleString()}đ</span>
        </div>
      `;
    }).join("");

    box.innerHTML += `
      <div class="order">
        <h3>👤 ${o.name} - ${o.phone}</h3>
        <p>Địa chỉ: ${o.address}</p>
        <p>Hình thức thanh toán: ${o.payment}</p>
        <p>Ngày & giờ đặt hàng ${o.time}</p>

        <div class="badge">ĐƠN #${o.id}</div>

        <h4>Sản phẩm:</h4>

        ${productHTML}

        <div class="total-box">
          Tổng tiền: ${total.toLocaleString()}đ
        </div>
      </div>
    `;
  });
}

renderOrders();
</script>

</body>
</html>
