<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đơn hàng của bạn</title>

<style>
body{
  font-family: Arial;
  background:#f5f5f5;
  margin:0;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.title-box{
  background:#e53935;
  color:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  font-size:20px;
  font-weight:bold;
}

.order-box{
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

.order-title{
  background:#e53935;
  color:#fff;
  padding:8px 12px;
  border-radius:8px;
  display:inline-block;
  margin-bottom:8px;
}

.item{
  display:flex;
  gap:10px;
  padding:10px 0;
  border-bottom:1px solid #eee;
  align-items:center;
}

.item img{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:8px;
}

.sale-price{
  color:#e53935;
  font-weight:bold;
  font-size:16px;
}

.old-price{
  text-decoration:line-through;
  color:#999;
  font-size:13px;
}

.calc{
  font-size:12px;
  color:#666;
  margin-top:4px;
}

.total-box{
  margin-top:12px;
  padding-top:10px;
  border-top:1px solid #eee;
}

.total-box .row{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
}

.total-box .discount b{
  color:#e53935;
}

.total-box .final{
  border-top:1px solid #ddd;
  margin-top:8px;
  padding-top:10px;
  font-size:18px;
  font-weight:bold;
}

.total-box .final b{
  color:#e53935;
}

.back-btn{
  display:inline-block;
  margin-bottom:15px;
  background:#fff;
  color:#00acc1;
  padding:8px 12px;
  border-radius:10px;
  text-decoration:none;
  font-size:13px;
}

#pagination{
  text-align:center;
  margin-top:10px;
}

#pagination button{
  margin:3px;
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

@media (max-width: 768px){
  .container{max-width:100%;padding:10px;}
  .order-box{padding:12px;}
  .item{gap:8px;}
  .item img{width:60px;height:60px;}
  .title-box{font-size:18px;padding:12px;}
  .order-title{font-size:14px;padding:6px 10px;}
}
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back-btn">← Quay lại</a>

<div class="title-box">📦 Đơn hàng của bạn</div>

<div id="orders"></div>
<div id="pagination"></div>

</div>

<script type="module">

import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { app, onAuthStateChangedListener } from "./auth.js";

const db = getFirestore(app);

let currentUID = null;
let orders = [];

let currentPage = 1;
const perPage = 5;

/* =========================
   AUTH CHECK (UID FIREBASE)
========================= */
onAuthStateChangedListener((user) => {
  if (user) {
    currentUID = user.uid;
    loadOrders();
  } else {
    document.getElementById("orders").innerHTML = "Chưa đăng nhập";
  }
});

/* =========================
   LOAD ORDERS FIREBASE
========================= */
async function loadOrders(){
  if(!currentUID) return;

  const snap = await getDocs(
    collection(db, "orders", currentUID, "userOrders")
  );

  orders = [];

  snap.forEach(doc => {
    orders.push({ id: doc.id, ...doc.data() });
  });

  renderOrders();
}

/* =========================
   RENDER ORDERS
========================= */
function renderOrders(){
  const box = document.getElementById("orders");
  const pagi = document.getElementById("pagination");

  if(!orders || orders.length === 0){
    box.innerHTML = "Chưa có đơn hàng";
    pagi.innerHTML = "";
    return;
  }

  box.innerHTML = "";

  const start = (currentPage - 1) * perPage;
  const end = start + perPage;

  const pageOrders = orders.slice(start, end);

  pageOrders.forEach(order => {

    let originalTotal = 0;
    let finalTotal = 0;

    let itemsHTML = "";

    (order.cart || []).forEach(p => {

      let qty = p.qty || 1;
      let price = Number(p.price) || 0;
      let old = Number(p.oldPrice) || price;

      let subFinal = qty * price;
      let subOld = qty * old;

      finalTotal += subFinal;
      originalTotal += subOld;

      itemsHTML += `
        <div class="item">
          <img src="${p.img || ''}">

          <div>
            <b>${p.name || ''}</b>

            <div class="calc">
              <div class="sale-price">
                ${price.toLocaleString()}đ
              </div>

              ${old > price ? `<div class="old-price">${old.toLocaleString()}đ</div>` : ""}

              <div>
                ${qty} × ${price.toLocaleString()}đ = ${subFinal.toLocaleString()}đ
              </div>
            </div>

          </div>
        </div>
      `;
    });

    let discount = originalTotal - finalTotal;

    box.innerHTML += `
      <div class="order-box">

        <div class="order-title">Đơn hàng #${order.id}</div>

        <p><b>${order.name || ""}</b> - ${order.phone || ""}</p>
        <p>Địa chỉ: ${order.address || ""}</p>
        <p>Ngày: ${order.time || ""}</p>

        <p>
          Thanh toán:
          ${order.payment === "bank" ? "🏦 Chuyển khoản" : "💵 COD"}
        </p>

        ${itemsHTML}

        <div class="total-box">

          <div class="row">
            <span>Tổng gốc</span>
            <b>${originalTotal.toLocaleString()}đ</b>
          </div>

          <div class="row discount">
            <span>Tiết kiệm</span>
            <b>-${discount.toLocaleString()}đ</b>
          </div>

          <div class="row final">
            <span>Thanh toán</span>
            <b>${finalTotal.toLocaleString()}đ</b>
          </div>

        </div>

      </div>
    `;
  });

  renderPagination();
}

/* =========================
   PAGINATION
========================= */
function renderPagination(){
  const pagi = document.getElementById("pagination");
  const totalPage = Math.ceil(orders.length / perPage);

  pagi.innerHTML = "";

  for(let i = 1; i <= totalPage; i++){
    pagi.innerHTML += `
      <button onclick="goPage(${i})"
        style="background:${i === currentPage ? '#e53935' : '#ddd'}">
        ${i}
      </button>
    `;
  }
}

window.goPage = function(page){
  currentPage = page;
  renderOrders();
};

</script>

</body>
</html>
