<div id="privacyPage">

    <div class="privacy-header">

        <button id="closePrivacyPage">
            <svg viewBox="0 0 24 24" width="24" height="24">
                <path d="M15 18L9 12L15 6"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"/>
            </svg>
        </button>

        <h2>Quyền riêng tư</h2>

    </div>

    <div class="privacy-scroll">

        <!-- Tài khoản -->

        <div class="privacy-group">

            <div class="privacy-title">
                Tài khoản
            </div>

            <div class="privacy-item">

                <div class="privacy-left">

                    <svg viewBox="0 0 24 24" width="22" height="22">
                        <path d="M12 2L20 6V12C20 17 16.5 21 12 22C7.5 21 4 17 4 12V6L12 2Z"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"/>
                    </svg>

                    <div>

                        <div class="privacy-name">
                            Tài khoản riêng tư
                        </div>

                        <div class="privacy-desc">
                            Chỉ follower được duyệt mới xem được nội dung.
                        </div>

                    </div>

                </div>

                <label class="ios-switch">
                    <input id="privateAccount" type="checkbox">
                    <span></span>
                </label>

            </div>

        </div>

        <!-- Hồ sơ -->

        <div class="privacy-group">

            <div class="privacy-title">
                Hồ sơ
            </div>

            <div class="privacy-item">

                <div class="privacy-left">

                    <svg viewBox="0 0 24 24" width="22" height="22">
                        <path d="M12 12a5 5 0 100-10a5 5 0 000 10zm-8 9c0-4 4-7 8-7s8 3 8 7"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"/>
                    </svg>

                    <div>

                        <div class="privacy-name">
                            Ẩn trang cá nhân
                        </div>

                        <div class="privacy-desc">
                            Người lạ không xem được hồ sơ.
                        </div>

                    </div>

                </div>

                <label class="ios-switch">
                    <input id="hideProfile" type="checkbox">
                    <span></span>
                </label>

            </div>

            <div class="privacy-item">

                <div class="privacy-left">

                    <svg viewBox="0 0 24 24" width="22" height="22">
                        <path d="M4 6H20M4 12H20M4 18H14"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"/>
                    </svg>

                    <div>

                        <div class="privacy-name">
                            Ẩn danh sách Follow
                        </div>

                    </div>

                </div>

                <label class="ios-switch">
                    <input id="hideFollowList" type="checkbox">
                    <span></span>
                </label>

            </div>

        </div>

        <!-- Tin nhắn -->

        <div class="privacy-group">

            <div class="privacy-title">
                Tin nhắn
            </div>

            <div class="privacy-item">

                <div class="privacy-left">

                    <svg viewBox="0 0 24 24" width="22" height="22">
                        <path d="M21 15A2 2 0 0119 17H7L3 21V5A2 2 0 015 3H19A2 2 0 0121 5Z"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"/>
                    </svg>

                    <div>

                        <div class="privacy-name">
                            Chỉ bạn bè được nhắn
                        </div>

                    </div>

                </div>

                <label class="ios-switch">
                    <input id="friendOnlyMessage" type="checkbox">
                    <span></span>
                </label>

            </div>

            <div class="privacy-item">

                <div class="privacy-left">

                    <svg viewBox="0 0 24 24" width="22" height="22">
                        <path d="M3 6L12 13L21 6"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"/>
                        <rect x="3" y="4" width="18" height="16"
                        rx="2"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"/>
                    </svg>

                    <div>

                        <div class="privacy-name">
                            Giới hạn 3 tin nhắn chờ
                        </div>

                        <div class="privacy-desc">
                            Sau 3 tin phải chờ bạn chấp nhận.
                        </div>

                    </div>

                </div>

                <label class="ios-switch">
                    <input id="limitMessage" type="checkbox">
                    <span></span>
                </label>

            </div>

        </div>

        <!-- Story -->

        <div class="privacy-group">

            <div class="privacy-title">
                Story
            </div>

            <div class="privacy-item">

                <div class="privacy-left">

                    <svg viewBox="0 0 24 24" width="22" height="22">
                        <circle cx="12" cy="12" r="9"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"/>
                        <path d="M12 8V12L15 15"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"/>
                    </svg>

                    <div>

                        <div class="privacy-name">
                            Chỉ bạn bè xem Story
                        </div>

                    </div>

                </div>

                <label class="ios-switch">
                    <input id="storyFriendOnly" type="checkbox">
                    <span></span>
                </label>

            </div>

        </div>

    </div>

</div>
