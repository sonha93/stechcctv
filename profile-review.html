<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hồ sơ</title>

<link rel="stylesheet"
href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    min-height:100%;
    background:#fff;
    color:#111;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    overflow-x:hidden;
}

/*==========================
HEADER
==========================*/

.profile-header{
    position:sticky;
    top:0;
    z-index:1000;

    display:flex;
    align-items:center;
    justify-content:space-between;

    height:56px;
    padding:0 14px;

    background:rgba(255,255,255,.96);
    backdrop-filter:blur(12px);

    border-bottom:1px solid #ececec;

    box-shadow:0 1px 8px rgba(0,0,0,.04);
}

.top-btn{
    width:42px;
    height:42px;

    display:flex;
    align-items:center;
    justify-content:center;

    border:none;
    background:none;
    cursor:pointer;
    border-radius:50%;
}

.top-btn:active{
    background:#f3f3f3;
}

.top-btn .material-symbols-outlined{
    font-size:27px;
}

/*==========================
PROFILE
==========================*/

.profile-top{
    display:flex;
    flex-direction:column;
    align-items:center;

    padding:22px 18px 14px;
}

.profile-avatar{
    width:94px;
    height:94px;

    border-radius:50%;
    object-fit:cover;

    border:3px solid #fff;

    box-shadow:
        0 2px 10px rgba(0,0,0,.08),
        0 0 0 1px #ececec;
}

#profileName{
    margin-top:14px;
    font-size:22px;
    font-weight:700;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:0;
}

.username{
    margin-top:5px;

    color:#777;
    font-size:15px;
}

.bio{
    margin-top:12px;

    max-width:340px;

    text-align:center;

    line-height:1.5;
    font-size:14px;
    color:#555;
}

/*==========================
COUNT
==========================*/

.profile-count{
    display:flex;
    justify-content:center;
    gap:42px;
    margin-top:18px;
}

.count-item{
    min-width:70px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.count-item span{
    font-size:20px;
    font-weight:700;
}

.count-item small{
    margin-top:4px;
    color:#888;
    font-size:13px;
}

/*==========================
BUTTON
==========================*/

.profile-buttons{
    display:flex;
    gap:10px;

    padding:0 16px;
    margin-top:22px;
}

.profile-buttons button{
    flex:1;

    height:42px;

    border:none;
    border-radius:10px;

    font-size:15px;
    font-weight:600;

    cursor:pointer;

    transition:.18s ease;
}

.profile-buttons button:hover{
    filter:brightness(.98);
}

.profile-buttons button:active{
    transform:scale(.97);
}


#followBtn{
    background:#ff2d55;
    color:#fff;
}

#editBtn{
    background:#f4f4f4;
    color:#111;
}

/*==========================
TAB
==========================*/

.profile-tabs{
    display:grid;
    grid-template-columns:repeat(5,1fr);

    margin-top:24px;

    background:#fff;

    border-top:1px solid #ececec;
    border-bottom:1px solid #ececec;

    position:sticky;
    top:56px;
    z-index:20;
}

.tab{
    position:relative;

    height:50px;

    display:flex;
    align-items:center;
    justify-content:center;

    border:none;
    background:#fff;

    color:#999;
    cursor:pointer;
}

.tab{
    position:relative;

    height:50px;

    display:flex;
    align-items:center;
    justify-content:center;

    border:none;
    background:#fff;

    color:#999;

    transition:.18s;

    cursor:pointer;
}

.tab:hover{
    color:#555;
}

.tab.active{
    color:#111;
}

.tab.active::after{
    content:"";
    position:absolute;
    left:20%;
    right:20%;
    bottom:0;
    height:2px;
    background:#111;
    border-radius:20px;
}
  .tab svg{
    width:22px;
    height:22px;
}

/*==========================
GRID
==========================*/

.video-grid{
    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:2px;

    padding:2px;

    background:#f1f1f1;
}
.video-card{
    position:relative;

    aspect-ratio:1/1.6;

    overflow:hidden;

    background:#000;

    cursor:pointer;

    border-radius:8px;

    transition:.2s;
}

.video-card:hover{
    transform:translateY(-2px);
}

.video-card:active{
    transform:scale(.98);
}
.video-card img,
.video-card video{
    width:100%;
    height:100%;

    object-fit:cover;

    transition:transform .3s ease;
}

.video-card:hover img,
.video-card:hover video{
    transform:scale(1.05);
}
.video-card:hover img,
.video-card:hover video{
    transform:scale(1.03);
}

.play-count{
    position:absolute;

    left:6px;
    bottom:6px;

    display:flex;
    align-items:center;
    gap:4px;

    padding:3px 8px;

    border-radius:999px;

    background:rgba(0,0,0,.45);

    backdrop-filter:blur(6px);

    color:#fff;

    font-size:11px;
    font-weight:600;

    box-shadow:0 2px 6px rgba(0,0,0,.25);
}

/*==========================
MENU
==========================*/

#videoMenu{
    position:fixed;
    inset:0;

    display:none;
    align-items:flex-end;

    background:rgba(0,0,0,.45);

    z-index:9999;
}

#videoMenu.active{
    display:flex;
}

.menu-box{
    width:100%;

    overflow:hidden;

    background:#fff;

    border-radius:22px 22px 0 0;

    box-shadow:0 -5px 20px rgba(0,0,0,.12);

    animation:menuUp .22s ease;
}

@keyframes menuUp{

from{
    transform:translateY(100%);
}

to{
    transform:translateY(0);
}

}

/*==========================
MOBILE
==========================*/

@media(max-width:768px){

.profile-avatar{
    width:86px;
    height:86px;

    border-radius:50%;
    object-fit:cover;

    border:3px solid #fff;

    box-shadow:
        0 2px 10px rgba(0,0,0,.08),
        0 0 0 1px #ececec;
}
.profile-count{
    display:flex;
    justify-content:center;
    gap:42px;
    margin-top:18px;
}

.count-item{
    min-width:70px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.count-item span{
    font-size:20px;
    font-weight:700;
}

.count-item small{
    margin-top:4px;
    color:#888;
    font-size:13px;
}
/* ==========================
   VERIFIED BADGE
========================== */

.verified-badge{
    display:inline-flex;
    align-items:center;
    position:relative;
    margin-left:6px;
    vertical-align:middle;
    cursor:pointer;
}

.verified-icon{
    width:18px !important;
    height:18px !important;
    min-width:18px;
    min-height:18px;
    display:block;
    flex-shrink:0;
}

.verified-popup{
    position:absolute;
    top:28px;
    left:50%;
    transform:translateX(-50%);
    width:240px;

    background:#fff;
    border-radius:12px;
    padding:12px;

    box-shadow:0 8px 30px rgba(0,0,0,.15);

    opacity:0;
    visibility:hidden;
    transition:.2s;

    z-index:9999;
}

.verified-badge:hover .verified-popup{
    opacity:1;
    visibility:visible;
}

.verified-popup-title{
    display:flex;
    align-items:center;
    gap:8px;

    font-weight:700;
    font-size:14px;
    margin-bottom:8px;
}

.verified-popup-icon{
    width:18px;
    height:18px;
    flex:none;
}

.verified-popup-text{
    font-size:13px;
    line-height:1.5;
    color:#555;
}
}
 /* ===== FIX VERIFIED BADGE PC ===== */
@media (min-width:769px){

    .verified-badge{
        display:inline-flex;
        align-items:center;
        position:relative;
        margin-left:6px;
        cursor:pointer;
        vertical-align:middle;
    }

    .verified-icon,
    .verified-popup-icon{
        width:18px;
        height:18px;
        min-width:18px;
        min-height:18px;
        display:block;
    }

    .verified-popup{
        position:absolute;
        top:28px;
        left:50%;
        transform:translateX(-50%);
        width:240px;
        background:#fff;
        border-radius:12px;
        padding:12px;
        box-shadow:0 8px 30px rgba(0,0,0,.15);
        opacity:0;
        visibility:hidden;
        transition:.2s;
        z-index:9999;
    }

    .verified-badge:hover .verified-popup{
        opacity:1;
        visibility:visible;
    }
 .verified-popup-title{
    display:flex;
    align-items:center;
    gap:6px;
    white-space:nowrap;   /* Không cho xuống dòng */
    font-size:10px;
    font-weight:600;
}

.verified-popup-icon{
    width:14px;
    height:14px;
    flex-shrink:0;
}

.verified-popup-title span{
    white-space:nowrap;
}
.verified-popup-text{
    font-size:9px !important;
    line-height:1.3;
}
}
</style>
</head>

<body>

<!-- Header -->

<div class="profile-header">

    <button id="backBtn" class="top-btn">
        <span class="material-symbols-outlined">arrow_back</span>
    </button>

    <div class="profile-title">
        Hồ sơ
    </div>

    <button id="menuBtn" class="top-btn">
        <span class="material-symbols-outlined">menu</span>
    </button>

</div>



<!-- Thông tin -->

<div class="profile-top">

    <img
        id="profileAvatar"
        class="profile-avatar"
        src="https://i.ibb.co/Z1kv9nJj/logo.png">

   <h2 id="profileName">
    <span id="profileNameText">Đang tải...</span>
</h2>

    <div id="profileUsername" class="username">
        @loading
    </div>

    <div id="profileBio" class="bio">
    </div>

</div>



<!-- Thống kê -->

<div class="profile-count">

    <div class="count-item">

        <span id="followingCount">0</span>

        <small>Đã follow</small>

    </div>

    <div class="count-item">

        <span id="followerCount">0</span>

        <small>Follower</small>

    </div>

    <div class="count-item">

        <span id="likeCount">0</span>

        <small>Thích</small>

    </div>

</div>



<!-- Nút -->

<div class="profile-buttons">

    <button id="followBtn">

        Follow

    </button>

    <button id="editBtn">

        Sửa hồ sơ

    </button>

</div>



<!-- Tabs -->

<div class="profile-tabs">

    <button
        class="tab active"
        data-tab="videos">

        <span class="material-symbols-outlined">

            grid_view

        </span>

    </button>

    <button
        class="tab"
        data-tab="private">

        <span class="material-symbols-outlined">

            lock

        </span>

    </button>

    <button
        class="tab"
        data-tab="liked">

        <span class="material-symbols-outlined">

            favorite

        </span>

    </button>

    <button
        class="tab"
        data-tab="saved">

        <span class="material-symbols-outlined">

            bookmark

        </span>

    </button>
<button class="tab" data-tab="orders">

<svg width="24" height="24" viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="2"
stroke-linecap="round"
stroke-linejoin="round">

<path d="M6 8V6a6 6 0 0 1 12 0v2"/>

<path d="M5 8h14l-1 12H6L5 8z"/>

</svg>

</button>
</div>



<!-- Nội dung -->

<div id="tabContent">

    <div
        id="videosGrid"
        class="video-grid">

    </div>

</div>



<!-- Menu video -->

<div id="videoMenu">

    <div class="menu-box">

        <button id="privacyBtn">

            Chuyển Công khai / Riêng tư

        </button>

        <button id="commentBtn">

            Bật / Tắt bình luận

        </button>

        <button id="deleteBtn">

            Xóa video

        </button>

        <button id="cancelBtn">

            Hủy

        </button>

    </div>

</div>



<script type="module" src="profile-review.js"></script>

</body>
</html>
