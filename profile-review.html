<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hồ sơ</title>

<link rel="stylesheet" href="profile-review.css">

<link rel="stylesheet"
href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

</head>

<body>

<!-- Header -->

<div class="profile-header">

    <button id="backBtn" class="top-btn">
        <span class="material-symbols-outlined">arrow_back</span>
    </button>

    <div class="profile-title">
        Hồ sơ
    </div>

    <button id="menuBtn" class="top-btn">
        <span class="material-symbols-outlined">menu</span>
    </button>

</div>



<!-- Thông tin -->

<div class="profile-top">

    <img
        id="profileAvatar"
        class="profile-avatar"
        src="https://i.ibb.co/Z1kv9nJj/logo.png">

    <h2 id="profileName">
        Đang tải...
    </h2>

    <div id="profileUsername" class="username">
        @loading
    </div>

    <div id="profileBio" class="bio">
    </div>

</div>



<!-- Thống kê -->

<div class="profile-count">

    <div class="count-item">

        <span id="followingCount">0</span>

        <small>Đã follow</small>

    </div>

    <div class="count-item">

        <span id="followerCount">0</span>

        <small>Follower</small>

    </div>

    <div class="count-item">

        <span id="likeCount">0</span>

        <small>Thích</small>

    </div>

</div>



<!-- Nút -->

<div class="profile-buttons">

    <button id="followBtn">

        Follow

    </button>

    <button id="editBtn">

        Sửa hồ sơ

    </button>

</div>



<!-- Tabs -->

<div class="profile-tabs">

    <button
        class="tab active"
        data-tab="videos">

        <span class="material-symbols-outlined">

            grid_view

        </span>

    </button>

    <button
        class="tab"
        data-tab="private">

        <span class="material-symbols-outlined">

            lock

        </span>

    </button>

    <button
        class="tab"
        data-tab="liked">

        <span class="material-symbols-outlined">

            favorite

        </span>

    </button>

    <button
        class="tab"
        data-tab="saved">

        <span class="material-symbols-outlined">

            bookmark

        </span>

    </button>

</div>



<!-- Nội dung -->

<div id="tabContent">

    <div
        id="videosGrid"
        class="video-grid">

    </div>

</div>



<!-- Menu video -->

<div id="videoMenu">

    <div class="menu-box">

        <button id="privacyBtn">

            Chuyển Công khai / Riêng tư

        </button>

        <button id="commentBtn">

            Bật / Tắt bình luận

        </button>

        <button id="deleteBtn">

            Xóa video

        </button>

        <button id="cancelBtn">

            Hủy

        </button>

    </div>

</div>



<script type="module" src="profile-review.js"></script>

</body>
</html>
