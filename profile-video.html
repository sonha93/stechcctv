<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Xem video</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#fff;
height:100vh;
overflow:hidden;
font-family:Arial;
}

#videoBox{

height:100vh;
position:relative;

display:flex;
justify-content:center;
align-items:center;

}

video{

width:100%;
height:100%;

object-fit:contain;

}


.top{

position:absolute;

top:15px;
left:15px;

z-index:10;

}


.back{

width:42px;
height:42px;

border-radius:50%;

border:none;

background:rgba(0,0,0,.45);

color:white;

font-size:25px;

cursor:pointer;

}



.info{

position:absolute;

bottom:80px;
left:15px;

z-index:5;

}


.name{

font-size:18px;
font-weight:700;

}


.username{

font-size:14px;
opacity:.8;

margin-top:4px;

}


.time{

font-size:13px;
opacity:.7;

margin-top:5px;

}


.desc{

margin-top:10px;

font-size:15px;

}

#videoList{

height:100vh;
overflow-y:auto;

scroll-snap-type:y mandatory;

}


.videoItem{

height:100vh;

scroll-snap-align:start;

position:relative;

display:flex;

justify-content:center;

align-items:center;

}


.videoItem video{

width:100%;
height:100%;

object-fit:contain;

background:#000;

}


.videoItem .info{

position:absolute;

bottom:80px;
left:15px;

}

</style>

</head>


<body>


<div id="videoBox">


<div class="top">

<button class="back" id="backBtn">
←
</button>

</div>


<div id="videoList"></div>


<div class="info">

<div class="name" id="name">
</div>


<div class="username" id="username">
</div>


<div class="time" id="time">
</div>


<div class="desc" id="desc">
</div>


</div>


</div>


<script type="module" src="profile-video.js"></script>


</body>
</html>
