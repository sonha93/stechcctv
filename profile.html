<style>
/* =========================
   GLOBAL RESET
========================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    color:#111;
    overflow-x:hidden;
}

/* =========================
   HEADER & NAVBAR
========================= */
header{
    display:flex;
    align-items:center;

    gap:8px;
    padding:8px 10px;

    background:#33A0AB;
    height:80px;

    position:sticky;
    top:0;
    z-index:999;
}

/* Đẩy icon qua phải */
.header-icons{
    margin-left:auto;

    display:flex;
    align-items:center;
    gap:8px;
}
/* MENU + LOGO + ICON */
.menu-btn,
.logo,
.icon-btn{

    width:48px;
    height:48px;

    min-width:48px;

    border-radius:16px;

    display:flex;
    align-items:center;
    justify-content:center;

    flex-shrink:0;

    position:relative;

    transition:
    transform .18s cubic-bezier(.34,1.56,.64,1),
    box-shadow .18s ease;

    /* 3D */
    box-shadow:
    6px 6px 12px rgba(0,0,0,.35),
    -3px -3px 8px rgba(255,255,255,.12),
    inset 1px 1px 1px rgba(255,255,255,.06);
}
/* MENU */
.menu-btn{
    background:#111;
    color:#fff;
    font-size:22px;
}

/* LOGO */
.logo{
    background:#fff;
    overflow:hidden;
}

.logo img{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* ICON */
.icon-btn{
    background:linear-gradient(
        145deg,
        #1c1c1c,
        #0d0d0d
    );

    color:#fff;

    text-decoration:none;

    font-size:20px;
    line-height:1;
}


/* Cart badge */
.cart-count{
    position:absolute;
    top:-4px;
    right:-4px;
    min-width:18px;
    height:18px;
    border-radius:50%;
    background:red;
    color:#fff;
    font-size:11px;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* =========================
   SIDEBAR
========================= */
.sidebar{
    position:fixed;
    top:0;
    left:-260px;
    width:240px;
    height:100vh;
    background:#fff;
    z-index:9999;
    transition:.3s;
    padding:20px;
    box-shadow:0 0 20px rgba(0,0,0,.15);
}

.sidebar.active{
    left:0;
}

.sidebar h3{
    margin-bottom:20px;
    color:#00acc1;
}

.sidebar a{
    display:block;
    padding:14px;
    margin-bottom:10px;
    border-radius:12px;
    background:#f5f5f5;
    text-decoration:none;
    color:#111;
    font-weight:bold;
}

/* Overlay */
#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
    z-index:9998;
    opacity:0;
    visibility:hidden;
    transition:.3s;
}

#overlay.active{
    opacity:1;
    visibility:visible;
}

/* =========================
   CONTAINER
========================= */
.container{
    background:#fff;
    padding:25px;
    border-radius:12px;
    max-width:600px;
    margin:20px auto;
    box-shadow:0 4px 20px rgba(0,0,0,.1);
}


h2{
    text-align:center;
    margin-bottom:20px;
}


/* Avatar */
.avatar-container {
    width: 130px;
    height: 130px;
    margin: 0 auto 15px;
    border: 3px solid #4CAF50;
    border-radius: 50%;
    overflow: hidden;
    cursor: pointer;
   position:relative;
}

.avatar-container img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:50%;
}
.camera-btn{
    position:absolute;
    bottom:5px;
    right:5px;
    width:34px;
    height:34px;
    border-radius:50%;
    background:#00acc1;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    cursor:pointer;
    border:2px solid #fff;
   z-index:5;
    box-shadow:0 2px 6px rgba(0,0,0,.25);
}
/* Inputs */
.info-fields label{
    font-weight:bold;
    margin-top:10px;
    display:block;
    color:#333;
}

.info-fields input{
    width:100%;
    padding:10px;
    margin-top:4px;
    margin-bottom:8px;
    border-radius:8px;
    border:1px solid #b3e5fc;
    font-size:.95rem;
}

/* Buttons */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#007BFF;
    color:#fff;
    font-size:1rem;
    cursor:pointer;
    margin-top:8px;
}

button:hover{
    background:#0056b3;
}

/* Updated info */
.updated-info{
    margin-top:20px;
    background:#e7f3ff;
    padding:15px;
    border-radius:12px;
}

.updated-info p{
    margin:0;
    padding:6px 0;
}

/* Password */
.password-section{
    margin-top:20px;
    text-align:center;
}

/* Actions */
.actions{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.actions button{
    flex:1;
}

/* Orders */
.orders{
    margin-top:20px;
    background:#fff;
    padding:15px;
    border-radius:12px;
    box-shadow:0 2px 6px rgba(0,0,0,.1);
}

.order-item{
    border-bottom:1px solid #eee;
    padding:8px 0;
}

.order-item:last-child{
    border-bottom:none;
}

/* Animation */
.fade{
    opacity:0;
    transition:opacity .5s;
}

.fade.show{
    opacity:1;
}

/* =========================
   MOBILE
========================= */
@media (max-width:768px){

    header{
        padding:6px 8px;
        gap:6px;
    }
    #logoutArrow{
        font-size:22px !important;
        font-weight:bold;
    }
   .header-icons{
        gap:5px;
    }

    .cart-count{
        min-width:16px;
        height:16px;
        font-size:10px;
        top:-2px;
        right:-2px;
    }

    .container{
        margin:12px;
        padding:18px;
    }

.actions{
    flex-direction:column;
}

.camera-btn{
    width:32px;
    height:32px;
    font-size:16px;
    bottom:4px;
    right:4px;
}
   .logo::before,
.menu-btn::before,
.icon-btn::before{
    content:"";
    position:absolute;
    inset:0;

    border-radius:16px;

    background:linear-gradient(
        to bottom,
        rgba(255,255,255,.12),
        transparent
    );

    pointer-events:none;
}
   .logo:active,
.menu-btn:active,
.icon-btn:active{

    transform:
    scale(.92)
    translateY(2px);

    box-shadow:
    inset 4px 4px 8px rgba(0,0,0,.25),
    inset -2px -2px 4px rgba(255,255,255,.08);
}
   .icon-btn{
  position:relative !important;

}

</style>
</head>

   <script>

// ==========================
// LOGOUT
// ==========================
logoutArrow.addEventListener("click", async (e) => {

    e.preventDefault();

    try {

        await auth.signOut();

        window.location.href = "index.html";

    } catch (err) {

        alert(err.message);

    }

});

// ==========================
// ĐỔI MẬT KHẨU
// ==========================
changePasswordBtn.addEventListener("click", async () => {

    const newPassword =
        newPasswordInput.value.trim();

    if (newPassword.length < 6) {

        showMsg(
            errorEl,
            "Mật khẩu tối thiểu 6 ký tự!",
            "red"
        );

        return;
    }

    try {

        await currentUser.updatePassword(
            newPassword
        );

        newPasswordInput.value = "";

        showMsg(
            messageEl,
            "Đổi mật khẩu thành công!",
            "green"
        );

    } catch (err) {

        showMsg(
            errorEl,
            err.message,
            "red"
        );

    }

});

// ==========================
// LỊCH SỬ ĐƠN HÀNG
// ==========================
if(orderHistoryBtn){
    orderHistoryBtn.addEventListener("click",(e)=>{
        e.preventDefault();

        ordersContainer.style.display =
        ordersContainer.style.display === "none"
        ? "block"
        : "none";

        loadOrders();
    });
}



// ==========================
// LOAD ORDERS
// ==========================
function loadOrders(){

    if(!currentUser) return;

    db.ref("orders/" + currentUser.uid)
    .once("value")
    .then(snapshot => {

        ordersList.innerHTML = "";

        if(!snapshot.exists()){

            ordersList.innerHTML =
            "<p>Chưa có đơn hàng</p>";

            return;
        }

        snapshot.forEach(item => {

            const order = item.val();

            const div =
            document.createElement("div");

            div.className = "order-item";

            div.innerHTML = `

                <p>
                <b>Mã đơn:</b>
                ${item.key}
                </p>

                <p>
                <b>Tổng tiền:</b>
                ${order.total || 0}đ
                </p>

                <p>
                <b>Ngày:</b>
                ${order.date || ""}
                </p>

            `;

            ordersList.appendChild(div);

        });

    });

}

</script>
