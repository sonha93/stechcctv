<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thông tin cá nhân - Stech</title>
<style>
/* =========================
   GLOBAL RESET
========================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    color:#111;
    overflow-x:hidden;
}

/* =========================
   HEADER & NAVBAR
========================= */
header{
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 10px;
    background:#33A0AB;
    position:sticky;
    top:0;
    z-index:999;
}

.menu-btn{
    width:40px;
    height:40px;
    border-radius:12px;
    background:#00acc1;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    cursor:pointer;
    flex-shrink:0;
}

.logo{
    width:40px;
    height:40px;
    border-radius:12px;
    overflow:hidden;
    background:#fff;
    flex-shrink:0;
}

.logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.search-box{
    flex:1;
    min-width:0;
}

.search-box input{
    width:100%;
    height:36px;
    border:none;
    border-radius:12px;
    padding:0 10px;
    font-size:14px;
}

.header-icons{
    display:flex;
    align-items:center;
    gap:8px;
}

.icon-btn{
    width:40px;
    height:40px;
    border-radius:12px;
    background:#00acc1;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    font-size:18px;
    line-height:1;
    position:relative;
    cursor:pointer;
    flex-shrink:0;
}

.cart-count{
    position:absolute;
    top:-4px;
    right:-4px;
    min-width:18px;
    height:18px;
    border-radius:50%;
    background:red;
    color:#fff;
    font-size:11px;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* =========================
   SIDEBAR
========================= */
.sidebar{
    position:fixed;
    top:0;
    left:-260px;
    width:240px;
    height:100vh;
    background:#fff;
    z-index:9999;
    transition:.3s;
    padding:20px;
    box-shadow:0 0 20px rgba(0,0,0,.15);
}

.sidebar.active{
    left:0;
}

.sidebar h3{
    margin-bottom:20px;
    color:#00acc1;
}

.sidebar a{
    display:block;
    padding:14px;
    margin-bottom:10px;
    border-radius:12px;
    background:#f5f5f5;
    text-decoration:none;
    color:#111;
    font-weight:bold;
}

/* Overlay */
#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
    z-index:9998;
    opacity:0;
    visibility:hidden;
    transition:.3s;
}

#overlay.active{
    opacity:1;
    visibility:visible;
}

/* =========================
   COVER FULL WIDTH & PROFILE HEADER
========================= */
.cover-full {
    width: 100vw;
    height: 220px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
}

.cover-full img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.cover-btn {
    position:absolute;
    bottom:10px;
    right:10px;
    width:34px;
    height:34px;
    border-radius:50%;
    background:#00acc1;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    cursor:pointer;
    border:2px solid #fff;
    z-index:5;
    box-shadow:0 2px 6px rgba(0,0,0,.25);
}

/* Avatar và tiêu đề */
.profile-header{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-top:-65px;
    z-index:2;
}

.avatar-container{
    width:130px;
    height:130px;
    border:3px solid #fff;
    border-radius:50%;
    overflow:hidden;
    background:#fff;
    position:relative;
    z-index:2;
}

.avatar-container img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:50%;
}

.camera-btn{
    position:absolute;
    bottom:5px;
    right:5px;
    width:34px;
    height:34px;
    border-radius:50%;
    background:#00acc1;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    cursor:pointer;
    border:2px solid #fff;
    box-shadow:0 2px 6px rgba(0,0,0,.25);
}

.profile-title{
    margin-top:10px;
    font-size:1.5rem;
    font-weight:bold;
    color:#111;
}

/* =========================
   CONTAINER
========================= */
.container{
    background:#fff;
    padding:25px;
    border-radius:12px;
    max-width:600px;
    margin:20px auto 40px auto;
    box-shadow:0 4px 20px rgba(0,0,0,.1);
}

/* Inputs & Buttons */
.info-fields label{
    font-weight:bold;
    margin-top:10px;
    display:block;
    color:#333;
}

.info-fields input{
    width:100%;
    padding:10px;
    margin-top:4px;
    margin-bottom:8px;
    border-radius:8px;
    border:1px solid #b3e5fc;
    font-size:.95rem;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#007BFF;
    color:#fff;
    font-size:1rem;
    cursor:pointer;
    margin-top:8px;
}

button:hover{
    background:#0056b3;
}

.updated-info{
    margin-top:20px;
    background:#e7f3ff;
    padding:15px;
    border-radius:12px;
}

.updated-info p{
    margin:0;
    padding:6px 0;
}

.password-section{
    margin-top:20px;
    text-align:center;
}

.actions{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.actions button{
    flex:1;
}

.orders{
    margin-top:20px;
    background:#fff;
    padding:15px;
    border-radius:12px;
    box-shadow:0 2px 6px rgba(0,0,0,.1);
}

.order-item{
    border-bottom:1px solid #eee;
    padding:8px 0;
}

.order-item:last-child{
    border-bottom:none;
}

.fade{
    opacity:0;
    transition:opacity .5s;
}

.fade.show{
    opacity:1;
}

/* Modal */
#imageModal {
    display:none;
    position:fixed;
    z-index:10000;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.8);
    justify-content:center;
    align-items:center;
}

#imageModal img {
    max-width:90%;
    max-height:90%;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,.5);
}

/* =========================
   MOBILE
========================= */
@media (max-width:768px){
    header{
        padding:6px 8px;
        gap:6px;
    }
    .menu-btn{ width:36px; height:36px; font-size:18px;}
    #logoutArrow{ font-size:22px !important; font-weight:bold; }
    .logo{ width:36px; height:36px;}
    .search-box input{ height:32px; font-size:13px; padding:0 8px; }
    .header-icons{ gap:5px; }
    .icon-btn{ width:32px; height:32px; font-size:14px;}
    .cart-count{ min-width:16px; height:16px; font-size:10px; top:-2px; right:-2px; }
    .container{ margin:12px; padding:18px; }
    .actions{ flex-direction:column; }
    .camera-btn, .cover-btn{ width:32px; height:32px; font-size:16px; bottom:4px; right:4px; } 
}
</style>
</head>
<body>

<div id="overlay" onclick="toggleMenu()"></div>
<div class="sidebar" id="sidebar">
<h3>Menu</h3>
<a href="index.html">Trang Chủ</a>
<a href="#" id="orderHistoryBtn">Lịch sử đơn hàng</a>
</div>

<header>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
<div class="logo"><img src="https://i.ibb.co/Z1kv9nJj/logo.png" alt="logo"></div>
<div class="search-box"><input type="text" placeholder="Tìm kiếm sản phẩm..."></div>
<div class="header-icons">
<a href="#" class="icon-btn" id="logoutArrow">↩</a>
<a href="cart.html" class="icon-btn">🛒<span class="cart-count" id="cartCount">0</span></a>
</div>
</header>

<!-- Cover full width -->
<div class="cover-full" id="coverContainer">
<img id="coverImg" src="https://i.ibb.co/Z1kv9nJj/logo.png" alt="cover">
<div class="cover-btn" id="coverBox">📷</div>
</div>

<!-- Avatar + title -->
<div class="profile-header">
<div class="avatar-container">
<img id="avatarImg" src="https://i.ibb.co/Z1kv9nJj/logo.png" alt="avatar">
<div class="camera-btn" id="avatarBox">📷</div>
</div>
<h2 class="profile-title">Thông tin cá nhân</h2>
</div>

<div class="container">
<div class="info-fields">
<p>Email: <b id="userEmail"></b></p>
<p>Ngày đăng ký: <span id="userCreatedAt"></span></p>
<label for="name">Họ và tên:</label><input type="text" id="name">
<label for="address">Địa chỉ:</label><input type="text" id="address">
<label for="birthday">Ngày sinh:</label><input type="date" id="birthday">
<label for="phone">Số điện thoại:</label><input type="text" id="phone" placeholder="VD: 0912345678">
<button id="updateInfoBtn" disabled>Cập nhật thông tin</button>
</div>

<div class="updated-info">
<h3>Thông tin hiện tại:</h3>
<p>Họ và tên: <span id="currentName"></span></p>
<p>Địa chỉ: <span id="currentAddress"></span></p>
<p>Ngày sinh: <span id="currentBirthday"></span></p>
<p>Số điện thoại: <span id="currentPhone"></span></p>
</div>

<div class="password-section">
<h2>Đổi mật khẩu</h2>
<input type="password" id="newPassword" placeholder="Mật khẩu mới">
<div class="actions">
<button id="changePasswordBtn">Đổi mật khẩu</button>
</div>
</div>

<div class="orders" id="ordersContainer" style="display:none;">
<h3>Lịch sử đơn hàng</h3>
<div id="ordersList"></div>
</div>

<div id="message" class="fade"></div>
<div id="error" class="fade"></div>

<!-- Modal -->
<div id="imageModal"><img src="" alt="view"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
// --- JS y nguyên như bạn gửi, giữ upload avatar/cover, modal, sidebar, orders ---
</script>
</body>
</html>
