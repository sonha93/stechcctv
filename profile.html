<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thông tin cá nhân</title>
<style>
body{font-family:Arial;background:#f5f5f5;display:flex;justify-content:center;align-items:flex-start;padding-top:50px;}
.container{background:#fff;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);width:320px;}
input{width:100%;padding:10px;margin:5px 0;border-radius:5px;border:1px solid #ccc;}
button{width:100%;padding:10px;margin-top:10px;border:none;border-radius:5px;background:#007BFF;color:#fff;cursor:pointer;}
button:hover{background:#0056b3;}
img{display:block;margin:10px auto;width:100px;height:100px;border-radius:50%;object-fit:cover;}
#message{color:green;margin-top:10px;text-align:center;}
#error{color:red;margin-top:10px;text-align:center;}
</style>
</head>
<body>
<div class="container">
<h2>Thông tin cá nhân</h2>
<img id="avatarImg" src="https://via.placeholder.com/50" alt="Avatar">
<input type="text" id="name" placeholder="Họ và tên">
<input type="text" id="phone" placeholder="Số điện thoại">
<button onclick="updateProfile()">Cập nhật thông tin</button>

<h2>Đổi mật khẩu</h2>
<input type="password" id="newPassword" placeholder="Mật khẩu mới">
<button onclick="changePassword()">Đổi mật khẩu</button>

<button onclick="logout()">Đăng xuất</button>

<div id="message"></div>
<div id="error"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, updatePassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYVcBEYJN1HUCta3XdJAUBe4TGLnmy7y4",
  authDomain: "stech-73b89.firebaseapp.com",
  projectId: "stech-73b89",
  storageBucket: "stech-73b89.firebasestorage.app",
  messagingSenderId: "873739162979",
  appId: "1:873739162979:web:978f1a4043f025b1cdaf56",
  measurementId: "G-98Q3927PHZ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let currentUser = null;

onAuthStateChanged(auth,user=>{
  if(user){
    currentUser=user;
    const userRef = ref(db,'users/'+user.uid);
    get(userRef).then(snapshot=>{
      if(snapshot.exists()){
        const data = snapshot.val();
        document.getElementById("name").value = data.name || "";
        document.getElementById("phone").value = data.phone || "";
        document.getElementById("avatarImg").src = data.avatar || "https://via.placeholder.com/50";
      }
    });
  } else {
    window.location.href="register.html";
  }
});

window.updateProfile = function(){
  const name=document.getElementById("name").value.trim();
  const phone=document.getElementById("phone").value.trim();
  const messageEl=document.getElementById("message");
  const errorEl=document.getElementById("error");
  messageEl.innerText=""; errorEl.innerText="";
  update(ref(db,'users/'+currentUser.uid),{name,phone})
    .then(()=>{messageEl.innerText="Cập nhật thành công!";})
    .catch(err=>{errorEl.innerText=err.message;});
};

window.changePassword = function(){
  const newPass=document.getElementById("newPassword").value.trim();
  const messageEl=document.getElementById("message");
  const errorEl=document.getElementById("error");
  messageEl.innerText=""; errorEl.innerText="";
  if(newPass.length<6){errorEl.innerText="Mật khẩu ≥6 ký tự"; return;}
  updatePassword(currentUser,newPass)
    .then(()=>{messageEl.innerText="Đổi mật khẩu thành công!";document.getElementById("newPassword").value="";})
    .catch(err=>{errorEl.innerText=err.message;});
};

window.logout=function(){signOut(auth).then(()=>{window.location.href="register.html";});};
</script>
</body>
</html>
