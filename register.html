<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng ký tài khoản</title>
<style>
body{font-family:Arial;background:#f5f5f5;display:flex;justify-content:center;align-items:center;height:100vh;}
.container{background:#fff;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);width:320px;}
input{width:100%;padding:10px;margin:5px 0;border-radius:5px;border:1px solid #ccc;}
button{width:100%;padding:10px;margin-top:10px;border:none;border-radius:5px;background:#007BFF;color:#fff;cursor:pointer;}
button:hover{background:#0056b3;}
#message{color:green;margin-top:10px;text-align:center;}
#error{color:red;margin-top:10px;text-align:center;}
</style>
</head>
<body>
<div class="container">
<h2>Đăng ký tài khoản</h2>
<input type="text" id="name" placeholder="Họ và tên">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Mật khẩu">
<input type="text" id="phone" placeholder="Số điện thoại">
<button id="registerBtn">Đăng ký</button>
<div id="message"></div>
<div id="error"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// Firebase config chuẩn
const firebaseConfig = {
  apiKey: "AIzaSyDYVcBEYJN1HUCta3XdJAUBe4TGLnmy7y4",
  authDomain: "stech-73b89.firebaseapp.com",
  databaseURL: "https://stech-73b89-default-rtdb.firebaseio.com",
  projectId: "stech-73b89",
  storageBucket: "stech-73b89.appspot.com",
  messagingSenderId: "873739162979",
  appId: "1:873739162979:web:978f1a4043f025b1cdaf56",
  measurementId: "G-98Q3927PHZ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const phoneInput = document.getElementById("phone");
const messageEl = document.getElementById("message");
const errorEl = document.getElementById("error");
const registerBtn = document.getElementById("registerBtn");

registerBtn.addEventListener("click", async () => {
  messageEl.innerText=""; errorEl.innerText="";

  const name = nameInput.value.trim();
  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();
  const phone = phoneInput.value.trim();

  if(!name || !email || !password || !phone){
    errorEl.innerText="Vui lòng nhập đầy đủ thông tin!";
    return;
  }

  try{
    // Tạo user
    const userCredential = await createUserWithEmailAndPassword(auth,email,password);
    const user = userCredential.user;

    // Cập nhật displayName
    await updateProfile(user,{displayName:name, photoURL:"https://i.ibb.co/Z1kv9nJj/logo.png"});

    // Lưu info vào Realtime Database
    await set(ref(db,'users/'+user.uid),{
      uid: user.uid,
      name: name,
      email: email,
      phone: phone,
      avatar: "https://i.ibb.co/Z1kv9nJj/logo.png",
      createdAt: Date.now()
    });

    messageEl.style.color="green";
    messageEl.innerText="Đăng ký thành công! Chuyển tới profile...";
    
    // Reset form
    nameInput.value=""; emailInput.value=""; passwordInput.value=""; phoneInput.value="";

    // Chuyển sang profile.html sau 1s
    setTimeout(()=>window.location.href="profile.html",1000);

  }catch(err){
    if(err.code==="auth/email-already-in-use"){
      errorEl.innerText="Email đã tồn tại, vui lòng đăng nhập!";
    } else {
      errorEl.innerText=err.message;
    }
  }
});
</script>
</body>
</html>
