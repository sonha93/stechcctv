<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng ký tài khoản</title>
<style>
body{font-family:Arial;background:#f5f5f5;display:flex;justify-content:center;align-items:center;height:100vh;}
.container{background:#fff;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);width:320px;}
input{width:100%;padding:10px;margin:5px 0;border-radius:5px;border:1px solid #ccc;}
button{width:100%;padding:10px;margin-top:10px;border:none;border-radius:5px;background:#007BFF;color:#fff;cursor:pointer;}
button:hover{background:#0056b3;}
#message{color:green;margin-top:10px;text-align:center;}
#error{color:red;margin-top:10px;text-align:center;}
</style>
</head>
<body>
<div class="container">
<h2>Đăng ký tài khoản</h2>
<input type="text" id="name" placeholder="Họ và tên">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Mật khẩu">
<input type="text" id="phone" placeholder="Số điện thoại">
<button onclick="register()">Đăng ký</button>
<div id="message"></div>
<div id="error"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// Firebase config stech-73b89
const firebaseConfig = {
  apiKey: "AIzaSyDYVcBEYJN1HUCta3XdJAUBe4TGLnmy7y4",
  authDomain: "stech-73b89.firebaseapp.com",
  projectId: "stech-73b89",
  storageBucket: "stech-73b89.firebasestorage.app",
  messagingSenderId: "873739162979",
  appId: "1:873739162979:web:978f1a4043f025b1cdaf56",
  measurementId: "G-98Q3927PHZ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

window.register = function(){
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const messageEl = document.getElementById("message");
  const errorEl = document.getElementById("error");
  messageEl.innerText=""; errorEl.innerText="";

  if(!name || !email || !password || !phone){
    errorEl.innerText="Vui lòng nhập đầy đủ thông tin!";
    return;
  }

  createUserWithEmailAndPassword(auth,email,password)
    .then(userCredential=>{
      const user = userCredential.user;
      // Update displayName
      return updateProfile(user,{displayName:name});
    })
    .then(()=>{
      const user = auth.currentUser;
      // Lưu info vào Realtime Database
      return set(ref(db,'users/'+user.uid),{
        name: name,
        email: email,
        phone: phone,
        avatar: "https://via.placeholder.com/50",
        createdAt: Date.now()
      });
    })
    .then(()=>{
      messageEl.innerText="Đăng ký thành công!";
      document.getElementById("name").value="";
      document.getElementById("email").value="";
      document.getElementById("password").value="";
      document.getElementById("phone").value="";
      setTimeout(()=>window.location.href="profile.html",1000);
    })
    .catch(err=>{
      errorEl.innerText=err.message;
    });
};
</script>
</body>
</html>
