<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Admin Reviews</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 15px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      background: #222;
      color: white;
    }

    .star {
      color: orange;
      font-weight: bold;
    }

    button {
      padding: 5px 10px;
      cursor: pointer;
    }

    .del {
      background: red;
      color: white;
      border: none;
    }

    .top {
      margin-bottom: 10px;
    }

    input {
      padding: 6px;
    }
  </style>
</head>

<body>

<h2>📊 ADMIN - REVIEWS SYSTEM</h2>

<div class="top">
  <input id="search" placeholder="Tìm SĐT...">
  <button onclick="filter()">Tìm</button>
  <button onclick="reset()">Reset</button>
</div>

<table>
  <thead>
    <tr>
      <th>Tên</th>
      <th>SĐT</th>
      <th>Email</th>
      <th>Nội dung</th>
      <th>Sao</th>
      <th>Sản phẩm</th>
      <th>Thời gian</th>
      <th>Xoá</th>
    </tr>
  </thead>

  <tbody id="list"></tbody>
</table>

<script type="module">
import { db } from "./firebase-config.js";
import { ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const list = document.getElementById("list");

let allData = {};

// ==========================
// LOAD REALTIME
// ==========================
const reviewRef = ref(db, "reviews");

onValue(reviewRef, (snapshot) => {
  allData = snapshot.val() || {};
  render(allData);
});

// ==========================
// RENDER TABLE
// ==========================
function render(data) {
  list.innerHTML = "";

  Object.entries(data).forEach(([id, r]) => {
    list.innerHTML += `
      <tr>
        <td>${r.name || ""}</td>
        <td>${r.phone || ""}</td>
        <td>${r.email || ""}</td>
        <td>${r.comment || ""}</td>
        <td class="star">${"⭐".repeat(r.star || 0)}</td>
        <td>${r.productId || ""}</td>
        <td>${r.createdAt || ""}</td>
        <td>
          <button class="del" onclick="del('${id}')">Xoá</button>
        </td>
      </tr>
    `;
  });
}

// ==========================
// DELETE
// ==========================
window.del = async (id) => {
  await remove(ref(db, "reviews/" + id));
};

// ==========================
// FILTER SĐT
// ==========================
window.filter = () => {
  const val = document.getElementById("search").value;

  const filtered = Object.fromEntries(
    Object.entries(allData).filter(([id, r]) =>
      (r.phone || "").includes(val)
    )
  );

  render(filtered);
};

// ==========================
// RESET
// ==========================
window.reset = () => {
  render(allData);
};

</script>

</body>
</html>
