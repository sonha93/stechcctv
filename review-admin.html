<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quản lý đánh giá sản phẩm </title>

<link rel="icon" type="image/png" href="favicon-96x96.png?v=20260523" sizes="96x96" /> 
<link rel="icon" type="image/svg+xml" href="favicon.svg?v=20260523" /> 
<link rel="shortcut icon" href="favicon.ico?v=20260523" /> 
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=20260523" /> 
<meta name="apple-mobile-web-app-title" content="Stech" />
<link rel="manifest" href="site.webmanifest?v=20260523" />



<link rel="stylesheet" href="./css/review-admin.css">

<style>
body{
margin:0;
padding:20px;
font-family:Arial,sans-serif;
background:#f5f6fa;
}

.page-header{
margin-bottom:20px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tab-btn{
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
background:#ddd;
font-weight:bold;
}

.tab-btn.active{
background:#00b894;
color:#fff;
}

.tab-content{
display:none;
}

.tab-content.active{
display:block;
}

.table-wrapper{
background:#fff;
border-radius:12px;
padding:15px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
text-align:left;
}
</style>

</head>

<body>

<div class="page-header">
<h2>⭐ Quản lý đánh giá & hỏi đáp</h2>
</div>

<div class="tabs">

<button
class="tab-btn active"
data-tab="reviews">
Đánh giá sản phẩm
</button>

<button
class="tab-btn"
data-tab="questions">
Hỏi đáp sản phẩm
</button>

</div>

<div
id="reviewsTab"
class="tab-content active">

<div class="table-wrapper">

<table>

<thead>
<tr>
<th>Khách hàng</th>
<th>SĐT</th>
<th>Sản phẩm</th>
<th>Số sao</th>
<th>Nội dung</th>
<th>Phản hồi</th>   <!-- 👈 THÊM -->
<th>Media</th>
<th>Ngày</th>
<th>Reply</th>
<th>Xóa</th>

</tr>
</thead>

<tbody id="reviewsTable">
</tbody>

</table>

</div>

</div>

<div
id="questionsTab"
class="tab-content">

<div class="table-wrapper">

<table>

<thead>
<tr>
<th>Khách hàng</th>
<th>SĐT</th>
<th>Sản phẩm</th>
<th>Nội dung</th>
<th>Phản hồi</th>   <!-- 👈 THÊM -->
<th>Media</th>
<th>Ngày</th>
<th>Reply</th>
<th>Xóa</th>
</tr>
</thead>

<tbody id="questionsTable">
</tbody>

</table>

</div>

</div>



<script type="module" src="./review-admin.js"></script>

</body>
</html>
