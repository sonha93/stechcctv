<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Admin Reviews Pro</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h2 { margin-bottom: 15px; }

    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    input {
      padding: 6px;
      width: 200px;
    }

    button {
      padding: 6px 10px;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      background: #222;
      color: white;
    }

    .star {
      color: orange;
      font-weight: bold;
    }

    .del {
      background: red;
      color: white;
      border: none;
    }

    .badge {
      background: #00b894;
      color: white;
      padding: 2px 6px;
      border-radius: 5px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<h2>📊 ADMIN REVIEWS SYSTEM (PRO)</h2>

<div class="toolbar">
  <input id="searchPhone" placeholder="Tìm SĐT...">
  <input id="searchName" placeholder="Tìm tên...">
 <button onclick="search()">Search</button>
<button onclick="reset()">Reset</button>
<button onclick="stats()">Stats</button>
</div>

<table>
  <thead>
    <tr>
      <th>Khách</th>
      <th>SĐT</th>
      <th>Email</th>
      <th>Nội dung</th>
      <th>Sao</th>
      <th>Sản phẩm</th>
      <th>Thời gian</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody id="list"></tbody>
</table>

<script type="module">

import { db } from "./firebase-config.js";

import {
  collection,
  onSnapshot,
  query,
  orderBy,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* =========================
   STATE
========================= */
let state = {
  all: [],
  filtered: []
};

const el = {
  list: document.getElementById("list"),
  phone: document.getElementById("searchPhone"),
  name: document.getElementById("searchName")
};

/* =========================
   FIREBASE LAYER
========================= */
const q = query(collection(db, "reviews"), orderBy("createdAt", "desc"));

onSnapshot(q, (snap) => {
  state.all = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  state.filtered = state.all;
  render();
});

/* =========================
   UI LAYER
========================= */
const ui = {
  search() {
    const phone = el.phone.value.toLowerCase();
    const name = el.name.value.toLowerCase();

    state.filtered = state.all.filter(r => {
      return (
        (r.phone || "").toLowerCase().includes(phone) &&
        (r.userName || "").toLowerCase().includes(name)
      );
    });

    render();
  },

  reset() {
    el.phone.value = "";
    el.name.value = "";
    state.filtered = state.all;
    render();
  },

  stats() {
    const total = state.all.length;
    const avg =
      total > 0
        ? (state.all.reduce((a, b) => a + (b.rating || 0), 0) / total).toFixed(1)
        : 0;

    alert(`Tổng review: ${total}\nRating TB: ${avg}`);
  },

  async del(id) {
    await deleteDoc(doc(db, "reviews", id));
  }
};

window.search = ui.search;
window.reset = ui.reset;
window.stats = ui.stats;
window.del = ui.del;

/* =========================
   RENDER ENGINE
========================= */
function render() {
  el.list.innerHTML = "";

  state.filtered.forEach(r => {
    el.list.innerHTML += rowTemplate(r);
  });
}

/* =========================
   TEMPLATE ENGINE
========================= */
function rowTemplate(r) {
  return `
    <tr>
      <td>
        ${r.userName || ""}
        ${r.verified ? `<span class="badge">✔ VIP</span>` : ""}
      </td>
      <td>${r.phone || ""}</td>
      <td>${r.email || ""}</td>
      <td>${r.content || ""}</td>
      <td class="star">${"⭐".repeat(r.rating || 0)}</td>
      <td>${r.productId || ""}</td>
      <td>${
        r.createdAt?.toDate
          ? r.createdAt.toDate().toLocaleString()
          : ""
      }</td>
      <td>
        <button class="del"onclick="del('${r.id}')">Xoá</button>
      </td>
    </tr>
  `;
}

</script>

</body>
</html>
