const videos = document.querySelectorAll(".vid");

const observer = new IntersectionObserver((entries)=>{

    entries.forEach(entry=>{

        const video = entry.target;

        if(entry.isIntersecting){

            video.play()
            .then(()=>{

                video.muted = false;
                video.volume = 1;

            })
            .catch(()=>{

                // trình duyệt chặn âm thanh
                // cho phép người dùng bật bằng click
                video.muted = true;
                video.play();

            });

        }else{

            video.pause();
            video.currentTime = 0;

        }

    });

},{
    threshold:0.8
});


videos.forEach(video=>{
    observer.observe(video);
});


// Click vào video để bật/tắt tiếng
videos.forEach(video=>{

    video.addEventListener("click",()=>{

        video.muted = !video.muted;

    });

});

function autoPlay(){

    const videos = document.querySelectorAll(".vid");

    const observer = new IntersectionObserver(entries=>{

        entries.forEach(entry=>{

            const v = entry.target;

          if(entry.isIntersecting && entry.intersectionRatio >= 0.5){

                videos.forEach(x=>{

                    if(x!==v){

                       x.pause();
                        x.currentTime = 0;

                    }

                });

            
v.muted = !soundOn;
v.volume = soundOn ? 1 : 0;
const p = v.play();

if (p !== undefined) {
    p.catch(err=>{
        console.log("play error",err);
    });
}

            }else{

    v.pause();

    v.currentTime = 0;

}

        });

    },{
       threshold:0.5
    });

   videos.forEach(v => {

    v.addEventListener("ended", () => {
        v.currentTime = 0;
       const p = v.play();

if (p !== undefined) {
    p.catch(err=>{
        console.log("play error",err);
    });
}
    });

    observer.observe(v);

    v.addEventListener("click", () => {

        if (v.paused) {
            v.play();
        } else {
            v.pause();
        }

    });

});

}

function timeAgo(timestamp){

    if(!timestamp) return "Vừa xong";

    const date = timestamp.toDate
        ? timestamp.toDate()
        : new Date(timestamp);

    const diff = Math.floor((Date.now() - date.getTime()) / 1000);

    if(diff < 5) return " Vừa xong";
    if(diff < 60) return diff + "s";

    const m = Math.floor(diff / 60);
    if(m < 60) return m + " phút ";

    const h = Math.floor(m / 60);
    if(h < 24) return h + " giờ ";

    const d = Math.floor(h / 24);
    if(d < 30) return d + " ngày";

    const month = Math.floor(d / 30);
    if(month < 12) return month + " tháng";

    const y = Math.floor(month / 12);
    return y + " năm";
}
