<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review TikTok</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden}

/* FEED */
#feed{
  height:100vh;
  overflow-y:auto;
  scroll-snap-type:y mandatory;
  scroll-behavior:smooth;
}

.video-item{
  height:100vh;
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  scroll-snap-align:start;
  background:#000;
}

.video-item video{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* INFO */
.info{
  position:absolute;
  bottom:80px;
  left:15px;
  color:#fff;
}

.right-action{
  position:absolute;
  right:12px;
  bottom:110px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.action{
  display:flex;
  flex-direction:column;
  align-items:center;
  color:#fff;
}

.action .icon{
  width:55px;height:55px;
  border-radius:50%;
  background:rgba(0,0,0,.5);
  display:flex;
  justify-content:center;
  align-items:center;
}

#commentSheet{
  position:fixed;
  left:0;right:0;bottom:-100%;
  height:70vh;
  background:#fff;
  border-radius:20px 20px 0 0;
  transition:.3s;
  display:flex;
  flex-direction:column;
  z-index:9999;
}

#commentSheet.active{bottom:0}

.sheet-header{
  padding:15px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
}

#commentList{
  flex:1;
  overflow:auto;
  padding:15px;
}

.comment-input{
  display:flex;
  gap:10px;
  padding:10px;
}
.comment-input input{flex:1;padding:10px}
</style>
</head>

<body>

<div id="commentSheet">
  <div class="sheet-header">
    Bình luận
    <button onclick="closeComment()">✕</button>
  </div>

  <div id="commentList"></div>

  <div class="comment-input">
    <input id="commentText" placeholder="Viết bình luận...">
    <button onclick="sendComment()">Gửi</button>
  </div>
</div>

<div id="feed"></div>

<script type="module">

import { app, auth } from "./auth.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  getDoc,
  addDoc,
  updateDoc,
  deleteDoc,
  increment,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { addToCart as addToCartFirebase } from "./cart.js";

const db = getFirestore(app);
const feed = document.getElementById("feed");

let currentCommentProduct = "";

/* LOAD VIDEO */
async function loadVideos(){
  const snap = await getDocs(collection(db,"products"));
  feed.innerHTML = "";

  snap.forEach(docSnap=>{
    const p = docSnap.data();
    if(!p.videos?.length) return;

    const video = typeof p.videos[0] === "string"
      ? p.videos[0]
      : p.videos[0].url;

    const id = docSnap.id;

    feed.insertAdjacentHTML("beforeend",`
      <div class="video-item">

        <video class="vid" src="${video}" autoplay muted playsinline loop></video>

        <div class="right-action">

          <div class="action" onclick="location.href='logo.html?id=${id}'">
            <div class="icon">🛍️</div>
          </div>

          <div class="action" onclick="toggleLike('${id}')">
            <div class="icon">❤️</div>
            <span id="like-${id}">0</span>
          </div>

          <div class="action" onclick="openComment('${id}')">
            <div class="icon">💬</div>
            <span id="comment-${id}">0</span>
          </div>

          <div class="action" onclick="addCart('${id}')">
            <div class="icon">🛒</div>
          </div>

        </div>

        <div class="info">
          <div>${p.name}</div>
          <div>${Number(p.price).toLocaleString()}đ</div>
        </div>

      </div>
    `);
  });

  autoPlay();
}

/* AUTO PLAY */
function autoPlay(){
  const videos = document.querySelectorAll(".vid");

  const obs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      const v = e.target;

      if(e.isIntersecting){
        videos.forEach(x=>x!==v && (x.pause(),x.currentTime=0));
        v.play().catch(()=>{});
      }else{
        v.pause();
      }
    });
  },{threshold:0.8});

  videos.forEach(v=>obs.observe(v));
}

/* LIKE + COMMENT REALTIME */
function bindRealtime(){
  document.querySelectorAll("[id^='like-'],[id^='comment-']")
  .forEach(el=>{
    const id = el.id.replace("like-","").replace("comment-","");

    onSnapshot(doc(db,"products",id),(snap)=>{
      const d = snap.data() || {};

      const l = document.getElementById("like-"+id);
      const c = document.getElementById("comment-"+id);

      if(l) l.innerText = d.likeCount || 0;
      if(c) c.innerText = d.commentCount || 0;
    });
  });
}

/* COMMENT */
window.openComment = function(id){
  currentCommentProduct = id;
  document.getElementById("commentSheet").classList.add("active");
  loadComments(id);
};

window.closeComment = function(){
  document.getElementById("commentSheet").classList.remove("active");
};

function loadComments(id){
  const list = document.getElementById("commentList");

  onSnapshot(collection(db,"products",id,"comments"), snap=>{
    list.innerHTML = "";
    snap.forEach(d=>{
      const c = d.data();
      list.innerHTML += `
        <div style="padding:10px;border-bottom:1px solid #eee">
          <b>${c.name}</b><br>${c.text}
        </div>
      `;
    });
  });
}

window.sendComment = async function(){
  const user = auth.currentUser;
  if(!user) return alert("Đăng nhập");

  const text = document.getElementById("commentText").value.trim();
  if(!text) return;

  await addDoc(collection(db,"products",currentCommentProduct,"comments"),{
    uid:user.uid,
    name:user.displayName || "User",
    text,
    createdAt:serverTimestamp()
  });

  await updateDoc(doc(db,"products",currentCommentProduct),{
    commentCount:increment(1)
  });

  document.getElementById("commentText").value="";
};

/* CART */
window.addCart = async function(id){
  const snap = await getDoc(doc(db,"products",id));
  if(!snap.exists()) return;

  await addToCartFirebase({
    id: snap.id,
    productId: snap.id,
    ...snap.data()
  });
};

/* LIKE */
window.toggleLike = async function(id){
  const user = auth.currentUser;
  if(!user) return alert("Đăng nhập");

  const ref = doc(db,"reviewLikes",id+"_"+user.uid);
  const snap = await getDoc(ref);

  if(snap.exists()){
    await deleteDoc(ref);
    await updateDoc(doc(db,"products",id),{
      likeCount:increment(-1)
    });
  }else{
    await setDoc(ref,{uid:user.uid,productId:id});
    await updateDoc(doc(db,"products",id),{
      likeCount:increment(1)
    });
  }
};

loadVideos().then(bindRealtime);

</script>

</body>
</html>
