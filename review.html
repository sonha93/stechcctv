/* AUTO PLAY LIKE TIKTOK */
function autoPlay(){

    const videos = document.querySelectorAll(".vid");

    const observer = new IntersectionObserver(entries=>{

        entries.forEach(entry=>{

            const v = entry.target;

            if(entry.isIntersecting && entry.intersectionRatio >= 0.8){

                videos.forEach(x=>{

                    if(x!==v){

                       x.pause();
                        x.currentTime = 0;

                    }

                });

v.play().catch(()=>{});

    },{
        threshold:0.8
    });

   videos.forEach(v => {

    v.addEventListener("ended", () => {
        v.currentTime = 0;
        v.play().catch(()=>{});
    });

    observer.observe(v);

    v.addEventListener("click", () => {

        if (v.paused) {
            v.play();
        } else {
            v.pause();
        }

    });

});

}


document.addEventListener("visibilitychange",()=>{

function timeAgo(timestamp){

    if(!timestamp) return "Vừa xong";

    const date = timestamp.toDate
        ? timestamp.toDate()
        : new Date(timestamp);

    const diff = Math.floor((Date.now() - date.getTime()) / 1000);

    if(diff < 5) return "Vừa xong";
    if(diff < 60) return diff + "s";

    const m = Math.floor(diff / 60);
    if(m < 60) return m + "p";

    const h = Math.floor(m / 60);
    if(h < 24) return h + "h";

    const d = Math.floor(h / 24);
    if(d < 30) return d + " ngày";

    const month = Math.floor(d / 30);
    if(month < 12) return month + " tháng";

    const y = Math.floor(month / 12);
    return y + " năm";
}

window.likeComment = async function(productId, commentId){

    const user = auth.currentUser;

    if(!user){
        alert("Đăng nhập trước");
        return;
    }

    const likeRef = doc(
        db,
        "commentLikes",
        commentId + "_" + user.uid
    );

    const likeSnap = await getDoc(likeRef);

    const commentRef = doc(
        db,
        "products",
        productId,
        "comments",
        commentId
    );

    if(likeSnap.exists()){

        await deleteDoc(likeRef);

        await updateDoc(commentRef,{
            likeCount:increment(-1)
        });

    }else{

        await setDoc(likeRef,{
            uid:user.uid
        });

        await updateDoc(commentRef,{
            likeCount:increment(1)
        });

    }

}
