<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review TikTok</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
}

/* CONTAINER FULL SCREEN */
#feed{
    height:100vh;
    overflow-y:auto;
    scroll-snap-type:y mandatory;
    scroll-behavior:smooth;
    -webkit-overflow-scrolling:touch;
}

/* VIDEO ITEM */
.video-item{
    height:100vh;
    width:100%;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    scroll-snap-align:start;
    scroll-snap-stop:always;
    background:#000;
}

/* VIDEO FULL SCREEN */
.video-item video{
    max-width:100%;
    max-height:100%;
    width:auto;
    height:auto;
    object-fit:contain;
}
/* INFO OVERLAY */
.info{
    position:absolute;
    bottom:80px;
    left:15px;
    color:#fff;
    z-index:2;
}

.name{
    font-size:16px;
    font-weight:bold;
    margin-bottom:5px;
}

.price{
    color:#ff3b3b;
    font-weight:bold;
}

/* BUTTON */
.buy{
    margin-top:8px;
    padding:8px 12px;
    border:none;
    border-radius:20px;
    background:#ff0033;
    color:#fff;
    font-weight:bold;
}
    #reviewProducts{
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
}



.review-video{
    max-width:100%;
    max-height:100%;
    width:auto;
    height:auto;
    object-fit:contain;
}
.info{
    position:absolute;
    bottom:80px;
    left:15px;
    color:#fff;
    z-index:2;
}
.right-action{

    position:absolute;

    right:12px;
    bottom:110px;

    display:flex;
    flex-direction:column;

    align-items:center;

    gap:20px;

    z-index:999;

}

.action{

    display:flex;

    flex-direction:column;

    align-items:center;

    color:#fff;

    cursor:pointer;

    user-select:none;

}

.action .icon{

    width:58px;

    height:58px;

    border-radius:50%;

    background:rgba(0,0,0,.45);

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:28px;

    transition:.25s;

}

.action:active .icon{

    transform:scale(.9);

}

.action span{

    margin-top:5px;

    font-size:13px;

    font-weight:bold;

}
    #commentSheet{

    position:fixed;

    left:0;
    right:0;
    bottom:-100%;

    height:70vh;

    background:#fff;

    border-radius:20px 20px 0 0;

    transition:.35s;

    z-index:9999;

    display:flex;

    flex-direction:column;

}

#commentSheet.active{

    bottom:0;

}

.sheet-top{

    width:50px;

    height:5px;

    background:#ccc;

    border-radius:20px;

    margin:10px auto;

}

.sheet-header{

    display:flex;

    justify-content:space-between;

    padding:15px;

    font-weight:bold;

}

#commentList{

    flex:1;

    overflow:auto;

    padding:15px;

}

.comment-input{

    display:flex;

    padding:12px;

    gap:10px;

}

.comment-input input{

    flex:1;

    padding:10px;

}

.comment-input button{

    padding:10px 18px;

}
   
</style>
</head>
<div id="commentSheet">

    <div class="sheet-top"></div>

    <div class="sheet-header">

        Bình luận

        <button onclick="closeComment()">✕</button>

    </div>

    <div id="commentList"></div>

    <div class="comment-input">

        <input
        id="commentText"
        placeholder="Viết bình luận...">

        <button onclick="sendComment()">Gửi</button>

    </div>

</div>
<body>

<div id="feed"></div>

<script type="module">


import { app } from "./auth.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
    getFirestore,
    collection,
    getDocs,
    doc,
    getDoc,
    setDoc,
    addDoc,
    deleteDoc,
    updateDoc,
    increment,
    onSnapshot,
    query,
    where,
    serverTimestamp
    
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
    addToCart as addToCartFirebase
} from "./cart.js";

const firebaseConfig = {
    apiKey: "AIzaSyDYVcBEYJN1HUCta3XdJAUBe4TGLnmy7y4",
    authDomain: "stech-73b89.firebaseapp.com",
    projectId: "stech-73b89",
    storageBucket: "stech-73b89.firebasestorage.app",
    messagingSenderId: "873739162979",
    appId: "1:873739162979:web:978f1a4043f025b1cdaf56"
};



const feed = document.getElementById("feed");
if(!feed) throw new Error("Missing #feed");
const db = getFirestore(app);
const auth = getAuth(app);
let currentProduct = "";
let currentCommentProduct = "";
async function loadVideos(){

    const snap = await getDocs(collection(db,"products"));
   
    feed.innerHTML = "";

    snap.forEach(docSnap=>{

        const p = docSnap.data();

        if(!p.videos || p.videos.length === 0) return;

        const video =
        typeof p.videos[0] === "string"
        ? p.videos[0]
        : p.videos[0].url;

        const id = docSnap.id;
    
        feed.innerHTML += `
        
        <div class="video-item">
       <video
    class="vid"
    src="${video}"
    autoplay
    playsinline
    webkit-playsinline
    controls
    preload="metadata"
    controlsList="nodownload noplaybackrate"
    disablePictureInPicture>
</video>
            <div class="right-action">

    <div class="action" onclick="location.href='logo.html?id=${id}'">
        <div class="icon">🛍️</div>
        <span>Shop</span>
    </div>

    <div class="action" onclick="toggleLike('${id}')">
        <div class="icon">❤️</div>
      <span id="like-${id}">${p.likeCount || 0}</span>
    </div>

    <div class="action" onclick="openComment('${id}')">
        <div class="icon">💬</div>
       <span id="comment-${id}">${p.commentCount || 0}</span>
    </div>

    <div class="action" onclick="addCart('${id}')">
        <div class="icon">🛒</div>
        <span>Giỏ</span>
    </div>
<div class="action" onclick="toggleSound()">
    <div class="icon">🔊</div>
    <span></span>
</div>
</div>

<div class="info">
                <div class="name">${p.name}</div>
                <div class="price">${Number(p.price).toLocaleString()}đ</div>
                <button class="buy" onclick="location.href='logo.html?id=${id}'">
                    Mua ngay
                </button>
            </div>
        </div>
        `;
   });


    

autoPlay();

}

/* AUTO PLAY LIKE TIKTOK */
function autoPlay(){

    const videos = document.querySelectorAll(".vid");

    const observer = new IntersectionObserver(entries=>{

        entries.forEach(entry=>{

            const v = entry.target;

            if(entry.isIntersecting && entry.intersectionRatio >= 0.8){

                videos.forEach(x=>{

                    if(x!==v){

                       x.pause();
                        x.currentTime = 0;

                    }

                });

v.volume = soundOn ? 1 : 0;
v.play().catch(()=>{});

            }else{

                v.pause();

            }

        });

    },{
        threshold:0.8
    });

   videos.forEach(v => {

    v.addEventListener("ended", () => {
        v.currentTime = 0;
        v.play().catch(()=>{});
    });

    observer.observe(v);

    v.addEventListener("click", () => {

        if (v.paused) {
            v.play();
        } else {
            v.pause();
        }

    });

});

}


document.addEventListener("visibilitychange",()=>{

    const videos = document.querySelectorAll(".vid");

    if(document.hidden){

        videos.forEach(v=>v.pause());

    }else{

        videos.forEach(v=>{
            if(!v.paused){
                v.play().catch(()=>{});
            }
        });

    }

});
    window.openComment = function(id){

    currentCommentProduct = id;

    document
        .getElementById("commentSheet")
        .classList.add("active");

    loadComments(id);

}

window.closeComment=function(){

    document
    .getElementById("commentSheet")
    .classList.remove("active");

}
function loadComments(productId){

    const list = document.getElementById("commentList");

   return onSnapshot(

        collection(
            db,
            "products",
            productId,
            "comments"
        ),

        snap=>{

            list.innerHTML="";

            snap.forEach(docSnap=>{

                const c=docSnap.data();

                list.innerHTML+=`
                <div style="padding:10px;border-bottom:1px solid #eee">
                    <b>${c.name}</b><br>
                    ${c.text}
                </div>
                `;

            });

        }

    );

}
    window.sendComment = async function(){

    const user = auth.currentUser;

    if(!user){
        alert("Đăng nhập trước");
        return;
    }

    const text = document
        .getElementById("commentText")
        .value
        .trim();

    if(text=="") return;

    await addDoc(

        collection(
            db,
            "products",
            currentCommentProduct,
            "comments"
        ),

        {
            uid:user.uid,
            name:user.displayName || "Người dùng",
            text:text,
            createdAt:serverTimestamp()
        }

    );

    await updateDoc(

        doc(db,"products",currentCommentProduct),

        {
            commentCount:increment(1)
        }

    );

    document.getElementById("commentText").value="";

    loadComments(currentCommentProduct);
    document.getElementById("commentText").focus();
}
window.addCart = async function(id){

    const docSnap = await getDoc(doc(db,"products",id));

    if(!docSnap.exists()) return;

    const product = docSnap.data();

    await addToCartFirebase({
        id: id,              // 🔥 QUAN TRỌNG
        productId: id,      // 🔥 QUAN TRỌNG
        ...product
    });

    alert("Đã thêm giỏ hàng");
}

window.toggleLike = async function(id){

    const user = auth.currentUser;

    if(!user){
        alert("Đăng nhập trước");
        return;
    }

    const likeRef = doc(
        db,
        "reviewLikes",
        id+"_"+user.uid
    );

    const likeSnap = await getDoc(likeRef);

    const productRef = doc(db,"products",id);

    if(likeSnap.exists()){

        await deleteDoc(likeRef);

        await updateDoc(productRef,{
            likeCount:increment(-1)
        });
const el = document.getElementById("like-" + id);

if(el){
    let v = parseInt(el.innerText || "0");

    if(likeSnap.exists()){
        el.innerText = v - 1;
    }else{
        el.innerText = v + 1;
    }
}
    }else{

        await setDoc(likeRef,{
            uid:user.uid,
            productId:id
        });

        await updateDoc(productRef,{
            likeCount:increment(1)
        });
const el = document.getElementById("like-" + id);
if(el){
    let v = parseInt(el.innerText || "0");
    el.innerText = v + 1;
}
    }

}
  let soundOn = false;

window.toggleSound = function () {
    soundOn = !soundOn;

    document.querySelectorAll(".vid").forEach(v => {
        v.muted = !soundOn;
        v.volume = soundOn ? 1 : 0;
    });
};
 loadVideos();

</script>
<script type="module" src="review.js"></script>
</body>
</html>
