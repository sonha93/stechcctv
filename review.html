<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review TikTok</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
}

/* CONTAINER FULL SCREEN */
#feed{
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
}

/* VIDEO ITEM */
.video-item{
    height:100vh;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    position:relative;
}

/* VIDEO FULL SCREEN */
.video-item video{
    max-width:100%;
    max-height:100%;
    width:auto;
    height:auto;
    object-fit:contain;
}
/* INFO OVERLAY */
.info{
    position:absolute;
    bottom:80px;
    left:15px;
    color:#fff;
    z-index:2;
}

.name{
    font-size:16px;
    font-weight:bold;
    margin-bottom:5px;
}

.price{
    color:#ff3b3b;
    font-weight:bold;
}

/* BUTTON */
.buy{
    margin-top:8px;
    padding:8px 12px;
    border:none;
    border-radius:20px;
    background:#ff0033;
    color:#fff;
    font-weight:bold;
}
    #reviewProducts{
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
}



.review-video{
    max-width:100%;
    max-height:100%;
    width:auto;
    height:auto;
    object-fit:contain;
}
.info{
    position:absolute;
    bottom:80px;
    left:15px;
    color:#fff;
    z-index:2;
}

</style>
</head>

<body>

<div id="feed"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
    getFirestore,
    collection,
    getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDYVcBEYJN1HUCta3XdJAUBe4TGLnmy7y4",
    authDomain: "stech-73b89.firebaseapp.com",
    projectId: "stech-73b89",
    storageBucket: "stech-73b89.firebasestorage.app",
    messagingSenderId: "873739162979",
    appId: "1:873739162979:web:978f1a4043f025b1cdaf56"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const feed = document.getElementById("feed");

async function loadVideos(){

    const snap = await getDocs(collection(db,"products"));

    feed.innerHTML = "";

    snap.forEach(docSnap=>{

        const p = docSnap.data();

        if(!p.videos || p.videos.length === 0) return;

        const video =
        typeof p.videos[0] === "string"
        ? p.videos[0]
        : p.videos[0].url;

        const id = docSnap.id;

        feed.innerHTML += `
        <div class="video-item">
       <video
    class="vid"
    src="${video}"
    autoplay
    muted
    playsinline
    webkit-playsinline
    controls
    preload="metadata"
    controlsList="nodownload noplaybackrate"
    disablePictureInPicture>
</video>
            <div class="info">
                <div class="name">${p.name}</div>
                <div class="price">${Number(p.price).toLocaleString()}đ</div>
                <button class="buy" onclick="location.href='logo.html?id=${id}'">
                    Mua ngay
                </button>
            </div>
        </div>
        `;
    });

    autoPlay();
}

/* AUTO PLAY LIKE TIKTOK */
function autoPlay(){

    const videos = document.querySelectorAll(".vid");

    const observer = new IntersectionObserver(entries=>{

        entries.forEach(entry=>{

            const v = entry.target;

            if(entry.isIntersecting && entry.intersectionRatio >= 0.8){

                videos.forEach(x=>{

                    if(x!==v){

                       x.pause();
                        x.currentTime = 0;
                        x.muted = true;
                        x.load();

                    }

                });

               v.load();
v.play().catch(()=>{});

            }else{

                v.pause();

            }

        });

    },{
        threshold:0.8
    });

    videos.forEach(v=>{
    v.addEventListener("ended", () => {
    v.currentTime = 0;
    v.play().catch(()=>{});
});
        observer.observe(v);

        
    });

}
loadVideos();
document.addEventListener("visibilitychange",()=>{

    if(document.hidden){

        videos.forEach(v=>v.pause());

    }else{

        const active=document.querySelector(".vid:not([paused])");
        if(active){
            active.play().catch(()=>{});
        }

    }

});
</script>
<script type="module" src="review.js"></script>
</body>
</html>
