<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review Video</title>

<style>
html,body{
    margin:0;
    padding:0;
    height:100%;
    background:#000;
    overflow:hidden;
}

#reviewProducts{
    height:100vh;
    width:100vw;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
}

.video-item{
    height:100vh;
    width:100vw;
    position:relative;
    scroll-snap-align:start;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
    background:black;
}

.info{
    position:absolute;
    bottom:40px;
    left:20px;
    color:white;
    z-index:2;
}

.buy-btn{
    margin-top:10px;
    padding:10px 15px;
    border:none;
    background:red;
    color:white;
}
</style>
</head>

<body>

<div id="reviewProducts"></div>

<script type="module" src="review.js"></script>

</body>
</html>
