<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Đặt hàng thành công</title>

<link rel="icon" type="image/png" href="favicon-96x96.png?v=20260523" sizes="96x96" /> 
<link rel="icon" type="image/svg+xml" href="favicon.svg?v=20260523" /> 
<link rel="shortcut icon" href="favicon.ico?v=20260523" /> 
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=20260523" /> 
<meta name="apple-mobile-web-app-title" content="Stech" />
<link rel="manifest" href="site.webmanifest?v=20260523" />

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family:Arial, sans-serif;
      background:#f5f5f5;

      display:flex;
      justify-content:center;
      align-items:center;

      min-height:100vh;
      padding:20px;
    }

    .box{
      background:#fff;
      padding:30px 20px;
      border-radius:12px;
      width:100%;
      max-width:500px;

      box-shadow:0 5px 15px rgba(0,0,0,0.08);
    }

    h1{
      color:green;
      margin-bottom:15px;
    }

    p{
      color:#555;
      margin-bottom:25px;
    }

    .buttons{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
    }

    a{
      display:inline-block;
      padding:10px 16px;

      background:#ee4d2d;
      color:#fff;

      text-decoration:none;
      border-radius:8px;

      transition:0.2s;
    }

    a:hover{
      opacity:0.9;
      transform:translateY(-1px);
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>🎉 Đặt hàng thành công!</h1>

    <p>Cảm ơn bạn đã mua hàng.</p>

    <div class="buttons">
      <a href="index.html">Về trang chủ</a>
      <a href="orders.html">Xem đơn hàng</a>
    </div>
  </div>


</body>
</html>
