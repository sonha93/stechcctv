<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Đăng video</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html,
body{

width:100%;
height:100%;
background:#000;
overflow:hidden;

}

.upload-popup{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#000;

display:flex;

flex-direction:column;

z-index:999999;

}

.upload-header{

height:60px;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 18px;

border-bottom:1px solid rgba(255,255,255,.08);

flex-shrink:0;

}

.upload-close{

background:none;

border:none;

color:#fff;

font-size:30px;

cursor:pointer;

}

.upload-title{

color:#fff;

font-size:20px;

font-weight:bold;

}

.upload-post{

background:#fe2c55;

color:#fff;

border:none;

border-radius:8px;

padding:10px 18px;

font-size:15px;

font-weight:bold;

cursor:pointer;

}

.upload-content{

flex:1;

overflow-y:auto;

padding:20px;

}

.upload-preview{

width:100%;

height:320px;

border:2px dashed rgba(255,255,255,.15);

border-radius:18px;

display:flex;

justify-content:center;

align-items:center;

position:relative;

overflow:hidden;

background:#111;

margin-bottom:25px;

}

.upload-preview video{

width:100%;

height:100%;

object-fit:contain;

display:none;

background:#000;

}

.upload-preview img{

width:100%;

height:100%;

object-fit:cover;

display:none;

}

.upload-empty{

text-align:center;

color:#999;

}

.upload-empty-icon{

font-size:70px;

margin-bottom:15px;

}

.upload-empty-title{

font-size:20px;

font-weight:bold;

color:#fff;

margin-bottom:8px;

}

.upload-empty-sub{

font-size:14px;

color:#999;

}
  .upload-form{

display:flex;

flex-direction:column;

gap:18px;

}

.upload-group{

display:flex;

flex-direction:column;

gap:8px;

}

.upload-label{

color:#fff;

font-size:15px;

font-weight:bold;

}

.upload-input{

width:100%;

background:#181818;

border:1px solid #2c2c2c;

border-radius:12px;

padding:14px;

color:#fff;

font-size:15px;

outline:none;

}

.upload-input:focus{

border-color:#fe2c55;

}

.upload-textarea{

width:100%;

height:120px;

resize:none;

background:#181818;

border:1px solid #2c2c2c;

border-radius:12px;

padding:14px;

color:#fff;

font-size:15px;

outline:none;

}

.upload-textarea:focus{

border-color:#fe2c55;

}

.upload-counter{

margin-top:6px;

text-align:right;

font-size:13px;

color:#888;

}

.upload-buttons{

display:grid;

grid-template-columns:1fr 1fr;

gap:12px;

margin-top:5px;

}

.upload-btn{

height:54px;

border-radius:14px;

background:#181818;

border:1px solid #333;

display:flex;

align-items:center;

justify-content:center;

gap:10px;

color:#fff;

font-size:15px;

font-weight:bold;

cursor:pointer;

transition:.25s;

}

.upload-btn:hover{

background:#232323;

border-color:#fe2c55;

}

.upload-btn svg{

width:22px;

height:22px;

fill:#fff;

}

.upload-file-name{

margin-top:8px;

font-size:13px;

color:#9e9e9e;

word-break:break-all;

}

input[type=file]{

display:none;

}
  .upload-options{

margin-top:25px;

background:#111;

border-radius:18px;

overflow:hidden;

border:1px solid #222;

}

.option-item{

display:flex;

align-items:center;

justify-content:space-between;

padding:18px;

border-bottom:1px solid #222;

}

.option-item:last-child{

border-bottom:none;

}

.option-left{

display:flex;

align-items:center;

gap:15px;

}

.option-icon{

width:42px;

height:42px;

border-radius:50%;

background:#222;

display:flex;

justify-content:center;

align-items:center;

font-size:20px;

color:#fff;

}

.option-text{

display:flex;

flex-direction:column;

}

.option-title{

color:#fff;

font-size:15px;

font-weight:bold;

}

.option-desc{

color:#888;

font-size:13px;

margin-top:4px;

}

.switch{

position:relative;

display:inline-block;

width:48px;

height:28px;

}

.switch input{

opacity:0;

width:0;

height:0;

}

.slider{

position:absolute;

top:0;

left:0;

right:0;

bottom:0;

background:#555;

border-radius:40px;

transition:.3s;

cursor:pointer;

}

.slider:before{

content:"";

position:absolute;

width:22px;

height:22px;

left:3px;

bottom:3px;

background:#fff;

border-radius:50%;

transition:.3s;

}

.switch input:checked + .slider{

background:#fe2c55;

}

.switch input:checked + .slider:before{

transform:translateX(20px);

}

.upload-progress{

display:none;

margin-top:25px;

}

.progress-text{

display:flex;

justify-content:space-between;

color:#fff;

font-size:14px;

margin-bottom:10px;

}

.progress-bar{

height:8px;

background:#222;

border-radius:50px;

overflow:hidden;

}

.progress-fill{

width:0%;

height:100%;

background:linear-gradient(90deg,#25F4EE,#FE2C55);

transition:.25s;

}
  /* ===========================
RESPONSIVE
=========================== */

@media(max-width:768px){

.upload-content{

padding:15px;

}

.upload-preview{

height:260px;

}

.upload-title{

font-size:18px;

}

.upload-post{

padding:9px 16px;

font-size:14px;

}

.upload-buttons{

grid-template-columns:1fr;

}

.option-item{

padding:15px;

}

.option-icon{

width:38px;

height:38px;

font-size:18px;

}

.upload-textarea{

height:100px;

}

}

@media(max-width:480px){

.upload-preview{

height:220px;

}

.upload-empty-icon{

font-size:55px;

}

.upload-empty-title{

font-size:18px;

}

.upload-empty-sub{

font-size:13px;

}

.upload-label{

font-size:14px;

}

.upload-btn{

height:50px;

font-size:14px;

}

.option-title{

font-size:14px;

}

.option-desc{

font-size:12px;

}

}

/* ===========================
SCROLLBAR
=========================== */

.upload-content::-webkit-scrollbar{

width:6px;

}

.upload-content::-webkit-scrollbar-thumb{

background:#333;

border-radius:20px;

}

.upload-content::-webkit-scrollbar-track{

background:transparent;

}

</style>

</head>

<body>

<div class="upload-popup">

<div class="upload-header">

<button
id="closeUpload"
class="upload-close">

✕

</button>

<div class="upload-title">

Đăng video

</div>

<button
id="postVideo"
class="upload-post">

Đăng

</button>

</div>

<div class="upload-content">
  <!-- ===========================
PREVIEW
=========================== -->

<div class="upload-preview">

    <video
        id="uploadPreviewVideo"
        playsinline
        webkit-playsinline
        controls>
    </video>

    <img
        id="uploadPreviewImage">

    <div
        id="uploadEmpty"
        class="upload-empty">

        <div class="upload-empty-icon">

            ⬆️

        </div>

        <div class="upload-empty-title">

            Chưa chọn video

        </div>

        <div class="upload-empty-sub">

            Nhấn bên dưới để chọn video

        </div>

    </div>

</div>

<!-- ===========================
THÔNG TIN VIDEO
=========================== -->

<div class="upload-form">

    <div class="upload-group">

        <div class="upload-label">

            Tiêu đề

        </div>

        <input
            id="uploadTitle"
            class="upload-input"
            maxlength="100"
            placeholder="Nhập tiêu đề video">

    </div>

    <div class="upload-group">

        <div class="upload-label">

            Mô tả

        </div>

        <textarea
            id="uploadCaption"
            class="upload-textarea"
            maxlength="500"
            placeholder="Viết mô tả..."></textarea>

        <div
            id="captionCounter"
            class="upload-counter">

            0 / 500

        </div>

    </div>

    <div class="upload-buttons">

        <label
            class="upload-btn"
            for="uploadVideoInput">

            🎥

            <span>

                Chọn video

            </span>

        </label>

        <input
            type="file"
            id="uploadVideoInput"
            accept="video/*">

        <label
            class="upload-btn"
            for="uploadImageInput">

            🖼️

            <span>

                Chọn ảnh bìa

            </span>

        </label>

        <input
            type="file"
            id="uploadImageInput"
            accept="image/*">

    </div>

    <div
        id="videoFileName"
        class="upload-file-name">

    </div>

    <div
        id="imageFileName"
        class="upload-file-name">

    </div>

</div>
  <!-- ===========================
TÙY CHỌN
=========================== -->

<div class="upload-options">

    <div class="option-item">

        <div class="option-left">

            <div class="option-icon">
                🌍
            </div>

            <div class="option-text">

                <div class="option-title">
                    Công khai
                </div>

                <div class="option-desc">
                    Mọi người đều có thể xem video
                </div>

            </div>

        </div>

    </div>

    <div class="option-item">

        <div class="option-left">

            <div class="option-icon">
                💬
            </div>

            <div class="option-text">

                <div class="option-title">
                    Cho phép bình luận
                </div>

                <div class="option-desc">
                    Người xem có thể bình luận
                </div>

            </div>

        </div>

        <label class="switch">

            <input
                type="checkbox"
                id="allowComment"
                checked>

            <span class="slider"></span>

        </label>

    </div>

</div>

<!-- ===========================
UPLOAD
=========================== -->

<div
    id="uploadProgress"
    class="upload-progress">

    <div class="progress-text">

        <span>
            Đang tải lên...
        </span>

        <span id="uploadPercent">
            0%
        </span>

    </div>

    <div class="progress-bar">

        <div
            id="uploadProgressFill"
            class="progress-fill">
        </div>

    </div>

</div>

</div>

</div>

</body>

</html>

</div>

</div>
