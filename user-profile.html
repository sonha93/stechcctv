<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thông tin cá nhân - Stech</title>

<style>

/* =========================
   RESET
========================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f7fb;
    color:#111;
    overflow-x:hidden;
}

/* =========================
   HEADER
========================= */
header{
    position:sticky;
    top:0;
    z-index:999;
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
    background:#33A0AB;
    box-shadow:0 2px 10px rgba(0,0,0,.12);
}

.menu-btn,
.icon-btn{
    width:42px;
    height:42px;
    border:none;
    border-radius:12px;
    background:#0f8d98;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-size:18px;
    text-decoration:none;
    position:relative;
    transition:.2s;
}

.menu-btn:hover,
.icon-btn:hover{
    transform:scale(.96);
}

.logo{
    width:42px;
    height:42px;
    border-radius:12px;
    overflow:hidden;
    background:#fff;
    flex-shrink:0;
}

.logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.search-box{
    flex:1;
}

.search-box input{
    width:100%;
    height:40px;
    border:none;
    outline:none;
    border-radius:12px;
    padding:0 14px;
    font-size:14px;
}

.cart-count{
    position:absolute;
    top:-5px;
    right:-5px;
    min-width:18px;
    height:18px;
    border-radius:50%;
    background:red;
    color:#fff;
    font-size:11px;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* =========================
   SIDEBAR
========================= */
.sidebar{
    position:fixed;
    top:0;
    left:-270px;
    width:250px;
    height:100vh;
    background:#fff;
    z-index:9999;
    transition:.3s;
    padding:20px;
    box-shadow:0 0 20px rgba(0,0,0,.2);
}

.sidebar.active{
    left:0;
}

.sidebar h3{
    margin-bottom:20px;
    color:#00acc1;
}

.sidebar a{
    display:block;
    text-decoration:none;
    color:#111;
    background:#f5f5f5;
    padding:14px;
    border-radius:12px;
    margin-bottom:10px;
    font-weight:bold;
    transition:.2s;
}

.sidebar a:hover{
    background:#dff7fa;
}

#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.4);
    opacity:0;
    visibility:hidden;
    transition:.3s;
    z-index:9998;
}

#overlay.active{
    opacity:1;
    visibility:visible;
}

/* =========================
   CONTAINER
========================= */
.container{
    max-width:650px;
    margin:25px auto;
    background:#fff;
    border-radius:18px;
    padding:25px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.title{
    text-align:center;
    margin-bottom:25px;
    font-size:28px;
    color:#0f8d98;
}

/* =========================
   AVATAR
========================= */
.avatar-container{
    position:relative;
    width:140px;
    height:140px;
    margin:0 auto 20px;
}

.avatar-container img{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #00acc1;
}

.camera-btn{
    position:absolute;
    bottom:5px;
    right:5px;
    width:38px;
    height:38px;
    border-radius:50%;
    background:#00acc1;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    border:3px solid #fff;
    font-size:18px;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
}

/* =========================
   INFO
========================= */
.info-box{
    background:#f7fbff;
    border-radius:14px;
    padding:18px;
    margin-bottom:20px;
}

.info-top{
    margin-bottom:15px;
    line-height:1.8;
}

label{
    display:block;
    margin-top:12px;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    height:45px;
    border:1px solid #cfe9ee;
    border-radius:12px;
    padding:0 14px;
    outline:none;
    font-size:15px;
}

input:focus{
    border-color:#00acc1;
}

button{
    width:100%;
    height:46px;
    border:none;
    border-radius:12px;
    background:#00acc1;
    color:#fff;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
    margin-top:14px;
}

button:hover{
    background:#0b8d9b;
}

.current-info{
    margin-top:20px;
    background:#eefcff;
    border-radius:14px;
    padding:18px;
    line-height:2;
}

/* =========================
   PASSWORD
========================= */
.password-section{
    margin-top:25px;
}

/* =========================
   ORDERS
========================= */
.orders{
    margin-top:25px;
    background:#fafafa;
    border-radius:14px;
    padding:18px;
    display:none;
}

.order-item{
    padding:12px 0;
    border-bottom:1px solid #eee;
    line-height:1.8;
}

.order-item:last-child{
    border:none;
}

/* =========================
   MESSAGE
========================= */
.message{
    margin-top:18px;
    padding:12px;
    border-radius:12px;
    font-weight:bold;
    display:none;
}

.message.success{
    display:block;
    background:#e8fff0;
    color:green;
}

.message.error{
    display:block;
    background:#ffeaea;
    color:red;
}

/* =========================
   MOBILE
========================= */
@media(max-width:768px){

    .container{
        margin:14px;
        padding:18px;
    }

    .title{
        font-size:22px;
    }

    .avatar-container{
        width:120px;
        height:120px;
    }

    .camera-btn{
        width:34px;
        height:34px;
        font-size:16px;
    }

    header{
        gap:6px;
        padding:8px;
    }

    .menu-btn,
    .icon-btn{
        width:36px;
        height:36px;
        font-size:15px;
    }

    .logo{
        width:36px;
        height:36px;
    }

    .search-box input{
        height:36px;
        font-size:13px;
    }
}

</style>
</head>

<body>

<!-- OVERLAY -->
<div id="overlay"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

    <h3>MENU</h3>

    <a href="index.html">
        🏠 Trang chủ
    </a>

    <a href="#" id="orderHistoryBtn">
        📦 Lịch sử đơn hàng
    </a>

</div>

<!-- HEADER -->
<header>

    <div class="menu-btn" id="menuBtn">
        ☰
    </div>

    <div class="logo">
        <img src="https://i.ibb.co/Z1kv9nJj/logo.png">
    </div>

    <div class="search-box">
        <input type="text" placeholder="Tìm kiếm sản phẩm...">
    </div>

    <a href="#" class="icon-btn" id="logoutBtn">
        ↩
    </a>

    <a href="cart.html" class="icon-btn">
        🛒
        <span class="cart-count" id="cartCount">
            0
        </span>
    </a>

</header>

<!-- CONTAINER -->
<div class="container">

    <h1 class="title">
        Thông Tin Cá Nhân
    </h1>

    <!-- AVATAR -->
    <div class="avatar-container">

        <img
        id="avatarImg"
        src="https://i.ibb.co/Z1kv9nJj/logo.png">

        <div class="camera-btn" id="avatarBtn">
            📷
        </div>

    </div>

    <input
    type="file"
    id="avatarUpload"
    accept="image/*"
    hidden>

    <!-- INFO -->
    <div class="info-box">

        <div class="info-top">

            <p>
                Email:
                <b id="userEmail"></b>
            </p>

            <p>
                Ngày đăng ký:
                <span id="userCreatedAt"></span>
            </p>

        </div>

        <label>Họ và tên</label>
        <input type="text" id="name">

        <label>Địa chỉ</label>
        <input type="text" id="address">

        <label>Ngày sinh</label>
        <input type="date" id="birthday">

        <label>Số điện thoại</label>
        <input
        type="text"
        id="phone"
        placeholder="VD: 0912345678">

        <button id="updateInfoBtn">
            Cập nhật thông tin
        </button>

    </div>

    <!-- CURRENT INFO -->
    <div class="current-info">

        <h3>Thông tin hiện tại</h3>

        <p>
            Họ tên:
            <span id="currentName"></span>
        </p>

        <p>
            Địa chỉ:
            <span id="currentAddress"></span>
        </p>

        <p>
            Ngày sinh:
            <span id="currentBirthday"></span>
        </p>

        <p>
            Số điện thoại:
            <span id="currentPhone"></span>
        </p>

    </div>

    <!-- PASSWORD -->
    <div class="password-section">

        <h3>Đổi mật khẩu</h3>

        <input
        type="password"
        id="newPassword"
        placeholder="Nhập mật khẩu mới">

        <button id="changePasswordBtn">
            Đổi mật khẩu
        </button>

    </div>

    <!-- ORDERS -->
    <div class="orders" id="ordersContainer">

        <h3>Lịch sử đơn hàng</h3>

        <div id="ordersList"></div>

    </div>

    <!-- MESSAGE -->
    <div id="messageBox" class="message"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

/* =========================
   FIREBASE
========================= */
const firebaseConfig = {
    apiKey:"AIzaSyDYVcBEYJN1HUCta3XdJAUBe4TGLnmy7y4",
    authDomain:"stech-73b89.firebaseapp.com",
    databaseURL:"https://stech-73b89-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:"stech-73b89",
    storageBucket:"stech-73b89.appspot.com",
    messagingSenderId:"873739162979",
    appId:"1:873739162979:web:978f1a4043f025b1cdaf56"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

/* =========================
   ELEMENTS
========================= */
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

const avatarBtn = document.getElementById("avatarBtn");
const avatarUpload = document.getElementById("avatarUpload");
const avatarImg = document.getElementById("avatarImg");

const userEmail = document.getElementById("userEmail");
const userCreatedAt = document.getElementById("userCreatedAt");

const nameInput = document.getElementById("name");
const addressInput = document.getElementById("address");
const birthdayInput = document.getElementById("birthday");
const phoneInput = document.getElementById("phone");

const currentName = document.getElementById("currentName");
const currentAddress = document.getElementById("currentAddress");
const currentBirthday = document.getElementById("currentBirthday");
const currentPhone = document.getElementById("currentPhone");

const updateInfoBtn = document.getElementById("updateInfoBtn");

const changePasswordBtn = document.getElementById("changePasswordBtn");
const newPassword = document.getElementById("newPassword");

const logoutBtn = document.getElementById("logoutBtn");

const cartCount = document.getElementById("cartCount");

const ordersContainer = document.getElementById("ordersContainer");
const ordersList = document.getElementById("ordersList");
const orderHistoryBtn = document.getElementById("orderHistoryBtn");

const messageBox = document.getElementById("messageBox");

/* =========================
   MESSAGE
========================= */
function showMessage(text,type="success"){

    messageBox.innerText = text;
    messageBox.className = `message ${type}`;

    setTimeout(()=>{
        messageBox.className = "message";
    },3000);
}

/* =========================
   MENU
========================= */
function toggleMenu(){

    sidebar.classList.toggle("active");
    overlay.classList.toggle("active");
}

document.getElementById("menuBtn")
.addEventListener("click",toggleMenu);

overlay.addEventListener("click",toggleMenu);

/* =========================
   USER
========================= */
let currentUser = null;

auth.onAuthStateChanged(async user=>{

    if(!user){

        window.location.href = "index.html";
        return;
    }

    currentUser = user;

    userEmail.innerText = user.email || "";
    userCreatedAt.innerText =
    new Date(
        user.metadata.creationTime
    ).toLocaleDateString("vi-VN");

    loadUserData();
    loadCartCount();
});

/* =========================
   LOAD USER
========================= */
async function loadUserData(){

    const snapshot =
    await db.ref(
        "users/" + currentUser.uid
    ).once("value");

    if(!snapshot.exists()) return;

    const data = snapshot.val();

    nameInput.value = data.name || "";
    addressInput.value = data.address || "";
    birthdayInput.value = data.birthday || "";
    phoneInput.value = data.phone || "";

    avatarImg.src =
    data.avatar ||
    "https://i.ibb.co/Z1kv9nJj/logo.png";

    currentName.innerText =
    data.name || "Chưa cập nhật";

    currentAddress.innerText =
    data.address || "Chưa cập nhật";

    currentBirthday.innerText =
    data.birthday || "Chưa cập nhật";

    currentPhone.innerText =
    data.phone || "Chưa cập nhật";
}

/* =========================
   UPDATE INFO
========================= */
updateInfoBtn.addEventListener(
"click",
async ()=>{

    if(!currentUser) return;

    try{

        const data = {

            name:nameInput.value.trim(),
            address:addressInput.value.trim(),
            birthday:birthdayInput.value,
            phone:phoneInput.value.trim()
        };

        await db.ref(
            "users/" + currentUser.uid
        ).update(data);

        loadUserData();

        showMessage(
            "Cập nhật thành công!"
        );

    }catch(err){

        showMessage(
            err.message,
            "error"
        );
    }
});

/* =========================
   CHANGE PASSWORD
========================= */
changePasswordBtn.addEventListener(
"click",
async ()=>{

    const pass =
    newPassword.value.trim();

    if(pass.length < 6){

        showMessage(
            "Mật khẩu tối thiểu 6 ký tự",
            "error"
        );

        return;
    }

    try{

        await currentUser.updatePassword(pass);

        newPassword.value = "";

        showMessage(
            "Đổi mật khẩu thành công!"
        );

    }catch(err){

        showMessage(
            err.message,
            "error"
        );
    }
});

/* =========================
   AVATAR
========================= */
avatarBtn.addEventListener(
"click",
()=> avatarUpload.click()
);

avatarUpload.addEventListener(
"change",
async e=>{

    const file = e.target.files[0];

    if(!file) return;

    try{

        const formData = new FormData();

        formData.append("file",file);

        formData.append(
            "upload_preset",
            "stech_upload"
        );

        const res = await fetch(
            "https://api.cloudinary.com/v1_1/dmz9gpp1b/image/upload",
            {
                method:"POST",
                body:formData
            }
        );

        const data = await res.json();

        if(data.secure_url){

            avatarImg.src =
            data.secure_url;

            await db.ref(
                "users/" + currentUser.uid
            ).update({
                avatar:data.secure_url
            });

            showMessage(
                "Upload avatar thành công!"
            );
        }

    }catch(err){

        showMessage(
            "Upload thất bại!",
            "error"
        );
    }
});

/* =========================
   LOGOUT
========================= */
logoutBtn.addEventListener(
"click",
async e=>{

    e.preventDefault();

    await auth.signOut();

    window.location.href =
    "index.html";
});

/* =========================
   CART COUNT
========================= */
function loadCartCount(){

    db.ref(
        "carts/" + currentUser.uid
    ).on("value",snapshot=>{

        let total = 0;

        snapshot.forEach(item=>{

            total +=
            parseInt(
                item.val().quantity
            ) || 1;
        });

        cartCount.innerText = total;
    });
}

/* =========================
   ORDERS
========================= */
orderHistoryBtn.addEventListener(
"click",
()=>{

    ordersContainer.style.display =
    "block";

    ordersList.innerHTML =
    "Đang tải...";

    db.ref(
        "orders/" + currentUser.uid
    ).once("value")

    .then(snapshot=>{

        ordersList.innerHTML = "";

        if(!snapshot.exists()){

            ordersList.innerHTML =
            "<p>Chưa có đơn hàng nào.</p>";

            return;
        }

        snapshot.forEach(order=>{

            const data = order.val();

            const productNames =
            data.items
            ? data.items
                .map(i=>i.name)
                .join(", ")
            : "Không có sản phẩm";

            const div =
            document.createElement("div");

            div.className =
            "order-item";

            div.innerHTML = `
                <strong>
                    Mã đơn:
                    ${order.key}
                </strong>

                <br>

                Trạng thái:
                ${data.status || "Đang xử lý"}

                <br>

                Sản phẩm:
                ${productNames}
            `;

            ordersList.appendChild(div);
        });
    });
});

</script>

</body>
</html>
