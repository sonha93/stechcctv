<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thông tin cá nhân - Stech</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 20px; }

.container {
  background: #fff;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  width: 95%;
  max-width: 500px;
}

h2 { text-align: center; margin-bottom: 20px; font-size: 1.6rem; color: #222; }

.profile {
  display: flex;
  gap: 20px;
  align-items: flex-start;
}

.avatar-container {
  width: 130px;
  height: 130px;
  border: 3px solid #4CAF50;
  border-radius: 50%;
  overflow: hidden;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.avatar-container img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  transition: transform 0.3s;
}

.avatar-container img:hover {
  transform: scale(1.05);
}

.info-fields { flex:1; display: flex; flex-direction: column; gap: 10px; }
.info-fields p { font-size: 0.95rem; color: #555; }
.info-fields input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 0.95rem; }

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #007BFF;
  color: white;
  font-size: 1rem;
  cursor: pointer;
  margin-top: 8px;
}

button:hover { background: #0056b3; }

@media(max-width:450px){
  .profile{ flex-direction: column; align-items: center; }
  .info-fields { width: 100%; }
}
</style>
</head>
<body>

<div class="container">
  <h2>Thông tin cá nhân</h2>
  <div class="profile">
    <div class="avatar-container">
      <img id="avatarImg" src="https://sf-static.upanhlaylink.com/img/image_20260509a7d8481abffe51016824fa5c6c433dd5.jpg" alt="Avatar">
      <input type="file" id="avatarInput" accept="image/*" style="display:none">
    </div>
    <div class="info-fields">
      <p>Email: <b id="userEmail"></b></p>
      <p>Ngày tạo: <span id="userCreatedAt"></span></p>
      <input type="text" id="name" placeholder="Họ và tên">
      <input type="text" id="phone" placeholder="Số điện thoại">
      <input type="text" id="address" placeholder="Địa chỉ">
      <input type="date" id="birthday" placeholder="Ngày sinh">
      <button id="updateInfoBtn" disabled>Cập nhật thông tin</button>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyDYVcBEYJN1HUCta3XdJAUBe4TGLnmy7y4",
  authDomain:"stech-73b89.firebaseapp.com",
  databaseURL:"https://stech-73b89-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"stech-73b89",
  storageBucket:"stech-73b89.appspot.com",
  messagingSenderId:"873739162979",
  appId:"1:873739162979:web:978f1a4043f025b1cdaf56"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
const storage = firebase.storage();

const avatarImg = document.getElementById("avatarImg");
const avatarInput = document.getElementById("avatarInput");
const userEmail = document.getElementById("userEmail");
const userCreatedAt = document.getElementById("userCreatedAt");
const nameInput = document.getElementById("name");
const phoneInput = document.getElementById("phone");
const addressInput = document.getElementById("address");
const birthdayInput = document.getElementById("birthday");
const updateInfoBtn = document.getElementById("updateInfoBtn");

let currentUser = null;

auth.onAuthStateChanged(user => {
  if(!user){ window.location.href="index.html"; return; }
  currentUser = user;
  updateInfoBtn.disabled = false;
  userEmail.innerText = user.email;

  db.ref('users/'+user.uid).once('value').then(snapshot=>{
    if(snapshot.exists()){
      const data = snapshot.val();
      nameInput.value = data.name || "";
      phoneInput.value = data.phone || "";
      addressInput.value = data.address || "";
      birthdayInput.value = data.birthday || "";
      avatarImg.src = data.avatar || "https://sf-static.upanhlaylink.com/img/image_20260509a7d8481abffe51016824fa5c6c433dd5.jpg";

      const createdDate = data.createdAt ? new Date(data.createdAt).toLocaleDateString() 
                                          : new Date(currentUser.metadata.creationTime).toLocaleDateString();
      userCreatedAt.innerText = createdDate;
    }
  }).catch(err=>{ console.error("Không thể load dữ liệu: "+err.message); });
});

// Avatar upload
avatarImg.addEventListener('click', ()=> avatarInput.click());
avatarInput.addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  if(!file || !currentUser) return;
  try {
    const storageRef = storage.ref('avatars/' + currentUser.uid + '.jpg');
    await storageRef.put(file);
    const url = await storageRef.getDownloadURL();
    await db.ref('users/' + currentUser.uid).update({ avatar: url });
    avatarImg.src = url + '?t=' + new Date().getTime();
  } catch(err){
    console.error("Lỗi upload avatar: " + err.message);
  }
});
</script>

</body>
</html>
