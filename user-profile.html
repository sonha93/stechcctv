<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thông tin cá nhân - Stech</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial, sans-serif; background:#f5f5f5; display:flex; justify-content:center; padding:20px; }

.container {
  background:#fff; padding:20px; border-radius:12px; box-shadow:0 5px 20px rgba(0,0,0,0.1);
  width:95%; max-width:450px; text-align:center;
}

/* Logo */
.logo-container img { height:50px; margin-bottom:15px; object-fit:contain; }

/* Header */
h2 { margin-bottom:20px; font-size:1.5rem; color:#333; }

/* Profile */
.profile { display:flex; flex-direction:column; align-items:center; gap:15px; }
.avatar-container { position:relative; width:120px; height:120px; cursor:pointer; }
.avatar-container img { width:120px; height:120px; border-radius:50%; object-fit:cover; border:2px solid #007BFF; transition:0.3s; }
.avatar-container img:hover { transform:scale(1.05); }

/* Info fields */
.info-fields { width:100%; margin-top:10px; text-align:left; }
.info-fields p { margin:8px 0 4px; font-size:0.9rem; color:#555; }
.info-fields input { width:100%; padding:10px; margin-bottom:12px; border-radius:8px; border:1px solid #ccc; font-size:0.95rem; }

/* Buttons */
button { width:100%; padding:12px; border:none; border-radius:8px; background:#007BFF; color:white; font-size:1rem; cursor:pointer; margin-top:8px; transition:0.3s; }
button:hover { background:#0056b3; }

/* Updated info */
.updated-info { margin-top:20px; background:#e7f3ff; padding:12px; border-radius:8px; text-align:left; }
.updated-info h3 { font-size:1rem; margin-bottom:8px; }
.updated-info p { margin:4px 0; font-size:0.9rem; }

/* Change password */
.change-pass { margin-top:20px; padding:12px; background:#fff3e7; border-radius:8px; border:1px solid #ffae42; text-align:left; }
.change-pass h3 { margin-bottom:8px; font-size:1rem; }
.change-pass input { width:100%; margin-bottom:8px; padding:10px; border-radius:6px; border:1px solid #ccc; font-size:0.95rem; }

/* Messages */
#message { color:green; margin-top:10px; font-size:0.9rem; }
#error { color:red; margin-top:10px; font-size:0.9rem; }

/* Actions */
.actions { display:flex; flex-direction:column; gap:10px; margin-top:15px; }
@media (min-width:450px){ 
  .profile{ flex-direction: row; align-items:flex-start; } 
  .avatar-container img{ width:140px; height:140px; }
  .actions{ flex-direction: row; }
  .actions button{ flex:1; }
}
</style>
</head>
<body>

<div class="container">

  <!-- Logo -->
  <div class="logo-container">
    <img src="https://sf-static.upanhlaylink.com/img/stech-logo.png" alt="Stech Logo">
  </div>

  <h2>Thông tin cá nhân</h2>

  <div class="profile">
    <div class="avatar-container">
      <img id="avatarImg" src="https://via.placeholder.com/130" alt="Avatar">
      <input type="file" id="avatarInput" accept="image/*" style="display:none">
    </div>
    <div class="info-fields">
      <p>Email: <span id="userEmail"></span></p>
      <p>Ngày tạo: <span id="userCreatedAt"></span></p>
      <input type="text" id="name" placeholder="Họ và tên">
      <input type="text" id="phone" placeholder="Số điện thoại">
      <input type="text" id="address" placeholder="Địa chỉ">
      <input type="date" id="birthday" placeholder="Ngày sinh">
      <button id="updateInfoBtn" disabled>Cập nhật thông tin</button>
    </div>
  </div>

  <div class="updated-info">
    <h3>Thông tin hiện tại:</h3>
    <p>Họ và tên: <span id="currentName"></span></p>
    <p>Số điện thoại: <span id="currentPhone"></span></p>
    <p>Địa chỉ: <span id="currentAddress"></span></p>
    <p>Ngày sinh: <span id="currentBirthday"></span></p>
    <p>Ngày tạo tài khoản: <span id="currentCreatedAt"></span></p>
  </div>

  <div class="change-pass">
    <h3>Đổi mật khẩu</h3>
    <input type="password" id="newPassword" placeholder="Mật khẩu mới">
    <button id="changePasswordBtn">Đổi mật khẩu</button>
  </div>

  <div class="actions">
    <button id="logoutBtn">Đăng xuất</button>
    <button id="homeBtn">Trang chủ</button>
  </div>

  <div id="message"></div>
  <div id="error"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyDYVcBEYJN1HUCta3XdJAUBe4TGLnmy7y4",
  authDomain:"stech-73b89.firebaseapp.com",
  databaseURL:"https://stech-73b89-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"stech-73b89",
  storageBucket:"stech-73b89.appspot.com",
  messagingSenderId:"873739162979",
  appId:"1:873739162979:web:978f1a4043f025b1cdaf56"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
const storage = firebase.storage();

const avatarImg = document.getElementById("avatarImg");
const avatarInput = document.getElementById("avatarInput");
const userEmail = document.getElementById("userEmail");
const userCreatedAt = document.getElementById("userCreatedAt");
const currentCreatedAt = document.getElementById("currentCreatedAt");
const nameInput = document.getElementById("name");
const phoneInput = document.getElementById("phone");
const addressInput = document.getElementById("address");
const birthdayInput = document.getElementById("birthday");
const currentName = document.getElementById("currentName");
const currentPhone = document.getElementById("currentPhone");
const currentAddress = document.getElementById("currentAddress");
const currentBirthday = document.getElementById("currentBirthday");
const newPasswordInput = document.getElementById("newPassword");
const messageEl = document.getElementById("message");
const errorEl = document.getElementById("error");
const updateInfoBtn = document.getElementById("updateInfoBtn");
const changePasswordBtn = document.getElementById("changePasswordBtn");
const logoutBtn = document.getElementById("logoutBtn");
const homeBtn = document.getElementById("homeBtn");

let currentUser = null;

// LOAD USER
auth.onAuthStateChanged(user=>{
  if(!user){ window.location.href="index.html"; return; }
  currentUser = user;
  updateInfoBtn.disabled = false;
  userEmail.innerText = user.email;
  db.ref('users/'+user.uid).once('value').then(snapshot=>{
    if(snapshot.exists()){
      const data = snapshot.val();
      nameInput.value=data.name||"";
      phoneInput.value=data.phone||"";
      addressInput.value=data.address||"";
      birthdayInput.value=data.birthday||"";
      avatarImg.src = data.avatar || "https://via.placeholder.com/130";
      const createdDate = data.createdAt ? new Date(data.createdAt).toLocaleDateString() : new Date(currentUser.metadata.creationTime).toLocaleDateString();
      userCreatedAt.innerText = createdDate;
      currentCreatedAt.innerText = createdDate;
      currentName.innerText=data.name||"";
      currentPhone.innerText=data.phone||"";
      currentAddress.innerText=data.address||"";
      currentBirthday.innerText=data.birthday||"";
    }
  }).catch(err=>{ errorEl.innerText="Không thể load dữ liệu: "+err.message; });
});

// AVATAR CLICK + UPLOAD
avatarImg.addEventListener('click',()=>avatarInput.click());
avatarInput.addEventListener('change', async e=>{
  const file = e.target.files[0];
  if(!file || !currentUser) return;
  const avatarRef = storage.ref('avatars/'+currentUser.uid+'.jpg');
  await avatarRef.put(file);
  const url = await avatarRef.getDownloadURL();
  await db.ref('users/'+currentUser.uid).update({ avatar:url });
  avatarImg.src=url+'?t='+new Date().getTime();
  messageEl.innerText="Cập nhật avatar thành công!";
});

// UPDATE INFO
updateInfoBtn.addEventListener('click', async ()=>{
  messageEl.innerText=""; errorEl.innerText="";
  if(!currentUser){ errorEl.innerText="User chưa load xong!"; return; }
  const name=nameInput.value.trim(), phone=phoneInput.value.trim(), address=addressInput.value.trim(), birthday=birthdayInput.value;
  if(!name || !phone){ errorEl.innerText="Vui lòng nhập đầy đủ thông tin!"; return; }
  await db.ref('users/'+currentUser.uid).update({name,phone,address,birthday});
  messageEl.innerText="Cập nhật thông tin thành công!";
  currentName.innerText=name; currentPhone.innerText=phone; currentAddress.innerText=address; currentBirthday.innerText=birthday;
});

// CHANGE PASSWORD
changePasswordBtn.addEventListener('click', async ()=>{
  messageEl.innerText=""; errorEl.innerText="";
  const newPass=newPasswordInput.value.trim();
  if(newPass.length<6){ errorEl.innerText="Mật khẩu ≥6 ký tự"; return; }
  try{
    await currentUser.updatePassword(newPass);
    messageEl.innerText="Đổi mật khẩu thành công!"; newPasswordInput.value="";
  }catch(err){
    if(err.code==="auth/requires-recent-login"){
      const oldPass=prompt("Nhập mật khẩu cũ để xác thực:");
      if(!oldPass) return;
      const credential = firebase.auth.EmailAuthProvider.credential(currentUser.email, oldPass);
      try{
        await currentUser.reauthenticateWithCredential(credential);
        await currentUser.updatePassword(newPass);
        messageEl.innerText="Đổi mật khẩu thành công!"; newPasswordInput.value="";
      }catch(e){ errorEl.innerText=e.message; }
    } else errorEl.innerText=err.message;
  }
});

// LOGOUT & HOME
logoutBtn.addEventListener('click', ()=>auth.signOut().then(()=>window.location.href="index.html"));
homeBtn.addEventListener('click', ()=>window.location.href="index.html");
</script>
</body>
</html>
