<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thông tin cá nhân - Stech</title>
<style>
/* =========================
   GLOBAL RESET
========================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #f5f5f5;
    color: #111;
    overflow-x: hidden;
}

/* =========================
   HEADER & NAVBAR
========================= */
header {
    display: flex !important;
    justify-content: space-between !important; /* logo trái, icons phải */
    align-items: center !important;
    padding: 6px 8px !important;
    gap: 6px !important;
}

/* Menu button */
.menu-btn {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: #00acc1;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
}

/* Logo */
.logo {
    width: 36px !important;
    height: 36px !important;
    flex-shrink: 0 !important; /* giữ kích thước */
}

.logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Search box */
.search-box {
    flex: 1 !important;
    min-width: 0 !important; /* cho phép co nhỏ */
    margin-left: 8px !important; /* khoảng cách nhỏ */
}

.search-box input {
    height: 32px !important;
    font-size: 13px !important;
    padding: 0 8px !important;
}

.search-box input {
    width: 100%;
    height: 36px;
    border-radius: 12px;
    border: none;
    padding: 0 10px;
    font-size: 14px;
}

/* Header icons: cart + other buttons */
.header-icons {
    display: flex !important;
    gap: 5px !important;
    margin-left: 0 !important; /* bỏ margin-left auto */
}

.icon-btn {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: #00acc1;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    text-decoration: none;
    position: relative;
    cursor: pointer;
}

/* Cart count badge */
.cart-count {
    position: absolute;
    top: -2px;
    right: -2px;
    min-width: 16px;
    height: 16px;
    border-radius: 50%;
    background: red;
    color: white;
    font-size: 10px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* =========================
   SIDEBAR
========================= */
.sidebar {
    position: fixed;
    top: 0;
    left: -260px;
    width: 240px;
    height: 100vh;
    background: #fff;
    z-index: 9999;
    transition: .3s;
    padding: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,.15);
}

.sidebar.active {
    left: 0;
}

.sidebar h3 {
    margin-bottom: 20px;
    color: #00acc1;
}

.sidebar a {
    display: block;
    padding: 14px;
    margin-bottom: 10px;
    border-radius: 12px;
    background: #f5f5f5;
    text-decoration: none;
    color: #111;
    font-weight: bold;
}

/* Overlay for sidebar */
#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 9998;
    opacity: 0;
    visibility: hidden;
    transition: .3s;
}

#overlay.active {
    opacity: 1;
    visibility: visible;
}

/* =========================
   CONTAINER & FORM
========================= */
.container {
    background: #fff;
    padding: 25px;
    border-radius: 12px;
    max-width: 600px;
    margin: 20px auto;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* Avatar */
.avatar-container {
    width: 130px;
    height: 130px;
    margin: 0 auto 15px;
    border: 3px solid #4CAF50;
    border-radius: 50%;
    overflow: hidden;
}

.avatar-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
}

/* Info fields */
.info-fields label {
    font-weight: bold;
    margin-top: 10px;
    display: block;
    color: #333;
}

.info-fields input {
    width: 100%;
    padding: 10px;
    margin-top: 4px;
    margin-bottom: 8px;
    border-radius: 8px;
    border: 1px solid #b3e5fc;
    font-size: 0.95rem;
}

/* Buttons */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #007BFF;
    color: white;
    font-size: 1rem;
    cursor: pointer;
    margin-top: 8px;
}

button:hover {
    background: #0056b3;
}

/* Updated info box */
.updated-info {
    margin-top: 20px;
    background: #e7f3ff;
    padding: 15px;
    border-radius: 12px;
}

.updated-info p {
    margin: 0;
    padding: 6px 0;
}

/* Password section */
.password-section {
    margin-top: 20px;
    text-align: center;
}

/* Action buttons */
.actions {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

.actions button {
    flex: 1;
}

/* =========================
   ORDERS
========================= */
.orders {
    margin-top: 20px;
    background: #fff;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.order-item {
    border-bottom: 1px solid #eee;
    padding: 8px 0;
}

.order-item:last-child {
    border-bottom: none;
}

/* =========================
   ANIMATIONS
========================= */
.fade {
    opacity: 0;
    transition: opacity 0.5s;
}

.fade.show {
    opacity: 1;
}@media (max-width: 768px) {

    /* Header co gọn, logo trái, icons phải */
    header {
        display: flex;
        justify-content: space-between; /* logo trái, icons phải */
        align-items: center;
        padding: 6px 8px;
        gap: 6px;
    }

    /* Logo nhỏ hơn */
    .logo {
        width: 36px;
        height: 36px;
        flex-shrink: 0; /* không bị co */
    }

    .logo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* Search box nhỏ gọn */
    .search-box {
        flex: 1;
        min-width: 0; /* cho phép co nhỏ */
        margin-left: 8px;
    }

    .search-box input {
        height: 32px;
        font-size: 13px;
        padding: 0 8px;
    }

    /* Header icons: cart + nút cạnh */
    .header-icons {
        display: flex;
        gap: 5px;
        margin-left: 0; /* bỏ margin-left auto */
    }

    /* Icon buttons */
   .icon-btn {
    width: 32px !important;
    height: 32px !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    font-size: 14px !important;
    line-height: 1 !important;
}

.menu-btn {
    width: 36px !important;
    height: 36px !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    font-size: 18px !important;
}

.cart-count {
    min-width: 16px !important;
    height: 16px !important;
    font-size: 10px !important;
    top: -2px !important;
    right: -2px !important;
}

.menu-btn {
    width: 36px !important;
    height: 36px !important;
    font-size: 18px !important;
}
}
</style>
</head>
<body>
<div id="overlay" onclick="toggleMenu()"></div>
<div class="sidebar" id="sidebar">
<h3>Menu</h3>
<a href="index.html">Trang Chủ</a>
<a href="#" id="orderHistoryBtn">Lịch sử đơn hàng</a>
</div>

<header>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
<div class="logo"><img src="https://i.ibb.co/Z1kv9nJj/logo.png" alt="logo"></div>
<div class="search-box"><input type="text" placeholder="Tìm kiếm sản phẩm..."></div>
<div class="header-icons">
<a href="#" class="icon-btn" id="logoutArrow">⏻</a>
<a href="cart.html" class="icon-btn">🛒<span class="cart-count" id="cartCount">0</span></a>
</div>
</header>

<div class="container">
<h2>Thông tin cá nhân</h2>
<div class="avatar-container">
<img id="avatarImg" src="https://i.ibb.co/Z1kv9nJj/logo.png" alt="avatar">
</div>

<div class="info-fields">
<p>Email: <b id="userEmail"></b></p>
<p>Ngày đăng ký: <span id="userCreatedAt"></span></p>
<label for="name">Họ và tên:</label><input type="text" id="name">
<label for="address">Địa chỉ:</label><input type="text" id="address">
<label for="birthday">Ngày sinh:</label><input type="date" id="birthday">
<label for="phone">Số điện thoại:</label><input type="text" id="phone" placeholder="VD: 0912345678">
<button id="updateInfoBtn" disabled>Cập nhật thông tin</button>
</div>

<div class="updated-info">
<h3>Thông tin hiện tại:</h3>
<p>Họ và tên: <span id="currentName"></span></p>
<p>Địa chỉ: <span id="currentAddress"></span></p>
<p>Ngày sinh: <span id="currentBirthday"></span></p>
<p>Số điện thoại: <span id="currentPhone"></span></p>
</div>

<div class="password-section">
<h2>Đổi mật khẩu</h2>
<input type="password" id="newPassword" placeholder="Mật khẩu mới">
<div class="actions">
<button id="changePasswordBtn">Đổi mật khẩu</button>
</div>
</div>

<div class="orders" id="ordersContainer" style="display:none;">
<h3>Lịch sử đơn hàng</h3>
<div id="ordersList"></div>
</div>

<div id="message" class="fade"></div>
<div id="error" class="fade"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
apiKey:"AIzaSyDYVcBEYJN1HUCta3XdJAUBe4TGLnmy7y4",
authDomain:"stech-73b89.firebaseapp.com",
databaseURL:"https://stech-73b89-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"stech-73b89",
storageBucket:"stech-73b89.appspot.com",
messagingSenderId:"873739162979",
appId:"1:873739162979:web:978f1a4043f025b1cdaf56"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

const userEmail = document.getElementById("userEmail");
const userCreatedAt = document.getElementById("userCreatedAt");
const nameInput = document.getElementById("name");
const phoneInput = document.getElementById("phone");
const addressInput = document.getElementById("address");
const birthdayInput = document.getElementById("birthday");
const currentName = document.getElementById("currentName");
const currentPhone = document.getElementById("currentPhone");
const currentAddress = document.getElementById("currentAddress");
const currentBirthday = document.getElementById("currentBirthday");
const newPasswordInput = document.getElementById("newPassword");
const updateInfoBtn = document.getElementById("updateInfoBtn");
const changePasswordBtn = document.getElementById("changePasswordBtn");
const logoutArrow = document.getElementById("logoutArrow");
const cartCountEl = document.getElementById("cartCount");
const ordersContainer = document.getElementById("ordersContainer");
const ordersList = document.getElementById("ordersList");
const orderHistoryBtn = document.getElementById("orderHistoryBtn");
const avatarImg = document.getElementById("avatarImg");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

function toggleMenu(){ sidebar.classList.toggle("active"); overlay.classList.toggle("active"); }
function showMsg(el,text,color){ el.innerText=text; el.style.color=color; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),3000); }

let currentUser = null;
auth.onAuthStateChanged(user=>{
    if(!user){window.location.href="index.html";return;}
    currentUser = user;
    updateInfoBtn.disabled = false;

    // Thêm UID vào URL nếu chưa có
    const urlParams = new URLSearchParams(window.location.search);
    let uidToLoad = urlParams.get('uid') || currentUser.uid;
    if(!window.location.search.includes("uid=")){
        window.history.replaceState({}, "", `${window.location.pathname}?uid=${currentUser.uid}`);
    }

    userEmail.innerText = currentUser.email;
    userCreatedAt.innerText = new Date(currentUser.metadata.creationTime).toLocaleDateString();

    db.ref('users/'+uidToLoad).once('value').then(snapshot=>{
        if(snapshot.exists()){
            const data = snapshot.val();
            nameInput.value = data.name||"";
            phoneInput.value = data.phone||"";
            addressInput.value = data.address||"";
            birthdayInput.value = data.birthday||"";
            avatarImg.src = data.avatar || "https://i.ibb.co/Z1kv9nJj/logo.png";
            currentName.innerText = data.name||"Chưa cập nhật";
            currentPhone.innerText = data.phone||"Chưa cập nhật";
            currentAddress.innerText = data.address||"Chưa cập nhật";
            currentBirthday.innerText = data.birthday||"Chưa cập nhật";
        }
    });

    db.ref('carts/'+currentUser.uid).on('value',snapshot=>{
        let count=0; snapshot.forEach(item=>{count+=parseInt(item.val().quantity)||1;}); 
        cartCountEl.innerText=count;
    });
});

updateInfoBtn.addEventListener("click",async()=>{
    if(!currentUser)return;
    try{
        await db.ref('users/'+currentUser.uid).update({
            name:nameInput.value,
            phone:phoneInput.value,
            address:addressInput.value,
            birthday:birthdayInput.value
        });
        currentName.innerText = nameInput.value||"Chưa cập nhật";
        currentPhone.innerText = phoneInput.value||"Chưa cập nhật";
        currentAddress.innerText = addressInput.value||"Chưa cập nhật";
        currentBirthday.innerText = birthdayInput.value||"Chưa cập nhật";
        showMsg(messageEl,"Cập nhật thành công!","green");
    }catch(err){ showMsg(errorEl,err.message,"red"); }
});

changePasswordBtn.addEventListener("click",async()=>{
    const newPass = newPasswordInput.value.trim();
    if(newPass.length<6){ showMsg(errorEl,"Mật khẩu tối thiểu 6 ký tự","red"); return; }
    try{
        await currentUser.updatePassword(newPass);
        newPasswordInput.value="";
        showMsg(messageEl,"Đổi mật khẩu thành công!","green");
    }catch(err){ showMsg(errorEl,err.message,"red"); }
});

logoutArrow.addEventListener('click', e=>{ e.preventDefault(); auth.signOut().then(()=>window.location.href="index.html"); });

orderHistoryBtn.addEventListener('click',()=>{
    ordersContainer.style.display='block';
    ordersList.innerHTML='Đang tải...';
    db.ref('orders/'+currentUser.uid).once('value').then(snapshot=>{
        ordersList.innerHTML='';
        if(!snapshot.exists()){ ordersList.innerHTML='<p>Chưa có đơn hàng nào.</p>'; return; }
        snapshot.forEach(order=>{
            const data = order.val();
            const div = document.createElement('div');
            div.className='order-item';
            const productNames = data.items ? data.items.map(i=>i.name).join(', ') : "Không có sản phẩm";
            div.innerHTML=`<strong>Mã đơn: ${order.key}</strong><br>Trạng thái: ${data.status||"Đang xử lý"}<br>Sản phẩm: ${productNames}`;
            ordersList.appendChild(div);
        });
    });
});
</script>
</body>
</html>
