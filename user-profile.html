<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thông tin cá nhân</title>
<style>
/* RESET & BODY */
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 20px; }

/* CONTAINER */
.container {
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 0 15px rgba(0,0,0,0.1);
  width: 95%;
  max-width: 450px;
}

/* HEADER */
h2 { text-align: center; margin-bottom: 20px; font-size: 1.5rem; color: #333; }

/* PROFILE */
.profile { display: flex; flex-direction: column; align-items: center; gap: 15px; }
.avatar-container { position: relative; width: 120px; height: 120px; cursor: pointer; }
.avatar-container img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border:2px solid #007BFF; }

/* INFO FIELDS */
.info-fields { width: 100%; }
.info-fields p { margin: 8px 0 4px; font-size: 0.9rem; color: #555; }
.info-fields input { width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 0.95rem; }

/* BUTTONS */
button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #007BFF; color: white; font-size: 1rem; cursor: pointer; margin-top: 8px; }
button:hover { background: #0056b3; }

/* UPDATED INFO BOX */
.updated-info { margin-top: 20px; background: #e7f3ff; padding: 12px; border-radius: 8px; }
.updated-info p { margin: 4px 0; font-size: 0.9rem; }

/* MESSAGE & ERROR */
#message { color: green; margin-top: 10px; text-align: center; font-size: 0.9rem; }
#error { color: red; margin-top: 10px; text-align: center; font-size: 0.9rem; }

/* ACTION BUTTONS */
.actions { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
@media (min-width:450px){ 
  .profile{ flex-direction: row; align-items:flex-start; } 
  .avatar-container img{ width:140px; height:140px; }
  .actions{ flex-direction: row; }
  .actions button{ flex:1; }
}
</style>
</head>
<body>

<div class="container">
  <h2>Thông tin cá nhân</h2>
  <div class="profile">
    <div class="avatar-container">
      <img id="avatarImg" src="https://sf-static.upanhlaylink.com/img/image_2026050971756c76fa2be615eebe690664a5f510.jpg" alt="">
      <input type="file" id="avatarInput" accept="image/*" style="display:none">
    </div>
    <div class="info-fields">
      <p>Email: <span id="userEmail"></span></p>
      <input type="text" id="name" placeholder="Họ và tên">
      <input type="text" id="phone" placeholder="Số điện thoại">
      <input type="text" id="address" placeholder="Địa chỉ">
      <input type="date" id="birthday" placeholder="Ngày sinh">
      <button id="updateInfoBtn" disabled>Cập nhật thông tin</button>
    </div>
  </div>

  <div class="updated-info">
    <h3>Thông tin hiện tại:</h3>
    <p>Họ và tên: <span id="currentName"></span></p>
    <p>Số điện thoại: <span id="currentPhone"></span></p>
    <p>Địa chỉ: <span id="currentAddress"></span></p>
    <p>Ngày sinh: <span id="currentBirthday"></span></p>
  </div>

  <h2>Đổi mật khẩu</h2>
  <input type="password" id="newPassword" placeholder="Mật khẩu mới">
  <div class="actions">
    <button id="changePasswordBtn">Đổi mật khẩu</button>
    <button id="logoutBtn">Đăng xuất</button>
    <button id="homeBtn">Trang chủ</button>
  </div>

  <div id="message"></div>
  <div id="error"></div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, onAuthStateChanged, signOut, updatePassword, EmailAuthProvider, reauthenticateWithCredential 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYVcBEYJN1HUCta3XdJAUBe4TGLnmy7y4",
  authDomain: "stech-73b89.firebaseapp.com",
  databaseURL: "https://stech-73b89-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "stech-73b89",
  storageBucket: "stech-73b89.appspot.com",
  messagingSenderId: "873739162979",
  appId: "1:873739162979:web:978f1a4043f025b1cdaf56",
  measurementId: "G-98Q3927PHZ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const storage = getStorage(app);

let currentUser = null;

// DOM
const avatarImg = document.getElementById("avatarImg");
const avatarInput = document.getElementById("avatarInput");
const userEmail = document.getElementById("userEmail");
const nameInput = document.getElementById("name");
const phoneInput = document.getElementById("phone");
const addressInput = document.getElementById("address");
const birthdayInput = document.getElementById("birthday");
const currentName = document.getElementById("currentName");
const currentPhone = document.getElementById("currentPhone");
const currentAddress = document.getElementById("currentAddress");
const currentBirthday = document.getElementById("currentBirthday");
const newPasswordInput = document.getElementById("newPassword");
const messageEl = document.getElementById("message");
const errorEl = document.getElementById("error");
const updateInfoBtn = document.getElementById("updateInfoBtn");
const changePasswordBtn = document.getElementById("changePasswordBtn");
const logoutBtn = document.getElementById("logoutBtn");
const homeBtn = document.getElementById("homeBtn");

// LOAD USER
onAuthStateChanged(auth, (user) => {
  if(!user){ window.location.href="index.html"; return; }
  currentUser = user;
  updateInfoBtn.disabled = false;
  userEmail.innerText = user.email;

  const userRef = ref(db, "users/" + user.uid);
  get(userRef).then((snapshot)=>{
    if(!snapshot.exists()) return;
    const data = snapshot.val();
    nameInput.value = data.name || "";
    phoneInput.value = data.phone || "";
    addressInput.value = data.address || "";
    birthdayInput.value = data.birthday || "";
    avatarImg.src = data.avatar || "https://sf-static.upanhlaylink.com/img/image_2026050971756c76fa2be615eebe690664a5f510.jpg";

    currentName.innerText = data.name || "";
    currentPhone.innerText = data.phone || "";
    currentAddress.innerText = data.address || "";
    currentBirthday.innerText = data.birthday || "";
  });
});

// CLICK AVATAR
avatarImg.addEventListener("click", ()=> avatarInput.click());

// UPLOAD AVATAR
avatarInput.addEventListener("change", async (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const avatarRef = sRef(storage, 'avatars/' + currentUser.uid + '.jpg');
  await uploadBytes(avatarRef, file);
  const url = await getDownloadURL(avatarRef);
  await update(ref(db, 'users/' + currentUser.uid), { avatar: url });
  avatarImg.src = url;
  messageEl.innerText = "Cập nhật ảnh đại diện thành công!";
});

// UPDATE INFO
updateInfoBtn.addEventListener("click", async ()=>{
  messageEl.innerText=""; errorEl.innerText="";
  const name = nameInput.value.trim();
  const phone = phoneInput.value.trim();
  const address = addressInput.value.trim();
  const birthday = birthdayInput.value;
  if(!name || !phone){ errorEl.innerText="Vui lòng nhập đầy đủ thông tin!"; return; }
  await update(ref(db, 'users/' + currentUser.uid), { name, phone, address, birthday });
  messageEl.innerText = "Cập nhật thành công!";
  currentName.innerText = name;
  currentPhone.innerText = phone;
  currentAddress.innerText = address;
  currentBirthday.innerText = birthday;
});

// CHANGE PASSWORD
changePasswordBtn.addEventListener("click", async ()=>{
  messageEl.innerText=""; errorEl.innerText="";
  const newPass = newPasswordInput.value.trim();
  if(newPass.length<6){ errorEl.innerText="Mật khẩu phải ≥6 ký tự"; return; }
  try{
    await updatePassword(currentUser, newPass);
    messageEl.innerText="Đổi mật khẩu thành công!";
    newPasswordInput.value="";
  } catch(err){
    if(err.code === "auth/requires-recent-login"){
      const oldPass = prompt("Nhập mật khẩu cũ để xác thực:");
      if(!oldPass) return;
      const credential = EmailAuthProvider.credential(currentUser.email, oldPass);
      try{
        await reauthenticateWithCredential(currentUser, credential);
        await updatePassword(currentUser, newPass);
        messageEl.innerText="Đổi mật khẩu thành công!";
        newPasswordInput.value="";
      } catch(e){ errorEl.innerText = e.message; }
    } else errorEl.innerText = err.message;
  }
});

// LOGOUT & HOME
logoutBtn.addEventListener("click", ()=>signOut(auth).then(()=>window.location.href="index.html"));
homeBtn.addEventListener("click", ()=>window.location.href="index.html");
</script>
</body>
</html>
