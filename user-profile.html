<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thông tin người dùng</title>
<link rel="stylesheet" href="styletrong-nha.css">
<style>
.profile-container {
  max-width:400px; margin:50px auto; padding:20px; border:1px solid #ccc; border-radius:8px; background:#f9f9f9;
}
.profile-container input, .profile-container button {
  width:100%; padding:8px; margin:6px 0; border-radius:4px; border:1px solid #aaa;
}
.profile-container button {
  background:#007BFF; color:white; font-weight:bold; cursor:pointer; border:none; border-radius:4px;
}
#avatarPreview {
  width:100px; height:100px; border-radius:50%; object-fit:cover; display:block; margin:10px auto; border:1px solid #ccc;
}
#saveStatus { margin-top:8px; font-weight:bold; text-align:center;}
</style>
</head>
<body>

<div class="profile-container">
  <h2>Thông tin người dùng</h2>
  <img id="avatarPreview" src="images/logo-default.png" alt="Avatar">
  <input type="file" id="avatarInput">
  <input type="text" id="nameInput" placeholder="Họ và tên">
  <input type="email" id="emailInput" placeholder="Email" disabled>
  <input type="text" id="phoneInput" placeholder="Số điện thoại">
  <input type="text" id="addressInput" placeholder="Địa chỉ">
  <input type="date" id="dobInput" placeholder="Ngày sinh">
  <button id="saveProfileBtn">Lưu thông tin</button>
  <button id="logoutBtn" style="background:#2196F3">Đăng xuất</button>
  <p id="saveStatus"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="user-profile.js"></script>

</body>
</html>
